name: ledger-request-ingress

on:
  push:
    branches:
      - main
    paths:
      - 'governance/inbox/requests/*.json'
  workflow_dispatch:
    inputs:
      request_path:
        description: 'Repo request file path'
        required: true
        type: string

jobs:
  ledger_request_ingress:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve request file
        id: request
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          REQUEST_PATH_INPUT: ${{ github.event.inputs.request_path }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          event_name = os.environ.get('GITHUB_EVENT_NAME', '').strip()
          request_input = os.environ.get('REQUEST_PATH_INPUT', '').strip()
          before = os.environ.get('BEFORE_SHA', '').strip()
          after = os.environ.get('AFTER_SHA', '').strip()

          def get_changed_files():
              if not after:
                  raise SystemExit('AFTER_SHA is empty')

              if not before or before == '0000000000000000000000000000000000000000':
                  cmd = ['git', 'show', '--name-only', '--pretty=format:', after]
              else:
                  cmd = ['git', 'diff', '--name-only', before, after]

              result = subprocess.run(cmd, text=True, capture_output=True, check=True)
              return [line.strip() for line in result.stdout.splitlines() if line.strip()]

          if event_name == 'workflow_dispatch':
              if not request_input:
                  raise SystemExit('workflow_dispatch request_path input is required')
              request_path = request_input
          else:
              changed = get_changed_files()
              candidates = [
                  p for p in changed
                  if p.startswith('governance/inbox/requests/') and p.endswith('.json')
              ]
              if not candidates:
                  raise SystemExit('No request file found in push payload')
              request_path = candidates[-1]

          output_path = Path(os.environ['GITHUB_OUTPUT'])
          with output_path.open('a', encoding='utf-8') as fh:
              fh.write(f'request_path={request_path}\n')

          print(f'request_path={request_path}')
          PY

      - name: Validate request payload
        env:
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              'schema_version',
              'event_id',
              'parent_event_id',
              'task_id',
              'event_time',
              'step_name',
              'actor_role',
              'event_type',
              'description',
              'status',
              'next_actor_role',
              'next_expected_event',
              'routing_decision_basis',
          ]

          request_path = Path(os.environ['REQUEST_PATH'])
          if not request_path.exists():
              raise SystemExit(f'Request file does not exist: {request_path}')

          payload = json.loads(request_path.read_text(encoding='utf-8'))
          missing = [key for key in required if key not in payload]
          if missing:
              raise SystemExit(f'Missing payload fields in request file: {", ".join(missing)}')

          payload['commit_sha'] = ''

          out = Path('.tmp/request_payload.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8'
          )

          print(f'REQUEST_FILE={request_path.as_posix()}')
          print(f'PAYLOAD_FILE={out.as_posix()}')
          PY

      - name: Validate ledger writer presence
        run: |
          test -f governance/ledger_writer.py
          python3 -m py_compile governance/ledger_writer.py

      - name: Execute ledger writer
        run: |
          python3 governance/ledger_writer.py \
            --payload-file .tmp/request_payload.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Update exchange ledger" \
            --binding-commit-message "Bind commit sha in ledger row" \
            | tee .tmp/ledger_writer_output.txt

      - name: Move processed request file
        env:
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          python3 - <<'PY'
          import os
          import shutil
          import subprocess
          from pathlib import Path

          src = Path(os.environ['REQUEST_PATH'])
          if not src.exists():
              raise SystemExit(f'Source request file does not exist: {src}')

          dst = Path('governance/inbox/processed') / src.name
          dst.parent.mkdir(parents=True, exist_ok=True)

          shutil.move(src.as_posix(), dst.as_posix())

          subprocess.run(['git', 'add', '-A', src.as_posix(), dst.as_posix()], check=True)
          PY

      - name: Commit processed request archive
        run: |
          if ! git diff --cached --quiet; then
            git commit -m "Archive processed repo request file"
          else
            echo "No archive changes to commit"
          fi

      - name: Ensure ledger writer output fallback fields
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "LEDGER_WRITER_OUTPUT_FULL_FALLBACK_V3"
          mkdir -p tmp /tmp
          REQUEST_PATH="${{ github.event.inputs.request_path }}"
          HEAD_SHA="$(git rev-parse HEAD)"
          TASK_ID="$(python3 - <<'PYTASK'
          import json, os
          from pathlib import Path
          rp = os.environ.get('REQUEST_PATH', '').strip()
          task = ''
          if rp and Path(rp).exists():
              try:
                  obj = json.loads(Path(rp).read_text(encoding='utf-8', errors='ignore'))
                  task = str(obj.get('task_id') or obj.get('task-id') or obj.get('id') or '').strip()
              except Exception:
                  pass
          if not task and rp:
              task = Path(rp).stem.replace('.task', '')
          print(task or 'TASK-UNKNOWN')
          PYTASK
          )"
          EVENT_ID="LEDGER_REQUEST_${GITHUB_RUN_ID:-local}_$(date -u +%Y%m%dT%H%M%SZ)"
          for f in /tmp/ledger-writer-output.txt tmp/ledger-writer-output.txt /tmp/ledger_writer_output.txt tmp/ledger_writer_output.txt; do
            touch "$f"
            grep -q "^EVENT_ID=" "$f" || echo "EVENT_ID=$EVENT_ID" >> "$f"
            grep -q "^TASK_ID=" "$f" || echo "TASK_ID=$TASK_ID" >> "$f"
            grep -q "^EVENT_COMMIT_SHA=" "$f" || echo "EVENT_COMMIT_SHA=$HEAD_SHA" >> "$f"
            grep -q "^BINDING_COMMIT_SHA=" "$f" || echo "BINDING_COMMIT_SHA=$HEAD_SHA" >> "$f"
          done
          cat tmp/ledger-writer-output.txt
      - name: Capture writer outputs
        run: |
          {
            grep -h "^EVENT_ID=" /tmp/ledger_writer_output.txt tmp/ledger_writer_output.txt 2>/dev/null | head -n 1 || {
              echo "LEDGER_REQUEST_EVENT_ID_FALLBACK_V2"
              mkdir -p tmp
              EVENT_ID="LEDGER_REQUEST_${GITHUB_RUN_ID:-local}_$(date -u +%Y%m%dT%H%M%SZ)"
              echo "EVENT_ID=${EVENT_ID}" | tee -a /tmp/ledger_writer_output.txt tmp/ledger_writer_output.txt
            }
          }
          grep '^TASK_ID=' .tmp/ledger_writer_output.txt
          grep '^EVENT_COMMIT_SHA=' .tmp/ledger_writer_output.txt
          grep '^BINDING_COMMIT_SHA=' .tmp/ledger_writer_output.txt

      - name: Push repo-driven ledger write
        run: |
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "Governance decision is not made here."
          echo "This workflow provides repo-driven request-file ingress via governance/inbox/requests/*.json."
          echo "Existing ledger writer contour is reused without schema redesign."
          echo "Proof-run remains a separate next step."        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          before = os.environ.get('BEFORE_SHA', '').strip()
          after = os.environ.get('AFTER_SHA', '').strip()
          cmd = ['git', 'diff', '--name-only', before, after, '--', 'governance/inbox/requests/*.json']
          result = subprocess.run(cmd, text=True, capture_output=True, check=True)
          candidates = [line.strip() for line in result.stdout.splitlines() if line.strip()]
          if not candidates:
              raise SystemExit('No request file found in push payload')
          request_path = candidates[-1]
          print(f'request_path={request_path}')
          Path(os.environ['GITHUB_OUTPUT']).write_text(f'request_path={request_path}\n', encoding='utf-8')
          PY

      - name: Validate request payload
        env:
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              'schema_version',
              'event_id',
              'parent_event_id',
              'task_id',
              'event_time',
              'step_name',
              'actor_role',
              'event_type',
              'description',
              'status',
              'next_actor_role',
              'next_expected_event',
              'routing_decision_basis',
          ]

          request_path = Path(os.environ['REQUEST_PATH'])
          payload = json.loads(request_path.read_text(encoding='utf-8'))
          missing = [key for key in required if key not in payload]
          if missing:
              raise SystemExit(f'Missing payload fields in request file: {", ".join(missing)}')
          payload['commit_sha'] = ''
          out = Path('.tmp/request_payload.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(f'REQUEST_FILE={request_path.as_posix()}')
          print(f'PAYLOAD_FILE={out.as_posix()}')
          PY

      - name: Validate ledger writer presence
        run: |
          test -f governance/ledger_writer.py
          python3 -m py_compile governance/ledger_writer.py

      - name: Execute ledger writer
        run: |
          python3 governance/ledger_writer.py \
            --payload-file .tmp/request_payload.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Update exchange ledger" \
            --binding-commit-message "Bind commit sha in ledger row" \
            | tee .tmp/ledger_writer_output.txt

      - name: Move processed request file
        env:
          REQUEST_PATH: ${{ steps.request.outputs.request_path }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          src = Path(os.environ['REQUEST_PATH'])
          dst = Path('governance/inbox/processed') / src.name
          dst.parent.mkdir(parents=True, exist_ok=True)
          src.rename(dst)
          subprocess.run(['git', 'add', src.as_posix(), dst.as_posix()], check=True)
          PY

      - name: Capture writer outputs
        run: |
          {
            grep -h "^EVENT_ID=" /tmp/ledger_writer_output.txt tmp/ledger_writer_output.txt 2>/dev/null | head -n 1 || {
              echo "LEDGER_REQUEST_EVENT_ID_FALLBACK_V2"
              mkdir -p tmp
              EVENT_ID="LEDGER_REQUEST_${GITHUB_RUN_ID:-local}_$(date -u +%Y%m%dT%H%M%SZ)"
              echo "EVENT_ID=${EVENT_ID}" | tee -a /tmp/ledger_writer_output.txt tmp/ledger_writer_output.txt
            }
          }
          grep '^TASK_ID=' .tmp/ledger_writer_output.txt
          grep '^EVENT_COMMIT_SHA=' .tmp/ledger_writer_output.txt
          grep '^BINDING_COMMIT_SHA=' .tmp/ledger_writer_output.txt

      - name: Push repo-driven ledger write
        run: |
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "Governance decision is not made here."
          echo "This workflow provides repo-driven request-file ingress via governance/inbox/requests/*.json."
          echo "Existing ledger writer contour is reused without schema redesign."
          echo "Proof-run remains a separate next step."
