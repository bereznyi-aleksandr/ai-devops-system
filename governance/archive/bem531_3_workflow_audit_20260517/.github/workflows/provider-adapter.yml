name: Provider Adapter

# BEM-477: real Claude execution via claude.yml dispatch (Option B)
# BEM-488: YAML-safe rewrite — no f-string multiline, no nested python3 -c in $()
# Results: governance/transport/ + governance/reports/
# NO issue comments (BEM-476)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'claude | gpt'
        required: true
        default: 'claude'
        type: string
      role:
        description: 'analyst | auditor | executor | curator'
        required: true
        default: 'analyst'
        type: string
      trace_id:
        description: 'Trace ID'
        required: true
        type: string
      cycle_id:
        description: 'Cycle ID'
        required: false
        default: ''
        type: string
      task_type:
        description: 'Task type'
        required: false
        default: 'default_development'
        type: string
      task:
        description: 'Task body'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  provider-adapter:
    name: Provider Adapter
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "provider-adapter@ai-devops-system"
          git config user.name  "Provider Adapter"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Write transport request
        shell: bash
        env:
          INPUT_PROVIDER:  ${{ inputs.provider }}
          INPUT_ROLE:      ${{ inputs.role }}
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_CYCLE_ID:  ${{ inputs.cycle_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
          INPUT_TASK:      ${{ inputs.task }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ['INPUT_TRACE_ID']
          cycle = os.environ.get('INPUT_CYCLE_ID') or ('cycle_' + trace)

          req = {
              'trace_id':   trace,
              'cycle_id':   cycle,
              'role':       os.environ['INPUT_ROLE'],
              'provider':   os.environ['INPUT_PROVIDER'],
              'task_type':  os.environ.get('INPUT_TASK_TYPE', 'default_development'),
              'task':       os.environ.get('INPUT_TASK', ''),
              'status':     'queued',
              'created_at': now
          }
          Path('governance/transport').mkdir(parents=True, exist_ok=True)
          with open('governance/transport/requests.jsonl', 'a') as f:
              f.write(json.dumps(req, ensure_ascii=False) + '\n')
          print('Request written: trace=' + trace + ' role=' + req['role'])
          PYEOF

      # BEM-488: use Python urllib instead of nested python3 -c inside $() inside curl
      - name: Dispatch claude.yml for real Claude execution
        if: inputs.provider == 'claude'
        shell: bash
        env:
          GH_TOKEN:        ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO:            ${{ github.repository }}
          INPUT_ROLE:      ${{ inputs.role }}
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_CYCLE_ID:  ${{ inputs.cycle_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
          INPUT_TASK:      ${{ inputs.task }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          token     = os.environ['GH_TOKEN']
          repo      = os.environ['REPO']
          role      = os.environ.get('INPUT_ROLE', 'analyst')
          trace     = os.environ.get('INPUT_TRACE_ID', '')
          cycle     = os.environ.get('INPUT_CYCLE_ID', '')
          task_type = os.environ.get('INPUT_TASK_TYPE', 'default_development')
          task      = os.environ.get('INPUT_TASK', '')

          payload = json.dumps({
              'ref': 'main',
              'inputs': {
                  'role':      role,
                  'provider':  'claude',
                  'trace_id':  trace,
                  'cycle_id':  cycle,
                  'task_type': task_type,
                  'task':      task
              }
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://api.github.com/repos/' + repo + '/actions/workflows/claude.yml/dispatches',
              data=payload,
              headers={
                  'Authorization': 'Bearer ' + token,
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                  'User-Agent': 'provider-adapter'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  http_status = resp.status
          except urllib.error.HTTPError as e:
              http_status = e.code
          except Exception as e:
              http_status = 0
              print('Dispatch error: ' + str(e))

          print('claude.yml dispatch HTTP=' + str(http_status))

          # Write DISPATCH_HTTP to env file
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('DISPATCH_HTTP=' + str(http_status) + '\n')
          PYEOF

      - name: Write dispatch result to transport
        shell: bash
        env:
          INPUT_PROVIDER:  ${{ inputs.provider }}
          INPUT_ROLE:      ${{ inputs.role }}
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_CYCLE_ID:  ${{ inputs.cycle_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now      = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace    = os.environ['INPUT_TRACE_ID']
          cycle    = os.environ.get('INPUT_CYCLE_ID') or ('cycle_' + trace)
          role     = os.environ['INPUT_ROLE']
          provider = os.environ['INPUT_PROVIDER']
          dispatch_http = os.environ.get('DISPATCH_HTTP', '?')

          if dispatch_http == '204':
              status  = 'dispatched_to_claude'
              blocker = None
          else:
              status  = 'dispatch_failed'
              blocker = 'claude.yml dispatch returned HTTP ' + dispatch_http

          report_path = 'governance/reports/' + trace + '.md'
          Path('governance/reports').mkdir(parents=True, exist_ok=True)

          # BEM-488: safe string join instead of f-string multiline
          lines = [
              '# Provider Adapter - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Role | ' + role + ' |',
              '| Provider | ' + provider + ' |',
              '| Dispatch status | ' + status + ' |',
              '| Dispatch HTTP | ' + dispatch_http + ' |',
              '| Updated at | ' + now + ' |',
              '',
              'Status: ' + status,
              ('Blocker: ' + blocker) if blocker else 'No blocker at dispatch stage.',
              '',
              'Real result appended to governance/transport/results.jsonl by claude.yml.',
          ]
          Path(report_path).write_text('\n'.join(lines) + '\n')

          result = {
              'trace_id':     trace,
              'cycle_id':     cycle,
              'role':         role,
              'provider':     provider,
              'status':       status,
              'changed_files': [],
              'commit_sha':   None,
              'blocker':      blocker,
              'report_path':  report_path,
              'completed_at': now
          }
          with open('governance/transport/results.jsonl', 'a') as f:
              f.write(json.dumps(result, ensure_ascii=False) + '\n')

          ps_path = Path('governance/state/provider_status.json')
          try:
              ps = json.loads(ps_path.read_text())
          except Exception:
              ps = {}
          ps[provider] = {'status': 'dispatched', 'last_used': now, 'last_trace': trace}
          ps['updated_at'] = now
          ps_path.write_text(json.dumps(ps, indent=2) + '\n')

          print('Dispatch result written: status=' + status)
          PYEOF

      - name: Update role_cycle_state
        shell: bash
        env:
          INPUT_ROLE:     ${{ inputs.role }}
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          INPUT_CYCLE_ID: ${{ inputs.cycle_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          role  = os.environ.get('INPUT_ROLE', 'analyst')
          trace = os.environ.get('INPUT_TRACE_ID', 'unknown')
          cycle = os.environ.get('INPUT_CYCLE_ID') or ('cycle_' + trace)

          rcs_path = Path('governance/state/role_cycle_state.json')
          try:
              rcs = json.loads(rcs_path.read_text())
          except Exception:
              rcs = {'version': 1, 'roles_completed': []}

          completed = rcs.get('roles_completed') or []
          if role not in completed:
              completed.append(role)

          rcs.update({
              'trace_id':        trace,
              'cycle_id':        cycle,
              'current_role':    role,
              'roles_completed': completed,
              'status':          'in_progress',
              'updated_at':      now
          })
          rcs_path.write_text(json.dumps(rcs, indent=2) + '\n')
          print('role_cycle_state updated: role=' + role)
          PYEOF

      - name: Commit state
        shell: bash
        run: |
          git add \
            governance/transport/requests.jsonl \
            governance/transport/results.jsonl \
            governance/state/role_cycle_state.json \
            governance/state/provider_status.json \
            governance/reports/ \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "PROVIDER-ADAPTER: role=${{ inputs.role }} trace=${{ inputs.trace_id }}"
            git push
          fi

      # BEM-488: Python-based summary instead of heredoc (avoids YAML/bash heredoc issues)
      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_ROLE:      ${{ inputs.role }}
          INPUT_PROVIDER:  ${{ inputs.provider }}
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
        run: |
          python3 - <<'PYEOF'
          import os

          role      = os.environ.get('INPUT_ROLE', '?')
          provider  = os.environ.get('INPUT_PROVIDER', '?')
          trace     = os.environ.get('INPUT_TRACE_ID', '?')
          task_type = os.environ.get('INPUT_TASK_TYPE', '?')
          dispatch  = os.environ.get('DISPATCH_HTTP', '-')

          lines = [
              '## Provider Adapter - ' + role + ' | ' + provider,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Role | ' + role + ' |',
              '| Provider | ' + provider + ' |',
              '| Task type | ' + task_type + ' |',
              '| claude.yml dispatch HTTP | ' + dispatch + ' |',
              '| Report | governance/reports/' + trace + '.md |',
              '',
              '**No issue comments written (BEM-476/477)**',
              '',
          ]

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
