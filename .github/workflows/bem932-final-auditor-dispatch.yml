name: BEM-932 Final Auditor Dispatch

"on":
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  dispatch-claude-final-auditor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch Claude final release auditor
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/bem932_final_auditor_payload.json
          import json

          task = """BEM-932 v8.3 FINAL RELEASE AUDIT AFTER LIVE PROOFS

Role: EXTERNAL_AUDITOR_CLAUDE

Read these repository files:
- governance/release/bem932_release_gate.json
- governance/proofs/BEM932_live_worker_post_receipt.json
- governance/proofs/BEM932_live_quota_fallback_receipt.json
- governance/proofs/BEM932_cloudflare_dashboard_operator_evidence_20260615.json
- governance/proofs/BEM932_provider_router_smoke_receipt.json
- governance/audit_mailbox/gpt_to_claude/BEM932_final_release_after_live_proofs_audit_request.md

Then write the final verdict file exactly here:
governance/audit_mailbox/claude_to_gpt/BEM932_final_release_verdict_after_live_proofs.md

Accepted verdicts:
- APPROVED_FOR_WORKING_CONTOUR_READY
- BLOCKED_WITH_REASON

If approved, include a compact checklist of the live proofs reviewed.
If blocked, include explicit missing proof/action.
Do not paste secrets. Keep the verdict concise."""
          payload = {
              "ref": "main",
              "inputs": {
                  "role": "auditor",
                  "provider": "claude",
                  "trace_id": "bem932_final_release_verdict_after_live_proofs",
                  "cycle_id": "bem932_final_release_audit",
                  "task_type": "external_audit_final_release_verdict",
                  "task": task,
              },
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY

          code=$(curl -sS -o /tmp/claude_dispatch_response.txt -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/actions/workflows/claude.yml/dispatches" \
            --data @/tmp/bem932_final_auditor_payload.json)

          cat /tmp/claude_dispatch_response.txt || true
          if [ "$code" != "204" ]; then
            echo "Claude dispatch failed with HTTP $code"
            exit 1
          fi
          echo "Claude final auditor dispatch accepted"
