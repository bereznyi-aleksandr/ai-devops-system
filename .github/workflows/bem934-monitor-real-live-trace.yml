name: BEM934 Monitor Real Live Trace

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for real Claude run and captur trace
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          TRACE: tg_818730867_20260618T105741Z
        run: |
          set -euo pipefail
          gh auth setup-git
          REN =""
          for attempt in $(seq 1 60); do
            RUN="$(gh run list --repo "$REPO" --workflow claude.yml --limit 20 --json databaseId,createdAt,status,conclusion --jq '[.[] | select(.createdAt >= "2026-06-18T10:57:40Z")][0].databaseId // empty')"
            if [ -n "$RUN" ]; then
              STATUS="$(gh run view "$RUN" --repo "$REPO" --json status --jq .status)"
              if [ "$STATUS" = "completed" ]; then break; fi
            fi
            sleep 10
          done
          test -n "$RUN"
          gh run view "$RUN" --repo "$REPO" --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url,displayTitle > /tmp/run.json
          gh run view "$RUN" --repo "$REPO" --log-failed > /tmp/failed.log 2>&1 || true
          gh repo clone "$REPO" repo
          cd repo
          git pull --rebase origin main
          git config user.email "bem934-monitor@ai-devops-system"
          git config user.name "BEM-934 Live Monitor"
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          trace = os.environ["TRACE"]
          records = []
          results = Path("governance/transport/results.jsonl")
          for line in results.read_text(errors="replace").splitlines():
              if trace not in line:
                  continue
              try:
                  records.append(json.loads(line))
              except json.JSONDecodeError:
                  pass
          log = Path("/tmp/failed.log").read_text(errors="replace")
          out = {
              "task_id": "BEM934-LIVE-TEST",
              "trace_id": trace,
              "run": json.load(open("/tmp/run.json", encoding="utf-8")),
              "matching_transport_records": records[-10:],
              "failed_log_tail": log[-12000:],
          }
          Path("governance/proofs/BEM934_real_live_trace_monitor.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          git add governance/proofs/BEM934_real_live_trace_monitor.json
          git commit -m "Capture real BEM-934 Telegram Claude trace" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
