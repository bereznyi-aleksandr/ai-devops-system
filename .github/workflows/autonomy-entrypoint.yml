name: autonomy-entrypoint
# BEM-345 short E2E domain runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-entrypoint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show context
        run: |
          echo "WORKFLOW=${GITHUB_WORKFLOW}"
          echo "EVENT=${GITHUB_EVENT_NAME}"
          echo "REF=${GITHUB_REF}"
          echo "SHA=${GITHUB_SHA}"

      - name: Run E2E domain verification 002
        run: |
          set -euo pipefail
          python3 governance/scripts/e2e_domain_verification_002.py

      - name: Commit E2E domain verification proof
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/audit/e2e-domain-verification-002-latest.json
          if git diff --cached --quiet; then
            echo "NO_E2E_DOMAIN_PROOF_CHANGES"
          else
            git commit -m "Capture E2E domain verification 002 result"
            git push origin main
          fi
