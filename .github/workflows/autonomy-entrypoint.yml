name: autonomy-entrypoint
# BEM-353 trigger run 3 with run-specific E2E proof

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/autonomy-entrypoint.yml'
      - 'governance/scripts/e2e_domain_verification_002.py'
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  run-entrypoint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show context
        run: |
          echo "WORKFLOW=${GITHUB_WORKFLOW}"
          echo "EVENT=${GITHUB_EVENT_NAME}"
          echo "REF=${GITHUB_REF}"
          echo "SHA=${GITHUB_SHA}"
          echo "RUN_ID=${GITHUB_RUN_ID}"
          echo "RUN_ATTEMPT=${GITHUB_RUN_ATTEMPT}"

      - name: Run E2E domain verification 002
        run: |
          set -euo pipefail
          python3 governance/scripts/e2e_domain_verification_002.py
          mkdir -p governance/audit/e2e-domain-runs
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          latest = Path('governance/audit/e2e-domain-verification-002-latest.json')
          data = json.loads(latest.read_text(encoding='utf-8'))
          data['github_run'] = {
              'run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT', ''),
              'sha': os.environ.get('GITHUB_SHA', ''),
              'workflow': os.environ.get('GITHUB_WORKFLOW', ''),
              'event_name': os.environ.get('GITHUB_EVENT_NAME', ''),
          }
          latest.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          run_id = data['github_run']['run_id'] or 'unknown'
          attempt = data['github_run']['run_attempt'] or '0'
          run_file = Path('governance/audit/e2e-domain-runs') / f'e2e-domain-verification-002-run-{run_id}-attempt-{attempt}.json'
          run_file.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(run_file)
          PY

      - name: Commit E2E domain verification proof
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/audit/e2e-domain-verification-002-latest.json governance/audit/e2e-domain-runs/*.json
          if git diff --cached --quiet; then
            echo "NO_E2E_DOMAIN_PROOF_CHANGES"
          else
            git commit -m "Capture E2E domain verification 002 result"
            git push origin main
          fi
