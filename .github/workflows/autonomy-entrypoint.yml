name: autonomy-entrypoint

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-entrypoint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Show context
        run: |
          echo "WORKFLOW=${GITHUB_WORKFLOW}"
          echo "EVENT=${GITHUB_EVENT_NAME}"
          echo "REF=${GITHUB_REF}"
          echo "SHA=${GITHUB_SHA}"

      - name: Restore repo fixture for P-01 GHA E2E
        run: |
          mkdir -p governance/runtime/tasks
          mkdir -p governance/runtime/results
          mkdir -p governance/decisions

          if [ -f governance/fixtures/gha_e2e/TASK-GHA-E2E-001.task.json ]; then
            cp governance/fixtures/gha_e2e/TASK-GHA-E2E-001.task.json governance/runtime/tasks/TASK-GHA-E2E-001.json
          fi

          if [ -f governance/fixtures/gha_e2e/auditor_materialize_result.gha-e2e.json ]; then
            cp governance/fixtures/gha_e2e/auditor_materialize_result.gha-e2e.json governance/runtime/results/auditor_materialize_result.gha-e2e.json
          fi

          if [ -f governance/fixtures/gha_e2e/IMPLEMENTATION_COMPLETED-TASK-GHA-E2E-001.json ]; then
            cp governance/fixtures/gha_e2e/IMPLEMENTATION_COMPLETED-TASK-GHA-E2E-001.json governance/decisions/IMPLEMENTATION_COMPLETED-TASK-GHA-E2E-001.json
          fi

          if [ -f governance/fixtures/gha_e2e/AUDIT-TASK-GHA-E2E-001-AUTO-0001.json ]; then
            cp governance/fixtures/gha_e2e/AUDIT-TASK-GHA-E2E-001-AUTO-0001.json governance/decisions/AUDIT-TASK-GHA-E2E-001-AUTO-0001.json
          fi

      - name: Bootstrap runtime index
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          ROOT = Path.cwd()
          TASKS_DIR = ROOT / 'governance' / 'runtime' / 'tasks'
          INDEX_PATH = TASKS_DIR / 'index.json'

          TASKS_DIR.mkdir(parents=True, exist_ok=True)

          def infer_status_bucket(data):
              current_state = str(data.get('current_state', '')).strip()
              next_role = str(data.get('next_role', '')).strip()
              is_terminal = bool(data.get('is_terminal', False))
              closed_by_system = bool(data.get('closed_by_system', False))

              if is_terminal and closed_by_system:
                  return 'COMPLETED_CLOSED'
              if is_terminal:
                  return 'COMPLETED_OPEN_TERMINAL'
              if next_role == 'SYSTEM':
                  return 'AWAITING_SYSTEM'
              if next_role == 'AUDITOR':
                  return 'AWAITING_AUDITOR'
              if next_role == 'EXECUTOR':
                  return 'AWAITING_EXECUTOR'
              if current_state.endswith('PENDING'):
                  return 'IN_PROGRESS'
              if current_state.endswith('APPROVED'):
                  return 'APPROVED'
              if current_state.endswith('BLOCKED') or current_state == 'BLOCKED':
                  return 'BLOCKED'
              return 'UNKNOWN'

          latest = {}

          for path in sorted(TASKS_DIR.glob('*.json')):
              if path.name == 'index.json':
                  continue

              data = json.loads(path.read_text(encoding='utf-8'))
              task_id = str(data.get('task_id', '')).strip()
              if not task_id:
                  continue

              item = {
                  'task_id': task_id,
                  'registry_path': str(path.relative_to(ROOT)),
                  'current_state': str(data.get('current_state', '')).strip(),
                  'last_event_type': str(data.get('last_event_type', '')).strip(),
                  'next_role': str(data.get('next_role', '')).strip(),
                  'next_action': str(data.get('next_action', '')).strip(),
                  'is_terminal': bool(data.get('is_terminal', False)),
                  'closed_by_system': bool(data.get('closed_by_system', False)),
                  'last_event_ts': str(data.get('last_event_ts', '')).strip(),
              }
              item['status_bucket'] = infer_status_bucket(data)

              prev = latest.get(task_id)
              key = (item['last_event_ts'], item['task_id'])
              if prev is None or key >= (prev['last_event_ts'], prev['task_id']):
                  latest[task_id] = item

          items = sorted(
              latest.values(),
              key=lambda x: (x['last_event_ts'], x['task_id']),
              reverse=True,
          )

          summary = {}
          for item in items:
              bucket = item['status_bucket']
              summary[bucket] = summary.get(bucket, 0) + 1
          summary['TOTAL'] = len(items)

          index_doc = {
              'system_task_index_version': 'v1',
              'result': 'SUCCESS',
              'task_dir': str(TASKS_DIR.relative_to(ROOT)),
              'index_path': str(INDEX_PATH.relative_to(ROOT)),
              'summary': summary,
              'items': items,
          }

          INDEX_PATH.write_text(json.dumps(index_doc, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(index_doc['summary'], ensure_ascii=False, indent=2))
          PY

      - name: Run autonomy entrypoint
        run: |
          python3 governance/scripts/system_entrypoint_v1.py

      - name: Verify P-01 domain state
        run: |
          python3 - <<'PY2'
          import json
          from pathlib import Path

          ROOT = Path.cwd()
          task_path = ROOT / 'governance' / 'runtime' / 'tasks' / 'TASK-GHA-E2E-001.json'

          if not task_path.exists():
              raise SystemExit('P01_DOMAIN_FAIL: task file not found')

          data = json.loads(task_path.read_text(encoding='utf-8'))
          events = data.get('events', [])
          if not isinstance(events, list):
              raise SystemExit('P01_DOMAIN_FAIL: events is not a list')

          checks = {
              'current_state': str(data.get('current_state', '')).strip(),
              'last_event_type': str(data.get('last_event_type', '')).strip(),
              'next_role': str(data.get('next_role', '')).strip(),
              'next_action': str(data.get('next_action', '')).strip(),
              'latest_result_manifest': str(data.get('latest_result_manifest', '')).strip(),
              'events_count': len(events),
          }

          expected = {
              'current_state': 'COMPLETED',
              'last_event_type': 'RESULT_VERIFIED',
              'next_role': 'SYSTEM',
              'next_action': 'CLOSE_TASK',
          }

          for k, v in expected.items():
              if checks[k] != v:
                  raise SystemExit(f'P01_DOMAIN_FAIL: {k}={checks[k]!r}, expected {v!r}')

          if not checks['latest_result_manifest']:
              raise SystemExit('P01_DOMAIN_FAIL: latest_result_manifest is empty')

          if checks['events_count'] < 1:
              raise SystemExit('P01_DOMAIN_FAIL: events_count < 1')

          print(json.dumps({
              'p01_domain_verification': 'PASS',
              'task_id': 'TASK-GHA-E2E-001',
              'checks': checks,
          }, ensure_ascii=False, indent=2))
          PY2
