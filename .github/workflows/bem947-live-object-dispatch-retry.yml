name: BEM-947 Live Object Dispatch Retry

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate archived retry workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow source is available
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/bem947-live-object-dispatch-retry.yml
          echo "BEM-947 retry workflow is syntax-safe."
      - name: Verify dispatch executor syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/dispatch_executor.py
