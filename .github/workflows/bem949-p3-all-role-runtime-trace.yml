name: BEM949 P3 All-Role Runtime Trace (Superseded)

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: "Trace identifier retained for audit compatibility"
        required: false
        default: "bem949_p3_all_role_trace"
        type: string

permissions:
  contents: read

jobs:
  archived:
    runs-on: ubuntu-latest
    steps:
      - name: Record superseded workflow state
        shell: bash
        run: |
          set -euo pipefail
          echo "BEM949 P3 legacy trace workflow is superseded by bem949-p3-all-role-runtime-trace-v3.yml."
          echo "No provider, model, bridge, retry, E2E, or LLM execution is performed."
