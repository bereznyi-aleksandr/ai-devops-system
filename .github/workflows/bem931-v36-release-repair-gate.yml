name: BEM-931 v3.6 Release Repair Gate

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    paths:
      - '.github/workflows/bem931-v36-release-repair-gate.yml'
      - 'governance/runners/**'
      - 'governance/validators/**'
      - 'governance/architecture/**'

permissions:
  contents: write

jobs:
  release-repair-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run autonomous repair gate
        shell: bash
        run: |
          set -e
          python3 governance/runners/bem931_autonomous_repair_gate.py

      - name: Commit receipts
        if: always()
        shell: bash
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Collect all generated files into a patch before touching remote
          git add -A governance/channels \
                     governance/results \
                     governance/proofs \
                     governance/exchange \
                     governance/release \
                     governance/blockers 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing new to commit — receipts may already be present"
            exit 0
          fi

          # Commit on top of current HEAD without pulling first
          git commit -m "BEM-931: live repair receipts [run=$GITHUB_RUN_ID]"

          # Push with retry — if remote advanced, rebase and push again
          git push || (git pull --rebase --autostash && git push)
