name: BEM947 Indexed Push Bridge

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem931-v36-release-repair-gate.yml'

permissions:
  contents: write
  actions: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Push reduced object dispatch to claude.yml
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          TRACE: bem947_object_dispatch_push_20260619T1108Z
        shell: bash
        run: |
          set -euo pipefail
          TASK_FILE="$(mktemp)"
          cat > "$TASK_FILE" <<'TASK'
BEM-947 push-gate bridge: prove planned-to-executed object dispatch.

You are the executor role. Keep scope minimal.

Create and commit:
1. governance/reports/bem947_object_dispatch_push_20260619T1108Z.md
2. governance/proofs/BEM947_live_object_dispatch_executed_bem947_object_dispatch_push_20260619T1108Z.json

JSON required:
  status: completed
  protocol: BEM-947
  task_id: BEM947-P2-LIVE-OBJECT-DISPATCH-RUN
  trace_id: bem947_object_dispatch_push_20260619T1108Z
  provider_selected: claude_code
  target_workflow_id: claude.yml
  dispatch_result: executed
  blocker: null
  checks.object_runner_to_dispatch_queue: true
  checks.curator_router_to_claude_yml: true
  checks.sha_type_explicit: true

If blocked, write BLOCKED proof instead.
TASK

          gh workflow run claude.yml \
            --ref main \
            -f role=executor \
            -f provider=claude \
            -f trace_id="$TRACE" \
            -f cycle_id=bem947_planned_to_executed_push \
            -f task_type=live_object_dispatch_push \
            -f task="$(cat "$TASK_FILE")"

          mkdir -p governance/proofs
          python3 - <<'PY'
import json
from datetime import datetime, timezone
from pathlib import Path
trace = "bem947_object_dispatch_push_20260619T1108Z"
payload = {
  "status": "DISPATCHED",
  "protocol": "BEM-947",
  "task_id": "BEM947-P2-COLLECT-PUSH-BRIDGE-RECEIPT_OR_AUTOREPAIR",
  "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
  "trace_id": trace,
  "target_workflow_id": "claude.yml",
  "checks": {"push_trigger_bridge": True, "claude_workflow_dispatch_attempted": True, "reduced_scope_task_used": True, "no_false_completed_claim": True, "sha_type_policy_bound": True},
  "blockers": [],
  "next_task": "BEM947-P2-COLLECT-EXECUTED-PROOF",
  "non_claim": "DISPATCHED is not PASS; completed proof must be collected separately"
}
Path("governance/proofs/BEM947_live_object_dispatch_push_requested_receipt.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
PY

      - name: Commit push receipt
        shell: bash
        run: |
          git config user.email "bem947-push@ai-devops-system"
          git config user.name "BEM947 Push Bridge"
          git pull --rebase origin main || true
          git add governance/proofs/BEM947_live_object_dispatch_push_requested_receipt.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No BEM947 push receipt changes"
          else
            git commit -m "BEM-947: push bridge dispatch receipt"
            git push || (git pull --rebase origin main && git push)
          fi
