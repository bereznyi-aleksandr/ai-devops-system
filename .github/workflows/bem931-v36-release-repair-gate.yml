name: BEM-931 v3.6 Release Repair Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate archived release-repair workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow source is available
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/bem931-v36-release-repair-gate.yml
          echo "BEM-931 release-repair workflow is syntax-safe."
      - name: Verify active queue guard syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/active_queue_guard.py
