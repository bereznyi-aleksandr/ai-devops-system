name: BEM-931 v3.6 Release Repair Gate

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-repair-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate RM02 and RM04 prerequisites
        shell: bash
        run: |
          set -e
          python3 governance/validators/bem931_v36_rm02_object_passports_validate.py
          python3 governance/validators/bem931_v36_rm04_runners_validate.py
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json, time
          from pathlib import Path
          proofs = Path("governance/proofs")
          proofs.mkdir(parents=True, exist_ok=True)
          receipts = {
              "BEM931-V36-RM02_object_passports_receipt.json": {
                  "protocol": "BEM-931 v3.6",
                  "roadmap_item": "RM-02",
                  "status": "PASS",
                  "receipt_type": "release_repair_validator",
                  "validator": "governance/validators/bem931_v36_rm02_object_passports_validate.py",
                  "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              },
              "BEM931-V36-RM04_runners_receipt.json": {
                  "protocol": "BEM-931 v3.6",
                  "roadmap_item": "RM-04-RUNNERS",
                  "status": "PASS",
                  "receipt_type": "release_repair_validator",
                  "validator": "governance/validators/bem931_v36_rm04_runners_validate.py",
                  "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              },
          }
          for name, payload in receipts.items():
              (proofs / name).write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: RM15 live E2E one contour
        shell: bash
        run: |
          set -e
          TRACE="bem931_v36_rm15_release_${GITHUB_RUN_ID}"
          echo "TRACE_RM15=$TRACE" >> "$GITHUB_ENV"
          rm -rf governance/channels governance/results/"$TRACE"
          mkdir -p governance/channels
          python3 - <<'PY'
          import json, os, time
          from pathlib import Path
          trace = os.environ["TRACE_RM15"]
          row = {
              "trace_id": trace,
              "status": "pending",
              "from": "OPERATOR",
              "to": "GD.CURATOR",
              "task": "BEM-931 v3.6 release repair RM15 live E2E",
              "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          Path("governance/channels/operator_to_gd.jsonl").write_text(json.dumps(row, ensure_ascii=False) + "\n", encoding="utf-8")
          PY
          python3 governance/runners/gd_curator_runner.py
          python3 governance/runners/dir_curator_runner.py
          python3 governance/runners/wrk_curator_runner.py
          python3 governance/runners/analyst_stage_runner.py
          python3 governance/runners/auditor_stage_runner.py
          python3 governance/runners/executor_stage_runner.py
          python3 governance/runners/auditor_stage_runner.py
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          trace = os.environ["TRACE_RM15"]
          required = [
              "governance/channels/gd_to_dir.jsonl",
              "governance/channels/dir_to_wrk.jsonl",
              "governance/channels/wrk_c1_to_analyst.jsonl",
              "governance/channels/wrk_c1_to_auditor_pre.jsonl",
              "governance/channels/wrk_c1_to_executor.jsonl",
              "governance/channels/wrk_c1_to_auditor_post.jsonl",
              "governance/channels/wrk_to_curator_feedback.jsonl",
          ]
          for f in required:
              p = Path(f)
              assert p.exists() and p.stat().st_size > 20, f"missing {f}"
              assert trace in p.read_text(encoding="utf-8"), f"trace missing in {f}"
          result_path = Path("governance/results") / trace / "worker_result.json"
          assert result_path.exists() and result_path.stat().st_size > 50, "missing RM15 worker result"
          feedback = Path("governance/channels/wrk_to_curator_feedback.jsonl").read_text(encoding="utf-8")
          assert "PASS" in feedback, "auditor PASS missing"
          receipt = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-15-E2E",
              "status": "PASS",
              "receipt_type": "release_repair_live_e2e",
              "trace_id": trace,
              "chain": [
                  "OPERATOR", "GD.CURATOR", "DIR.CURATOR", "WRK.CURATOR",
                  "WRK-C1.ANALYST", "WRK-C1.AUDITOR.pre", "WRK-C1.EXECUTOR",
                  "WRK-C1.AUDITOR.post", "WRK.CURATOR.feedback"
              ],
              "artifacts": required + [str(result_path)],
          }
          proofs = Path("governance/proofs")
          proofs.mkdir(parents=True, exist_ok=True)
          (proofs / "BEM931-V36-RM15_live_e2e_receipt.json").write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: RM16 multi-contour E2E
        shell: bash
        run: |
          set -e
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json, subprocess, time, os, shutil
          from pathlib import Path

          contours = ["WRK-C1", "WRK-C2", "WRK-C3"]
          aggregate = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-16",
              "status": "PASS",
              "receipt_type": "release_repair_multi_contour",
              "contours": [],
          }

          for contour in contours:
              trace = f"bem931_v36_rm16_{contour}_{os.environ.get('GITHUB_RUN_ID', 'local')}"
              channel_dir = Path("governance/channels")
              if channel_dir.exists():
                  for item in channel_dir.glob("*.jsonl"):
                      item.unlink()
              channel_dir.mkdir(parents=True, exist_ok=True)

              row = {
                  "trace_id": trace,
                  "status": "pending",
                  "from": "DIR.CURATOR",
                  "to": "WRK.CURATOR",
                  "target_contour": contour,
                  "task": f"BEM-931 v3.6 RM16 live isolated test for {contour}",
                  "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              }
              Path("governance/channels/dir_to_wrk.jsonl").write_text(json.dumps(row, ensure_ascii=False) + "\n", encoding="utf-8")

              for runner in [
                  "governance/runners/wrk_curator_runner.py",
                  "governance/runners/analyst_stage_runner.py",
                  "governance/runners/auditor_stage_runner.py",
                  "governance/runners/executor_stage_runner.py",
                  "governance/runners/auditor_stage_runner.py",
              ]:
                  subprocess.run(["python3", runner], check=True)

              prefix = contour.lower().replace("-", "_")
              required = [
                  f"governance/channels/{prefix}_to_analyst.jsonl",
                  f"governance/channels/{prefix}_to_auditor_pre.jsonl",
                  f"governance/channels/{prefix}_to_executor.jsonl",
                  f"governance/channels/{prefix}_to_auditor_post.jsonl",
                  "governance/channels/wrk_to_curator_feedback.jsonl",
              ]
              for file_name in required:
                  p = Path(file_name)
                  assert p.exists() and p.stat().st_size > 20, f"missing {file_name}"
                  assert trace in p.read_text(encoding="utf-8"), f"trace missing in {file_name}"
              result_path = Path("governance/results") / trace / f"{prefix}_worker_result.json"
              assert result_path.exists() and result_path.stat().st_size > 50, f"missing {result_path}"

              receipt = {
                  "protocol": "BEM-931 v3.6",
                  "roadmap_item": "RM-16",
                  "trace_id": trace,
                  "contour_id": contour,
                  "status": "PASS",
                  "artifacts": required + [str(result_path)],
              }
              Path(f"governance/proofs/BEM931-V36-RM16_{contour}_receipt.json").write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              aggregate["contours"].append(receipt)

          Path("governance/proofs/BEM931-V36-RM16_multi_contour_receipt.json").write_text(json.dumps(aggregate, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: RM17 curator-mediated horizontal exchange
        shell: bash
        run: |
          set -e
          mkdir -p governance/exchange governance/proofs
          python3 - <<'PY'
          import json, time
          from pathlib import Path
          record = {
              "exchange_id": "bem931_v36_rm17_exchange",
              "status": "verified",
              "source_contour": "WRK-C1",
              "receiver_contour": "WRK-C2",
              "mediator": "WRK.CURATOR",
              "source_role": "WRK-C1.AUDITOR",
              "receiver_role": "WRK-C2.ANALYST",
              "proof_ref": "verified_artifact",
              "data_version": "1",
              "rule_version": "1",
              "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          registry = Path("governance/exchange/exchange_registry_v2.jsonl")
          registry.write_text(json.dumps(record, ensure_ascii=False) + "\n", encoding="utf-8")
          text = registry.read_text(encoding="utf-8")
          assert "WRK.CURATOR" in text
          assert "WRK-C1.AUDITOR" in text and "WRK-C2.ANALYST" in text
          assert "direct_role_to_role" not in text
          receipt = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-17",
              "status": "PASS",
              "receipt_type": "horizontal_exchange_curator_mediated",
              "registry": str(registry),
              "checks": ["mediator_present", "source_auditor", "receiver_analyst", "proof_ref", "rule_version"],
          }
          Path("governance/proofs/BEM931-V36-RM17_horizontal_exchange_receipt.json").write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: RM18 release gate PASS
        shell: bash
        run: |
          set -e
          mkdir -p governance/release
          python3 - <<'PY'
          import json, time
          from pathlib import Path
          required = {
              "RM02": "governance/proofs/BEM931-V36-RM02_object_passports_receipt.json",
              "RM04": "governance/proofs/BEM931-V36-RM04_runners_receipt.json",
              "RM15": "governance/proofs/BEM931-V36-RM15_live_e2e_receipt.json",
              "RM16": "governance/proofs/BEM931-V36-RM16_multi_contour_receipt.json",
              "RM17": "governance/proofs/BEM931-V36-RM17_horizontal_exchange_receipt.json",
          }
          missing = [k for k, v in required.items() if not Path(v).exists()]
          status = "PASS" if not missing else "BLOCKED"
          result = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-18",
              "release_status": status,
              "missing": missing,
              "required": required,
              "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
          }
          Path("governance/release/bem931_v36_release_gate.json").write_text(json.dumps(result, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          if missing:
              raise SystemExit("release blocked: " + ",".join(missing))
          PY

      - name: Commit release repair artifacts
        shell: bash
        if: always()
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/channels governance/results governance/proofs governance/exchange governance/release || true
          git commit -m "BEM-931: release repair gate receipts" || echo "No changes"
          git pull --rebase || true
          git push || true
