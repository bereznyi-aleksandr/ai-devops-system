name: BEM-931 v3.6 Release Repair Gate

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    paths:
      - '.github/workflows/bem931-v36-release-repair-gate.yml'
      - 'governance/runners/**'
      - 'governance/validators/**'
      - 'governance/architecture/**'

permissions:
  contents: write

jobs:
  release-repair-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run autonomous repair gate
        shell: bash
        run: |
          set -e
          python3 governance/runners/bem931_autonomous_repair_gate.py

      - name: Commit autonomous repair artifacts
        if: always()
        shell: bash
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Stage FIRST — before pull --rebase which would wipe untracked files
          git add governance/channels governance/results governance/proofs governance/exchange governance/release governance/blockers || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Save staged diff as patch, rebase, re-apply
          git stash
          git pull --rebase --autostash || true
          git stash pop || true
          git add governance/channels governance/results governance/proofs governance/exchange governance/release governance/blockers || true
          git commit -m "BEM-931: autonomous release repair receipts [run=$GITHUB_RUN_ID]" || echo "Nothing to commit after rebase"
          git push || true
