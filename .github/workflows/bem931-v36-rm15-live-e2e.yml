name: BEM-931 v3.6 RM15 Live E2E

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Live E2E test task'
        required: false
        default: 'BEM-931 v3.6 live E2E test'
        type: string
  push:
    paths:
      - 'governance/runners/*.py'
      - '.github/workflows/bem931-v36-rm15-live-e2e.yml'

permissions:
  contents: write

jobs:
  live-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Seed canonical operator task
        shell: bash
        env:
          INPUT_TASK: ${{ inputs.task }}
        run: |
          set -e
          TRACE="bem931_v36_rm15_${GITHUB_RUN_ID}"
          echo "TRACE=$TRACE" >> "$GITHUB_ENV"
          rm -f governance/channels/operator_to_gd.jsonl \
                governance/channels/gd_to_dir.jsonl \
                governance/channels/dir_to_wrk.jsonl \
                governance/channels/wrk_c1_to_analyst.jsonl \
                governance/channels/wrk_c1_to_auditor_pre.jsonl \
                governance/channels/wrk_c1_to_executor.jsonl \
                governance/channels/wrk_c1_to_auditor_post.jsonl \
                governance/channels/wrk_to_curator_feedback.jsonl
          mkdir -p governance/channels
          python3 - <<'PY'
          import json, os, time
          trace = os.environ["TRACE"]
          row = {
              "trace_id": trace,
              "status": "pending",
              "from": "OPERATOR",
              "to": "GD.CURATOR",
              "task": os.environ.get("INPUT_TASK") or "BEM-931 v3.6 live E2E test",
              "created_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
          }
          with open("governance/channels/operator_to_gd.jsonl", "w", encoding="utf-8") as f:
              f.write(json.dumps(row, ensure_ascii=False) + "\n")
          PY

      - name: Run canonical curator and contour chain
        shell: bash
        run: |
          set -e
          python3 governance/runners/gd_curator_runner.py
          python3 governance/runners/dir_curator_runner.py
          python3 governance/runners/wrk_curator_runner.py
          python3 governance/runners/analyst_stage_runner.py
          python3 governance/runners/auditor_stage_runner.py
          python3 governance/runners/executor_stage_runner.py
          python3 governance/runners/auditor_stage_runner.py

      - name: Validate live E2E receipts
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          trace = os.environ["TRACE"]
          required_files = [
              "governance/channels/gd_to_dir.jsonl",
              "governance/channels/dir_to_wrk.jsonl",
              "governance/channels/wrk_c1_to_analyst.jsonl",
              "governance/channels/wrk_c1_to_auditor_pre.jsonl",
              "governance/channels/wrk_c1_to_executor.jsonl",
              "governance/channels/wrk_c1_to_auditor_post.jsonl",
              "governance/channels/wrk_to_curator_feedback.jsonl",
          ]
          for file_name in required_files:
              p = Path(file_name)
              assert p.exists() and p.stat().st_size > 20, f"missing receipt {file_name}"
              assert trace in p.read_text(encoding="utf-8"), f"trace missing in {file_name}"
          result_path = Path("governance/results") / trace / "worker_result.json"
          assert result_path.exists() and result_path.stat().st_size > 50, "missing worker result"
          feedback = Path("governance/channels/wrk_to_curator_feedback.jsonl").read_text(encoding="utf-8")
          assert "PASS" in feedback, "auditor PASS missing"
          proofs = Path("governance/proofs")
          proofs.mkdir(parents=True, exist_ok=True)
          receipt = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-15-E2E",
              "trace_id": trace,
              "status": "PASS",
              "receipt_type": "live_e2e_repo_runtime",
              "chain": [
                  "OPERATOR",
                  "GD.CURATOR",
                  "DIR.CURATOR",
                  "WRK.CURATOR",
                  "WRK-C1.ANALYST",
                  "WRK-C1.AUDITOR.pre",
                  "WRK-C1.EXECUTOR",
                  "WRK-C1.AUDITOR.post",
                  "WRK.CURATOR.feedback"
              ],
              "artifacts": required_files + [str(result_path)]
          }
          (proofs / "BEM931-V36-RM15_live_e2e_receipt.json").write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          print("PASS: RM15 live E2E", trace)
          PY

      - name: Commit live E2E proof
        shell: bash
        run: |
          set -e
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/channels governance/results governance/proofs/BEM931-V36-RM15_live_e2e_receipt.json
          git commit -m "BEM-931 RM15: live E2E receipt" || echo "No changes"
          git push
