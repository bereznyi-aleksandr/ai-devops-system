name: Executor

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  executor:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@executor')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@executor'))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run as EXECUTOR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          claude_args: |
            --max-turns 15
            --append-system-prompt "$(cat governance/prompts/executor_prompt.md)"
