name: BEM934 Dynamic Validator Status

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Capture dynamic validator run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh run list --repo "$REPO" --workflow bem934-apply-dynamic-live-validator-and-dispatch.yml --limit 5 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url > /tmp/runs.json
          RUN_ID="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          : > /tmp/log.txt
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/log.txt 2>&1 || true
          fi
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-status@ai-devops-system"
          git config user.name "BEM-934 Dynamic Status"
          tail -n 120 /tmp/log.txt > /tmp/log.tail
          python3 -c 'import json; from pathlib import Path; out={"task_id":"BEM934-LIVE-TEST","runs":json.load(open("/tmp/runs.json")),"failed_log_tail":Path("/tmp/log.tail").read_text(errors="replace")}; Path("governance/proofs/BEM934_dynamic_validator_status.json").write_text(json.dumps(out,indent=2)+"\n")'
          git add governance/proofs/BEM934_dynamic_validator_status.json
          git commit -m "Capture BEM-934 dynamic validator status" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
