name: BEM934 Wait Latest Real Router and Dispatch Claude

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  wait-and-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for router receipt and dispatch Claude
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          TRACE: tg_818734369_20260618T105814Z
          EXPECTED_CHAT_ID: "601442777"
          EXPECTED_MESSAGE_ID: "730"
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-wait@ai-devops-system"
          git config user.name "BEM-934 Wait Router"
          RECEIPT="governance/proofs/BEM932_provider_router_${TRACE}.json"
          FOUND=false
          for attempt in $(seq 1 60); do
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            if [ -f "$RECEIPT" ]; then
              FOUND=true
              break
            fi
            sleep 10
          done
          mkdir -p governance/proofs
          if [ "$FOUND" != "true" ]; then
            jq -n --arg trace "$TRACE"               '{status:"BLOCKED",protocol:"BEM-934",task_id:"BEM934-LIVE-TEST",trace_id:$trace,blocker:"latest_real_router_receipt_not_found_after_timeout"}'               > governance/proofs/BEM934_latest_real_router_validation.json
          else
            jq -e --arg trace "$TRACE" --arg chat "$EXPECTED_CHAT_ID" --arg message "$EXPECTED_MESSAGE_ID"               '.status=="PASS" and .trace_id==$trace and .provider_selected=="claude_code" and .target_workflow_id=="claude.yml" and ((.chat_id|tostring)==$chat) and ((.message_id|tostring)==$message)'               "$RECEIPT" > /dev/null
            SOURCE_TASK="$(jq -r '.task // ""' "$RECEIPT")"
            DISPATCH_TASK="BEM-934 real operator Telegram live trace ${TRACE}. Verify ${RECEIPT}. Analyze exactly two verifiable idempotency invariants for Telegram delivery into WRK-C1. Create governance/proofs/BEM934_live_content_${TRACE}.json with status PASS, protocol BEM-934, task_id BEM934-LIVE-TEST, trace_id ${TRACE}, provider_selected claude_code, source_router_receipt ${RECEIPT}, exactly two invariants, at least two validation_steps, at least two acceptance_checks each with result PASS, and at least one limitation. Source user task: ${SOURCE_TASK}. Do not modify canonical state."
            gh workflow run claude.yml --repo "$REPO" --ref main               -f role=curator               -f provider=claude_code               -f trace_id="$TRACE"               -f cycle_id=bem934_live_operator_actual_latest               -f task_type=live_content_analysis_repair               -f task="$DISPATCH_TASK"
            jq -n --arg trace "$TRACE" --arg receipt "$RECEIPT" --arg task "$SOURCE_TASK"               '{status:"PASS",protocol:"BEM-934",task_id:"BEM934-LIVE-TEST",trace_id:$trace,router_receipt:$receipt,provider_selected:"claude_code",target_workflow:"claude.yml",claude_dispatched:true,source_task:$task,checks:{router_pass:true,trace_match:true,provider_selected_claude_code:true,target_claude_yml:true,chat_id_match:true,message_id_match:true}}'               > governance/proofs/BEM934_latest_real_router_validation.json
          fi
          git add governance/proofs/BEM934_latest_real_router_validation.json
          git commit -m "Validate latest real BEM-934 Telegram router and dispatch Claude" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
