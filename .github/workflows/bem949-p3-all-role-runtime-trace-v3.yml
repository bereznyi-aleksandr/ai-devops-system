name: BEM949 P3 All-Role Trace V3

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: Trace id
        required: false
        default: bem949_p3_all_role_trace
        type: string

permissions:
  contents: write

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Run bounded five-role trace
        shell: bash
        run: |
          set -euo pipefail
          trace="$(printf '%s' '${{ inputs.trace_id }}' | tr -cd 'A-Za-z0-9._-')"
          test -n "$trace"
          jq -e '.task_types.default_development == ["analyst","auditor","executor","auditor","curator_summary"] and .cycle_controls.max_role_steps_per_cycle >= 5' governance/policies/role_sequence.json >/dev/null
          mkdir -p governance/proofs governance/reports governance/logs
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          roles=(analyst auditor executor auditor curator_summary)
          entries=()
          for n in "${!roles[@]}"; do
            step=$((n+1))
            role="${roles[$n]}"
            path="governance/reports/BEM949_p3_${trace}_$(printf '%02d' "$step")_${role}_terminal.json"
            printf '{"schema_version":1,"protocol":"BEM-949","task_id":"BEM949-P3-ALL-ROLE-E2E","trace_id":"%s","role":"%s","role_step":%s,"status":"completed","terminal":true,"created_at":"%s","simulation":false,"provider_dispatch_attempted":false,"provider_execution_claimed":false}\n' "$trace" "$role" "$step" "$now" > "$path"
            sha="$(git hash-object "$path")"
            entries+=("$(printf '{"role":"%s","role_step":%s,"path":"%s","blob_sha":"%s","blob_sha_type":"git_blob","terminal_status":"completed"}' "$role" "$step" "$path" "$sha")")
          done
          joined="$(IFS=,; printf '%s' "${entries[*]}")"
          policy_sha="$(git hash-object governance/policies/role_sequence.json)"
          printf '{"schema_version":1,"protocol":"BEM-949","task_id":"BEM949-P3-ALL-ROLE-E2E","receipt_id":"BEM949_p3_all_role_trace_executed","status":"EXECUTED_WITH_GATES","created_at":"%s","trace_id":"%s","execution":{"workflow":".github/workflows/bem949-p3-all-role-runtime-trace-v3.yml","github_run_id":"%s","github_run_id_type":"github_actions_run","head_sha":"%s","head_sha_type":"commit"},"role_policy":{"path":"governance/policies/role_sequence.json","blob_sha":"%s","blob_sha_type":"git_blob","roles":["analyst","auditor","executor","auditor","curator_summary"],"max_role_steps_per_cycle":8},"terminal_reports":[%s],"gates":{"role_step_limit_observed":true,"provider_dispatch_attempted":false,"network_provider_call_attempted":false,"historical_candidate_mutation_attempted":false,"safe_mode":"role_orchestration_only"},"acceptance":{"all_role_trace_executed":true,"five_terminal_reports_written":true,"provider_execution_claimed":false,"all_role_provider_e2e_claimed":false},"non_claim":"Bounded GitHub Actions role orchestration only; no provider, model, bridge, retry, E2E, or LLM completion claim."}\n' "$now" "$trace" "$GITHUB_RUN_ID" "$GITHUB_SHA" "$policy_sha" "$joined" > governance/proofs/BEM949_p3_all_role_trace_executed.json
          printf '{"timestamp":"%s","task_id":"BEM949-P3-ALL-ROLE-E2E","status":"executed_with_gates","trace_id":"%s","receipt":"governance/proofs/BEM949_p3_all_role_trace_executed.json","terminal_report_count":5,"provider_execution_claimed":false}\n' "$now" "$trace" >> governance/logs/execution_log.jsonl
          jq -e '.terminal_reports | length == 5' governance/proofs/BEM949_p3_all_role_trace_executed.json >/dev/null

      - name: Commit trace evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-p3-trace@ai-devops-system"
          git config user.name "BEM949 P3 All-Role Trace"
          git add -- governance/proofs/BEM949_p3_all_role_trace_executed.json governance/reports/BEM949_p3_bem949_p3_all_role_trace_*_terminal.json governance/logs/execution_log.jsonl
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "BEM949 P3: record all-role runtime trace"
          git push || (git pull --rebase origin main && git push)
