name: BEM-932 Cloudflare Secrets Check

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      - name: Write safe secrets presence receipt
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          WRANGLER_API_TOKEN: ${{ secrets.WRANGLER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WRANGLER_ACCOUNT_ID: ${{ secrets.WRANGLER_ACCOUNT_ID }}
          GHPAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT || secrets.GH_PAT }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          def has(name):
              return bool(os.environ.get(name))
          receipt = {
              "status": "PASS",
              "protocol": "BEM-932 v8.3",
              "receipt_type": "cloudflare_secrets_presence",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "github_run_id": os.environ.get("RUN_ID", ""),
              "has_cloudflare_api_token": has("CLOUDFLARE_API_TOKEN"),
              "has_cf_api_token": has("CF_API_TOKEN"),
              "has_wrangler_api_token": has("WRANGLER_API_TOKEN"),
              "has_cloudflare_account_id": has("CLOUDFLARE_ACCOUNT_ID"),
              "has_cf_account_id": has("CF_ACCOUNT_ID"),
              "has_wrangler_account_id": has("WRANGLER_ACCOUNT_ID"),
              "has_github_pat": has("GHPAT")
          }
          Path("governance/proofs/BEM932_cloudflare_secrets_receipt.json").write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n")
          PY
          git config user.email "cloudflare-check@ai-devops-system"
          git config user.name "BEM-932 Cloudflare Check"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_cloudflare_secrets_receipt.json
          if git diff --cached --quiet; then
            echo "No check receipt changes"
         else
            git commit -m "BEM-932 cloudflare secrets check"
            git push
         fi
