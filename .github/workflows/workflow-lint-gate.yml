name: Workflow Lint Gate

# BEM-848: removed push trigger — was triggering on every workflow change creating cascade
# Use workflow_dispatch only

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: workflow-lint-gate
  cancel-in-progress: true

jobs:
  workflow-lint-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run workflow lint gate
        run: python3 scripts/workflow_lint_gate.py
      - name: Commit lint state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/state/workflow_lint_gate_state.json governance/reports/workflow_lint_report.md || true
          git diff --cached --quiet && echo "No changes" || git commit -m "BEM-735 workflow lint gate state"
          git pull --rebase --autostash origin main || true
          git push || true
