name: BEM-931 v3.6 Live Receipt Proof

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: write
  contents: write

concurrency:
  group: bem931-v36-live-receipt-proof
  cancel-in-progress: false

jobs:
  live-receipt-prof:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Run and publish live receipt proof without rebase conflicts
        id: proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          proof_exit=1
          published=false
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            set +e
            python3 governance/runners/bem931_live_receipt_proof.py
            proof_exit=$?
            set -e

            git add -A governance/channels governance/results governance/proofs governance/exchange governance/release governance/blockers || true

            if git diff --cached --quiet; then
              published=true
              break
            fi

            git commit -m "BEM-931: live GitHub Actions receipt proof [run=${GITHUB_RUN_ID}]"
            if git push origin HEAD:main; then
              published=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep "$((attempt * 2))"
            fi
          done

          if [ "$published" != "true" ]; then
            echo "receipt publication failed after 3 fresh-base attempts" >&2
            exit 1
          fi

          echo "proof_exit=$proof_exit" >> "$GITHUB_OUTPUT"

      - name: Fail if proof runner reported failure
        shell: bash
        run: |
          test "${{ steps.proof.outputs.proof_exit }}" = "0"
