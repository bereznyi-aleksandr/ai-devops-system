name: BEM-934 Repair Close Preparation Runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
      - name: Repair indentation and verify
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('governance/runners/bem934_prepare_close_v2.py')
          lines = path.read_text(encoding='utf-8').splitlines()
          lines[47] = '            if line.startswith("      ") and not line.startswith("        ") and line.rstrip().endswith(":"):'
          lines[48] = '                current_input = line.strip()[:-1]'
          lines[49] = '                out.append(line)'
          lines[50] = '                continue'
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python3 -m py_compile governance/runners/bem934_prepare_close_v2.py
      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem934-repair@ai-devops-system"
          git config user.name "BEM-934 Repair"
          git add governance/runners/bem934_prepare_close_v2.py
          git commit -m "BEM-934: repair close preparation runner indentation"
          git push || (git pull --rebase origin main && git push)
