name: System Status Report

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace id'
        required: false
        default: 'manual_system_status_report'
        type: string
  issue_comment:
    types: [created]
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write
  issues: write

jobs:
  system-status-report:
    name: System Status Report
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.number == 31 && contains(github.event.comment.body, 'TYPE: SYSTEM_STATUS_REPORT'))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Resolve trace
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          TRACE_ID="${INPUT_TRACE_ID:-system_status_report}"
          if [ "${EVENT_NAME:-}" = "issue_comment" ]; then
            TRACE_ID="$(printf '%s' "$COMMENT_BODY" | sed -n 's/^TRACE_ID:[[:space:]]*//p' | head -1)"
            TRACE_ID="${TRACE_ID:-issue_system_status_report}"
          fi
          echo "TRACE_ID=$TRACE_ID" >> "$GITHUB_ENV"

      - name: Generate report
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/system_status_report.py \
            --mode "${{ github.event_name }}" \
            --trace-id "$TRACE_ID" \
            --write | tee /tmp/system_status_report.md

      - name: Commit report
        shell: bash
        run: |
          set -e
          git config user.email "system-status@ai-devops-system"
          git config user.name "System Status Report"
          git pull --rebase --autostash origin main
          git add governance/reports/system_status_latest.md governance/events/system_status_reports.jsonl
          if git diff --cached --quiet; then
            echo "No system status changes"
            exit 0
          fi
          git commit -m "E4-004: system status report update"
          git push

      - name: Post report to issue
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const fs = require('fs');
            let body = 'BEM-SYSTEM-STATUS | REPORT MISSING';
            try {
              body = fs.readFileSync('governance/reports/system_status_latest.md', 'utf8');
            } catch (e) {
              body = `BEM-SYSTEM-STATUS | REPORT ERROR\n\n${e.message}`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 31,
              body
            });
