name: System Status Report

# BEM-476: removed schedule, issue_comment triggers — workflow_dispatch ONLY
# BEM-476: removed createComment to issue #31 — report goes to job summary + file

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace id'
        required: false
        default: 'manual_system_status_report'
        type: string

permissions:
  contents: write
  issues: write

jobs:
  system-status-report:
    name: System Status Report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "system-status@ai-devops-system"
          git config user.name  "System Status Report"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Resolve trace
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          TRACE_ID="${INPUT_TRACE_ID:-system_status_report}"
          echo "TRACE_ID=$TRACE_ID" >> "$GITHUB_ENV"

      - name: Generate report
        shell: bash
        run: |
          set +e
          python3 scripts/system_status_report.py \
            --mode "workflow_dispatch" \
            --trace-id "$TRACE_ID" \
            --write | tee /tmp/system_status_report.md
          echo "REPORT_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit report
        shell: bash
        run: |
          git add \
            governance/reports/system_status_latest.md \
            governance/events/system_status_reports.jsonl \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No system status changes"
          else
            git commit -m "SYSTEM-STATUS: report $TRACE_ID"
            git push
          fi

      # BEM-476: report to job summary ONLY — NO createComment to issue #31
      - name: Report to job summary
        if: always()
        shell: bash
        run: |
          echo "## System Status Report — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/system_status_report.md ]; then
            cat /tmp/system_status_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Report file not generated (exit=$REPORT_EXIT)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**No issue comments written (BEM-476)**" >> "$GITHUB_STEP_SUMMARY"
