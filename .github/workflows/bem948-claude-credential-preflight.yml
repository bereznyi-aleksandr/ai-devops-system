name: BEM-948 Claude Credential Preflight
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem948-claude-credential-preflight.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check credential presence without exposing it
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            present=true
            result="present"
          else
            present=false
            result="missing"
          fi
          python3 - <<PY
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          payload={
            "status":"OBSERVED",
            "protocol":"BEM-948",
            "task_id":"BEM948-P0-CLAUDE-CREDENTIAL-PREFLIGHT",
            "created_at":datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "credential_present":$present,
            "credential_result":"$result",
            "credential_value_exposed":False,
            "checks":{
              "secret_presence_checked":True,
              "secret_value_not_logged":True,
              "completed_p0_evidence_exists":False
            },
            "next_task":"BEM948-P0-AUTOREPAIR-CLAUDE-RUNTIME"
          }
          Path("governance/proofs/BEM948_p0_claude_credential_preflight_receipt.json").write_text(json.dumps(payload,indent=2)+"\n")
          PY
      - name: Commit preflight receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-948 Credential Preflight"
          git config user.email "bem948-preflight@ai-devops-system"
          git add governance/proofs/BEM948_p0_claude_credential_preflight_receipt.json
          git diff --cached --quiet || (git commit -m "BEM-948: record Claude credential preflight" && git push)
