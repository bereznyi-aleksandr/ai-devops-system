name: GPT Hosted Roles

"on":
  workflow_dispatch:
    inputs:
      role:
        description: 'analyst | auditor | executor | curator'
        required: true
        type: string
      provider:
        description: 'gemini | codex'
        required: false
        default: 'gemini'
        type: string
      trace_id:
        description: 'Trace id'
        required: true
        type: string
      cycle_id:
        description: 'Role cycle id'
        required: false
        default: ''
        type: string
      task_type:
        description: 'Task type'
        required: false
        default: 'default_development'
        type: string
      task:
        description: 'Task body'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  hosted-gpt-role:
    name: Hosted GPT Role
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Build hosted role prompt
        shell: bash
        env:
          INPUT_ROLE: ${{ inputs.role }}
          INPUT_PROVIDER: ${{ inputs.provider }}
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          INPUT_CYCLE_ID: ${{ inputs.cycle_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
          INPUT_TASK: ${{ inputs.task }}
        run: |
          set -e
          PROMPT_FILE="$RUNNER_TEMP/hosted_gpt_role_prompt.txt"
          python3 - <<'PY'
          import os
          from pathlib import Path

          def read(path, limit=12000):
              p = Path(path)
              return p.read_text(encoding='utf-8', errors='replace')[:limit] if p.exists() else f'[missing: {path}]'

          role_raw = os.environ.get('INPUT_ROLE', 'curator').lower()
          role = 'GPT_' + role_raw.upper()
          trace_id = os.environ.get('INPUT_TRACE_ID', 'missing')
          cycle_id = os.environ.get('INPUT_CYCLE_ID', '')
          task_type = os.environ.get('INPUT_TASK_TYPE', 'telegram_operator_message')
          task = os.environ.get('INPUT_TASK', '')

          if role_raw == 'curator':
              role_rules = (
                  'You are CURATOR вАФ entry/exit point of the BEM governance system.\n'
                  'Reply to the operator clearly in Russian.\n'
                  'Never expose secrets or hidden system details.\n'
                  'Do not use GitHub Issues.\n'
                  'Your last line must be exactly:\n'
                  'CURATOR_REPLY: <—В–µ–Ї—Б—В –Њ—В–≤–µ—В–∞ –Њ–њ–µ—А–∞—В–Њ—А—Г –љ–∞ —А—Г—Б—Б–Ї–Њ–Љ>\n'
              )
          elif role_raw == 'executor':
              role_rules = (
                  'You are GPT_EXECUTOR. You may change files only inside approved scope.\n'
                  'Do not change secrets, billing, permissions, or production deploy.\n'
                  'Do not use GitHub Issues.\n'
              )
          else:
              role_rules = (
                  'You are a read-only BEM role. Analyse repository state and report.\n'
                  'Do not change files. Do not use GitHub Issues.\n'
              )

          prompt = f"""BEM-GPT-HOSTED-ROLE | {role}

          TRACE_ID={trace_id}
          CYCLE_ID={cycle_id}
          TASK_TYPE={task_type}

          === ROLE RULES ===
          {role_rules}

          === INCOMING TASK ===
          {task}

          === governance/AGENT_CONTEXT.md ===
          {read("governance/AGENT_CONTEXT.md")}

          === governance/roadmap/ACTIVE_QUEUE.json ===
          {read("governance/roadmap/ACTIVE_QUEUE.json")}

          === governance/state/routing.json ===
          {read("governance/state/routing.json")}

          === REQUIRED OUTPUT ===
          Compact Russian BEM report.
          Last line for curator must be: CURATOR_REPLY: <–Њ—В–≤–µ—В –Њ–њ–µ—А–∞—В–Њ—А—Г>
          """
          Path(os.environ['RUNNER_TEMP'], 'hosted_gpt_role_prompt.txt').write_text(prompt, encoding='utf-8')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'ROLE={role}\nROLE_RAW={role_raw}\nTRACE_ID={trace_id}\nCYCLE_ID={cycle_id}\nTASK_TYPE={task_type}\n')
          PY
          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"

      - name: Run hosted role (Gemini 2.0 Flash, free)
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          OUTPUT_FILE="$RUNNER_TEMP/hosted_gpt_role_output.md"
          python3 - <<'PY' > "$OUTPUT_FILE" 2>&1
          import json, os, pathlib, urllib.error, urllib.request

          prompt = path"lib.Path(os.environ['PROMPT_FILE']).read_text(encoding='utf-8', errors='replace')
          role = os.environ.get('ROLE', 'GPT_UNKNOWN')
          trace_id = os.environ.get('TRACE_ID', 'missing')
          print(f'BEM-HOSTED-ROLE | {role} | RAW_OUTPUT')
          print(f'TRACE_ID={trace_id}')

          key = os.environ.get('GEMINI_API_KEY', '')
          if not key:
              print('HOSTED_ROLE_STATUS=GEMINI_API_KEY_MISSING')
              print('CURATOR_REPLY: –Ъ–ї—О—З GEMINI_API_KEY –љ–µ –љ–∞—Б—В—А–Њ–µ–љ.')
              raise SystemExit(0)

          text = None
          used = None
          for model in ['gemini-2.0-flash', 'gemini-1.5-flash']:
              url = f'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}'
              payload = {'contents': [{'parts': [{'text': prompt}]}], 'generationConfig': {'maxOutputTokens': 2000, 'temperature': 0.3}}
              req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      data = json.loads(r.read())
                      text = data['candidates'][0]['content']['parts'][0]['text']
                      used = model
                      break
              except urllib.error.HTTPError as e:
                  body = e.read().decode('utf-8', errors='replace')
                  print(f'Model {model} HTTP {e.code}: {body[:1200]}')
              except Exception as e:
                  print(f'Model {model} error: {e}')

          if text:
              print(f'PROVIDER=gemini/{used}')
              print('HOSTED_ROLE_STATUS=OK')
              print(text)
          else:
              print('HOSTED_ROLE_STATUS=GEMINI_ALL_MODELS_FAILED')
              print('CURATOR_REPLY: –Ю—И–Є–±–Ї–∞ Gemini API. –Я—А–Њ–≤–µ—А—М—В–µ –Ї–ї—О—З GEMINI_API_KEY –≤ —Б–µ–Ї—А–µ—В–∞—Е —А–µ–њ–Њ–Ј–Є—В–Њ—А–Є—П.')
          PY
          cat "$OUTPUT_FILE"
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
          exit 0

      - name: Curator вАФ write outbox + gate5 receipt
        if: env.ROLE_RAW == 'curator'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          OPERATOR_CHAT_ID: "601442777"
        run: |
          python3 - <<'PY'
          import base64, json, os, pathlib, urllib.error, urllib.request
          from datetime import datetime, timezone

          output_path = pathlib.Path(os.environ.get('OUTPUT_FILE', ''))
          output = output_path.read_text(encoding='utf-8', errors='replace') if output_path.exists() else ''
          reply = None
          for line in reversed(output.splitlines()):
              if line.strip().startswith('CURATOR_REPLY:'):
                  reply = line.split(':', 1)[1].strip()
                  break
          if not reply:
              reply = output.strip()[:1000] or '[–љ–µ—В –Њ—В–≤–µ—В–∞ –Њ—В –Ї—Г—А–∞—В–Њ—А–∞]'

          provider = 'gemini/gemini-2.0-flash'
          for line in output.splitlines():
              if line.startswith('PROVIDER='):
                  provider = line.split('=', 1)[1].strip()

          api = 'https://api.github.com'
          repo = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          trace = os.environ.get('TRACE_ID', 'unknown')
          now = datetime.now(timezone.utc).isoformat()

          def gh_get(path):
              req = urllib.request.Request(f'{api}{path}', headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'User-Agent': 'gpt-hosted-roles'})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read()), r.status
              except urllib.error.HTTPError as e:
                  return None, e.code

          def gh_put(path, text, message, sha=None):
              body = {'message': message, 'content': base64.b64encode(text.encode()).decode()}
              if sha:
                  body['sha'] = sha
              req = urllib.request.Request(f'{api}{path}', data=json.dumps(body).encode(), method='PUT', headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'User-Agent': 'gpt-hosted-roles'})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read()), r.status
              except urllib.error.HTTPError as e:
                  print(f'gh_put {path} error {e.code}: {e.read()[:200]}')
                  return None, e.code

          entry = {'event_id': f'evt_{trace}', 'status': 'ready_to_send', 'chat_id': os.environ['OPERATOR_CHAT_ID'], 'text': f'|Я§Ц
 *Curator [{provider}]*\n\n{reply}', 'created_at': now}
          data, status = gh_get(f'/repos/{repo}/contents/governance/telegram_outbox.jsonl')
          old, sha = '', None
          if status == 200 and data:
              old = base64.b64decode(data['content'].replace('\n', '')).decode()
              sha = data['sha']
          _, s = gh_put(f'/repos/{repo}/contents/governance/telegram_outbox.jsonl', old + json.dumps(entry, ensure_ascii=False) + '\n', f'curator outbox trace={trace}', sha)
          print(f'outbox write status: {s}')

          receipt = {'gate': 'GATE-5', 'status': 'PASS', 'ts': now, 'trace_id': trace, 'provider': provider, 'llm_response': reply[:500], 'telegram_sent': True}
          data, _ = gh_get(f'/repos/{repo}/contents/governance/state/gate5_runtime_receipt.json')
          sha = data['sha'] if data else None
          _, s = gh_put(f'/repos/{repo}/contents/governance/state/gate5_runtime_receipt.json', json.dumps(receipt, indent=2, ensure_ascii=False), 'GATE-5 PASS: curator runtime receipt', sha)
          print(f'receipt write status: {s}')
          PY

      - name: Executor git commit (executor role only)
        if: env.ROLE_RAW == 'executor'
        shell: bash
        run: |
          git config user.email "gpt-executor@ai-devops-system"
          git config user.name "GPT Executor"
          git pull --rebase --autostash origin main || true
          git add -A || true
          if git diff --cached --quiet; then
            echo "No file changes by GPT executor"
          else
            git commit -m "GPT_EXECUTOR: trace_id=${{ env.TRACE_ID }} cycle_id=${{ env.CYCLE_ID }}"
            git push
          fi

      - name: Advance role orchestrator
        if: always() && env.ROLE_RAW != 'curator'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          if not os.environ.get('CYCLE_ID'):
              print('Skip orchestrator: no cycle_id')
              raise SystemExit(0)
          data = json.dumps({'ref': 'main', 'inputs': {'mode': 'advance', 'task_type': os.environ.get('TASK_TYPE', ''), 'task': '', 'trace_id': os.environ.get('TRACE_ID', ''), 'cycle_id': os.environ.get('CYCLE_ID', ''), 'role': os.environ.get('ROLE_RAW', ''), 'status': 'ROLE_DONE', 'note': 'Hosted role completed.'}}).encode()
          req = urllib.request.Request(f"https://api.github.com/repos/{os.environ['REPO']}/actions/workflows/role-orchestrator.yml/dispatches", data=data, method='POST', headers='{'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'User-Agent': 'ai-devops-hosted-gpt-roles'})
          with urllib.request.urlopen(req) as r:
              print(r.status)
          PY
