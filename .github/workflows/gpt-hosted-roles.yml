name: GPT Hosted Roles

"on":
  workflow_dispatch:
    inputs:
      role:
        description: 'analyst | auditor | executor | curator'
        required: true
        type: string
      provider:
        description: 'openai | codex'
        required: false
        default: 'openai'
        type: string
      trace_id:
        description: 'Trace id'
        required: true
        type: string
      cycle_id:
        description: 'Role cycle id'
        required: false
        default: ''
        type: string
      task_type:
        description: 'Task type'
        required: false
        default: 'default_development'
        type: string
      task:
        description: 'Task body'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  hosted-gpt-role:
    name: Hosted GPT Role
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Build hosted role prompt
        shell: bash
        env:
          ROLE_RAW: ${{ inputs.role }}
          TRACE_ID: ${{ inputs.trace_id }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          TASK_TYPE: ${{ inputs.task_type }}
          TASK: ${{ inputs.task }}
        run: |
          set -e
          PROMPT_FILE="$RUNNER_TEMP/hosted_gpt_role_prompt.txt"
          {
            echo "BEM-GPT-HOSTED-ROLE | ${ROLE_RAW}"
            echo "TRACE_ID=${TRACE_ID}"
            echo "CYCLE_ID=${CYCLE_ID}"
            echo "TASK_TYPE=${TASK_TYPE}"
            echo
            echo "RULES:"
            echo "- Answer in Russian."
            echo "- Never expose secrets."
            echo "- GitHub Issues are forbidden."
            echo "- Telegram operator reports must be plaintext and mobile-readable."
            echo "- Never collapse checklist into one line."
            echo "- Every checklist item must be on its own line."
            echo "- If role is curator, output the final operator message in this exact block:"
            echo "  CURATOR_REPLY:"
            echo "  <message with real line breaks>"
            echo "  END_CURATOR_REPLY"
            echo "- Do not put the whole report on the same line as CURATOR_REPLY."
            echo
            echo "TASK:"
            printf '%s\n' "$TASK"
            echo
            echo "AGENT_CONTEXT:"
            cat governance/AGENT_CONTEXT.md 2>/dev/null || true
            echo
            echo "ACTIVE_QUEUE:"
            cat governance/roadmap/ACTIVE_QUEUE.json 2>/dev/null || true
          } > "$PROMPT_FILE"

          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"
          echo "ROLE_RAW=$ROLE_RAW" >> "$GITHUB_ENV"
          echo "TRACE_ID=$TRACE_ID" >> "$GITHUB_ENV"
          echo "CYCLE_ID=$CYCLE_ID" >> "$GITHUB_ENV"
          echo "TASK_TYPE=$TASK_TYPE" >> "$GITHUB_ENV"

      - name: Run hosted role (GPT-4o)
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e
          OUTPUT_FILE="$RUNNER_TEMP/hosted_gpt_role_output.md"
          python3 - <<'PY' > "$OUTPUT_FILE" 2>&1
          import json, os, pathlib, urllib.error, urllib.request

          prompt = pathlib.Path(os.environ["PROMPT_FILE"]).read_text(encoding="utf-8", errors="replace")
          trace_id = os.environ.get("TRACE_ID", "missing")

          print("BEM-HOSTED-ROLE | RAW_OUTPUT")
          print(f"TRACE_ID={trace_id}")

          key = os.environ.get("OPENAI_API_KEY", "")
          if not key:
              print("HOSTED_ROLE_STATUS=OPENAI_API_KEY_MISSING")
              print("CURATOR_REPLY:")
              print("Ключ OPENAI_API_KEY не настроен.")
              print("END_CURATOR_REPLY")
              raise SystemExit(0)

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {
                      "role": "system",
                      "content": (
                          "Ты — Curator, главный оркестратор системы BEM. "
                          "Отвечай по делу, по-русски, без раскрытия секретов. "
                          "Для Telegram-отчётов оператора используй только plaintext. "
                          "Сохраняй реальные переносы строк. "
                          "Не склеивай чек-лист в одну строку. "
                          "Если нужен ответ оператору, помести его в блок CURATOR_REPLY / END_CURATOR_REPLY."
                      ),
                  },
                  {"role": "user", "content": prompt},
              ],
              "max_tokens": 2000,
              "temperature": 0.2,
          }

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Authorization": f"Bearer {key}", "Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as r:
                  data = json.loads(r.read())
                  text = data["choices"][0]["message"]["content"]
                  print("PROVIDER=openai/gpt-4o")
                  print("HOSTED_ROLE_STATUS=OK")
                  print(text)
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"OpenAI HTTP {e.code}: {body[:1200]}")
              print("HOSTED_ROLE_STATUS=OPENAI_ERROR")
              print("CURATOR_REPLY:")
              print("Ошибка OpenAI API. Проверьте ключ и баланс OPENAI_API_KEY.")
              print("END_CURATOR_REPLY")
          except Exception as e:
              print(f"Error: {e}")
              print("HOSTED_ROLE_STATUS=ERROR")
              print("CURATOR_REPLY:")
              print("Сервис временно недоступен.")
              print("END_CURATOR_REPLY")
          PY
          cat "$OUTPUT_FILE"
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
          exit 0

      - name: Curator write outbox and receipt
        if: env.ROLE_RAW == 'curator'
        shell: bash
        env:
          OPERATOR_CHAT_ID: "601442777"
        run: |
          set -e
          python3 - <<'PY'
          import json, os, pathlib
          from datetime import datetime, timezone

          output = pathlib.Path(os.environ["OUTPUT_FILE"]).read_text(encoding="utf-8", errors="replace")

          def extract_provider(text):
              provider = "openai/gpt-4o"
              for line in text.splitlines():
                  if line.startswith("PROVIDER="):
                      provider = line.split("=", 1)[1].strip()
              return provider

          def extract_reply(text):
              lines = text.splitlines()

              # Preferred multiline block.
              for i, line in enumerate(lines):
                  if line.strip() == "CURATOR_REPLY:":
                      block = []
                      for nxt in lines[i + 1:]:
                          if nxt.strip() == "END_CURATOR_REPLY":
                              break
                          block.append(nxt.rstrip())
                      reply = "\n".join(block).strip()
                      if reply:
                          return reply

              # Backward compatibility: one-line marker.
              for line in reversed(lines):
                  if line.strip().startswith("CURATOR_REPLY:"):
                      reply = line.split(":", 1)[1].strip()
                      if reply:
                          return reply

              return text.strip()[:1000] or "[нет ответа от куратора]"

          def normalize_mobile_text(text):
              # Preserve line breaks; remove excessive blank lines.
              raw = text.replace("\r\n", "\n").replace("\r", "\n")
              lines = [ln.rstrip() for ln in raw.split("\n")]
              cleaned = []
              blank = False
              for ln in lines:
                  if not ln.strip():
                      if not blank:
                          cleaned.append("")
                      blank = True
                  else:
                      cleaned.append(ln)
                      blank = False
              return "\n".join(cleaned).strip()

          provider = extract_provider(output)
          reply = normalize_mobile_text(extract_reply(output))

          trace_id = os.environ.get("TRACE_ID", "unknown")
          now = datetime.now(timezone.utc).isoformat()

          outbox = pathlib.Path("governance/telegram_outbox.jsonl")
          outbox.parent.mkdir(parents=True, exist_ok=True)

          entry = {
              "event_id": f"evt_{trace_id}",
              "status": "ready_to_send",
              "chat_id": os.environ["OPERATOR_CHAT_ID"],
              "text": f"🤖 Curator [{provider}]\n\n{reply}",
              "created_at": now,
          }

          with outbox.open("a", encoding="utf-8") as f:
              f.write(json.dumps(entry, ensure_ascii=False) + "\n")

          receipt_path = pathlib.Path("governance/state/gate5_runtime_receipt.json")
          receipt_path.parent.mkdir(parents=True, exist_ok=True)
          receipt_path.write_text(json.dumps({
              "gate": "GATE-5",
              "status": "PASS",
              "ts": now,
              "trace_id": trace_id,
              "provider": provider,
              "llm_response": reply[:500],
              "telegram_sent": True,
              "format": "multiline_plaintext",
          }, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          git config user.email "gpt-curator@ai-devops-system"
          git config user.name "GPT Curator"
          git add governance/telegram_outbox.jsonl governance/state/gate5_runtime_receipt.json
          git commit -m "GATE-5: curator outbox trace=${TRACE_ID}" || echo "No curator changes"
          git push || true

      - name: Executor git commit
        if: env.ROLE_RAW == 'executor'
        shell: bash
        run: |
          git config user.email "gpt-executor@ai-devops-system"
          git config user.name "GPT Executor"
          git add -A
          git commit -m "GPT_EXECUTOR: trace_id=${TRACE_ID} cycle_id=${CYCLE_ID}" || echo "No executor changes"
          git push || true
