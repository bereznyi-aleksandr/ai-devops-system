name: Roadmap Autopilot
on:
  workflow_dispatch:
    inputs:
      force_task_id:
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/proofs/**
      - governance/runners/dispatch_executor.py
      - .github/workflows/roadmap-autopilot.yml
  schedule:
    - cron: "*/5 * * * *"
permissions:
  contents: write
  actions: write
concurrency:
  group: roadmap-autopilot
  cancel-in-progress: false
jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      - name: Compile dispatch code
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/roadmap_autopilot.py
          python3 -m py_compile governance/runners/dispatch_executor.py
      - id: choose
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id || '' }}
        run: |
          set -euo pipefail
          python3 governance/runners/roadmap_autopilot.py --force-task-id "$FORCE_TASK_ID" --output /tmp/dispatch.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          x = json.loads(Path("/tmp/dispatch.json").read_text())
          for k in ("action", "task_id", "workflow_id", "trace_id"):
              print(f"{k}={x.get(k, '')}")
          print("queue_changed=" + str(bool(x.get("queue_changed"))).lower())
          PY
      - name: Persist selected task
        if: steps.choose.outputs.queue_changed == 'true'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/roadmap/ACTIVE_QUEUE.json
          git diff --cached --quiet || git commit -m "AUTOPILOT: select roadmap task"
          git push origin HEAD:main
      - name: Dispatch and confirm lifecycle
        if: steps.choose.outputs.action == 'dispatch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
          TRACE_ID: ${{ steps.choose.outputs.trace_id }}
          TASK_ID: ${{ steps.choose.outputs.task_id }}
          WORKFLOW_ID: ${{ steps.choose.outputs.workflow_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/payload.json
          import json
          from pathlib import Path
          x = json.loads(Path("/tmp/dispatch.json").read_text())
          print(json.dumps({"ref": "main", "inputs": x["inputs"]}))
          PY
          code="$(curl -sS -o /tmp/dispatch_response.txt -w '%{http_code}' \
            -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPOSITORY/actions/workflows/$WORKFLOW_ID/dispatches" \
            --data @/tmp/payload.json)"
          test "$code" = "204"
          python3 governance/runners/dispatch_executor.py \
            --confirm-only --record-dispatched --trace-id "$TRACE_ID" \
            --dispatch-id "$TASK_ID" --workflow-id "$WORKFLOW_ID" \
            --repository "$REPOSITORY" --poll-timeout-seconds 300 \
            --poll-interval-seconds" 5 --output /tmp/lifecycle_result.json
      - name: Persist lifecycle log
        if: always() && steps.choose.outputs.action == 'dispatch'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase origin main
          git add governance/state/dispatch_lifecycle.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "AUTOPILOT: persist dispatch lifecycle"
          git push origin HEAD:main
