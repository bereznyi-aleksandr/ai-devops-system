name: Roadmap Autopilot

"on":
  workflow_dispatch:
    inputs:
      force_task_id:
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/runners/roadmap_autopilot.py
      - governance/runners/dispatch_executor.py
      - governance/runners/dsm1_finalize.py
      - .github/workflows/roadmap-autopilot.yml
      - .github/workflows/dsm1-lifecycle-probe.yml
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

# Serializes all executions of this workflow. Push retry below additionally
# protects against a commit from another workflow or a human operator.
concurrency:
  group: bem949-queue-writer
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Compile lifecycle executors
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/roadmap_autopilot.py
          python3 -m py_compile governance/runners/dispatch_executor.py
          python3 -m py_compile governce/runners/dsm1_finalize.py
