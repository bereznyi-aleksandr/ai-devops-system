name: Roadmap Autopilot

on:
  workflow_run:
    workflows:
      - "BEM949 P4 Live LLM Fallback Probe V2"
      - "BEM949 P5 Rule Source Catalog"
      - "Claude Code"
    types: [completed]
  repository_dispatch:
    types: [autopilot-run]
  workflow_dispatch:
    inputs:
      force_task_id:
        description: 'Запустить конкретный task ID (пусто = авто)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run: показать следующий task без dispatch'
        required: false
        default: 'false'
        type: string
  schedule:
    - cron: '* * * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: roadmap-autopilot
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          fetch-depth: 1

      - name: Read queue and select next task
        id: select
        shell: bash
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          QUEUE_PATH = Path("governance/roadmap/ACTIVE_QUEUE.json")
          OUT = os.environ.get("GITHUB_OUTPUT", "/dev/null")
          def out(k, v):
              open(OUT, "a").write(f"{k}={v}\n")
          if not QUEUE_PATH.exists():
              print("AUTOPILOT: queue not found"); out("action","stop"); out("reason","queue_not_found"); sys.exit(0)
          queue = json.loads(QUEUE_PATH.read_text())
          tasks = queue.get("tasks", [])
          force = os.environ.get("FORCE_TASK_ID","").strip()
          dry = os.environ.get("DRY_RUN","false").strip().lower() == "true"
          WORKFLOWS = {
              "BEM949-P4-LIVE-LLM-FALLBACK": ("bem949-p4-live-llm-fallback-v2.yml", lambda t: {"trace_id": t}),
              "BEM949-P5-RULE-ENFORCEMENT-COMPLETE": ("bem949-p5-rule-source-catalog.yml", lambda t: {"trace_id": t}),
              "BEM949-P6-LEARNING-LOOP-DRILL": ("claude.yml", lambda t: {"role":"executor","provider":"claude","trace_id":t,"cycle_id":t,"task_type":"default_development","task":"Execute BEM949-P6 per governance/protocols/BEM949_HARD_AUDIT_AND_ROADMAP.md"}),
              "BEM949-P7-RELEASE-AUDIT-FINAL": ("claude.yml", lambda t: {"role":"auditor","provider":"claude","trace_id":t,"cycle_id":t,"task_type":"default_development","task":"Execute BEM949-P7 per governance/protocols/BEM949_HARD_AUDIT_AND_ROADMAP.md"}),
          }
          sel = None
          for task in tasks:
              tid = task.get("id",""); status = task.get("status","")
              if force:
                  if tid == force: sel = task; break
                  continue
              if status in ("DONE","DONE_LIMITED_SCOPE"): continue
              if status in ("BLOCKED_OPERATOR_DECISION","BLOCKED"):
                  print(f"AUTOPILOT: skip {tid} ({status})"); continue
              if status in ("PENDING","IN_PROGRESS") and tid in WORKFLOWS:
                  sel = task; break
              if status in ("PENDING","IN_PROGRESS"):
                  print(f"AUTOPILOT: skip {tid} no mapping"); continue
          if not sel:
              print("AUTOPILOT: nothing actionable"); out("action","stop"); out("reason","no_actionable_task"); sys.exit(0)
          import datetime
          tid = sel["id"]; wf, inp_fn = WORKFLOWS[tid]
          ts = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
          trace = f"autopilot_{tid.lower().replace('-','_')}_{ts}"
          inputs = inp_fn(trace)
          print(f"AUTOPILOT: task={tid} wf={wf} trace={trace}")
          out("action","dispatch"); out("task_id",tid); out("workflow_id",wf); out("trace_id",trace); out("dry_run",str(dry).lower())
          Path("/tmp/ap.json").write_text(json.dumps({"workflow_id":wf,"inputs":inputs}))
          PY

      - name: Dispatch target workflow
        if: steps.select.outputs.action == 'dispatch' && steps.select.outputs.dry_run == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path
          from datetime import datetime, timezone
          d = json.loads(Path("/tmp/ap.json").read_text())
          wf = d["workflow_id"]; inputs = d["inputs"]
          data = json.dumps({"ref":"main","inputs":inputs}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/actions/workflows/{wf}/dispatches",
              data=data,
              headers={"Authorization":f"Bearer {os.environ['GH_TOKEN']}","Accept":"application/vnd.github+json","Content-Type":"application/json","User-Agent":"ai-devops-autopilot"},
              method="POST")
          with urllib.request.urlopen(req) as r:
              http = r.status
          rec = {"dispatched_at":datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),"workflow_id":wf,"trace_id":inputs.get("trace_id","?"),"http_status":http,"completion_claimed":False}
          Path("governance/state").mkdir(parents=True, exist_ok=True)
          open("governance/state/dispatch_executed.jsonl","a").write(json.dumps(rec)+"\n")
          print(f"AUTOPILOT: dispatched {wf} HTTP {http}")
          PY

      - name: Dry run report
        if: steps.select.outputs.action == 'dispatch' && steps.select.outputs.dry_run == 'true'
        run: |
          echo "DRY RUN: ${{ steps.select.outputs.workflow_id }} / ${{ steps.select.outputs.task_id }}"

      - name: Stopped
        if: steps.select.outputs.action == 'stop'
        run: echo "AUTOPILOT STOPPED"

      - name: Commit dispatch record
        if: steps.select.outputs.action == 'dispatch' && steps.select.outputs.dry_run == 'false'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase --autostash origin main || true
          git add governance/state/dispatch_executed.jsonl || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "AUTOPILOT: ${{ steps.select.outputs.workflow_id }} trace=${{ steps.select.outputs.trace_id }}"
          git push || (git pull --rebase origin main && git push)
