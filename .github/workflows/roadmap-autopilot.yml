name: Roadmap Autopilot

on:
  workflow_dispatch:
    inputs:
      force_task_id:
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/proofs/**
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: roadmap-autopilot
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Compile universal autopilot
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path("governance/runners/roadmap_autopilot.py")
          compile(p.read_text(encoding="utf-8"), str(p), "exec")
          PY

      - id: choose
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id || '' }}
        run: |
          set -euo pipefail
          python3 governance/runners/roadmap_autopilot.py \
            --force-task-id "$FORCE_TASK_ID" \
            --output /tmp/dispatch.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          x = json.loads(Path("/tmp/dispatch.json").read_text())
          for k in ("action", "task_id", "workflow_id"):
              print(f"{k}={x.get(k, '')}")
          print("queue_changed=" + str(bool(x.get("queue_changed"))).lower())
          PY

      - name: Persist queue transition
        if: steps.choose.outputs.queue_changed == 'true'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -- governance/roadmap/ACTIVE_QUEUE.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "AUTOPILOT: select universal queue task"
          for n in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase --autostash origin main
            sleep "$n"
          done
          exit 1

      - name: Dispatch selected task
        if: steps.choose.outputs.action == 'dispatch'
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/payload.json
          import json
          from pathlib import Path
          x = json.loads(Path("/tmp/dispatch.json").read_text())
          print(json.dumps({"ref": "main", "inputs": x["inputs"]}))
          PY
          workflow="$(python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import quote
          x = json.loads(Path("/tmp/dispatch.json").read_text())
          print(quote(x["workflow_id"], safe=""))
          PY
          )"
          code="$(curl -sS -o /tmp/response.txt -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPOSITORY/actions/workflows/$workflow/dispatches" \
            --data @/tmp/payload.json)"
          cat /tmp/response.txt || true
          test "$code" = "204"
