name: Roadmap Autopilot

on:
  workflow_dispatch:
    inputs:
      force_task_id:
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/runners/roadmap_autopilot.py
      - governance/runners/dispatch_executor.py
      - governance/runners/dsm1_finalize.py
      - governance/proofs/BEM949_dsm1_static_implementation_receipt.json
      - .github/workflows/roadmap-autopilot.yml
      - .github/workflows/dsm1-lifecycle-probe.yml

permissions:
  contents: write
  actions: write

concurrency:
  group: roadmap-autopilot
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Compile DSM-1 lifecycle code
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/roadmap_autopilot.py
          python3 -m py_compile governance/runners/dispatch_executor.py
          python3 -m py_compile governance/runners/dsm1_finalize.py

      - id: choose
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id  || '' }}
        run: |
          set -euo pipefail
          python3 governance/runners/roadmap_autopilot.py \
            --force-task-id "$FORCE_TASK_ID" --output /tmp/dispatch.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          item = json.loads(Path("/tmp/dispatch.json").read_text())
          for key in ("action", "task_id", "workflow_id", "trace_id"):
              print(f"{key}={item.get(key, '')}")
          print("queue_changed=" + str(bool(item.get("queue_changed"))).lower())
          PY

      - name: Persist DSM-1 selection
        if: steps.choose.outputs.queue_changed == 'true'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/roadmap/ACTIVE_QUEUE.json
          git diff --cached --quiet || git commit -m "AUTOPILOT: select DSM-1"
          git push origin HEAD:main

      - name: Dispatch DSM-1 probe and confirm lifecycle
        if: steps.choose.outputs.action == 'dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
          TRACE_ID: ${{ steps.choose.outputs.trace_id }}
          TASK_ID: ${{ steps.choose.outputs.task_id }}
          WORKFLOW_ID: ${{ steps.choose.outputs.workflow_id }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/payload.json
          import json
          from pathlib import Path
          item = json.loads(Path("/tmp/dispatch.json").read_text())
          print(json.dumps({"ref": "main", "inputs": item["inputs"]}))
          PY
          code="$(curl -sS -o /tmp/dispatch_response.txt -w '%{http_code}' \
            -X POST -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPOSITORY/actions/workflows/$WORKFLOW_ID/dispatches" \
            --data @/tmp/payload.json)"
          test "$code" = "204"
          python3 governance/runners/dispatch_executor.py \
            --confirm-only --record-dispatched --trace-id "$TRACE_ID" \
            --dispatch-id "$TASK_ID" --workflow-id "$WORKFLOW_ID" \
            --repository "$REPOSITORY" --poll-timeout-seconds 300 \
            --poll-interval-seconds 5 --output /tmp/lifecycle_result.json

      - name: Persist DSM-1 terminal evidence
        if: always() && steps.choose.outputs.action == 'dispatch'
        env:
          TASK_ID: ${{ steps.choose.outputs.task_id }}
          TRACE_ID: ${{ steps.choose.outputs.trace_id }}
          WORKFLOW_ID: ${{ steps.choose.outputs.workflow_id }}
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase origin main
          python3 governance/runners/dsm1_finalize.py \
            --task-id "$TASK_ID" --trace-id "$TRACE_ID" \
            --workflow-id "$WORKFLOW_ID" \
            --result /tmp/lifecycle_result.json
          git add governance/state/dispatch_lifecycle.jsonl \
            governance/proofs/BEM949_dsm1_runtime_hardening_receipt.json \
            governance/roadmap/ACTIVE_QUEUE.json \
            governance/state/ssot_transaction_log.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "AUTOPILOT: finalize DSM-1 lifecycle"
          git push origin HEAD:main
