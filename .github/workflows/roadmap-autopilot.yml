name: Roadmap Autopilot

on:
  workflow_dispatch:
    inputs:
      force_task_id:
        description: Optional eligible PENDING task ID override
        required: false
        default: ""
        type: string
  workflow_run:
    workflows: ["Roadmap Task Executor"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/proofs/**
      - governance/logs/execution_log.jsonl
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: roadmap-autopilot
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Compile universal autopilot
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path("governance/runners/roadmap_autopilot.py")
          compile(path.read_text(encoding="utf-8"), str(path), "exec")
          PY

      - id: advance
        name: Reconcile receipts and select any eligible task
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id || '' }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 governance/runners/roadmap_autopilot.py             --force-task-id "$FORCE_TASK_ID"             --trace-prefix "autopilot_${RUN_ID}"             --dispatch-out /tmp/roadmap_dispatch.json             > /tmp/roadmap_advance.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          result = json.loads(Path("/tmp/roadmap_advance.json").read_text(encoding="utf-8"))
          print("action=" + str(result["action"]))
          print("queue_changed=" + str(bool(result["queue_changed"])).lower())
          print("workflow_id=" + str(result.get("workflow_id", "")))
          print("task_id=" + str(result.get("task_id", "")))
          PY

      - name: Persist autopilot queue transition
        if: steps.advance.outputs.queue_changed == 'true'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --check
          git add -A -- governance/roadmap/ACTIVE_QUEUE.json governance/state/dispatch_executed.jsonl
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "AUTOPILOT: reconcile and advance universal queue"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase --autostash origin main
            sleep "$attempt"
          done
          exit 1

      - name: Dispatch selected task binding
        if: steps.advance.outputs.action == 'dispatch'
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/dispatch_payload.json
          import json
          from pathlib import Path
          dispatch = json.loads(Path("/tmp/roadmap_dispatch.json").read_text(encoding="utf-8"))
          print(json.dumps({"ref": "main", "inputs": dispatch["inputs"]}))
          PY
          workflow_path="$(python3 - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import quote
          dispatch = json.loads(Path("/tmp/roadmap_dispatch.json").read_text(encoding="utf-8"))
          print(quote(dispatch["workflow_id"], safe=""))
          PY
          )"
          code="$(curl -sS -o /tmp/dispatch_response.txt -w '%{http_code}'             -X POST             -H "Authorization: Bearer $GH_TOKEN"             -H "Accept: application/vnd.github+json"             -H "Content-Type: application/json"             "https://api.github.com/repos/$REPOSITORY/actions/workflows/$workflow_path/dispatches"             --data @/tmp/dispatch_payload.json)"
          cat /tmp/dispatch_response.txt || true
          test "$code" = "204"
