name: Roadmap Autopilot

on:
  workflow_dispatch:
    inputs:
      force_task_id:
        required: false
        default: ""
        type: string
  push:
    branches: [main]
    paths:
      - governance/roadmap/ACTIVE_QUEUE.json
      - governance/runners/roadmap_autopilot.py
      - governance/runners/dispatch_executor.py
      - governance/runners/dsm1_finalize.py
      - .github/workflows/roadmap-autopilot.yml
      - .github/workflows/dsm1-lifecycle-probe.yml
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  actions: write

# The same group must be reused by every workflow that mutates ACTIVE_QUEUE.json.
concurrency:
  group: bem949-queue-writer
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Compile lifecycle executors
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/roadmap_autopilot.py
          python3 -m py_compile governance/runners/dispatch_executor.py
          python3 -m py_compile governance/runners/dsm1_finalize.py

      - id: choose
        name: Select eligible DSM-1 lifecycle run
        env:
          FORCE_TASK_ID: ${{ inputs.force_task_id || '' }}
        run: |
          set -euo pipefail
          python3 governance/runners/roadmap_autopilot.py \
            --force-task-id "$FORCE_TASK_ID" \
            --output /tmp/dispatch.json
          {
            for key in action task_id workflow_id trace_id; do
              echo "$key=$(jq -r --arg key "$key" '.[$key] // ""' /tmp/dispatch.json)"
            done
            echo "queue_changed=$(jq -r '.queue_changed // false' /tmp/dispatch.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Persist selection
        if: steps.choose.outputs.queue_changed == 'true'
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/roadmap/ACTIVE_QUEUE.json
          git diff --cached --quiet || git commit -m "AUTOPILOT: select DSM-1 lifecycle probe"

          for attempt in 1 2 3; do
            git push origin HEAD:main && exit 0
            git fetch origin main
            git rebase --autostash origin/main || {
              git rebase --abort || true
              exit 1
            }
          done
          exit 1

      - name: Dispatch and confirm DSM-1
        if: steps.choose.outputs.action == 'dispatch'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
          TRACE_ID: ${{ steps.choose.outputs.trace_id }}
          TASK_ID: ${{ steps.choose.outputs.task_id }}
          WORKFLOW_ID: ${{ steps.choose.outputs.workflow_id }}
        run: |
          set -euo pipefail
          jq -n --arg trace "$TRACE_ID" --arg task "$TASK_ID" \
            '{ref:"main",inputs:{trace_id:$trace,task_id:$task}}' > /tmp/payload.json
          status="$(
            curl -sS -o /tmp/dispatch_response.txt -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/$REPOSITORY/actions/workflows/$WORKFLOW_ID/dispatches" \
              --data @/tmp/payload.json
          )"
          test "$status" = "204"

          python3 governance/runners/dispatch_executor.py \
            --confirm-only \
            --record-dispatched \
            --trace-id "$TRACE_ID" \
            --dispatch-id "$TASK_ID" \
            --workflow-id "$WORKFLOW_ID" \
            --repository "$REPOSITORY" \
            --poll-timeout-seconds 300 \
            --poll-interval-seconds 5 \
            --output /tmp/lifecycle_result.json

      - name: Persist terminal DSM-1 evidence
        if: always() && steps.choose.outputs.action == 'dispatch'
        env:
          TASK_ID: ${{ steps.choose.outputs.task_id }}
          TRACE_ID: ${{ steps.choose.outputs.trace_id }}
          WORKFLOW_ID: ${{ steps.choose.outputs.workflow_id }}
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          set +e
          python3 governance/runners/dsm1_finalize.py \
            --task-id "$TASK_ID" \
            --trace-id "$TRACE_ID" \
            --workflow-id "$WORKFLOW_ID" \
            --result /tmp/lifecycle_result.json
          finalizer_status=$?
          set -e

          git add \
            governance/state/dispatch_lifecycle.jsonl \
            governance/proofs/BEM949_dsm1_runtime_execution_receipt.json \
            governance/roadmap/ACTIVE_QUEUE.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "AUTOPILOT: record DSM-1 lifecycle evidence"

          # Do not run git pull in a dirty working tree. Commit first, then
          # retry a rebase only after a rejected push. A conflict exits safely;
          # nothing is force-pushed.
          for attempt in 1 2 3; do
            git push origin HEAD:main && exit "$finalizer_status"
            git fetch origin main
            git rebase --autostash origin/main || {
              git rebase --abort || true
              exit 1
            }
          done
          exit 1
