name: Operator Hourly Curator Report

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: operator-hourly-curator-report
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch curator hourly report
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone, timedelta

          repo = os.environ["REPO"]
          token = os.environ.get("GH_TOKEN") or os.environ.get("FALLBACK_GITHUB_TOKEN")
          if not token:
              raise SystemExit("No GitHub token available")

          utc_now = datetime.now(timezone.utc)
          utc3 = utc_now.astimezone(timezone(timedelta(hours=3)))
          trace_id = "operator_hourly_" + utc_now.strftime("%Y%m%dT%H%M%SZ")

          task = f"""
          ЗАДАЧА: OPERATOR_HOURLY_REPORT

          Ты — Curator генерального директора.

          Подготовь короткий Telegram-отчёт оператору строго в формате:

          BEM-HOURLY | OPERATOR REPORT | {utc3.strftime("%Y-%m-%d | %H:%M (UTC+3)")}

          ЭТАП:
          X/Y (Z%)

          ДОРОЖНАЯ КАРТА:
          X/Y (Z%)

          ЧЕК-ЛИСТ:
          [x] <сделано>
          [ ] <не сделано>
          [!] <блокер>

          ВОПРОС ОПЕРАТОРУ:
          нет

          ПРАВИЛА:
          - Не добавляй другие разделы.
          - Не добавляй "изменения за час".
          - Не добавляй "mailbox".
          - Не добавляй "риски".
          - Не добавляй raw logs.
          - Если вопрос оператору нужен, задай ровно один вопрос в секции "ВОПРОС ОПЕРАТОРУ".
          - Если вопрос не нужен, напиши "нет".
          - Последняя строка ответа должна быть:
            CURATOR_REPLY: <весь отчёт одной связной plaintext-формой>
          """.strip()

          payload = {
              "ref": "main",
              "inputs": {
                  "role": "curator",
                  "provider": "openai",
                  "trace_id": trace_id,
                  "cycle_id": "operator_hourly",
                  "task_type": "operator_hourly_report",
                  "task": task,
              },
          }

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/workflows/gpt-hosted-roles.yml/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"Dispatched curator hourly report: HTTP {resp.status}")
              print(f"trace_id={trace_id}")
          PY
