name: Operator Hourly Curator Report

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: operator-hourly-curator-report
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch curator hourly report
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone, timedelta

          repo = os.environ["REPO"]
          token = os.environ.get("GH_TOKEN") or os.environ.get("FALLBACK_GITHUB_TOKEN")
          if not token:
              raise SystemExit("No GitHub token available")

          utc_now = datetime.now(timezone.utc)
          utc3 = utc_now.astimezone(timezone(timedelta(hours=3)))
          trace_id = "operator_hourly_" + utc_now.strftime("%Y%m%dT%H%M%SZ")

          task = f"""
ЗАДАЧА: OPERATOR_HOURLY_REPORT

Ты — куратор управляющего контура.

Подготовь короткий Telegram-отчёт оператору.
Формат обязателен: plaintext, читаемый на телефоне, каждый пункт чек-листа на отдельной строке.

СТРОГО ЗАПРЕЩЕНО:
- склеивать отчёт в одну строку;
- писать чек-лист через пробел;
- добавлять raw mailbox;
- добавлять repository changes;
- добавлять risks/logs/stack traces;
- добавлять внутренние рассуждения.

ОБЯЗАТЕЛЬНЫЙ ШАБЛОН:

BEM-HOURLY | ОТЧЁТ ОПЕРАТОРУ
{utc3.strftime("%Y-%m-%d | %H:%M (UTC+3)")}

ЭТАП:
X/Y (Z%)

ДОРОЖНАЯ КАРТА:
X/Y (Z%)

ЧЕК-ЛИСТ:
✅ <сделано>
⬜ <не сделано>
⛔ <блокер>

ВОПРОС ОПЕРАТОРУ:
нет

ПРАВИЛА:
- максимум 6 строк в чек-листе;
- если изменений нет, напиши один пункт: ✅ Изменений за отчётный период нет
- если есть блокер, отдельная строка должна начинаться с ⛔
- если нужен оператор, в секции "ВОПРОС ОПЕРАТОРУ" напиши ровно один вопрос;
- если вопрос не нужен, напиши "нет".

В конце ответа выведи блок:

CURATOR_REPLY:
<готовый текст Telegram-отчёта с переносами строк>
END_CURATOR_REPLY
""".strip()

          payload = {
              "ref": "main",
              "inputs": {
                  "role": "curator",
                  "provider": "openai",
                  "trace_id": trace_id,
                  "cycle_id": "operator_hourly",
                  "task_type": "operator_hourly_report",
                  "task": task,
              },
          }

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/actions/workflows/gpt-hosted-roles.yml/dispatches",
              data=json.dumps(payload).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"Dispatched curator hourly report: HTTP {resp.status}")
              print(f"trace_id={trace_id}")
          PY
