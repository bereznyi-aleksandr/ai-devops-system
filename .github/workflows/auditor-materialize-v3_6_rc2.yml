name: Auditor Materialize v3.6-RC2

on:
  workflow_dispatch:
    inputs:
      packet_path:
        description: 'Path to auditor packet JSON'
        required: false
        default: '.runtime/auditor_packet_v3_6_rc2.json'
        type: string

jobs:
  materialize_auditor_artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize auditor decision skeleton
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          packet_path = Path('${{ github.event.inputs.packet_path }}')
          if not packet_path.exists():
              raise SystemExit('AUDITOR_PACKET_MISSING')

          packet = json.loads(packet_path.read_text(encoding='utf-8'))
          task_id = packet.get('task_id', '').strip()
          review_action = packet.get('review_action', '').strip()
          parent_event_id = packet.get('current_event_ref', '').strip()
          if not task_id:
              raise SystemExit('AUDITOR_PACKET_TASK_ID_MISSING')

          ts = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          decision_id = f'DECISION-{task_id}-{ts.replace(":", "").replace("-", "")}'
          out_path = Path(f'governance/decisions/{decision_id}.md')
          body = f'''decision_id: {decision_id}
task_id: {task_id}
parent_event_id: {parent_event_id}
decision_author: AUDITOR
decision_profile: v3.6-RC2
ts_utc: {ts}
decision_type: PLACEHOLDER_DECISION
decision: WAIT
review_action: {review_action}
reviewed_ref: {packet.get('artifact_ref', '')}
reviewed_commit_sha:
next_role_assigned: EXECUTOR
next_action_assigned: {review_action or 'PROPOSE_TASK'}
rationale: Placeholder auditor decision materialized by canonical contour.
conditions: GPT invocation not connected yet; replace placeholder with structured decision.
flags: [placeholder]
'''
          out_path.parent.mkdir(parents=True, exist_ok=True)
          out_path.write_text(body, encoding='utf-8')

          manifest = {
              'status': 'AUDITOR_DECISION_MATERIALIZED',
              'task_id': task_id,
              'review_action': review_action,
              'artifact_path': str(out_path),
              'parent_event_id': parent_event_id,
              'ts_utc': ts,
              'decision_id': decision_id,
          }
          manifest_path = Path('.runtime/auditor_materialize_result.json')
          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False))
          PY

      - name: Commit auditor artifact
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/ .runtime/
          if git diff --cached --quiet; then
            echo "No auditor artifact changes to commit"
            exit 0
          fi
          git commit -m "Auditor: materialize canonical decision skeleton"
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "Materializes auditor decision skeleton only."
          echo "No GPT call and no semantic approval here."
