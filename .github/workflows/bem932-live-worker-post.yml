name: BEM-932 Live Worker POST Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1

      - name: POST Telegram update shape to deployed Worker
        shell: bash
        env:
          WORKER_URL: "https://tg-curator-webhook.bereznii-aleksandr.workers.dev"
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          TRACE_UPDATE_ID="932000001"
          cat > /tmp/telegram_update.json <<JSON
          {
            "update_id": $TRACE_UPDATE_ID,
            "message": {
              "message_id": 932001,
              "date": 1781384469,
              "chat": { "id": 601442777, "type": "private" },
              "text": "BEM-932 live worker provider-router test: act without stopping"
            }
          }
          JSON

          HTTP_CODE=$(curl -sS -o /tmp/worker_response.json -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/json" \
            --data @/tmp/telegram_update.json \
            "$WORKER_URL")
          export HTTP_CODE
          cat /tmp/worker_response.json || true

          python3 - <<'PY'
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          resp_path = Path("/tmp/worker_response.json")
          raw = resp_path.read_text() if resp_path.exists() else ""
          try:
              body = json.loads(raw)
          except Exception:
              body = {"raw": raw}
          http_code = os.environ["HTTP_CODE"]
          status = "PASS" if (http_code == "200" and body.get("status") == "DISPATCHED") else "BLOCKED"
          receipt = {
              "status": status,
              "protocol": "BEM-932 v8.3",
              "receipt_type": "live_cloudflare_worker_post",
              "created_at": now,
              "worker_url": os.environ["WORKER_URL"],
              "http_code": http_code,
              "worker_response": body,
              "update_id": "932000001",
              "sent_text": "BEM-932 live worker provider-router test: handoff from Cloudflare to provider-router"
          }
          Path("governance/proofs/BEM932_live_worker_post_receipt.json").write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n")
          if status != "PASS":
              raise SystemExit(1)
          PY

      - name: Commit live test receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem932-live-worker-test@ai-devops-system"
          git config user.name "BEM932 Live Worker Test"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_live_worker_post_receipt.json 2>/dev/null || true
         if git diff --cached --quiet; then
            echo "No live test receipt changes"
          else
            git commit -m "BEM-932 live worker post receipt"
            git push
         fi
