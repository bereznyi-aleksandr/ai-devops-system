name: BEM949 Claude Transport Recovery Analysis

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Dispatch governed read-only Claude analyst
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: python3 governance/tools/dispatch_bem949_claude_transport_analysis.py
