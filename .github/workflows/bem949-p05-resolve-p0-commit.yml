name: BEM949 P0.5 Resolve P0 Commit SHA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve candidate against repository commit objects and persist receipt
        uses: actions/github-script@f7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const malformed = "3bf9f8e257cd113ed4436d956ebbf2b2ea7b859bd";
            const candidates = [malformed.slice(0, -1), malformed.slice(1)];
            const resolved = [];
            for (const candidate of candidates) {
              try {
                const { data } = await github.rest.git.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: candidate,
                });
                if (data && typeof data.sha === "string" && data.sha.length === 40 && !resolved.includes(data.sha)) {
                  resolved.push(data.sha);
                }
              } catch (error) {
                if (error.status !== 404 && error.status !== 422) {
                  throw error;
                }
              }
            }

            const payload = {
              schema_version: 1,
              protocol: "BEM-949",
              task_id: "BEM949-P0.5-TEXT-INTEGRITY-FIX",
              receipt_id: "BEM949_p05_p0_commit_resolution",
              created_at: new Date().toISOString(),
              status: resolved.length === 1 ? "PASS" : "BLOCKED",
              source_receipt: "governance/proofs/BEM948_p0_final_verification_receipt.json",
              source_report: "governance/reports/bem948_p0_live_object_e2e_turn24_20260620T0950Z.md",
              malformed_reference: malformed,
              malformed_reference_length: malformed.length,
              candidates_checked: candidates,
              resolved_commit_shas: resolved,
              resolved_commit_sha_type: resolved.length === 1 ? "commit" : null,
              checks: {
                source_reference_is_invalid_length: malformed.length !== 40,
                exactly_one_repository_commit_resolved: resolved.length === 1,
              },
              blocker: resolved.length === 1 ? null : "p0_execution_commit_sha_not_resolvable_from_repository_candidates",
            };

            const path = "governance/proofs/BEM949_p05_p0_commit_resolution.json";
            let currentSha;
            try {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: context.ref.replace("refs/heads/", ""),
              });
              if (!Array.isArray(current.data)) {
                currentSha = current.data.sha;
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: "BEM949 P0.5: resolve historical P0 commit SHA",
              content: Buffer.from(JSON.stringify(payload, null, 2) + "\n", "utf8").toString("base64"),
              branch: context.ref.replace("refs/heads/", ""),
              ...(currentSha ? { sha: currentSha } : {}),
            });
