name: BEM934 Atomic Dynamic Claude Patch

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Patch and validate claude.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          git config user.email "bem934-atomic@ai-devops-system"
          git config user.name "BEM-934 Atomic Patch"
          python3 -m py_compile governance/runners/bem934_make_live_validation_dynamic.py
          python3 governance/runners/bem934_make_live_validation_dynamic.py
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/claude.yml')"
          python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/claude.yml').read_text(encoding='utf-8')
          required = [
              'safe_trace',
              "BEM932_provider_router_' + trace + '.json'",
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit(f'dynamic markers missing: {missing}')
          PY
          git add .github/workflows/claude.yml
          if git diff --cached --quiet; then
            echo "already patched"
            exit 0
          fi
          git commit -m "Make BEM-934 Claude live proof validation dynamic and trace-bound"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
