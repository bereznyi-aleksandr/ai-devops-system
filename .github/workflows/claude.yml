name: Claude Code

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Run Claude Code BEM-947 executor
        id: claude_role
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          prompt: |
            BEM-947 planned-to-executed live object dispatch proof.

            You are the executor role inside ai-devops-system.

            Scope is minimal and evidence-bearing:
            1. Read:
               - governance/state/dispatch_queue.jsonl
               - governance/state/dispatch_processed.jsonl
               - governance/runners/object_runner.py
               - governance/runners/dispatch_consumer.py
               - governance/runners/curator_router.py
            2. Create governance/reports/bem947_object_dispatch_claude_yml_default_20260619T1130Z.md.
            3. Create governance/proofs/BEM947_live_object_dispatch_executed_bem947_object_dispatch_claude_yml_default_20260619T1130Z.json.
            4. Commit only that report/proof.

            Required JSON fields:
            {
              "status": "completed",
              "protocol": "BEM-947",
              "task_id": "BEM947-P2-LIVE-OBJECT-DISPATCH-RUN",
              "trace_id": "bem947_object_dispatch_claude_yml_default_20260619T1130Z",
              "provider_selected": "claude_code",
              "target_workflow_id": "claude.yml",
              "dispatch_result": "executed",
              "blocker": null,
              "checks": {
                "object_runner_to_dispatch_queue": true,
                "curator_router_to_claude_yml": true,
                "executed_by_claude_yml": true,
                "sha_type_explicit": true
              },
              "artifacts": [
                {
                  "path": "governance/reports/bem947_object_dispatch_claude_yml_default_20260619T1130Z.md",
                  "sha_type": "git_blob"
                }
              ]
            }

            If any required field cannot be truthfully satisfied, write a BLOCKED proof instead and do not claim completed.
          claude_args: '--max-turns 10 --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*)"' 

      - name: Validate and commit BEM-947 proof
        if: always()
        shell: bash
        env:
          CLAUDE_OUTCOME: ${{ steps.claude_role.outcome }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs governance/reports
          python3 - <<'PY'
import json
import os
import subprocess
from datetime import datetime, timezone
from pathlib import Path

trace = "bem947_object_dispatch_claude_yml_default_20260619T1130Z"
proof_path = Path("governance/proofs/BEM947_live_object_dispatch_executed_" + trace + ".json")
report_path = Path("governance/reports/" + trace + ".md")
receipt_path = Path("governance/proofs/BEM947_claude_yml_default_execution_receipt.json")

def now():
    return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

proof_valid = False
blockers = []
if proof_path.exists():
    try:
        proof = json.loads(proof_path.read_text(encoding="utf-8"))
        checks = proof.get("checks") if isinstance(proof.get("checks"), dict) else {}
        proof_valid = (
            proof.get("status") == "completed"
            and proof.get("protocol") == "BEM-947"
            and proof.get("task_id") == "BEM947-P2-LIVE-OBJECT-DISPATCH-RUN"
            and proof.get("trace_id") == trace
            and proof.get("provider_selected") == "claude_code"
            and proof.get("target_workflow_id") == "claude.yml"
            and proof.get("dispatch_result") == "executed"
            and proof.get("blocker") is None
            and checks.get("executed_by_claude_yml") is True
            and checks.get("sha_type_explicit") is True
        )
        if not proof_valid:
            blockers.append("proof_semantic_validation_failed")
    except Exception as exc:
        blockers.append("proof_json_parse_failed:" + str(exc))
else:
    blockers.append("executed_proof_not_created_by_claude")

if not report_path.exists():
    blockers.append("report_not_created_by_claude")

receipt = {
    "status": "PASS" if proof_valid and report_path.exists() else "BLOCKED",
    "protocol": "BEM-947",
    "task_id": "BEM947-P2-LIVE-OBJECT-DISPATCH-RUN",
    "created_at": now(),
    "trace_id": trace,
    "stage": {"tasks_done": 3 if proof_valid and report_path.exists() else 2, "tasks_total": 4, "percent": 75 if proof_valid and report_path.exists() else 50},
    "workflow": {
        "target_workflow_id": "claude.yml",
        "dispatch_mode": "default_inputs_after_autorepair",
        "claude_action_outcome": os.environ.get("CLAUDE_OUTCOME", "unknown")
    },
    "checks": {
        "claude_yml_ran": True,
        "executed_proof_exists": proof_path.exists(),
        "report_exists": report_path.exists(),
        "executed_proof_semantically_valid": proof_valid,
        "no_false_completed_claim": True,
        "sha_type_policy_bound": True
    },
    "blockers": blockers,
    "next_task": "BEM947-P3-FINAL-VERIFY" if proof_valid and report_path.exists() else "BEM947-P2-AUTOREPAIR-CLAUDE-YML-DEFAULT",
}
receipt_path.write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

PY

          git config user.email "bem947-claude-yml@ai-devops-system"
          git config user.name "BEM947 Claude YML"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM947_claude_yml_default_execution_receipt.json governance/proofs/BEM947_live_object_dispatch_executed_bem947_object_dispatch_claude_yml_default_20260619T1130Z.json governance/reports/bem947_object_dispatch_claude_yml_default_20260619T1130Z.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No BEM947 Claude yml proof changes"
          else
            git commit -m "BEM-947: collect claude.yml executed dispatch proof"
            git push || (git pull --rebase origin main && git push)
          fi
