name: BEM-934 State Transition

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Compile BEM-934 action runner
        run: python3 -m py_compile governance/runners/bem934_actions.py

      - name: Execute requested BEM-934 action
        env:
          BEM934_GITHUB_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: python3 governance/runners/bem934_actions.py

      - name: Commit action results
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem934-state@ai-devops-system"
          git config user.name "BEM-934 State"
          git pull --rebase --autostash origin main || true
          git add governance/proofs governance/architecture/objects_registry_v2.json governance/runtime/bem934_state_request.json
          if git diff --cached --quiet; then
            echo "No BEM-934 result changes"
          else
            git commit -m "BEM-934 requested action result"
            git push
          fi
