name: BEM-934 State Transition

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Execute requested repository action
        env:
          BEM934_GITHUB_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/bem934_actions.py
          python3 governance/runners/bem934_actions.py

      - name: Update queue and append execution log
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          request_path = Path("governance/runtime/bem934_state_request.json")
          queue_path = Path("governance/roadmap/ACTIVE_QUEUE.json")
          log_path = Path("governance/logs/execution_log.jsonl")
          req = json.loads(request_path.read_text(encoding="utf-8"))
          if not req.get("transition"):
              raise SystemExit(0)

          queue = json.loads(queue_path.read_text(encoding="utf-8"))
          task_id = str(req["task_id"])
          done_sha = str(req["done_sha"])
          next_task = str(req.get("next_task") or "").strip() or None
          proof = str(req.get("proof") or "").strip() or None
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          found = False
          next_found = next_task is None
          for task in queue.get("tasks", []):
              if task.get("id") == task_id:
                  task["status"] = "DONE"
                  task["done_sha"] = done_sha
                  if proof:
                      task["proof"] = proof
                  found = True
              elif next_task and task.get("id") == next_task:
                  if task.get("status") == "PENDING":
                      task["status"] = "IN_PROGRESS"
                  next_found = True

          if not found:
              raise SystemExit(f"task not found: {task_id}")
          if not next_found:
              raise SystemExit(f"next task not found: {next_task}")

          queue["version"] = int(queue.get("version", 0)) + 1
          queue["updated_at"] = now
          queue["last_completed"] = {"id": task_id, "completed_at": now}
          queue["current_task"] = next_task
          queue["queue_state"] = "ACTIVE" if next_task else "IDLE"
          queue["next_action"] = f"{next_task} — execute" if next_task else "Batch complete"
          queue_path.write_text(
              json.dumps(queue, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          record = {
              "date": now,
              "id": task_id,
              "sha": done_sha,
              "status": "done",
              "source_proof": proof,
              "next_task": next_task,
          }
          existing = []
          if log_path.exists():
              existing = log_path.read_text(encoding="utf-8").splitlines()
          duplicate = False
          for line in existing:
              try:
                item = json.loads(line)
              except json.JSONDecodeError:
                continue
              if item.get("id") == task_id and item.get("sha") == done_sha:
                  duplicate = True
                  break
          if not duplicate:
              log_path.parent.mkdir(parents=True, exist_ok=True)
              with log_path.open("a", encoding="utf-8") as handle:
                handle.write(json.dumps(record, ensure_ascii=False) + "\n")
          PY

      - name: Commit requested action and state
        if: always()
        run: |
          set -euo pipefail
          git config user.email "bem934-state@ai-devops-system"
          git config user.name "BEM-934 State"
          git pull --rebase --autostash origin main || true
          git add -A
          if git diff --cached --quiet; then
            echo "No BEM-934 changes"
          else
            git commit -m "BEM-934 request execution"
            git push
          fi
