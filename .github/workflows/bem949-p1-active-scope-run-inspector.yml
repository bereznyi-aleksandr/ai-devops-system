name: BEM949 P1 Active Scope Run Inspector

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Collect recent target runs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          if ! gh run list \
            --repo "$REPO" \
            --workflow bem949-p1-active-scope-validation.yml \
            --limit 10 \
            --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt \
            > /tmp/bem949_p1_active_scope_runs.json; then
            printf '[]\n' > /tmp/bem949_p1_active_scope_runs.json
          fi
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          runs = json.loads(Path("/tmp/bem949_p1_active_scope_runs.json").read_text(encoding="utf-8"))
          receipt = {
              "schema_version": 2,
              "protocol": "BEM-949",
              "task_id": "BEM949-P1-CI-STABILIZE",
              "receipt_id": "BEM949_p1_active_scope_run_inspection",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "target_workflow": ".github/workflows/bem949-p1-active-scope-validation.yml",
              "target_workflow_type": "workflow_path",
              "runs": [
                  {
                      "run_id": str(row.get("databaseId", "")),
                      "run_id_type": "github_actions_run",
                      "head_sha": row.get("headSha", ""),
                      "head_sha_type": "commit",
                      "status": row.get("status"),
                      "conclusion": row.get("conclusion"),
                      "event": row.get("event"),
                      "created_at": row.get("createdAt"),
                      "updated_at": row.get("updatedAt"),
                  }
                  for row in runs
              ],
              "checks": {
                  "workflow_runs_queried_via_github_actions_api": True,
                  "run_level_conclusions_preserved": True,
                  "no_completion_claim_from_dispatch_only": True,
              },
              "non_claim": "This inspection records GitHub Actions API observations. A dispatch acknowledgement is not a completion claim.",
          }
          Path("governance/proofs/BEM949_p1_active_scope_run_inspection.json").write_text(
              json.dumps(receipt, indent=2) + "\n", encoding="utf-8"
          )
          PY

      - name: Commit run inspection
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-ci-inspector@ai-devops-system"
          git config user.name "BEM949 CI Run Inspector"
          git add governance/proofs/BEM949_p1_active_scope_run_inspection.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: inspect active-scope validation runs"
          git push || (git pull --rebase origin main && git push)
