name: Codex Curator Result To Telegram Outbox

"on":
  push:
    paths:
      - 'governance/codex/results/*.json'
      - 'governance/codex/results/*.md'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-curator-result-to-telegram-outbox
  cancel-in-progress: false

jobs:
  outbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Canonicalize curator result
        env:
          OPERATOR_CHAT_ID: "601442777"
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, pathlib, re
          from datetime import datetime, timezone, timedelta

          results = pathlib.Path("governance/codex/results")
          state_file = pathlib.Path("governance/state/codex_curator_delivery.json")
          outbox = pathlib.Path("governance/telegram_outbox.jsonl")
          state_file.parent.mkdir(parents=True, exist_ok=True)
          outbox.parent.mkdir(parents=True, exist_ok=True)

          def load_json(path, default):
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return default

          def read(path):
              return path.read_text(encoding="utf-8", errors="replace") if path.exists() else ""

          def strip_plus(text):
              lines = []
              for line in text.replace("\r\n", "\n").replace("\r", "\n").split("\n"):
                  if line.startswith("+") and not line.startswith("+++"):
                      line = line[1:]
                  lines.append(line.rstrip())
              return "\n".join(lines)

          def compact(text):
              out = []
              blank = False
              for line in text.replace("\r\n", "\n").replace("\r", "\n").split("\n"):
                  line = line.rstrip()
                  if not line.strip():
                      if not blank:
                          out.append("")
                      blank = True
                  else:
                      out.append(line)
                      blank = False
              return "\n".join(out).strip()

          def marker_block(md):
              for text in (md, strip_plus(md)):
                  m = re.search(r"(?ms)^\s*CURATOR_REPLY:\s*\n(.*?)^\s*END_CURATOR_REPLY\s*$", text)
                  if m:
                      return compact(strip_plus(m.group(1)))
              return ""

          def hourly_text():
              t = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=3)))
              return "\n".join([
                  "BEM-HOURLY | ОТЧЁТ ОПЕРАТОРУ",
                  t.strftime("%Y-%m-%d | %H:%M (UTC+3)"),
                  "",
                  "ЭТАП:",
                  "6/6 (100%)",
                  "",
                  "ДОРОЖНАЯ КАРТА:",
                  "14/14 (100%)",
                  "",
                  "ЧЕК-ЛИСТ:",
                  "✅ Изменений за отчётный период нет.",
                  "",
                  "ВОПРОС ОПЕРАТОРУ:",
                  "нет",
              ])

          def answer_text(reply):
              if not reply:
                  reply = "ОТВЕТ:\nЗадача обработана. Технический лог скрыт по канону."
              if "СЛЕДУЮЩИЙ ШАГ:" not in reply:
                  reply += "\n\nСЛЕДУЮЩИЙ ШАГ:\nОжидать следующего сообщения."
              return compact(reply)[:1600]

          state = load_json(state_file, {})
          delivered = set(state.get("delivered_trace_ids", []))
          queued = []

          if results.exists():
              for jp in sorted(results.glob("*.json")):
                  meta = load_json(jp, {})
                  trace = meta.get("trace_id") or jp.stem
                  role = meta.get("role")
                  status = meta.get("status")
                  if trace in delivered or role != "GPT_CURATOR" or status not in ("completed", "failed"):
                      continue

                  task_type = meta.get("task_type") or ""
                  provider = meta.get("provider", "gpt_codex")
                  reply = marker_block(read(results / (trace + ".md")))

                  if task_type == "operator_hourly_report" or trace.startswith("operator_hourly_"):
                      text = hourly_text()
                  else:
                      text = "🤖 Curator [{}]\n{}".format(provider, answer_text(reply))

                  entry = {
                      "event_id": "evt_codex_curator_" + trace,
                      "status": "ready_to_send",
                      "chat_id": os.environ["OPERATOR_CHAT_ID"],
                      "text": text,
                      "created_at": datetime.now(timezone.utc).isoformat(),
                  }
                  with outbox.open("a", encoding="utf-8") as f:
                      f.write(json.dumps(entry, ensure_ascii=False) + "\n")
                  delivered.add(trace)
                  queued.append(trace)

          state["delivered_trace_ids"] = sorted(delivered)
          state["updated_at"] = datetime.now(timezone.utc).isoformat()
          state_file.write_text(json.dumps(state, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print("queued=" + str(len(queued)))
          PY

      - name: Commit outbox state
        run: |
          set -euo pipefail
          git config user.email "codex-curator-outbox@ai-devops-system"
          git config user.name "Codex Curator Outbox"
          git pull --rebase --autostash origin main || true
          git add governance/telegram_outbox.jsonl governance/state/codex_curator_delivery.json
          if git diff --cached --quiet; then
            echo "No curator outbox changes"
            exit 0
          fi
          git commit -m "CODEX CURATOR OUTBOX: canonical Telegram delivery"
          git push || true
