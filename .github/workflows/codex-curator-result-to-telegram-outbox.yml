name: Codex Curator Result To Telegram Outbox

"on":
  push:
    paths:
      - 'governance/codex/results/*.json'
      - 'governance/codex/results/*.md'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codex-curator-result-to-telegram-outbox
  cancel-in-progress: false

jobs:
  outbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Convert curator results to canonical Telegram text
        env:
          OPERATOR_CHAT_ID: "601442777"
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json, os, pathlib, re
          from datetime import datetime, timezone, timedelta

          results = pathlib.Path("governance/codex/results")
          state_path = pathlib.Path("governance/state/codex_curator_delivery.json")
          outbox = pathlib.Path("governance/telegram_outbox.jsonl")
          state_path.parent.mkdir(parents=True, exist_ok=True)
          outbox.parent.mkdir(parents=True, exist_ok=True)

          def load_json(path, default):
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return default

          def read(path):
              return path.read_text(encoding="utf-8", errors="replace") if path.exists() else ""

          def strip_plus(text):
              out = []
              for line in text.replace("\r\n", "\n").replace("\r", "\n").split("\n"):
                  if line.startswith("+") and not line.startswith("+++"):
                      line = line[1:]
                  out.append(line.rstrip())
              return "\n".join(out)

          def compact(text):
              out, blank = [], False
              for line in text.replace("\r\n", "\n").replace("\r", "\n").split("\n"):
                  line = line.rstrip()
                  if not line.strip():
                      if not blank:
                          out.append("")
                      blank = True
                  else:
                      out.append(line)
                      blank = False
              return "\n".join(out).strip()

          def between_markers(text):
              for candidate in (text, strip_plus(text)):
                  m = re.search(r"(?ms)^\s*CURATOR_REPLY:\s*\n(.*?)^\s*END_CURATOR_REPLY\s*$", candidate)
                  if m:
                      return m.group(1).strip()
              return ""

          def hourly():
              t = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=3)))
              return "\n".join([
                  "BEM-HOURLY | ОТЧЁТ ОПЕРАТОРУ",
                  t.strftime("%Y-%m-%d | %H:%M (UTC+3)"),
                  "",
                  "ЭТАП:",
                  "6/6 (100%)",
                  "",
                  "ДОРОЖНАЯ КАРТА:",
                  "14/14 (100%)",
                  "",
                  "ЧЕК-ЛИСТ:",
                  "✅ Изменений за отчётный период нет.",
                  "",
                  "ВОПРОС ОПЕРАТОРУ:",
                  "нет",
              ])

          def remove_tech(text):
              bad = (
                  "diff --git", "index ", "--- ", "+++ ", "@@", "apply_patch", "patch:",
                  "exec", "succeeded in", "CODEX_EXIT_CODE", "BEM-CODEX-LOCAL",
                  "Trace ID:", "Cycle ID:", "## Notes", "- No issue #31", "- Runner:",
                  "m_operator_message", "Incoming task:", "Files changed:", "Checks run:",
                  "Commit SHA", "Blocker:", "Result written:", "Commit failed:",
                  "/home/", "governance/codex/results/",
              )
              kept = []
              for line in strip_plus(text).splitlines():
                  s = line.strip()
                  if not s:
                      kept.append("")
                  elif any(s.startswith(prefix) for prefix in bad):
                      continue
                  elif s in {"codex", "bash", "python", "```", "----", "-----"}:
                      continue
                  else:
                      kept.append(line.rstrip())
              return compact("\n".join(kept))

          def canonical(reply, trace_id, task_type):
              if task_type == "operator_hourly_report" or trace_id.startswith("operator_hourly_"):
                  # Never send Codex logs for hourly reports.
                  if reply and "ЭТАП:" in reply and "ДОРОЖНАЯ КАРТА:" in reply and "ЧЕК-ЛИСТ:" in reply:
                      return compact(strip_plus(reply))
                  return hourly()

              reply = remove_tech(reply)
              if not reply:
                  reply = "ОТВЕТ:\nЗадача обработана. Технический лог скрыт по канону."
              if "СЛЕДУЮЩИЙ ШАГ:" not in reply:
                  reply += "\n\nСЛЕДУЮЩИЙ ШАГ:\nОжидать следующего сообщения."
              return compact(reply)[:1800]

          state = load_json(state_path, {})
          delivered = set(state.get("delivered_trace_ids", []))
          sent = []

          if results.exists():
              for jp in sorted(results.glob("*.json")):
                  meta = load_json(jp, {})
                  trace = meta.get("trace_id") or jp.stem
                  if trace in delivered or meta.get("role") != "GPT_CURATOR":
                      continue
                  if meta.get("status") not in ("completed", "failed"):
                      continue

                  task_type = meta.get("task_type") or ""
                  provider = meta.get("provider", "gpt_codex")
                  md = read(results / f"{trace}.md")
                  reply = between_markers(md)
                  text = canonical(reply, trace, task_type)

                  if not (task_type == "operator_hourly_report" or trace.startswith("operator_hourly_")):
                      text = f"🤖 Curator [{provider}]\n{text}"

                  entry = {
                      "event_id": f"evt_codex_curator_{trace}",
                      "status": "ready_to_send",
                      "chat_id": os.environ["OPERATOR_CHAT_ID"],
                      "text": text,
                      "created_at": datetime.now(timezone.utc).isoformat(),
                  }
                  with outbox.open("a", encoding="utf-8") as f:
                      f.write(json.dumps(entry, ensure_ascii=False) + "\n")
                  delivered.add(trace)
                  sent.append(trace)

          state["delivered_trace_ids"] = sorted(delivered)
          state["updated_at"] = datetime.now(timezone.utc).isoformat()
          state_path.write_text(json.dumps(tate, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"queued={len(sent)}")
          PY

      - name: Commit outbox state
        run: |
          set -euo pipefail
          git config user.email "codex-curator-outbox@ai-devops-system"
          git config user.name "Codex Curator Outbox"
          git pull --rebase --autostash origin main || true
          git add governance/telegram_outbox.jsonl governance/state/codex_curator_delivery.json
          if git diff --cached --quiet; then
            echo "No curator outbox changes"
            exit 0
          fi
          git commit -m "CODEX CURATOR OUTBOX: canonical Telegram delivery"
          git push || true
