name: BEM-948 P0 Claude Diagnostic Retry

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate retired diagnostic retry workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow source is available
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/bem948-p0-claude-diagnostic-retry.yml
          echo "BEM-948 retired diagnostic workflow is syntax-safe."
      - name: Verify diagnostic runner syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/claude_run_diagnostic.py
