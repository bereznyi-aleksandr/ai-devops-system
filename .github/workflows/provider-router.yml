name: BEM-932 Provider Router

on:
  workflow_dispatch:
    inputs:
      role:
        required: false
        default: curator
        type: string
      task:
        required: false
        default: ""
        type: string
      trace_id:
        required: false
        default: ""
        type: string
      task_type:
        required: false
        default: provider_router_selftest
        type: string

permissions:
  contents: read
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.test.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - id: test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path("scripts/provider_router.py").read_text(encoding="utf-8")
          compile(source, "scripts/provider_router.py", "exec")
          PY
          default="$(python3 scripts/provider_router.py --role curator --trace-id bem950_default)"
          forced="$(python3 scripts/provider_router.py --role curator --trace-id bem950_cost --task force-fallback)"
          python3 - "$default" "$forced" <<'PY'
          import json, sys
          default, forced = map(json.loads, sys.argv[1:3])
          assert default["provider_selected"] == "claude_code", default
          assert default["fallback_reason"] is None, default
          assert forced["provider_selected"] == "claude_code", forced
          assert forced["fallback_reason"] == "fallback_blocked_cost_policy", forced
          assert forced["decision_source"] == "cost_policy", forced
          PY
          echo "status=PASS" >> "$GITHUB_OUTPUT"

  route:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      provider_selected: ${{ steps.route.outputs.provider_selected }}
      workflow_id: ${{ steps.route.outputs.workflow_id }}
      trace_id: ${{ steps.route.outputs.trace_id }}
    steps:
      - uses: actions/checkout@v4
      - id: route
        shell: bash
        env:
          ROLE: ${{ inputs.role }}
          TASK: ${{ inputs.task }}
          TRACE_ID: ${{ inputs.trace_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          trace="$TRACE_ID"
          if [ -z "$trace" ]; then trace="provider_router_${RUN_ID}"; fi
          python3 scripts/provider_router.py --role "$ROLE" --task "$TASK" --trace-id "$trace" > /tmp/decision.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          decision = json.loads(Path("/tmp/decision.json").read_text(encoding="utf-8"))
          config = json.loads(Path("governance/config/provider_config.json").read_text(encoding="utf-8"))
          spec = config["providers"][decision["provider_selected"]]
          print(f"provider_selected={decision['provider_selected']}")
          print(f"workflow_id={spec['workflow_id']}")
          print(f"trace_id={decision['trace_id']}")
          PY

  dispatch:
    runs-on: ubuntu-latest
    needs: route
    if: ${{ inputs.task_type != 'provider_router_selftest' }}
    steps:
      - name: Dispatch selected enabled provider only
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_ID: ${{ needs.route.outputs.workflow_id }}
          ROLE: ${{ inputs.role }}
          TASK: ${{ inputs.task }}
          TRACE_ID: ${{ needs.route.outputs.trace_id }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/payload.json
          import json, os
          print(json.dumps({"ref":"main","inputs":{"role":os.environ["ROLE"],"task":os.environ["TASK"],"trace_id":os.environ["TRACE_ID"]}}))
          PY
          code="$(curl -sS -o /tmp/response.txt -w '%{http_code}'             -X POST             -H "Authorization: Bearer $GH_TOKEN"             -H "Accept: application/vnd.github+json"             -H "Content-Type: application/json"             "https://api.github.com/repos/$REPOSITORY/actions/workflows/$WORKFLOW_ID/dispatches"             --data @/tmp/payload.json)"
          cat /tmp/response.txt || true
          test "$code" = "204"
