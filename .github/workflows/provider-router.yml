name: BEM-932 Provider Router

on:
  workflow_dispatch:
    inputs:
      role:
        required: true
        type: string
      task:
        required: false
        default: ""
        type: string
      trace_id:
        required: true
        type: string
      chat_id:
        required: false
        default: ""
        type: string
      message_id:
        required: false
        default: ""
        type: string
      cycle_id:
        required: false
        default: ""
        type: string
      task_type:
        required: false
        default: "default_development"
        type: string

permissions:
  contents: write
  actions: write

jobs:
  tests:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.t.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - id: t
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/state governance/codex/results
          python3 - <<'PY'
          import json, subprocess
          from pathlib import Path
          state = Path("governance/state/provider_status.json")
          results = Path("governance/codex/results")
          results.mkdir(parents=True, exist_ok=True)
          def run(trace):
              raw = subprocess.check_output(["python3","scripts/provider_router.py","--role","curator","--trace-id",trace,"--task","test"], text=True)
              return json.loads(raw)
          state.write_text(json.dumps({"records":[{"trace_id":"old_other","status":"quota_exceeded","created_at":"2000-01-01T00:00:00Z"}]}))
          out = run("fresh_trace")
          assert out["provider_selected"] == "gpt_codex" and out["fallback_reason"] is None and out["stale_ignored"] is True, out
          state.unlink(missing_ok=True)
          (results/"same_trace.json").write_text(json.dumps({"trace_id":"same_trace","status":"quota_exceeded","created_at":"2999-01-01T00:00:00Z"}))
          out = run("same_trace")
          assert out["provider_selected"] == "claude_code" and out["fallback_reason"] == "fallback_quota", out
          (results/"same_trace.json").unlink(missing_ok=True)
          out = run("empty_trace")
          assert out["provider_selected"] == "gpt_codex" and out["fallback_reason"] is None and out["decision_source"] == "default", out
          assert set(out) == {"provider_selected","fallback_reason","decision_source","trace_id","ttl_seconds","stale_ignored"}, out
          PY
          echo "status=PASS" >> "$GITHUB_OUTPUT"

  route:
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      provider_selected: ${{ steps.r.outputs.provider_selected }}
      fallback_reason: ${{ steps.r.outputs.fallback_reason }}
      decision_source: ${{ steps.r.outputs.decision_source }}
      trace_id: ${{ steps.r.outputs.trace_id }}
      ttl_seconds: ${{ steps.r.outputs.ttl_seconds }}
      stale_ignored: ${{ steps.r.outputs.stale_ignored }}
      workflow_id: ${{ steps.r.outputs.workflow_id }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        shell: bash
        env:
          ROLE: ${{ inputs.role }}
          TASK: ${{ inputs.task }}
          TRACE_ID: ${{ inputs.trace_id }}
        run: |
          set -euo pipefail
          python3 scripts/provider_router.py --role "$ROLE" --task "$TASK" --trace-id "$TRACE_ID" > /tmp/decision.json
          cat /tmp/decision.json
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          d = json.loads(Path("/tmp/decision.json").read_text())
          c = json.loads(Path("governance/config/provider_config.json").read_text())
          for k in ["provider_selected","fallback_reason","decision_source","trace_id","ttl_seconds","stale_ignored"]:
              v = d.get(k)
              print(f"{k}={'' if v is None else v}")
          print("workflow_id=" + c["providers"][d["provider_selected"]]["workflow_id"])
          PY

  dispatch:
    runs-on: ubuntu-latest
    needs: route
    steps:
      - shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_ID: ${{ needs.route.outputs.workflow_id }}
          ROLE: ${{ inputs.role }}
          PROVIDER: ${{ needs.route.outputs.provider_selected }}
          TRACE_ID: ${{ needs.route.outputs.trace_id }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          TASK_TYPE: ${{ inputs.task_type }}
          TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/payload.json
          import json, os
          print(json.dumps({"ref":"main","inputs":{"role":os.environ["ROLE"],"provider":os.environ["PROVIDER"],"trace_id":os.environ["TRACE_ID"],"cycle_id":os.environ.get("CYCLE_ID",""),"task_type":os.environ.get("TASK_TYPE","default_development"),"task":os.environ.get("TASK","")}}))
          PY
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/dispatches" --data @/tmp/payload.json)
          cat /tmp/resp.txt || true
          test "$code" = "204"

  receipt:
    runs-on: ubuntu-latest
    needs: [tests, route, dispatch]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      - shell: bash
        env:
          ROLE: ${{ inputs.role }}
          TASK: ${{ inputs.task }}
          TRACE_ID: ${{ needs.route.outputs.trace_id || inputs.trace_id }}
          PROVIDER_SELECTED: ${{ needs.route.outputs.provider_selected }}
          FALLBACK_REASON: ${{ needs.route.outputs.fallback_reason }}
          DECISION_SOURCE: ${{ needs.route.outputs.decision_source }}
          TTL_SECONDS: ${{ needs.route.outputs.ttl_seconds }}
          STALE_IGNORED: ${{ needs.route.outputs.stale_ignored }}
          WORKFLOW_ID: ${{ needs.route.outputs.workflow_id }}
          CHAT_ID: ${{ inputs.chat_id }}
          MESSAGE_ID: ${{ inputs.message_id }}
          TEST_RESULT: ${{ needs.tests.result }}
          ROUTE_RESULT: ${{ needs.route.result }}
          DISPATCH_RESULT: ${{ needs.dispatch.result }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          trace = os.environ["TRACE_ID"]
          fallback = os.environ.get("FALLBACK_REASON") or None
          receipt = {
            "status": "PASS" if os.environ.get("DISPATCH_RESULT") == "success" else "BLOCKED",
            "protocol": "BEM-932 v8.3",
            "receipt_type": "provider_router_dispatch",
            "created_at": now,
            "role": os.environ.get("ROLE",""),
            "provider_selected": os.environ.get("PROVIDER_SELECTED",""),
            "fallback_reason": fallback,
            "decision_source": os.environ.get("DECISION_SOURCE",""),
            "trace_id": trace,
            "ttl_seconds": int(os.environ.get("TTL_SECONDS") or 0),
            "stale_ignored": str(os.environ.get("STALE_IGNORED","")).lower() == "true",
            "github_run_id": os.environ.get("RUN_ID",""),
            "target_workflow_id": os.environ.get("WORKFLOW_ID",""),
            "chat_id": os.environ.get("CHAT_ID",""),
            "message_id": os.environ.get("MESSAGE_ID",""),
            "test_result": os.environ.get("TEST_RESULT",""),
            "route_result": os.environ.get("ROUTE_RESULT",""),
            "dispatch_result": os.environ.get("DISPATCH_RESULT","")
          }
          Path(f"governance/proofs/BEM932_provider_router_{trace}.json").write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n")
          if fallback:
              outbox = Path("governance/telegram_outbox.jsonl")
              lines = outbox.read_text().splitlines() if outbox.exists() else []
              seen = any((json.loads(x).get("trace_id") == trace) for x in lines if x.strip().startswith("{"))
              if not seen:
                  event = {"created_at": now, "trace_id": trace, "chat_id": os.environ.get("CHAT_ID",""), "message_id": os.environ.get("MESSAGE_ID",""), "type": "provider_fallback_notice", "text": "GPT quota exceeded -> fallback Claude запущен", "fallback_reason": fallback, "provider_selected": os.environ.get("PROVIDER_SELECTED","")}
                  with outbox.open("a", encoding="utf-8") as fh:
                      fh.write(json.dumps(event, ensure_ascii=False) + "\n")
          PY
          git config user.email "provider-router@ai-devops-system"
          git config user.name "BEM-932 Provider Router"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/ governance/telegram_outbox.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No receipt changes"
          else
            git commit -m "BEM-932 provider-router receipt trace=${{ inputs.trace_id }}"
            git push
          fi
