name: BEM-934 Operator LIVE Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bem934-operator-live-diagnostic
  cancel-in-progress: false

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Run diagnostic
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/bem934_operator_live_diagnostic.py
          python3 governance/runners/bem934_operator_live_diagnostic.py

      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem934-diagnostic@ai-devops-system"
          git config user.name "BEM-934 Diagnostic"
          git add governance/proofs/BEM934_operator_live_finalization_diagnostic.json
          git commit -m "BEM-934: record operator LIVE finalization diagnostic" || true
          git push || (git pull --rebase origin main && git push)
