name: BEM934 Live Test Monitor

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Capture live test run status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          git config user.email "bem934-monitor@ai-devops-system"
          git config user.name "BEM-934 Live Monitor"
          mkdir -p governance/proofs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow bem934-live-test.yml --limit 3 --json databaseId,status,conclusion,createdAt,updatedAt,url,displayTitle,headSha > /tmp/runs.json
          RUN_ID="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          : > /tmp/failed.log
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/failed.log 2>&1 || true
          fi
          tail -n 120 /tmp/failed.log > /tmp/failed.tail
          python3 -c 'import json; from pathlib import Path; runs=json.load(open("/tmp/runs.json")); tail=Path("/tmp/failed.tail").read_text(errors="replace"); low=tail.lower(); tail="[redacted failure log; token-like material detected]" if any(x in low for x in ("ghp_","github_pat_","bottoken")) else tail; Path("governance/proofs/BEM934_live_test_monitor.json").write_text(json.dumps({"task_id":"BEM934-LIVE-TEST","runs":runs,"failed_log_tail":tail},indent=2)+"\n")'
          git add governance/proofs/BEM934_live_test_monitor.json
          git commit -m "Capture BEM934 live test run status" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
