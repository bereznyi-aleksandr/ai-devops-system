name: BEM947 Live Object Dispatch Bridge

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Dispatch reduced live object task to claude.yml
        env:
          GH_TOKEN: ${{ github.token }}
          TRACE: bem947_object_dispatch_retry_${{ github.run_id }}
        shell: bash
        run: |
          set -uo pipefail
          TASK_FILE="$(mktemp)"
          cat > "$TASK_FILE" <<'TASK'
          BEM-947 retry task: prove planned-to-executed object dispatch.

          Executor role. Minimal scope.

          Create and commit:
          - governance/reports/${TRACE}.md
          - governance/proofs/BEM947_live_object_dispatch_executed_${TRACE}.json

          JSON required fields:
          status: completed
          protocol: BEM-947
          task_id: BEM947-P2-LIVE-OBJECT-DISPATCH-RUN
          trace_id: ${TRACE}
          provider_selected: claude_code
          target_workflow_id: claude.yml
          dispatch_result: executed
          blocker: null
          checks.sha_type_explicit: true

          If blocked, write BLOCKED instead. Do not over-claim.
          TASK

          if gh workflow run claude.yml --ref main \
            -f role=executor \
            -f provider=claude \
            -f trace_id="$TRACE" \
            -f cycle_id=bem947_planned_to_executed_retry \
            -f task_type=live_object_dispatch_retry \
            -f task="$(cat "$TASK_FILE")"; then
            GH_STATUS=0
          else
            GH_STATUS=$?
          fi
          export GH_STATUS

          mkdir -p governance/proofs
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          trace = os.environ["TRACE"]
          status_code = int(os.environ.get("GH_STATUS", "1"))
          payload = {
              "status": "DISPATCHED" if status_code == 0 else "BLOCKED",
              "protocol": "BEM-947",
              "task_id": "BEM947-P2-LIVE-OBJECT-DISPATCH-RETRY",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "trace_id": trace,
              "target_workflow_id": "claude.yml",
              "gh_status": status_code,
              "checks": {
                  "retry_workflow_dispatched": status_code == 0,
                  "reduced_scope_task_used": True,
                  "no_false_completed_claim": True,
                  "sha_type_policy_bound": True
              },
              "blockers": [] if status_code == 0 else ["claude_workflow_dispatch_failed"],
              "next_task": "BEM947-P2-COLLECT-EXECUTED-PROOF",
              "non_claim": "DISPATCHED is not PASS; completed proof must be collected separately"
          }
          Path("governance/proofs/BEM947_live_object_dispatch_retry_requested_receipt.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Commit retry dispatch receipt
        if: always()
        shell: bash
        run: |
          git config user.email "bem947-retry@ai-devops-system"
          git config user.name "BEM947 Retry Bridge"
          git pull --rebase origin main || true
          git add governance/proofs/BEM947_live_object_dispatch_retry_requested_receipt.json 2>/dev/null || true
         if git diff --cached --quiet; then
            echo "No BEM947 retry receipt changes"
          else
            git commit -m "BEM-947: dispatch reduced live object retry"
            git push || (git pull --rebase origin main && git push)
          fi

      - name: Fail job if dispatch failed
        if: always()
        shell: bash
        run: |
          status=0 and exit 0
