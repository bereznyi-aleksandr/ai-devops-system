name: BEM-947 Live Object Dispatch Bridge

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: "Trace identifier"
        required: true
        type: string
      cycle_id:
        description: "Cycle identifier"
        required: true
        type: string
      task:
        description: "Reduced executor task"
        required: true
        type: string
      allow_dispatch:
        description: "Enable a real dispatch command"
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

jobs:
  retry:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Dispatch reduced executor task behind safe gate
        shell: bash
        run: |
          set -euo pipefail
          safe_trace="$(printf '%s' "${{ inputs.trace_id }}" | tr -cd 'A-Za-z0-9._-')"
          safe_cycle="$(printf '%s' "${{ inputs.cycle_id }}" | tr -cd 'A-Za-z0-9._-')"
          test -n "$safe_trace"
          test -n "$safe_cycle"
          dispatch_exit=0
          if [ "${{ inputs.allow_dispatch }}" = "true" ]; then
            set +e
            gh workflow run claude.yml \
              --ref main \
              -f role=executor \
              -f provider=claude \
              -f trace_id="$safe_trace" \
              -f cycle_id="$safe_cycle" \
              -f task_type=bem947_live_object_dispatch_retry \
              -f task="${{ inputs.task }}"
            dispatch_exit=$?
            set -e
          fi
          python3 scripts/bem949_dispatch_request_receipt.py \
            --component bem947-live-object-dispatch \
            --trace-id "$safe_trace" \
            --target-workflow claude.yml \
            --allow-dispatch "${{ inputs.allow_dispatch }}" \
            --dispatch-exit-code "$dispatch_exit" \
            --out "governance/proofs/BEM947_live_object_dispatch_retry_requested_receipt.json"

      - name: Commit retry dispatch receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem947-retry@ai-devops-system"
          git config user.name "BEM947 Retry Bridge"
          git add governance/proofs/BEM947_live_object_dispatch_retry_requested_receipt.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM-947: record reduced live object dispatch request"
          git push || (git pull --rebase origin main && git push)
