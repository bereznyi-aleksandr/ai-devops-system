name: BEM934 Wait Exact Executor Claude Run

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  wait:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for exact executor run
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: "27758419784"
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh auth setup-git
          for attempt in $(seq 1 120); do
            STATUS="$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq .status)"
            if [ "$STATUS" = "completed" ]; then
              break
            fi
            sleep 10
          done
          gh api "repos/$REPO/actions/runs/$RUN_ID" > /tmp/run.json
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/failed.log 2>&1 || true
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-executor-wait@ai-devops-system"
          git config user.name "BEM-934 Executor Wait"
          mkdir -p governance/proofs
          tail -n 200 /tmp/failed.log > /tmp/failed.tail
          jq -n --slurpfile run /tmp/run.json --rawfile log /tmp/failed.tail            '{task_id:"BEM934-LIVE-TEST",run:{id:$run[0].id,status:$run[0].status,conclusion:$run[0].conclusion,created_at:$run[0].created_at,updated_at:$run[0].updated_at,head_sha:$run[0].head_sha,html_url:$run[0].html_url},failed_log_tail:$log}' > governance/proofs/BEM934_wait_executor_claude_run.json
          git add governance/proofs/BEM934_wait_executor_claude_run.json
          git commit -m "Capture BEM-934 executor Claude run" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
