name: BEM-932 Cloudflare Worker Live Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || secrets.GH_PAT || github.token }}

      - name: POST synthetic Telegram update to Worker /webhook
        shell: bash
        env:
          WORKER_URL: https://tg-curator-webhook.bereznii-aleksandr.workers.dev/webhook
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          seed="$(date -u +%Y%m%d%d_%M)S)"
          cat > /tmp/tg_payload.json <<JSON
          {"update_id": 932${seed}, "message": {"message_id": 932, "date": 1770000000, "chat": {"id": 601442777, "type": "private"}, "text": "BEM-932 live probe: provider-router dispatch"}}
          JSON
          code="$(curl -sS -o /tmp/worker_response.txt -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data @/tmp/tg_payload.json "$WORKER_URL" || true)"
          export HTTP_CODE="$code"
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          txt = Path("/tmp/worker_response.txt").read_text(encoding="utf-8", errors="replace")
          try:
              response = json.loads(txt)
          except Exception:
              response = txt[:1000]

          checks = {
              "http_200": os.environ["HTTP_CODE"] == "200",
              "json_response": isinstance(response, dict),
              "status_dispatched": isinstance(response, dict) and response.get("status") == "DISPATCHED",
              "workflow_provider_router": isinstance(response, dict) and response.get("workflow_id") == "provider-router.yml",
              "trace_id_present": isinstance(response, dict) and bool(response.get("trace_id")),
              "webhook_path_used": os.environ["WORKER_URL"].endswith("/webhook"),
          }
          status = "PASS" if all(checks.values()) else "BLOCKED_RUNTIME_NOT_CURRENT"
          receipt = {
              "status": status,
              "protocol": "BEM-932 v8.3",
              "receipt_type": "cloudflare_worker_live_probe",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "worker_url": os.environ["WORKER_URL"],
              "http_code": os.environ["HTTP_CODE"],
              "response": response,
              "checks": checks,
              "next_action": None if status == "PASS" else "Verify Cloudflare active deployment contains current repo worker and webhook route dispatches provider-router.yml."
          }
          Path("governance/proofs/BEM932_cloudflare_worker_live_probe_receipt.json").write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          print(json.dumps(receipt, indent=2, ensure_ascii=False))
          if status != "PASS":
              raise SystemExit(1)
          PY

      - name: Commit live probe receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "cloudflare-live-probe@ai-devops-system"
          git config user.name "BEM-932 Cloudflare Live Probe"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_cloudflare_worker_live_probe_receipt.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No live probe receipt changes"
          else
            git commit -m "BEM-932 cloudflare worker live probe receipt"
            git push
          fi
