name: Curator Telegram Report

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  curator-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send curator report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone, timedelta

          def safe_read(path, default="нет данных"):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return f.read()
              except Exception:
                  return default

          now_ua = (datetime.now(timezone.utc) + timedelta(hours=3)).strftime("%H:%M UA %d.%m")

          exchange_text = safe_read("governance/exchange.jsonl", "")
          events = []
          for line in exchange_text.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  events.append(json.loads(line))
              except Exception:
                  pass

          if events:
              recent = events[-5:]
              last_events = "\n".join(
                  f"• {item.get('event_type', '?')} [{item.get('source', '?')}]"
                  for item in recent
              )
          else:
              last_events = "нет данных"

          master_plan = safe_read("governance/MASTER_PLAN.md", "")
          current_stage = "E3" if "E3" in master_plan else "неизвестно"

          gpt_last = "нет данных"
          cloud_last = "нет данных"

          try:
              with open("governance/schedulers/gpt/state.json", "r", encoding="utf-8") as f:
                  gpt_last = json.load(f).get("last_tick", "нет данных")
          except Exception:
              pass

          try:
              with open("governance/schedulers/cloud/state.json", "r", encoding="utf-8") as f:
                  cloud_last = json.load(f).get("last_tick", "нет данных")
          except Exception:
              pass

          message = "\n".join([
              f"📊 КУРАТОР | {now_ua}",
              "",
              f"Этап: {current_stage}",
              "Дорожная карта: 3/4",
              "",
              "Последние события:",
              last_events,
              "",
              "Schedulers:",
              f"• GPT: {gpt_last}",
              f"• Cloud: {cloud_last}",
              "",
              "Следующий отчёт через 5 минут."
          ])

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()

          if not token:
              raise SystemExit("TELEGRAM_BOT_TOKEN is empty")
          if not chat_id:
              raise SystemExit("TELEGRAM_CHAT_ID is empty")

          data = urllib.parse.urlencode({
              "chat_id": chat_id,
              "text": message
          }).encode("utf-8")

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          req = urllib.request.Request(url, data=data, method="POST")

          with urllib.request.urlopen(req, timeout=30) as response:
              body = response.read().decode("utf-8")
              print(body)
          PY
