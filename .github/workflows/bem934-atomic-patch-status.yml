name: BEM934 Atomic Patch Status

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Capture atomic patch status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          git config user.email "bem934-status@ai-devops-system"
          git config user.name "BEM-934 Status"
          mkdir -p governance/proofs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow bem934-atomic-dynamic-claude-patch.yml --limit 5 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url > /tmp/runs.json
          RUN_ID="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          : > /tmp/log.txt
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log-failed > /tmp/log.txt 2>&1 || true
          fi
          tail -n 160 /tmp/log.txt > /tmp/log.tail
          jq -n --slurpfile runs /tmp/runs.json --rawfile log /tmp/log.tail             '{task_id:"BEM934-LIVE-TEST",runs:$runs[0],failed_log_tail:$log}'             > governance/proofs/BEM934_atomic_patch_status.json
          git add governance/proofs/BEM934_atomic_patch_status.json
          git commit -m "Capture BEM-934 atomic patch status" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
