name: BEM-931 v3.6 RM04 Validate Runners

"on":
  workflow_dispatch:
  push:
    paths:
      - "governance/runners/*.py"
      - ".github/workflows/bem931-v36-rm04-validate-runners.yml"

permissions:
  contents: write

concurrency:
  group: bem931-v36-rm04-runners-validation
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Validate runners and publish receipt from a fresh base
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          published=false
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            python3 governance/runners/bem931_rm04_static_receipt_runner.py
            git add -- governance/proofs/BEM931-V36-RM04_runners_receipt.json

            if git diff --cached --quiet; then
              published=true
              break
            fi

            git commit -m "BEM-931 RM04: publish static runner validation [run=${GITHUB_RUN_ID}]"
            if git push origin HEAD:main; then
              published=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep "$((attempt * 2))"
            fi
          done

          test "$published" = true
