name: BEM-931 v3.6 RM04 Validate Runners

on:
  workflow_dispatch:
  push:
    paths:
      - 'governance/runners/*.py'
      - 'governance/validators/bem931_v36_rm04_runners_validate.py'
      - '.github/workflows/bem931-v36-rm04-validate-runners.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate RM04 runner files without live provider dispatch
        shell: bash
        run: |
          set -euo pipefail
          python3 governance/validators/bem931_v36_rm04_runners_validate.py
          python3 - <<'PY'
          import ast
          import py_compile
          from pathlib import Path

          runner_paths = (
              Path("governance/runners/gd_curator_runner.py"),
              Path("governance/runners/dir_curator_runner.py"),
              Path("governance/runners/wrk_curator_runner.py"),
              Path("governance/runners/analyst_stage_runner.py"),
              Path("governance/runners/auditor_stage_runner.py"),
              Path("governance/runners/executor_stage_runner.py"),
          )
          for path in runner_paths:
              py_compile.compile(str(path), doraise=True)
              module = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
              assert any(
                  isinstance(node, ast.FunctionDef) and node.name == "main"
                  for node in module.body
              ), f"missing main(): {path}"
          print("PASS: RM04 runner syntax and entrypoints validated without live dispatch")
          PY

      - name: Write RM04 validation receipt
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          validator = Path("governance/validators/bem931_v36_rm04_runners_validate.py")
          receipt = {
              "protocol": "BEM-931 v3.6",
              "roadmap_item": "RM-04-RUNNERS",
              "validator": str(validator),
              "validator_sha": hashlib.sha256(validator.read_bytes()).hexdigest(),
              "validator_sha_type": "sha256_content",
              "status": "PASS",
              "receipt_type": "static_runner_validation",
              "created_by": "github_actions",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "non_claim": "This validates runnable Python and entrypoints; it does not claim live provider dispatch.",
          }
          Path("governance/proofs/BEM931-V36-RM04_runners_receipt.json").write_text(
              json.dumps(receipt, ensure_ascii=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit receipt
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/proofs/BEM931-V36-RM04_runners_receipt.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM-931 RM04: static runner validation receipt"
          git pull --rebase origin main
          git push origin HEAD:main
