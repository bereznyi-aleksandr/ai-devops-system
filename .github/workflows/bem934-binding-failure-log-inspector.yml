name: BEM-934 Binding Failure Log Inspector

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate archived bridge workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow source is available
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/bem934-binding-failure-log-inspector.yml
          echo "BEM-934 archived workflow syntax check started."
      - name: Verify dispatch executor syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/dispatch_executor.py
