name: BEM-948 Claude Turn Budget Repair

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem948-claude-turn-budget-repair.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Patch turn budget and validate syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          target = Path(".github/workflows/claude.yml")
          proof = Path("governance/proofs/BEM948_claude_turn_budget_repair_receipt.json")
          report = Path("governance/reports/bem948_p0_claude_turn_budget_repair.md")
          before = target.read_bytes()
          old = b'--max-turns 10 --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*)"'
          new = b'--max-turns 24 --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*)""'
          match_count = before.count(old)
          if match_count != 1:
              raise SystemExit(f"expected one default turn-budget setting, found {match_count}")
          after = before.replace(old, new, 1)
          temp = Path("/tmp/bem948_claude.yml")
          temp.write_bytes(after)

          yaml_check = subprocess.run(
              ["ruby", "-e", "require 'yaml'; YAML.load_file(ARGV[0])", str(temp)],
              text=True,
              capture_output=True,
              check=False,
          )
          if yaml_check.returncode != 0:
              raise SystemExit("yaml_validation_failed: " + yaml_check.stderr[:500])

          lines = after.decode("utf-8").splitlines()
          blocks = []
          capture = False
          body = []
          for line in lines:
              if not capture and line.startswith("          python3 - <<'PY'"):
                  capture = True
                  body = []
                  continue
              if capture and line == "          PY":
                  blocks.append("\n".join(
                      item[10:] if item.startswith("         ") else item
                      for item in body
                  ))
                  capture = False
                  continue
              if capture:
                  body.append(line)
          if capture or not blocks:
              raise SystemExit("embedded_python_heredoc_scan_failed")
          for index, block in enumerate(blocks, 1):
              compile(block, f"claude.yml:python-block-{index}", "exec")

          target.write_bytes(after)
          def blob(data):
              return hashlib.sha1(b"blob " + str(len(data)).encode() + b"\0" + data).hexdigest()
          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          receipt = {
              "status": "PASS",
              "protocol": "BEM-948",
              "task_id": "BEM948-P0-REPAIR-CLAUDE-TURN-BUDGET",
              "created_at": now,
              "cause": "claude_role reached maximum turns 10 in trace-bound live run",
              "before_blob_sha": blob(before),
              "before_blob_sha_type": "git_blob",
              "after_blob_sha": blob(after),
              "after_blob_sha_type": "git_blob",
              "change": {"from": "--max-turns 10", "to": "--max-turns 24"},
              "checks": {
                  "default_setting_match_count": match_count,
                  "yaml_valid": True,
                  "embedded_python_blocks_compiled": len(blocks),
                  "secret_values_read_or_logged": False,
                  "sha_type_explicit": True
              },
              "next_task": "BEM948-P0-LIVE-OBJECT-E2E-RETRY"
}
          proof.parent.mkdir(parents=True, exist_ok=True)
          report.parent.mkdir(parents=True, exist_ok=True)
          proof.write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          report.write_text(
              "# BEM-948 P0 Claude turn-budget repair\n\n"
              "Cause: Claude action reached the default 10-turn limit.\n\n"
              "Repair: default maximum turns changed from 10 to 24 after YAML and embedded-Python validation.\n",
              encoding="utf-8"
          )
          PY

      - name: Commit repair evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-948 Autorepair"
          git config user.email "bem948-autorepair@ai-devops-system"
          git add .github/workflows/claude.yml governance/proofs/BEM948_claude_turn_budget_repair_receipt.json governance/reports/bem948_p0_claude_turn_budget_repair.md
          if git diff --cached --quiet; then
            echo "No repair changes"
          else
            git commit -m "BEM-948: repair Claude turn budget after runtime limit"
            git push
          fi
