name: BEM949 P1 Core Diagnostic Observer

on:
  workflow_run:
    workflows: ["BEM949 P1 Core Workflow Diagnostics"]
    types: [completed]

permissions:
  contents: write
  actions: read
jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Collect core diagnostic run status
        uses: actions/github-script@f7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          script: |
            const fs = require("fs");
            const run = context.payload.workflow_run;
            const { data: jobResponse } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });
            const payload = {
              schema_version: 1,
              protocol: "BEM-949",
              task_id: "BEM949-P1-CI-STABILIZE",
              receipt_id: "BEM949_p1_core_diagnostic_run",
              status: run.conclusion === "success" ? "PASS" : "FAIL",
              run_id: String(run.id),
              run_id_type: "github_actions_run",
              run_conclusion: run.conclusion || "unknown",
              run_conclusion_type: "github_actions_conclusion",
              head_sha: run.head_sha || "",
              head_sha_type: "commit",
              created_at: new Date().toISOString(),
              jobs: jobResponse.jobs.map(job => ({
                name: job.name,
                status: job.status,
                conclusion: job.conclusion,
                steps: job.steps.map(step => ({ name: step.name, conclusion: step.conclusion })),
              })),
            };
            fs.writeFileSync("/tmp/BEM949_p1_core_diagnostic_run.json", JSON.stringify(payload, null, 2) + "\n", "utf8");

      - name: Commit run observation
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/BEM949_p1_core_diagnostic_run.json governance/proofs/BEM949_p1_core_diagnostic_run.json
          git config user.email "bem949-ci-observer@ai-devops-system"
          git config user.name "BEM949 CI Observer"
          git add governance/proofs/BEM949_p1_core_diagnostic_run.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: recore core diagnostic run"
          git push || (git pull --rebase origin main && git push)
