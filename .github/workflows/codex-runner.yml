name: Codex Runner

# BEM-525: extended Python executor — delete, move, append, set field, create
# NO issue comments, NO schedule, NO paid API

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (matches governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Override path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner (ubuntu-latest, Python executor)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')
          env_file  = os.environ['GITHUB_ENV']

          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task      = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title.replace('\n', ' ') + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:2000].replace('\n', ' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Execute task via Python executor
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          python3 - <<'PYEOF'
          """
          BEM-525 Python Executor — поддерживаемые паттерны в objective:

          1. Create file <path> with content <text>
             → создать файл с текстом

          2. Delete file <path>
             → удалить файл (заменить archived-маркером)

          3. Move file <path> to <path2>
             → переместить файл

          4. Append to <path>: <content>
             → дописать строку в файл (для jsonl и md)

          5. Set <path> field <key>=<value>
             → обновить поле в JSON файле

          6. Set <path> fields: <key1>=<val1>, <key2>=<val2>
             → обновить несколько полей в JSON

          Паттерны применяются по порядку.
          Можно комбинировать несколько операций в одном objective.
          Всегда создаётся proof file.
          """
          import json, os, re, shutil
          from datetime import datetime, timezone
          from pathlib import Path

          now       = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace     = os.environ.get('TRACE_ID', 'unknown')
          objective = os.environ.get('TASK_OBJECTIVE', '')
          task_type = os.environ.get('TASK_TYPE', 'unknown')

          print('Executing: ' + trace)
          print('Objective: ' + objective[:400])

          changed_files = []
          errors        = []
          exec_status   = 'completed'

          # ── 1. Create file <path> with content <text> ───────────────────────
          for m in re.finditer(
              r'[Cc]reate\s+file\s+([^\s]+)\s+with\s+content\s+["\']?(.+?)["\']?\s*(?=\.|Delete|Move|Append|Set|$)',
              objective, re.DOTALL
          ):
              target = m.group(1).strip()
              content = m.group(2).strip()
              try:
                  p = Path(target)
                  p.parent.mkdir(parents=True, exist_ok=True)
                  p.write_text(content + '\n')
                  changed_files.append(target)
                  print('Created: ' + target)
              except Exception as e:
                  errors.append('Create failed ' + target + ': ' + str(e))

          # ── 2. Delete file <path> ────────────────────────────────────────────
          for m in re.finditer(r'[Dd]elete\s+file\s+([^\s\.]+)', objective):
              target = m.group(1).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      # Replace with archived marker (git cannot delete via script alone)
                      p.write_text(
                          '# ARCHIVED\n'
                          'Status: deleted\n'
                          'Archived at: ' + now + '\n'
                          'Trace: ' + trace + '\n'
                      )
                      changed_files.append(target)
                      print('Archived (deleted): ' + target)
                  else:
                      print('Delete: file not found (skipped): ' + target)
              except Exception as e:
                  errors.append('Delete failed ' + target + ': ' + str(e))

          # ── 3. Move file <path> to <path2> ───────────────────────────────────
          for m in re.finditer(r'[Mm]ove\s+file\s+([^\s]+)\s+to\s+([^\s\.]+)', objective):
              src  = m.group(1).strip()
              dst  = m.group(2).strip()
              try:
                  sp = Path(src)
                  dp = Path(dst)
                  if sp.exists():
                      dp.parent.mkdir(parents=True, exist_ok=True)
                      dp.write_text(sp.read_text())
                      sp.write_text('# ARCHIVED\nMoved to: ' + dst + '\nAt: ' + now + '\n')
                      changed_files.extend([src, dst])
                      print('Moved: ' + src + ' → ' + dst)
                  else:
                      print('Move: source not found (skipped): ' + src)
              except Exception as e:
                  errors.append('Move failed ' + src + ': ' + str(e))

          # ── 4. Append to <path>: <content> ──────────────────────────────────
          for m in re.finditer(r'[Aa]ppend\s+to\s+([^\s:]+):\s+(.+?)(?=\.|Delete|Move|Create|Set|$)', objective, re.DOTALL):
              target  = m.group(1).strip()
              content = m.group(2).strip()
              try:
                  p = Path(target)
                  p.parent.mkdir(parents=True, exist_ok=True)
                  with p.open('a') as f:
                      f.write(content + '\n')
                  changed_files.append(target)
                  print('Appended to: ' + target)
              except Exception as e:
                  errors.append('Append failed ' + target + ': ' + str(e))

          # ── 5. Set <path> field <key>=<value> ───────────────────────────────
          for m in re.finditer(r'[Ss]et\s+([^\s]+)\s+field\s+(\w+)\s*=\s*([^\s,\.]+)', objective):
              target = m.group(1).strip()
              key    = m.group(2).strip()
              val    = m.group(3).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      data = json.loads(p.read_text())
                      if val.lower() == 'true':    val = True
                      elif val.lower() == 'false': val = False
                      elif val.replace('-','').replace('.','').isdigit():
                          val = float(val) if '.' in val else int(val)
                      data[key] = val
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
                      changed_files.append(target)
                      print('Set field ' + key + '=' + str(val) + ' in ' + target)
              except Exception as e:
                  errors.append('Set field failed ' + target + ': ' + str(e))

          # ── 6. Set <path> fields: k1=v1, k2=v2 ──────────────────────────────
          for m in re.finditer(r'[Ss]et\s+([^\s]+)\s+fields:\s+(.+?)(?=\.|$)', objective, re.DOTALL):
              target = m.group(1).strip()
              pairs  = m.group(2).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      data = json.loads(p.read_text())
                      for kv in re.findall(r'(\w+)\s*=\s*([^\s,]+)', pairs):
                          k, v = kv
                          if v.lower() == 'true':    v = True
                          elif v.lower() == 'false': v = False
                          elif v.replace('-','').replace('.','').isdigit():
                              v = float(v) if '.' in v else int(v)
                          data[k] = v
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
                      changed_files.append(target)
                      print('Set fields in ' + target + ': ' + pairs[:100])
              except Exception as e:
                  errors.append('Set fields failed ' + target + ': ' + str(e))

          # ── Always: proof file ───────────────────────────────────────────────
          proof_dir = Path('governance/codex/proofs')
          proof_dir.mkdir(parents=True, exist_ok=True)
          proof = proof_dir / (trace + '.txt')
          proof.write_text(
              'Executor: Python (ubuntu-latest)\n'
              'trace_id: ' + trace + '\n'
              'task_type: ' + task_type + '\n'
              'executed_at: ' + now + '\n'
              'changed_files: ' + ', '.join(changed_files) + '\n'
              'errors: ' + ('; '.join(errors) if errors else 'none') + '\n'
              'objective: ' + objective[:500] + '\n'
          )
          changed_files.append(str(proof))

          if errors:
              exec_status = 'failed'
              print('ERRORS: ' + str(errors))

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('EXEC_STATUS=' + exec_status + '\n')
              f.write('CHANGED_FILES=' + ','.join(changed_files) + '\n')
              f.write('EXEC_ERRORS=' + '; '.join(errors) + '\n')

          print('Status: ' + exec_status)
          print('Changed: ' + str(changed_files))
          PYEOF

      - name: Commit changes
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            echo "COMMIT_SHA=" >> "$GITHUB_ENV"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }}"
            git push
            SHA=$(git rev-parse HEAD)
            echo "COMMIT_SHA=$SHA" >> "$GITHUB_ENV"
            echo "Committed: $SHA"
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found  = os.environ.get('TASK_FOUND',  'false') == 'true'
          exec_status = os.environ.get('EXEC_STATUS', 'blocked')
          commit_sha  = os.environ.get('COMMIT_SHA',  '')
          changed_raw = os.environ.get('CHANGED_FILES', '')
          exec_errors = os.environ.get('EXEC_ERRORS', '')
          changed     = [f for f in changed_raw.split(',') if f]

          if not task_found:
              status  = 'blocked'
              blocker = {'code': 'TASK_FILE_NOT_FOUND', 'message': 'Task file not found.'}
          elif exec_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = exec_status
              blocker = {'code': 'EXEC_FAILED', 'message': exec_errors or exec_status}

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'python-ubuntu-latest-v2',
              'status':         status,
              'changed_files':  changed,
              'commit_sha':     commit_sha or None,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Runner Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | Python v2 (ubuntu-latest) |',
              '| Status | ' + status + ' |',
              '| Commit SHA | ' + (commit_sha or 'none') + ' |',
              '| Changed | ' + (', '.join(changed) or 'none') + ' |',
              '| Completed | ' + now + ' |',
              '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### Completed successfully.')
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result: status=' + status)
          PYEOF

      - name: Commit result
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            git push
          fi

      - name: Job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os
          trace  = os.environ.get('INPUT_TRACE_ID', '?')
          status = os.environ.get('EXEC_STATUS', 'blocked')
          sha    = os.environ.get('COMMIT_SHA', 'none')
          errors = os.environ.get('EXEC_ERRORS', '')
          lines  = [
              '## Codex Runner v2 - ' + trace,
              '| Field | Value |',
              '|---|---|',
              '| Executor | Python v2 (ubuntu-latest, no paid API) |',
              '| Status | ' + status + ' |',
              '| SHA | ' + (sha or 'none') + ' |',
              ('| Errors | ' + errors + ' |') if errors else '',
              '**No issue #31 comments (BEM-525)**', '',
          ]
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/s.md'), 'a') as f:
              f.write('\n'.join(l for l in lines if l))
          PYEOF
