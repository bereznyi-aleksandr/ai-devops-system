name: Codex Runner

# BEM-521: switched from [self-hosted, codex-local] to ubuntu-latest
# Python executor reads task objective and applies changes via git
# NO issue comments, NO schedule, NO self-hosted required

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (matches governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Override path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')
          env_file  = os.environ['GITHUB_ENV']

          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              print('Objective: ' + objective[:200])
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title.replace('\n', ' ') + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:500].replace('\n', ' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Execute task via Python executor
        if: env.TASK_FOUND == 'true'
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now       = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace     = os.environ.get('TRACE_ID', 'unknown')
          objective = os.environ.get('TASK_OBJECTIVE', '')
          task_type = os.environ.get('TASK_TYPE', 'unknown')

          print('Executing task: ' + trace)
          print('Type: ' + task_type)
          print('Objective: ' + objective[:300])

          changed_files = []
          exec_status   = 'completed'
          exec_error    = None

          # ── Proof file (always create — proves executor ran) ──────────────────
          proof_dir = Path('governance/codex/proofs')
          proof_dir.mkdir(parents=True, exist_ok=True)
          proof_file = proof_dir / (trace + '.txt')
          proof_file.write_text(
              'Codex Runner executed\n'
              'trace_id: ' + trace + '\n'
              'task_type: ' + task_type + '\n'
              'executed_at: ' + now + '\n'
              'objective: ' + objective[:500] + '\n'
          )
          changed_files.append(str(proof_file))
          print('Proof file created: ' + str(proof_file))

          # ── Parse objective for file operations ───────────────────────────────
          # Pattern: Create file <path> with content <content>
          create_match = re.search(
              r'[Cc]reate\s+(?:file\s+)?([^\s]+)\s+with\s+content\s+["\']?(.+?)["\']?(?:\.|$)',
              objective, re.DOTALL
          )
          if create_match:
              target_path = create_match.group(1).strip()
              content     = create_match.group(2).strip()
              p = Path(target_path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content + '\n')
              changed_files.append(target_path)
              print('Created file: ' + target_path)

          # Pattern: Update file <path> set <field>=<value>
          update_match = re.search(
              r'[Uu]pdate\s+(?:file\s+)?([^\s]+)\s+set\s+(.+?)(?:\.|$)',
              objective
          )
          if update_match and not create_match:
              target_path = update_match.group(1).strip()
              p = Path(target_path)
              if p.exists() and target_path.endswith('.json'):
                  try:
                      data = json.loads(p.read_text())
                      assignments = update_match.group(2)
                      for kv in re.findall(r'(\w+)\s*=\s*([^\s,]+)', assignments):
                          key, val = kv
                          if val.lower() == 'true':   val = True
                          elif val.lower() == 'false': val = False
                          elif val.replace('-','').replace('.','').isdigit():
                              val = float(val) if '.' in val else int(val)
                          data[key] = val
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2) + '\n')
                      changed_files.append(target_path)
                      print('Updated JSON: ' + target_path)
                  except Exception as e:
                      exec_error = 'JSON update failed: ' + str(e)
                      exec_status = 'failed'

          # Write env for next steps
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('EXEC_STATUS=' + exec_status + '\n')
              f.write('EXEC_ERROR=' + (exec_error or '') + '\n')
              f.write('CHANGED_FILES=' + ','.join(changed_files) + '\n')

          print('Execution status: ' + exec_status)
          print('Changed files: ' + str(changed_files))
          PYEOF

      - name: Commit changes
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "COMMIT_SHA=" >> "$GITHUB_ENV"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }} type=$TASK_TYPE"
            git push
            SHA=$(git rev-parse HEAD)
            echo "COMMIT_SHA=$SHA" >> "$GITHUB_ENV"
            echo "Committed: $SHA"
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found   = os.environ.get('TASK_FOUND', 'false') == 'true'
          exec_status  = os.environ.get('EXEC_STATUS', 'blocked')
          exec_error   = os.environ.get('EXEC_ERROR', '')
          commit_sha   = os.environ.get('COMMIT_SHA', '')
          changed_raw  = os.environ.get('CHANGED_FILES', '')
          changed      = [f for f in changed_raw.split(',') if f]

          if not task_found:
              status  = 'blocked'
              blocker = {
                  'code':    'TASK_FILE_NOT_FOUND',
                  'message': 'Task file governance/codex/tasks/' + trace + '.json not found.',
                  'next':    'Create task via POST /codex-task before running.'
              }
          elif exec_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = exec_status
              blocker = {'code': 'EXEC_FAILED', 'message': exec_error or 'unknown error'}

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'codex-runner-ubuntu',
              'status':         status,
              'changed_files':  changed,
              'commit_sha':     commit_sha or None,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Runner Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | codex-runner-ubuntu (ubuntu-latest) |',
              '| Status | ' + status + ' |',
              '| Task found | ' + str(task_found) + ' |',
              '| Commit SHA | ' + (commit_sha or 'none') + ' |',
              '| Changed files | ' + (', '.join(changed) or 'none') + ' |',
              '| Completed at | ' + now + ' |',
              '',
              '## Status: ' + status.upper(),
              '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### Execution completed successfully.')
          lines += [
              '',
              '## Notes',
              '- Runner: ubuntu-latest (no self-hosted required)',
              '- No issue #31 comments (BEM-476/521)',
              '- Results: governance/codex/results/' + trace + '.json + .md',
          ]
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result written: status=' + status)
          PYEOF

      - name: Commit result files
        if: always()
        shell: bash
        run: |
          git add governance/codex/results/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            git push
          fi

      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os

          trace      = os.environ.get('INPUT_TRACE_ID', '?')
          task_found = os.environ.get('TASK_FOUND', 'false')
          status     = os.environ.get('EXEC_STATUS', 'blocked')
          sha        = os.environ.get('COMMIT_SHA', 'none')
          changed    = os.environ.get('CHANGED_FILES', 'none')

          lines = [
              '## Codex Runner (ubuntu-latest) - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Runner | ubuntu-latest |',
              '| Task found | ' + task_found + ' |',
              '| Status | ' + status + ' |',
              '| Commit SHA | ' + (sha or 'none') + ' |',
              '| Changed files | ' + (changed or 'none') + ' |',
              '| Result | governance/codex/results/' + trace + '.json |',
              '',
              '**No issue #31 comments (BEM-521)**',
              '',
          ]
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
