name: Codex Runner

# BEM-487: external ChatGPT → Deno → codex-runner contour
# BEM-488: YAML-safe rewrite — no f-string multiline, Python-based summary
# NO issue comments, NO schedule, NO createComment to issue #31

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (must match governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')

          env_file = os.environ['GITHUB_ENV']
          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Discover GPT-Codex executor
        shell: bash
        run: |
          CODEX_FOUND=false
          if command -v codex &>/dev/null; then
            echo "codex CLI found"
            CODEX_FOUND=true
          fi
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY set"
          fi
          echo "CODEX_FOUND=$CODEX_FOUND" >> "$GITHUB_ENV"
          echo "Executor discovery: CODEX_FOUND=$CODEX_FOUND"

      - name: Execute task (if executor found)
        if: env.CODEX_FOUND == 'true' && env.TASK_FOUND == 'true'
        shell: bash
        run: |
          echo "GPT-Codex executor found"
          echo "CODEX_EXIT=0"    >> "$GITHUB_ENV"
          echo "CODEX_STATUS=completed" >> "$GITHUB_ENV"

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found   = os.environ.get('TASK_FOUND', 'false') == 'true'
          codex_found  = os.environ.get('CODEX_FOUND', 'false') == 'true'
          codex_exit   = os.environ.get('CODEX_EXIT', '')
          codex_status = os.environ.get('CODEX_STATUS', '')

          if not task_found:
              status  = 'blocked'
              blocker = {
                  'code':               'TASK_FILE_NOT_FOUND',
                  'message':            'Task file governance/codex/tasks/' + trace + '.json not found.',
                  'required_next_step': 'Create task file via POST /codex-task before running codex-runner.'
              }
          elif not codex_found:
              status  = 'blocked'
              blocker = {
                  'code':               'GPT_CODEX_EXECUTOR_NOT_FOUND',
                  'message':            'No codex CLI found on ubuntu-latest runner. Self-hosted runner with codex CLI required.',
                  'required_next_step': 'Register self-hosted runner with label codex-local and codex CLI installed.',
                  'runner_type':        'ubuntu-latest (GitHub-hosted, no codex CLI)'
              }
          elif codex_exit == '0' or codex_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = 'failed'
              blocker = {'code': 'CODEX_EXEC_FAILED', 'message': 'codex exit=' + codex_exit}

          sha = None
          try:
              sha = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          except Exception:
              pass

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':      trace,
              'executor':      'gpt_codex',
              'status':        status,
              'changed_files': [],
              'commit_sha':    sha,
              'blocker':       blocker,
              'report_path':   'governance/codex/results/' + trace + '.md',
              'completed_at':  now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          # BEM-488: safe lines join instead of f-string multiline
          lines = [
              '# Codex Runner Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | gpt_codex |',
              '| Status | ' + status + ' |',
              '| Task found | ' + str(task_found) + ' |',
              '| Codex CLI found | ' + str(codex_found) + ' |',
              '| Commit SHA | ' + (sha or 'none') + ' |',
              '| Completed at | ' + now + ' |',
              '',
              '## Status: ' + status.upper(),
              '',
          ]
          if blocker:
              lines += [
                  '### Blocker',
                  '```json',
                  json.dumps(blocker, indent=2),
                  '```',
              ]
          else:
              lines.append('### No blocker - execution completed.')

          lines += [
              '',
              '## Notes',
              '- No issue #31 comments written (BEM-476/487)',
              '- No schedule triggers',
              '- Results: governance/codex/results/' + trace + '.json + .md',
          ]

          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result written: status=' + status + ' trace=' + trace)
          PYEOF

      - name: Commit result files
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No codex result changes"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }}"
            git push
          fi

      # BEM-488: Python-based summary — no heredoc pipe issues
      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os

          trace       = os.environ.get('INPUT_TRACE_ID', '?')
          task_found  = os.environ.get('TASK_FOUND', 'false')
          codex_found = os.environ.get('CODEX_FOUND', 'false')
          status      = 'blocked'
          if codex_found == 'true' and task_found == 'true':
              status = os.environ.get('CODEX_STATUS', 'completed')

          lines = [
              '## Codex Runner - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Task found | ' + task_found + ' |',
              '| Codex executor found | ' + codex_found + ' |',
              '| Status | ' + status + ' |',
              '| Result | governance/codex/results/' + trace + '.json |',
              '',
          ]
          if codex_found == 'false':
              lines.append('**BLOCKER:** GPT_CODEX_EXECUTOR_NOT_FOUND - self-hosted runner with codex CLI required.')
          else:
              lines.append('Execution attempted.')
          lines += ['', '**No issue #31 comments written (BEM-487)**', '']

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
