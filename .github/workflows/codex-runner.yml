name: Codex Runner

# BEM-526: Python executor v3
# BEM-645: fixed duplicate permissions key
# BEM-842: removed global concurrency lock
# BEM-844: reverted external scripts to inline
# BEM-848: push triggers removed from all other workflows
# BEM-849: fixed git push — was using git_safe_commit_push.sh which re-committed (empty diff = no push)

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID'
        required: true
        type: string
      task_path:
        description: 'Override task file path'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  codex-runner:
    name: Codex Runner v3 (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')
          env_file  = os.environ['GITHUB_ENV']

          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task      = json.loads(p.read_text())
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              title     = task.get('title', 'untitled')
              print('Task: ' + title)
              print('Type: ' + task_type)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title.replace('\n',' ') + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:3000].replace('\n',' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Execute task
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re, shutil
          from datetime import datetime, timezone
          from pathlib import Path

          now       = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace     = os.environ.get('TRACE_ID', 'unknown')
          objective = os.environ.get('TASK_OBJECTIVE', '')
          task_type = os.environ.get('TASK_TYPE', 'unknown')

          task_path = 'governance/codex/tasks/' + trace + '.json'
          try:
              full_task = json.loads(Path(task_path).read_text())
              objective = full_task.get('objective', objective)
          except Exception:
              pass

          print('Executing: ' + trace)

          changed_files = []
          errors        = []
          ops_applied   = []
          exec_status   = 'completed'

          # Run script (level 2)
          script_match = re.search(r'Run script:\s*\n\s*"""(.*?)"""', objective, re.DOTALL)
          if not script_match:
              script_match = re.search(r"Run script:\s*\n\s*'''(.*?)'''", objective, re.DOTALL)

          if script_match:
              script_code = script_match.group(1)
              forbidden = ['requests', 'urllib', 'subprocess', 'os.system',
                           'os.popen', 'socket', 'exec(', 'eval(', '__import__']
              blocked = [f for f in forbidden if f in script_code]
              if blocked:
                  errors.append('Script blocked: ' + ', '.join(blocked))
                  exec_status = 'failed'
              else:
                  try:
                      safe_globals = {
                          '__builtins__': {
                              'print': print, 'len': len, 'str': str, 'int': int,
                              'float': float, 'bool': bool, 'list': list, 'dict': dict,
                              'tuple': tuple, 'set': set, 'range': range, 'enumerate': enumerate,
                              'zip': zip, 'map': map, 'filter': filter, 'sorted': sorted,
                              'min': min, 'max': max, 'sum': sum, 'any': any, 'all': all,
                              'isinstance': isinstance, 'type': type, 'repr': repr,
                              'open': open, 'True': True, 'False': False, 'None': None,
                          },
                          'json': json, 'Path': Path, 're': re,
                          'datetime': datetime, 'timezone': timezone,
                          'now': now, 'trace': trace, 'shutil': shutil,
                          'changed_files': changed_files, 'ops_applied': ops_applied,
                      }
                      exec(script_code, safe_globals)
                      if 'changed_files' in safe_globals:
                          changed_files = safe_globals['changed_files']
                      ops_applied.append('custom_script')
                  except Exception as e:
                      errors.append('Script error: ' + str(e))
                      exec_status = 'failed'

          # Pattern 1: Create file
          for m in re.finditer(
              r'Create\s+file\s+([^\s]+)\s+with\s+content\s+["\']?(.*?)["\']?\s*(?=\.|Create|Delete|Move|Copy|Append|Prepend|Set|Replace|Insert|Run|$)',
              objective, re.DOTALL | re.IGNORECASE
          ):
              target, content = m.group(1).strip(), m.group(2).strip()
              try:
                  p = Path(target)
                  p.parent.mkdir(parents=True, exist_ok=True)
                  p.write_text(content + '\n')
                  changed_files.append(target)
                  ops_applied.append('create:' + target)
                  print('Created: ' + target)
              except Exception as e:
                  errors.append('Create failed ' + target + ': ' + str(e))

          # Pattern 2: Delete file
          for m in re.finditer(r'Delete\s+file\s+([^\s\.]+)', objective, re.IGNORECASE):
              target = m.group(1).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      p.write_text('# ARCHIVED\nArchived at: ' + now + '\nTrace: ' + trace + '\n')
                      changed_files.append(target)
                      ops_applied.append('delete:' + target)
              except Exception as e:
                  errors.append('Delete failed: ' + str(e))

          # Pattern 3: Move file
          for m in re.finditer(r'Move\s+file\s+([^\s]+)\s+to\s+([^\s\.]+)', objective, re.IGNORECASE):
              src, dst = m.group(1).strip(), m.group(2).strip()
              try:
                  sp, dp = Path(src), Path(dst)
                  if sp.exists():
                      dp.parent.mkdir(parents=True, exist_ok=True)
                      dp.write_text(sp.read_text())
                      sp.write_text('# ARCHIVED\nMoved to: ' + dst + '\nAt: ' + now + '\n')
                      changed_files.extend([src, dst])
                      ops_applied.append('move:' + src + '->' + dst)
              except Exception as e:
                  errors.append('Move failed: ' + str(e))

          # Pattern 4: Copy file
          for m in re.finditer(r'Copy\s+file\s+([^\s]+)\s+to\s+([^\s\.]+)', objective, re.IGNORECASE):
              src, dst = m.group(1).strip(), m.group(2).strip()
              try:
                  sp, dp = Path(src), Path(dst)
                  if sp.exists():
                      dp.parent.mkdir(parents=True, exist_ok=True)
                      dp.write_text(sp.read_text())
                      changed_files.append(dst)
                      ops_applied.append('copy:' + src + '->' + dst)
              except Exception as e:
                  errors.append('Copy failed: ' + str(e))

          # Pattern 5: Append to
          for m in re.finditer(r'Append\s+to\s+([^\s:]+):\s+(.+?)(?=\.|Create|Delete|Move|Copy|Prepend|Set|Replace|Insert|Run|$)', objective, re.DOTALL | re.IGNORECASE):
              target, content = m.group(1).strip(), m.group(2).strip()
              try:
                  p = Path(target)
                  p.parent.mkdir(parents=True, exist_ok=True)
                  with p.open('a') as f:
                      f.write(content + '\n')
                  changed_files.append(target)
                  ops_applied.append('append:' + target)
              except Exception as e:
                  errors.append('Append failed: ' + str(e))

          # Pattern 6: Prepend to
          for m in re.finditer(r'Prepend\s+to\s+([^\s:]+):\s+(.+?)(?=\.|Create|Delete|Move|Copy|Append|Set|Replace|Insert|Run|$)', objective, re.DOTALL | re.IGNORECASE):
              target, content = m.group(1).strip(), m.group(2).strip()
              try:
                  p = Path(target)
                  existing = p.read_text() if p.exists() else ''
                  p.write_text(content + '\n' + existing)
                  changed_files.append(target)
                  ops_applied.append('prepend:' + target)
              except Exception as e:
                  errors.append('Prepend failed: ' + str(e))

          # Pattern 7: Set field
          for m in re.finditer(r'Set\s+([^\s]+)\s+field\s+(\w+)\s*=\s*([^\s,\.]+)', objective, re.IGNORECASE):
              target, key, val = m.group(1).strip(), m.group(2).strip(), m.group(3).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      data = json.loads(p.read_text())
                      val = True if val.lower()=='true' else (False if val.lower()=='false' else (float(val) if '.' in val and val.replace('.','').replace('-','').isdigit() else (int(val) if val.replace('-','').isdigit() else val)))
                      data[key] = val
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
                      changed_files.append(target)
                      ops_applied.append('set_field:' + target + '.' + key)
              except Exception as e:
                  errors.append('Set field failed: ' + str(e))

          # Pattern 8: Set fields
          for m in re.finditer(r'Set\s+([^\s]+)\s+fields:\s+(.+?)(?=\.|$)', objective, re.DOTALL | re.IGNORECASE):
              target, pairs = m.group(1).strip(), m.group(2).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      data = json.loads(p.read_text())
                      for k, v in re.findall(r'(\w+)\s*=\s*([^\s,]+)', pairs):
                          v = True if v.lower()=='true' else (False if v.lower()=='false' else (int(v) if v.isdigit() else v))
                          data[k] = v
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')
                      changed_files.append(target)
                      ops_applied.append('set_fields:' + target)
              except Exception as e:
                  errors.append('Set fields failed: ' + str(e))

          # Pattern 9: Replace line
          for m in re.finditer(r'Replace\s+in\s+([^\s]+)\s+line\s+containing\s+["\'](.+?)["\']\s+with\s+["\'](.+?)["\']', objective, re.IGNORECASE):
              target, old, new = m.group(1).strip(), m.group(2).strip(), m.group(3).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      lines = p.read_text().split('\n')
                      replaced = 0
                      for i, line in enumerate(lines):
                          if old in line:
                              lines[i] = line.replace(old, new)
                              replaced += 1
                      p.write_text('\n'.join(lines))
                      changed_files.append(target)
                      ops_applied.append('replace_line:' + target)
              except Exception as e:
                  errors.append('Replace failed: ' + str(e))

          # Pattern 10: Delete line
          for m in re.finditer(r'Delete\s+from\s+([^\s]+)\s+line\s+containing\s+["\'](.+?)["\']', objective, re.IGNORECASE):
              target, text = m.group(1).strip(), m.group(2).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      lines = [l for l in p.read_text().split('\n') if text not in l]
                      p.write_text('\n'.join(lines))
                      changed_files.append(target)
                      ops_applied.append('delete_line:' + target)
              except Exception as e:
                  errors.append('Delete line failed: ' + str(e))

          # Pattern 11: Insert after
          for m in re.finditer(r'Insert\s+in\s+([^\s]+)\s+after\s+line\s+containing\s+["\'](.+?)["\']\s*:\s+["\']?(.+?)["\']?\s*(?=\.|$)', objective, re.DOTALL | re.IGNORECASE):
              target, anchor, content = m.group(1).strip(), m.group(2).strip(), m.group(3).strip()
              try:
                  p = Path(target)
                  if p.exists():
                      lines = p.read_text().split('\n')
                      result = []
                      for line in lines:
                          result.append(line)
                          if anchor in line:
                              result.append(content)
                      p.write_text('\n'.join(result))
                      changed_files.append(target)
                      ops_applied.append('insert_after:' + target)
              except Exception as e:
                  errors.append('Insert failed: ' + str(e))

          # Pattern 12: Create dir
          for m in re.finditer(r'Create\s+dir\s+([^\s\.]+)', objective, re.IGNORECASE):
              target = m.group(1).strip()
              try:
                  p = Path(target)
                  p.mkdir(parents=True, exist_ok=True)
                  (p / '.gitkeep').write_text('')
                  changed_files.append(target + '/.gitkeep')
                  ops_applied.append('create_dir:' + target)
              except Exception as e:
                  errors.append('Create dir failed: ' + str(e))

          # Proof file
          proof_dir = Path('governance/codex/proofs')
          proof_dir.mkdir(parents=True, exist_ok=True)
          proof = proof_dir / (trace + '.txt')
          proof.write_text(
              'Executor: Python v3 (ubuntu-latest)\n'
              'trace_id: ' + trace + '\n'
              'task_type: ' + task_type + '\n'
              'executed_at: ' + now + '\n'
              'ops_applied: ' + ', '.join(ops_applied) + '\n'
              'changed_files: ' + ', '.join(changed_files) + '\n'
              'errors: ' + ('; '.join(errors) if errors else 'none') + '\n'
          )
          changed_files.append(str(proof))

          if errors and not ops_applied:
              exec_status = 'failed'

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('EXEC_STATUS=' + exec_status + '\n')
              f.write('CHANGED_FILES=' + ','.join(changed_files) + '\n')
              f.write('OPS_APPLIED=' + ','.join(ops_applied) + '\n')
              f.write('EXEC_ERRORS=' + '; '.join(errors) + '\n')

          print('Status: ' + exec_status)
          print('Ops: ' + str(ops_applied))
          PYEOF

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found  = os.environ.get('TASK_FOUND',  'false') == 'true'
          exec_status = os.environ.get('EXEC_STATUS', 'blocked')
          commit_sha  = os.environ.get('COMMIT_SHA',  '')
          changed_raw = os.environ.get('CHANGED_FILES', '')
          ops_raw     = os.environ.get('OPS_APPLIED', '')
          exec_errors = os.environ.get('EXEC_ERRORS', '')
          changed     = [f for f in changed_raw.split(',') if f]
          ops         = [o for o in ops_raw.split(',') if o]

          if not task_found:
              status  = 'blocked'
              blocker = {'code': 'TASK_FILE_NOT_FOUND', 'message': 'Task file not found.'}
          elif exec_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = exec_status
              blocker = {'code': 'EXEC_FAILED', 'message': exec_errors or exec_status}

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result = {
              'schema_version':     1,
              'trace_id':           trace,
              'executor':           'python-v3',
              'status':             status,
              'operations_applied': ops,
              'changed_files':      changed,
              'commit_sha':         commit_sha or None,
              'blocker':            blocker,
              'report_path':        'governance/codex/results/' + trace + '.md',
              'completed_at':       now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Runner v3 Result - ' + trace, '',
              '| Field | Value |', '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | Python v3 (ubuntu-latest) |',
              '| Status | ' + status + ' |',
              '| Operations | ' + (', '.join(ops) or 'none') + ' |',
              '| Commit SHA | ' + (commit_sha or 'none') + ' |',
              '| Completed | ' + now + ' |', '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### Completed successfully.')
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result written: status=' + status)
          PYEOF


      - name: Process workflow dispatch queue before commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          python3 scripts/process_workflow_dispatch_queue.py || true


      - name: BEM-866 queue step heartbeat
        if: always()
        run: |
          mkdir -p governance/runtime/curator_dispatch
          echo "# BEM-866 codex queue step heartbeat" > governance/runtime/curator_dispatch/BEM866_CODEX_QUEUE_STEP_HEARTBEAT.md
          echo "Status: QUEUE_STEP_EXECUTED" >> governance/runtime/curator_dispatch/BEM866_CODEX_QUEUE_STEP_HEARTBEAT.md
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> governance/runtime/curator_dispatch/BEM866_CODEX_QUEUE_STEP_HEARTBEAT.md


      - name: Process workflow dispatch queue via github-script
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const queueDir = 'governance/workflow_dispatch_queue';
            const processedDir = 'governance/workflow_dispatch_processed';
            const resultsDir = 'governance/workflow_dispatch_results';
            fs.mkdirSync(queueDir, { recursive: true });
            fs.mkdirSync(processedDir, { recursive: true });
            fs.mkdirSync(resultsDir, { recursive: true });
            const files = fs.readdirSync(queueDir).filter((f) => f.endsWith('.json')).sort();
            for (const file of files) {
              const full = path.join(queueDir, file);
              const raw = fs.readFileSync(full, 'utf8');
              const item = JSON.parse(raw);
              const workflow_id = item.workflow;
              const ref = item.ref || 'main';
              const inputs = item.inputs || {};
              let status = 'DISPATCHED';
              let error = null;
              try {
                await github.rest.actions.createWorkflowDispatch({ owner: context.repo.owner, repo: context.repo.repo, workflow_id, ref, inputs });
              } catch (e) {
                status = 'DISPATCH_FAILED';
                error = String(e).slice(0, 1000);
              }
              const resultName = file.replace(/\\.json$/, '_result.json');
              fs.writeFileSync(path.join(resultsDir, resultName), JSON.stringify({ status, workflow_id, ref, inputs, error, dispatched_at: new Date().toISOString() }, null, 2));
              fs.renameSync(full, path.join(processedDir, file));
            }

      - name: Commit and push everything
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }} status=${EXEC_STATUS:-unknown}"
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
            echo "Pushed: $(git rev-parse HEAD)"
          fi


      - name: Job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os
          trace  = os.environ.get('INPUT_TRACE_ID', '?')
          status = os.environ.get('EXEC_STATUS', 'blocked')
          sha    = os.environ.get('COMMIT_SHA', 'none')
          ops    = os.environ.get('OPS_APPLIED', 'none')
          errors = os.environ.get('EXEC_ERRORS', '')
          lines  = [
              '## Codex Runner v3 - ' + trace,
              '| Field | Value |', '|---|---|',
              '| Executor | Python v3 (BEM-849 git push fix) |',
              '| Status | ' + status + ' |',
              '| Operations | ' + ops + ' |',
              '| SHA | ' + (sha or 'none') + ' |',
              ('| Errors | ' + errors + ' |') if errors else '',
              '**No issue #31 comments**', '',
          ]
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/s.md'), 'a') as f:
              f.write('\n'.join(l for l in lines if l))
          PYEOF

# BEM-865 inline workflow dispatch queue marker
# Queue processing is handled after task execution by scripts/process_workflow_dispatch_queue.py.
