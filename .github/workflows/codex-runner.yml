name: Codex Runner

# BEM-487: external ChatGPT → Deno → codex-runner contour
# Triggered by Deno /codex-task endpoint via workflow_dispatch
# NO issue comments, NO schedule, NO createComment to issue #31
# Results: governance/codex/results/<trace_id>.json + .md

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (must match governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or f'governance/codex/tasks/{trace}.json'

          p = Path(task_path)
          if not p.exists():
              print(f"TASK_FOUND=false")
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'TASK_FOUND=false\n')
                  f.write(f'TASK_TITLE=unknown\n')
                  f.write(f'TASK_OBJECTIVE=unknown\n')
                  f.write(f'TASK_TYPE=unknown\n')
                  f.write(f'TRACE_ID={trace}\n')
              print(f"Task file not found: {task_path}")
          else:
              task = json.loads(p.read_text())
              title = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              with open(os.environ['GITHUB_ENV'], 'a') as f:
                  f.write(f'TASK_FOUND=true\n')
                  f.write(f'TASK_TITLE={title}\n')
                  f.write(f'TASK_OBJECTIVE={objective[:200]}\n')
                  f.write(f'TASK_TYPE={task_type}\n')
                  f.write(f'TRACE_ID={trace}\n')
              print(f"Task found: {title} | type={task_type}")
          PYEOF

      # BEM-487 ЭТАП 6: GPT-Codex executor discovery
      # ubuntu-latest = GitHub-hosted runner, no codex CLI by default
      # Self-hosted runner with codex CLI required for real execution
      - name: Discover GPT-Codex executor
        shell: bash
        run: |
          CODEX_FOUND=false

          # Check 1: codex CLI available
          if command -v codex &>/dev/null; then
            echo "codex CLI found: $(codex --version 2>/dev/null || echo 'version unknown')"
            CODEX_FOUND=true
          fi

          # Check 2: OPENAI_API_KEY available (could use API directly)
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is set — could use API mode"
            # Still not sufficient without codex CLI on this hosted runner
          fi

          # Check 3: running on self-hosted runner
          if [ "${RUNNER_NAME:-}" != "" ] && echo "${RUNNER_LABELS:-}" | grep -qi "codex"; then
            echo "Self-hosted codex runner detected"
            CODEX_FOUND=true
          fi

          echo "CODEX_FOUND=$CODEX_FOUND" >> "$GITHUB_ENV"
          echo "Executor discovery: CODEX_FOUND=$CODEX_FOUND"

      - name: Execute task (if executor found)
        if: env.CODEX_FOUND == 'true' && env.TASK_FOUND == 'true'
        shell: bash
        run: |
          echo "GPT-Codex executor found — running task"
          # Placeholder for real codex exec call:
          # codex exec "$(cat governance/codex/tasks/$TRACE_ID.json | python3 -c 'import json,sys; t=json.load(sys.stdin); print(t["objective"])')"
          echo "CODEX_EXIT=0" >> "$GITHUB_ENV"
          echo "CODEX_STATUS=completed" >> "$GITHUB_ENV"

      - name: Write result file
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found  = os.environ.get('TASK_FOUND', 'false') == 'true'
          codex_found = os.environ.get('CODEX_FOUND', 'false') == 'true'
          codex_exit  = os.environ.get('CODEX_EXIT', '')
          codex_status = os.environ.get('CODEX_STATUS', '')

          # Determine final status and blocker
          if not task_found:
              status  = 'blocked'
              blocker = {
                  'code':               'TASK_FILE_NOT_FOUND',
                  'message':            f'Task file governance/codex/tasks/{trace}.json not found in repository.',
                  'required_next_step': 'Create task file via POST /codex-task before running codex-runner.'
              }
          elif not codex_found:
              status  = 'blocked'
              blocker = {
                  'code':               'GPT_CODEX_EXECUTOR_NOT_FOUND',
                  'message':            'No configured GPT-Codex runner/action/CLI was found in this GitHub Actions environment. codex-runner.yml runs on ubuntu-latest (GitHub-hosted). GPT-Codex requires a self-hosted runner with codex CLI installed.',
                  'required_next_step': 'Register a self-hosted runner with label "codex-local" and codex CLI installed (nvm + npx codex), OR provide OPENAI_API_KEY and codex CLI on this runner.',
                  'runner_type':        'ubuntu-latest (GitHub-hosted, no codex CLI)'
              }
          elif codex_exit == '0' or codex_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = 'failed'
              blocker = {'code': 'CODEX_EXEC_FAILED', 'message': f'codex exit={codex_exit}'}

          # Get changed files + commit SHA
          changed = []
          sha = None
          try:
              sha = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          except Exception:
              pass

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':      trace,
              'executor':      'gpt_codex',
              'status':        status,
              'changed_files': changed,
              'commit_sha':    sha,
              'blocker':       blocker,
              'report_path':   f'governance/codex/results/{trace}.md',
              'completed_at':  now
          }

          (result_dir / f'{trace}.json').write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          report_md = f"""# Codex Runner Result — {trace}

| Field | Value |
|---|---|
| Trace | {trace} |
| Executor | gpt_codex |
| Status | **{status}** |
| Task found | {task_found} |
| Codex CLI found | {codex_found} |
| Commit SHA | {sha or 'none'} |
| Completed at | {now} |

## Status: {status.upper()}

{'### Blocker\\n```json\\n' + json.dumps(blocker, indent=2) + '\\n```' if blocker else '### No blocker — execution completed.'}

## Notes
- No issue #31 comments written (BEM-476/487)
- No schedule triggers
- Results: governance/codex/results/{trace}.json + .md
"""
          (result_dir / f'{trace}.md').write_text(report_md)
          print(f"Result written: status={status} trace={trace}")
          PYEOF

      - name: Commit result files
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No codex result changes"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }} status=${{ env.CODEX_STATUS || 'blocked' }}"
            git push
          fi

      # NO createComment to issue #31 — job summary only
      - name: Report to job summary
        if: always()
        shell: bash
        run: |
          CODEX_FOUND="${CODEX_FOUND:-false}"
          TASK_FOUND="${TASK_FOUND:-false}"
          STATUS="blocked"
          if [ "$CODEX_FOUND" = "true" ] && [ "$TASK_FOUND" = "true" ]; then
            STATUS="${CODEX_STATUS:-completed}"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Codex Runner — ${{ inputs.trace_id }}

          | Field | Value |
          |---|---|
          | Trace | ${{ inputs.trace_id }} |
          | Task found | ${TASK_FOUND} |
          | Codex executor found | ${CODEX_FOUND} |
          | Status | ${STATUS} |
          | Result | governance/codex/results/${{ inputs.trace_id }}.json |

          $( [ "$CODEX_FOUND" = "false" ] && echo "**BLOCKER:** GPT_CODEX_EXECUTOR_NOT_FOUND — self-hosted runner with codex CLI required." || echo "Execution attempted." )

          **No issue #31 comments written (BEM-487)**
          EOF
