name: Codex Runner

# BEM-526: Python executor v3
# BEM-645: fixed duplicate permissions key
# BEM-842: removed global concurrency lock — was blocking queue

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID'
        required: true
        type: string
      task_path:
        description: 'Override task file path'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: write

jobs:
  codex-runner:
    name: Codex Runner v3 (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Queue processor execution marker
        if: always()
        run: bash scripts/mark_queue_processor_step_seen.sh

      - name: Process workflow dispatch queue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: bash scripts/process_workflow_dispatch_queue.sh

      - name: Commit queue processor marker results
        if: always()
        run: bash scripts/commit_queue_processor_marker_results.sh

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: python3 scripts/codex_read_task.py

      - name: Execute task
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: python3 scripts/codex_execute_task.py

      - name: Commit changes
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            echo "COMMIT_SHA=" >> "$GITHUB_ENV"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }}"
            bash scripts/git_safe_commit_push.sh "CODEx safe push"
            SHA=$(git rev-parse HEAD)
            echo "COMMIT_SHA=$SHA" >> "$GITHUB_ENV"
            echo "Committed: $SHA"
          fi

      - name: Dispatch workflow queue
        if: env.TASK_FOUND == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p governance/workflow_dispatch_results governance/workflow_dispatch_processed
          if [ ! -d governance/workflow_dispatch_queue ]; then
            echo "No workflow dispatch queue"
            exit 0
          fi
          shopt -s nullglob
          for f in governance/workflow_dispatch_queue/*.json; do
            WORKFLOW=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('workflow',''))" "$f")
            if [ -z "$WORKFLOW" ]; then
              echo "missing_workflow" > "governance/workflow_dispatch_results/$(basename "$f" .json).status"
              continue
            fi
            BODY=$(python3 -c "import json,sys; data=json.load(open(sys.argv[1])); print(json.dumps({'ref':data.get('ref','main'),'inputs':data.get('inputs',{})}))" "$f")
            HTTP_CODE=$(curl -sS -o "governance/workflow_dispatch_results/$(basename "$f" .json).response.json" -w "%{http_code}" \
              -X POST "https://api.github.com/repos/${GH_REPOSITORY}/actions/workflows/${WORKFLOW}/dispatches" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "$BODY" || echo "000")
            echo "$HTTP_CODE" > "governance/workflow_dispatch_results/$(basename "$f" .json).status"
            echo "Dispatched ${WORKFLOW}: ${HTTP_CODE}"
            mv "$f" "governance/workflow_dispatch_processed/$(basename "$f")"
          done
          git add governance/workflow_dispatch_results governance/workflow_dispatch_queue 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "CODEX-RUNNER: workflow dispatch queue trace=${{ inputs.trace_id }}" || true
            bash scripts/git_safe_commit_push.sh "CODEx safe push" || true
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: python3 scripts/codex_write_result.py

      - name: Commit result
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            bash scripts/git_safe_commit_push.sh "CODEx safe push"
          fi

      - name: Job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os
          trace  = os.environ.get('INPUT_TRACE_ID', '?')
          status = os.environ.get('EXEC_STATUS', 'blocked')
          sha    = os.environ.get('COMMIT_SHA', 'none')
          ops    = os.environ.get('OPS_APPLIED', 'none')
          errors = os.environ.get('EXEC_ERRORS', '')
          lines  = [
              '## Codex Runner v3 - ' + trace,
              '| Field | Value |', '|---|---|',
              '| Executor | Python v3 (no paid API) |',
              '| Status | ' + status + ' |',
              '| Operations | ' + ops + ' |',
              '| SHA | ' + (sha or 'none') + ' |',
              ('| Errors | ' + errors + ' |') if errors else '',
              '**No issue #31 comments (BEM-842)**', '',
          ]
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/s.md'), 'a') as f:
              f.write('\n'.join(l for l in lines if l))
          PYEOF
