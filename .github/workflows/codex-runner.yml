name: Codex Runner

# BEM-523: back to ubuntu-latest + Python executor (no paid API required)
# NO issue comments, NO schedule, NO self-hosted required

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (matches governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Override path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner (ubuntu-latest, Python executor)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')
          env_file  = os.environ['GITHUB_ENV']

          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task      = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title.replace('\n', ' ') + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:1000].replace('\n', ' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Execute task via Python executor
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, re
          from datetime import datetime, timezone
          from pathlib import Path

          now       = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace     = os.environ.get('TRACE_ID', 'unknown')
          objective = os.environ.get('TASK_OBJECTIVE', '')
          task_type = os.environ.get('TASK_TYPE', 'unknown')

          print('Executing: ' + trace)
          print('Objective: ' + objective[:300])

          changed_files = []
          exec_status   = 'completed'

          # Always create proof file
          proof_dir = Path('governance/codex/proofs')
          proof_dir.mkdir(parents=True, exist_ok=True)
          proof_file = proof_dir / (trace + '.txt')
          proof_file.write_text(
              'Executor: Python (ubuntu-latest)\n'
              'trace_id: ' + trace + '\n'
              'task_type: ' + task_type + '\n'
              'executed_at: ' + now + '\n'
              'objective: ' + objective[:500] + '\n'
          )
          changed_files.append(str(proof_file))

          # Create file: "Create file <path> with content <text>"
          m = re.search(r'[Cc]reate\s+file\s+([^\s]+)\s+with\s+content\s+["\']?(.+?)["\']?\s*(?:\.|$)', objective, re.DOTALL)
          if m:
              p = Path(m.group(1).strip())
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(m.group(2).strip() + '\n')
              changed_files.append(str(p))
              print('Created: ' + str(p))

          # Update JSON: "Update file <path> set <field>=<value>"
          m2 = re.search(r'[Uu]pdate\s+file\s+([^\s]+)\s+set\s+(.+?)(?:\.|$)', objective)
          if m2 and not m:
              p = Path(m2.group(1).strip())
              if p.exists() and str(p).endswith('.json'):
                  try:
                      data = json.loads(p.read_text())
                      for k, v in re.findall(r'(\w+)\s*=\s*([^\s,]+)', m2.group(2)):
                          data[k] = True if v == 'true' else (False if v == 'false' else v)
                      data['updated_at'] = now
                      p.write_text(json.dumps(data, indent=2) + '\n')
                      changed_files.append(str(p))
                      print('Updated: ' + str(p))
                  except Exception as e:
                      exec_status = 'failed'
                      print('Update failed: ' + str(e))

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write('EXEC_STATUS=' + exec_status + '\n')
              f.write('CHANGED_FILES=' + ','.join(changed_files) + '\n')

          print('Status: ' + exec_status)
          PYEOF

      - name: Commit changes
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes"
            echo "COMMIT_SHA=" >> "$GITHUB_ENV"
          else
            git commit -m "CODEX-RUNNER: trace=${{ inputs.trace_id }}"
            git push
            SHA=$(git rev-parse HEAD)
            echo "COMMIT_SHA=$SHA" >> "$GITHUB_ENV"
            echo "Committed: $SHA"
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found  = os.environ.get('TASK_FOUND',  'false') == 'true'
          exec_status = os.environ.get('EXEC_STATUS', 'blocked')
          commit_sha  = os.environ.get('COMMIT_SHA',  '')
          changed_raw = os.environ.get('CHANGED_FILES', '')
          changed     = [f for f in changed_raw.split(',') if f]

          if not task_found:
              status  = 'blocked'
              blocker = {'code': 'TASK_FILE_NOT_FOUND', 'message': 'Task file not found.'}
          elif exec_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = exec_status
              blocker = {'code': 'EXEC_FAILED', 'message': exec_status}

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'python-ubuntu-latest',
              'status':         status,
              'changed_files':  changed,
              'commit_sha':     commit_sha or None,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Runner Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | Python (ubuntu-latest) |',
              '| Status | ' + status + ' |',
              '| Commit SHA | ' + (commit_sha or 'none') + ' |',
              '| Changed | ' + (', '.join(changed) or 'none') + ' |',
              '| Completed | ' + now + ' |',
              '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### Completed successfully.')
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result: status=' + status)
          PYEOF

      - name: Commit result
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            git push
          fi

      - name: Job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os
          trace  = os.environ.get('INPUT_TRACE_ID', '?')
          status = os.environ.get('EXEC_STATUS', 'blocked')
          sha    = os.environ.get('COMMIT_SHA', 'none')
          lines  = [
              '## Codex Runner - ' + trace,
              '| Field | Value |',
              '|---|---|',
              '| Executor | Python (ubuntu-latest, no paid API) |',
              '| Status | ' + status + ' |',
              '| SHA | ' + (sha or 'none') + ' |',
              '**No issue #31 comments (BEM-523)**', '',
          ]
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/s.md'), 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
