name: Codex Runner

# BEM-522 patch #3: fix codex login syntax — printenv OPENAI_API_KEY | codex login --with-api-key
# NO issue comments, NO schedule

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (matches governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Override path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner (self-hosted codex-local)
    runs-on: [self-hosted, codex-local]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')
          env_file  = os.environ['GITHUB_ENV']

          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task      = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              print('Objective: ' + objective[:300])
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title.replace('\n', ' ') + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:1000].replace('\n', ' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      # BEM-522 patch #3: correct auth syntax for codex-cli 0.130.0
      - name: Execute task via Codex CLI
        if: env.TASK_FOUND == 'true'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export PATH="$HOME/.nvm/versions/node/v20.19.2/bin:$HOME/.local/bin:$PATH"
          set +e

          STDOUT_FILE="$RUNNER_TEMP/codex_stdout.txt"
          STDERR_FILE="$RUNNER_TEMP/codex_stderr.txt"

          echo "Codex CLI version: $(codex --version 2>/dev/null || echo 'not found')"
          echo "Objective: $TASK_OBJECTIVE"

          # BEM-522 patch #3: correct flag --with-api-key reads from stdin
          printenv OPENAI_API_KEY | codex login --with-api-key 2>>"$STDERR_FILE"

          # Execute with write sandbox enabled
          codex exec --sandbox workspace-write "$TASK_OBJECTIVE" \
            1>"$STDOUT_FILE" 2>>"$STDERR_FILE"
          CODEX_EXIT=$?

          echo "--- stdout ---"
          cat "$STDOUT_FILE" || true
          echo "--- stderr ---"
          cat "$STDERR_FILE" || true

          echo "CODEX_EXIT=$CODEX_EXIT"   >> "$GITHUB_ENV"
          echo "STDOUT_FILE=$STDOUT_FILE" >> "$GITHUB_ENV"
          echo "STDERR_FILE=$STDERR_FILE" >> "$GITHUB_ENV"

          if [ "$CODEX_EXIT" = "0" ]; then
            echo "EXEC_STATUS=completed" >> "$GITHUB_ENV"
          else
            echo "EXEC_STATUS=failed"    >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Commit codex changes
        if: env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "COMMIT_SHA=" >> "$GITHUB_ENV"
          else
            git commit -m "CODEX-CLI: trace=${{ inputs.trace_id }} type=$TASK_TYPE"
            git push
            SHA=$(git rev-parse HEAD)
            echo "COMMIT_SHA=$SHA" >> "$GITHUB_ENV"
            echo "Committed: $SHA"
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found  = os.environ.get('TASK_FOUND',  'false') == 'true'
          exec_status = os.environ.get('EXEC_STATUS', 'blocked')
          codex_exit  = os.environ.get('CODEX_EXIT',  '')
          commit_sha  = os.environ.get('COMMIT_SHA',  '')
          stderr_file = os.environ.get('STDERR_FILE', '')

          stderr_tail = ''
          if stderr_file:
              try:
                  lines = Path(stderr_file).read_text(errors='replace').strip().split('\n')
                  stderr_tail = '\n'.join(lines[-10:])
              except Exception:
                  pass

          changed = []
          try:
              out = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'], text=True
              ).strip()
              changed = [f for f in out.split('\n') if f]
          except Exception:
              pass

          if not task_found:
              status  = 'blocked'
              blocker = {
                  'code':    'TASK_FILE_NOT_FOUND',
                  'message': 'Task file not found.',
                  'next':    'Create task via POST /codex-task before running.'
              }
          elif exec_status == 'completed':
              status  = 'completed'
              blocker = None
          else:
              status  = exec_status
              blocker = {
                  'code':        'CODEX_EXEC_FAILED',
                  'message':     'codex exit=' + codex_exit,
                  'stderr_tail': stderr_tail[-500:] if stderr_tail else 'no stderr captured'
              }

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'codex-cli',
              'runner':         'self-hosted codex-local',
              'status':         status,
              'changed_files':  changed,
              'commit_sha':     commit_sha or None,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex CLI Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | Codex CLI |',
              '| Runner | self-hosted codex-local |',
              '| Status | ' + status + ' |',
              '| Commit SHA | ' + (commit_sha or 'none') + ' |',
              '| Changed files | ' + (', '.join(changed) or 'none') + ' |',
              '| Completed at | ' + now + ' |',
              '',
              '## Status: ' + status.upper(),
              '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### Codex CLI executed successfully.')
          lines += [
              '',
              '## Notes',
              '- Runner: [self-hosted, codex-local] on Google Cloud VM',
              '- Auth: printenv OPENAI_API_KEY | codex login --with-api-key',
              '- Sandbox: --sandbox workspace-write',
              '- No issue #31 comments (BEM-476/522)',
          ]
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result written: status=' + status)
          PYEOF

      - name: Commit result files
        if: always()
        shell: bash
        run: |
          git add governance/codex/results/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            git push
          fi

      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os

          trace      = os.environ.get('INPUT_TRACE_ID', '?')
          task_found = os.environ.get('TASK_FOUND',  'false')
          status     = os.environ.get('EXEC_STATUS', 'blocked')
          sha        = os.environ.get('COMMIT_SHA',  'none')
          exit_c     = os.environ.get('CODEX_EXIT',  '?')

          lines = [
              '## Codex CLI Runner - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Runner | [self-hosted, codex-local] |',
              '| Executor | Codex CLI |',
              '| Auth | printenv OPENAI_API_KEY | codex login --with-api-key |',
              '| Sandbox | --sandbox workspace-write |',
              '| Task found | ' + task_found + ' |',
              '| Status | ' + status + ' |',
              '| Codex exit | ' + exit_c + ' |',
              '| Commit SHA | ' + (sha or 'none') + ' |',
              '| Result | governance/codex/results/' + trace + '.json |',
              '',
              '**No issue #31 comments (BEM-522)**',
              '',
          ]
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
