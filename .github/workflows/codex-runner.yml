name: Codex Runner

# BEM-487: external ChatGPT → Deno → codex-runner contour
# BEM-488: YAML-safe rewrite
# BEM-495: runs-on [self-hosted, codex-local] — PRIMARY path for GPT-Codex
#
# Trigger: Deno /codex-task → workflow_dispatch
# Runner:  self-hosted with label codex-local (codex CLI required)
# Results: governance/codex/results/<trace_id>.json + .md
# NO issue comments, NO schedule

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: 'Trace ID (matches governance/codex/tasks/<trace_id>.json)'
        required: true
        type: string
      task_path:
        description: 'Override path to task JSON file'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  codex-runner:
    name: Codex Runner (self-hosted)
    runs-on: [self-hosted, codex-local]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Sync latest main
        shell: bash
        run: |
          git config user.email "codex-runner@ai-devops-system"
          git config user.name  "Codex Runner"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Verify codex CLI
        shell: bash
        run: |
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          if ! command -v codex &>/dev/null; then
            echo "CODEX_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "CODEX_VERSION=none"    >> "$GITHUB_ENV"
            echo "codex CLI not found on this runner"
          else
            VER=$(codex --version 2>/dev/null || echo "unknown")
            echo "CODEX_AVAILABLE=true"    >> "$GITHUB_ENV"
            echo "CODEX_VERSION=$VER"      >> "$GITHUB_ENV"
            echo "codex CLI found: $VER"
          fi

      - name: Read task file
        shell: bash
        env:
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_TASK_PATH: ${{ inputs.task_path }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          trace     = os.environ['INPUT_TRACE_ID']
          task_path = os.environ.get('INPUT_TASK_PATH') or ('governance/codex/tasks/' + trace + '.json')

          env_file = os.environ['GITHUB_ENV']
          p = Path(task_path)
          if not p.exists():
              print('Task file not found: ' + task_path)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=false\n')
                  f.write('TASK_TITLE=unknown\n')
                  f.write('TASK_OBJECTIVE=\n')
                  f.write('TASK_TYPE=unknown\n')
                  f.write('TRACE_ID=' + trace + '\n')
          else:
              task = json.loads(p.read_text())
              title     = task.get('title', 'untitled')
              objective = task.get('objective', '')
              task_type = task.get('task_type', 'unknown')
              print('Task found: ' + title)
              with open(env_file, 'a') as f:
                  f.write('TASK_FOUND=true\n')
                  f.write('TASK_TITLE=' + title + '\n')
                  f.write('TASK_OBJECTIVE=' + objective[:300].replace('\n', ' ') + '\n')
                  f.write('TASK_TYPE=' + task_type + '\n')
                  f.write('TRACE_ID=' + trace + '\n')
          PYEOF

      - name: Execute with Codex CLI
        if: env.CODEX_AVAILABLE == 'true' && env.TASK_FOUND == 'true'
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          set +e

          TRACE="$INPUT_TRACE_ID"
          OBJECTIVE="$TASK_OBJECTIVE"
          TITLE="$TASK_TITLE"

          # Build prompt for Codex
          PROMPT="BEM-CODEX-LOCAL | EXECUTOR
          TRACE_ID: $TRACE
          TASK: $TITLE
          OBJECTIVE: $OBJECTIVE

          Safety boundaries:
          - Do not edit secrets or tokens.
          - Do not write to issue #31 comments.
          - Write result only to:
            governance/codex/results/${TRACE}.md
            governance/codex/results/${TRACE}.json
          - Keep commits focused and minimal.

          Required output:
          - Create or update governance/codex/proofs/${TRACE}.txt with proof of execution.
          - Write result summary to governance/codex/results/${TRACE}.md.
          - Commit changed files."

          OUTPUT_FILE="$RUNNER_TEMP/codex_output_${TRACE}.txt"

          codex exec "$PROMPT" 2>&1 | tee "$OUTPUT_FILE"
          CODEX_EXIT=${PIPESTATUS[0]}

          echo "CODEX_EXIT=$CODEX_EXIT"     >> "$GITHUB_ENV"
          echo "OUTPUT_FILE=$OUTPUT_FILE"   >> "$GITHUB_ENV"

          if [ "$CODEX_EXIT" = "0" ]; then
            echo "CODEX_STATUS=completed" >> "$GITHUB_ENV"
          else
            echo "CODEX_STATUS=failed"    >> "$GITHUB_ENV"
          fi
          exit 0

      - name: Commit codex changes
        if: env.CODEX_AVAILABLE == 'true' && env.TASK_FOUND == 'true'
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          git add -A 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No codex changes to commit"
          else
            git commit -m "CODEX-LOCAL: trace=${{ inputs.trace_id }} status=$CODEX_STATUS"
            git push
          fi

      - name: Write result files
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now   = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace = os.environ.get('TRACE_ID') or os.environ['INPUT_TRACE_ID']

          task_found      = os.environ.get('TASK_FOUND', 'false') == 'true'
          codex_available = os.environ.get('CODEX_AVAILABLE', 'false') == 'true'
          codex_version   = os.environ.get('CODEX_VERSION', 'none')
          codex_exit      = os.environ.get('CODEX_EXIT', '')
          codex_status    = os.environ.get('CODEX_STATUS', '')

          # Determine status and blocker
          if not task_found:
              status  = 'blocked'
              blocker = {
                  'code':               'TASK_FILE_NOT_FOUND',
                  'message':            'Task file governance/codex/tasks/' + trace + '.json not found.',
                  'required_next_step': 'Create task file via POST /codex-task before running.'
              }
          elif not codex_available:
              status  = 'blocked'
              blocker = {
                  'code':               'CODEX_CLI_NOT_AVAILABLE',
                  'message':            'codex CLI not found on self-hosted runner.',
                  'required_next_step': 'Install codex CLI: npm install -g @openai/codex. See governance/codex/CODEX_LOCAL_RUNNER_SETUP.md.',
                  'runner_labels':      '[self-hosted, codex-local]'
              }
          elif codex_status == 'completed' or codex_exit == '0':
              status  = 'completed'
              blocker = None
          else:
              status  = 'failed'
              blocker = {'code': 'CODEX_EXEC_FAILED', 'message': 'codex exit=' + codex_exit}

          # Get changed files and commit SHA
          changed = []
          sha = None
          try:
              sha = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          except Exception:
              pass
          try:
              changed = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'], text=True
              ).strip().split('\n')
              changed = [f for f in changed if f]
          except Exception:
              pass

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'codex-local',
              'codex_version':  codex_version,
              'status':         status,
              'changed_files':  changed,
              'commit_sha':     sha,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Runner Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Executor | codex-local |',
              '| Codex version | ' + codex_version + ' |',
              '| Status | ' + status + ' |',
              '| Task found | ' + str(task_found) + ' |',
              '| Codex available | ' + str(codex_available) + ' |',
              '| Commit SHA | ' + (sha or 'none') + ' |',
              '| Changed files | ' + (', '.join(changed) or 'none') + ' |',
              '| Completed at | ' + now + ' |',
              '',
              '## Status: ' + status.upper(),
              '',
          ]
          if blocker:
              lines += ['### Blocker', '```json', json.dumps(blocker, indent=2), '```']
          else:
              lines.append('### No blocker - execution completed.')
          lines += [
              '',
              '## Notes',
              '- Runner: [self-hosted, codex-local]',
              '- No issue #31 comments (BEM-476/487/495)',
              '- Results: governance/codex/results/' + trace + '.json + .md',
          ]
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')
          print('Result written: status=' + status)
          PYEOF

      - name: Commit result files
        if: always()
        shell: bash
        run: |
          git add governance/codex/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new result changes"
          else
            git commit -m "CODEX-RUNNER: result trace=${{ inputs.trace_id }}"
            git push
          fi

      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
        run: |
          python3 - <<'PYEOF'
          import os

          trace     = os.environ.get('INPUT_TRACE_ID', '?')
          task_ok   = os.environ.get('TASK_FOUND', 'false')
          codex_ok  = os.environ.get('CODEX_AVAILABLE', 'false')
          codex_ver = os.environ.get('CODEX_VERSION', 'none')
          status    = os.environ.get('CODEX_STATUS', 'blocked')

          lines = [
              '## Codex Runner (self-hosted) - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Runner | [self-hosted, codex-local] |',
              '| Task found | ' + task_ok + ' |',
              '| Codex CLI available | ' + codex_ok + ' |',
              '| Codex version | ' + codex_ver + ' |',
              '| Status | ' + status + ' |',
              '| Result | governance/codex/results/' + trace + '.json |',
              '',
              '**No issue #31 comments written (BEM-495)**',
              '',
          ]
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
