name: BEM934 Apply Dynamic Live Validator and Dispatch

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Apply dynamic validator and dispatch real trace
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-dynamic@ai-devops-system"
          git config user.name "BEM-934 Dynamic Validator"
          python3 -m py_compile governance/runners/bem934_make_live_validation_dynamic.py
          python3 governance/runners/bem934_make_live_validation_dynamic.py
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/claude.yml')"
          grep -q "safe_trace" .github/workflows/claude.yml
          git add .github/workflows/claude.yml
          if ! git diff --cached --quiet; then
            git commit -m "Make BEM-934 live proof validation dynamic and trace-bound"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then break; fi
              git pull --rebase origin main
              if [ "$attempt" = "5" ]; then exit 1; fi
            done
          fi
          gh workflow run claude.yml --repo "$REPO" --ref main \
            -f role=curator \
            -f provider=claude_code \
            -f trace_id=tg_818730867_20260618T105741Z \
            -f cycle_id=bem934_live_operator_actual \
            -f task_type=live_content_analysis_repair \
            -f task='BEM-934 real operator Telegram live trace tg_818730867_20260618T105741Z. Read and verify governance/proofs/BEM932_provider_router_tg_818730867_20260618T105741Z.json. Create governance/proofs/BEM934_live_content_tg_818730867_20260618T105741Z.json. The JSON must have status=PASS, protocol=BEM-934, task_id=BEM934-LIVE-TEST, trace_id=tg_818730867_20260618T105741Z, provider_selected=claude_code, source_router_receipt=governance/proofs/BEM932_provider_router_tg_818730867_20260618T105741Z.json, exactly two verifiable idempotency invariants for Telegram delivery into WRK-C1, at least two validation_steps, at least two acceptance_checks each with result=PASS, and at least one limitation. Produce a content-bearing report for the operator. Do not modify ACTIVE_QUEUE, AGENT_CONTEXT, or SYSTEM_STATUS.'
