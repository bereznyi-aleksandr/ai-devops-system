name: BEM-934 Binding Failure API Inspector

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Inspect failure logs and write receipt through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RUN_ID: "27739114088"
          REPO: ${{ github.repository }}
          BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import io
          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          import zipfile
          from datetime import datetime, timezone

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]
          run_id = os.environ["TARGET_RUN_ID"]
          path = "governance/proofs/BEM934_binding_failure_log_inspection.json"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "bem934-binding-failure-api-inspector",
          }

          def request(url, method="GET", body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=90) as response:
                  return response.read(), response.status

          raw, _ = request(
              f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/logs"
          )

          selected = []
          with zipfile.ZipFile(io.BytesIO(raw)) as zf:
              for name in zf.namelist():
                  text = zf.read(name).decode("utf-8", errors="replace")
                  lines = text.splitlines()
                  errors = [
                      line for line in lines
                      if re.search(
                          r"error|traceback|exception|failed|no such file|syntaxerror|modulenotfound|exit code",
                          line,
                          re.I,
                      )
                  ]
                  if errors or "Materialize and exercise AUDITOR.pre" in text:
                      selected.append({
                          "name": name,
                          "line_count": len(lines),
                          "errors": errors[-120:],
                          "tail": lines[-220:],
                      })

          payload = {
              "status": "PASS" if selected else "BLOCKED",
              "protocol": "BEM-934",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "target_run_id": int(run_id),
              "selected_logs": selected,
              "missing": [] if selected else ["matching_log_files"],
          }
          if not selected:
              payload["blocker"] = "matching_log_files_not_found"

          content = base64.b64encode(
              (json.dumps(payload, ensure_ascii=False, indent=2) + "\n").encode("utf-8")
          ).decode("ascii")

          encoded_path = urllib.parse.quote(path, safe="/")
          url = f"https://api.github.com/repos/{repo}/contents/{encoded_path}"
          sha = None
          try:
              existing_raw, _ = request(url + f"?ref={branch}")
              sha = json.loads(existing_raw.decode("utf-8")).get("sha")
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          body = {
              "message": "Inspect BEM-934 V2 binding failure logs",
              "content": content,
              "branch": branch,
          }
          if sha:
              body["sha"] = sha
          request(url, method="PUT", body=body)
          PY
