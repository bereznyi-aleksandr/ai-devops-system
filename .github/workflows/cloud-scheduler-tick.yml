name: Cloud Scheduler Tick

on:
  workflow_dispatch:
  schedule:
    - cron: '5-59/10 * * * *'

permissions:
  contents: write

jobs:
  cloud-tick:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main
        run: |
          git config user.email "cloud-scheduler@ai-devops-system"
          git config user.name "Cloud Scheduler"
          git pull --rebase origin main

      - name: Run Cloud Scheduler Tick
        run: |
          python3 governance/cloud_scheduler_tick.py

      - name: Commit state changes
        run: |
          git add governance/schedulers/cloud/ governance/exchange.jsonl
          git diff --cached --quiet || git commit -m "CLOUD SCHEDULER TICK: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
