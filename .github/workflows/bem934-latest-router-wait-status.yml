name: BEM934 Latest Router Wait Status

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Capture wait-workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          git config user.email "bem934-status-monitor@ai-devops-system"
          git config user.name "BEM-934 Status Monitor"
          mkdir -p governance/proofs
          gh run list --repo "$GITHUB_REPOSITORY" --workflow bem934-wait-latest-real-router-and-dispatch-claude.yml --limit 5 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url > /tmp/runs.json
          jq '{task_id:"BEM934-LIVE-TEST", workflow:"bem934-wait-latest-real-router-and-dispatch-claude.yml", runs:.}' /tmp/runs.json > governance/proofs/BEM934_latest_router_wait_status.json
          git add governance/proofs/BEM934_latest_router_wait_status.json
          git commit -m "Capture BEM-934 latest router wait status" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
