name: BEM934 Wait Claude Semantic Result

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  wait:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for Claude and capture semantic evidence
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          TRACE: tg_934432449_20260618T102008Z
        run: |
          set -euo pipefail
          gh auth setup-git
          TARGET=""
          for attempt in $(seq 1 60); do
            TARGET="$(gh run list --repo "$REPO" --workflow claude.yml --limit 20 --json databaseId,createdAt,status,conclusion --jq '[.[] | select(.createdAt >= "2026-06-18T10:52:40Z")][0].databaseId // empty')"
            if [ -n "$TARGET" ]; then
              STATUS="$(gh run view "$TARGET" --repo "$REPO" --json status --jq .status)"
              if [ "$STATUS" = "completed" ]; then
                break
              fi
            fi
            sleep 10
          done
          test -n "$TARGET"
          gh run view "$TARGET" --repo "$REPO" --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url > /tmp/run.json
          gh repo clone "$REPO" repo
          cd repo
          git pull --rebase origin main
          git config user.email "bem934-wait@ai-devops-system"
          git config user.name "BEM-934 Wait"
          mkdir -p governance/proofs
          python3 -c 'import json,os; from pathlib import Path; trace=os.environ["TRACE"]; lines=[]; p=Path("governance/transport/results.jsonl"); 
for line in p.read_text(errors="replace").splitlines():
    if trace in line:
        try: lines.append(json.loads(line))
        except Exception: pass
out={"task_id":"BEM934-LIVE-TEST","trace_id":trace,"run":json.load(open("/tmp/run.json")),"matching_transport_records":lines[-10:]}; Path("governance/proofs/BEM934_semantic_result_monitor.json").write_text(json.dumps(out,ensure_ascii=False,indent=2)+"\n")'
          git add governance/proofs/BEM934_semantic_result_monitor.json
          git commit -m "Capture BEM-934 Claude semantic result" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
