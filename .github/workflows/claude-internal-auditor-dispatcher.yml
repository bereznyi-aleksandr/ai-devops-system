name: Claude Internal Auditor Dispatcher

# BEM-870: reconfigured claude-code-action@v1
# - anthropic_api_key via with: (required for v1 automation mode)
# - prompt via with: (automation mode trigger)
# - allowed_tools to read/write files
# - no CLAUDE_CODE_OAUTH_TOKEN needed when using API key

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  id-token: write

concurrency:
  group: claude-internal-auditor-dispatcher
  cancel-in-progress: false

jobs:
  claude-internal-auditor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record dispatcher start
        run: python3 scripts/record_claude_dispatcher_state.py start dispatcher_started

      - name: Claude internal auditor responds to mailbox
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are Claude Internal Auditor for repository bereznyi-aleksandr/ai-devops-system.

            TASK:
            1. Read the newest file in governance/audit_mailbox/gpt_to_claude/ directory
            2. Write a response file to governance/audit_mailbox/claude_to_gpt/ directory

            RESPONSE FILE REQUIREMENTS:
            - Filename: same as input file but with _claude_response suffix
            - First line must be exactly: CLAUDE RESPONSE
            - Include a line: DECISION: APPROVED or DECISION: CHANGE_REQUIRED or DECISION: BLOCKED
            - Provide your analysis and reasoning in Russian or English

            STRICT RULES:
            - Do NOT write issue comments
            - Do NOT write to issue #31
            - Do NOT expose secrets
            - Only read/write files in governance/ directory

      - name: Record dispatcher complete
        if: always()
        run: python3 scripts/record_claude_dispatcher_state.py complete ${{ steps.claude.outcome }}

      - name: Ensure Claude response or explicit failure
        if: always()
        run: python3 scripts/ensure_claude_response_or_failure.py

      - name: Commit dispatcher state and mailbox
        if: always()
        run: bash scripts/commit_claude_dispatcher_state.sh
