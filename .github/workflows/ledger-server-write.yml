name: ledger-server-write

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      payload_json:
        description: 'Machine-readable event payload as JSON'
        required: true
        type: string

jobs:
  ledger_server_write:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        contains(github.event.comment.body, 'ledger-write-request')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare server-side write contour
        run: |
          mkdir -p .tmp
          echo "Workflow execution layer upgraded for issue/comment-triggered server-side ledger write contour."
          echo "Proof-run remains out of scope for executor-layer build steps."
      - name: Validate ledger writer presence
        run: |
          test -f governance/ledger_writer.py
          python3 -m py_compile governance/ledger_writer.py

      - name: Configure git identity for server-side writer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build payload from ingress
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          DISPATCH_PAYLOAD_JSON: ${{ inputs.payload_json }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              'schema_version',
              'event_id',
              'parent_event_id',
              'task_id',
              'event_time',
              'step_name',
              'actor_role',
              'event_type',
              'description',
              'status',
              'next_actor_role',
              'next_expected_event',
              'routing_decision_basis',
          ]

          if os.environ.get('GITHUB_EVENT_NAME') == 'workflow_dispatch':
              raw = os.environ.get('DISPATCH_PAYLOAD_JSON', '').strip()
              if not raw:
                  raise SystemExit('Missing payload_json for workflow_dispatch')
              payload = json.loads(raw)
          else:
              body = os.environ.get('COMMENT_BODY', '')
              payload = {}
              for line in body.splitlines():
                  line = line.strip()
                  if not line or line == 'ledger-write-request':
                      continue
                  if '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  payload[key.strip()] = value.strip()

          missing = [key for key in required if key not in payload]
          if missing:
              raise SystemExit(f"Missing payload fields from ingress: {', '.join(missing)}")

          payload['commit_sha'] = ''
          out = Path('.tmp/p0_task_proposed_payload.json')
          out.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(f'PAYLOAD_FILE={out.as_posix()}')
          PY
      - name: Materialize P0.1 executor artifact
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          payload = json.loads(Path('.tmp/p0_task_proposed_payload.json').read_text(encoding='utf-8'))
          if not (
              payload.get('step_name') == 'P0.1' and
              payload.get('actor_role') == 'EXECUTOR' and
              payload.get('event_type') == 'ACTION_EXECUTION_REQUEST'
          ):
              print('NO_EXECUTOR_ACTION_FOR_EVENT')
              raise SystemExit(0)

          target = Path('governance/action_registry.json')
          target.parent.mkdir(parents=True, exist_ok=True)
          content = {
              'schema_version': 'v153-p0',
              'registry_name': 'action_registry',
              'actions': [
                  {
                      'action_id': 'P0.1',
                      'action_name': 'create_action_registry',
                      'phase': 'P0',
                      'description': 'Create governance/action_registry.json in the repository as the machine-readable unified action dictionary bootstrap artifact.',
                      'status': 'DEFINED',
                  }
              ],
          }
          target.write_text(json.dumps(content, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          subprocess.run(['git', 'add', 'governance/action_registry.json'], check=True)
          staged = subprocess.run(['git', 'diff', '--cached', '--name-only'], text=True, capture_output=True, check=True).stdout.strip()
          if 'governance/action_registry.json' not in staged:
              raise SystemExit('action_registry not staged for commit')
          subprocess.run(['git', 'commit', '-m', 'Create action registry for P0.1'], check=True)
          artifact_commit_sha = subprocess.run(['git', 'rev-parse', 'HEAD'], text=True, capture_output=True, check=True).stdout.strip()
          Path('.tmp/action_registry_commit_sha.txt').write_text(artifact_commit_sha + '\n', encoding='utf-8')
          print(f'ACTION_REGISTRY_COMMIT_SHA={artifact_commit_sha}')
          PY
      - name: Execute ledger writer
        run: |
          python3 governance/ledger_writer.py \
            --payload-file .tmp/p0_task_proposed_payload.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Update exchange ledger" \
            --binding-commit-message "Bind commit sha in ledger row" \
            | tee .tmp/ledger_writer_output.txt

      - name: Capture writer outputs
        run: |
          grep '^EVENT_ID=' .tmp/ledger_writer_output.txt
          grep '^TASK_ID=' .tmp/ledger_writer_output.txt
          grep '^EVENT_COMMIT_SHA=' .tmp/ledger_writer_output.txt
          grep '^BINDING_COMMIT_SHA=' .tmp/ledger_writer_output.txt

      - name: Push server-side repo write
        run: |
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "Governance decision is not made here."
          echo "This workflow accepts issue_comment and workflow_dispatch ingress."
          echo "workflow_dispatch.payload_json is available for auditor closure-events."
          echo "Proof-run remains a separate next step."
