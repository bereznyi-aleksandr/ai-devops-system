name: Executor Runner

on:
  push:
    branches: [main]
    paths: ['governance/current_task.json']
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID'
        required: false
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GitHub PAT from Secret Manager
        id: get_pat
        run: |
          PAT=$(gcloud secrets versions access latest \
            --secret="GITHUB_TOKEN" \
            --project="barber-483016" | tr -d '\r\n')
          echo "::add-mask::$PAT"
          printf 'pat=%s\n' "$PAT" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve task context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TASK_ID: ${{ github.event.inputs.task_id }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          event_name = (os.environ.get('EVENT_NAME') or '').strip()
          input_task_id = (os.environ.get('INPUT_TASK_ID') or '').strip()
          resolved_task_id = ''
          current_status = ''
          should_execute = False
          skip_reason = ''

          if event_name == 'push':
              p = Path('governance/current_task.json')
              if not p.exists():
                  skip_reason = 'skip: governance/current_task.json missing'
              else:
                  ct = json.loads(p.read_text(encoding='utf-8'))
                  resolved_task_id = str(ct.get('task_id', '')).strip()
                  current_status = str(ct.get('status', '')).strip()
                  if not resolved_task_id:
                      skip_reason = 'skip: no task_id in current_task.json'
                  elif current_status not in {'APPROVED', 'RETRY_REQUIRED'}:
                      skip_reason = f'skip: status={current_status} not APPROVED/RETRY_REQUIRED'
                  else:
                      should_execute = True
          elif event_name == 'workflow_dispatch':
              resolved_task_id = input_task_id
              if not resolved_task_id:
                  skip_reason = 'skip: no task_id in workflow_dispatch'
              else:
                  should_execute = True
          else:
              skip_reason = f'skip: unsupported event={event_name}'

          out = Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a', encoding='utf-8') as f:
              f.write(f'task_id={resolved_task_id}\n')
              f.write(f'current_status={current_status}\n')
              f.write(f"should_execute={'true' if should_execute else 'false'}\n")
              f.write(f'skip_reason={skip_reason}\n')

          if not should_execute:
              print(skip_reason)
              raise SystemExit(0)

          tf = Path(f'governance/tasks/{resolved_task_id}.json')
          task = json.loads(tf.read_text(encoding='utf-8')) if tf.exists() else {"task_id": resolved_task_id}
          ledger = Path('governance/exchange_ledger.csv')
          tail = '\n'.join(ledger.read_text(encoding='utf-8').strip().splitlines()[-5:]) if ledger.exists() else ''
          ctx = {
              "event_name": event_name,
              "task_id": resolved_task_id,
              "current_status": current_status,
              "task": task,
              "ledger_tail": tail
          }
          Path('.tmp').mkdir(exist_ok=True)
          Path('.tmp/executor_context.json').write_text(
              json.dumps(ctx, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('CONTEXT_READY=true')
          PY

      - name: Show skip reason
        if: steps.context.outputs.should_execute != 'true'
        run: echo "${{ steps.context.outputs.skip_reason }}"

      - name: Resolve controlled mutation policy
        if: steps.context.outputs.should_execute == 'true'
        id: mutation_policy
        run: |
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path

          fixed_allowlist = [
              'governance/current_task.json',
              'ssot/MASTER_PROMPT_v162_CANON_FINAL.txt',
          ]
          allowlist_set = set(fixed_allowlist)

          context = json.loads(Path('.tmp/executor_context.json').read_text(encoding='utf-8'))
          task = context.get('task', {})
          task_id = str(task.get('task_id', context.get('task_id', ''))).strip()
          step_name = str(task.get('step_name', '')).strip()
          requested_targets = task.get('allowed_target_files') or task.get('target_files') or []
          if requested_targets and not isinstance(requested_targets, list):
              print('VALIDATION_FAILED: requested target files must be a list', file=sys.stderr)
              sys.exit(1)

          is_controlled_mutation_task = bool(requested_targets) or step_name == 'P2.6-CORRECTIVE'
          if requested_targets:
              unsupported = sorted(set(requested_targets) - allowlist_set)
              if unsupported:
                  print(f'VALIDATION_FAILED: target files outside allowlist: {unsupported}', file=sys.stderr)
                  sys.exit(1)

          mutation_apply = False

          out = Path(os.environ['GITHUB_OUTPUT'])
          with out.open('a', encoding='utf-8') as f:
              f.write(f"controlled_mutation_task={'true' if is_controlled_mutation_task else 'false'}\n")
              f.write(f"mutation_apply={'true' if mutation_apply else 'false'}\n")
              f.write('allowlist=governance/current_task.json,ssot/MASTER_PROMPT_v162_CANON_FINAL.txt\n')
              f.write(f'task_id={task_id}\n')

          Path('.tmp/mutation_policy.json').write_text(
              json.dumps({
                  'task_id': task_id,
                  'step_name': step_name,
                  'controlled_mutation_task': is_controlled_mutation_task,
                  'mutation_apply': mutation_apply,
                  'allowlist': fixed_allowlist,
                  'requested_targets': requested_targets,
                  'guardrails': [
                      'allowlist only for governance/current_task.json and ssot/MASTER_PROMPT_v162_CANON_FINAL.txt',
                      'hard reject for targets outside allowlist',
                      'no arbitrary free-form repo mutation',
                      'no audit decisions in executor',
                      'TASK-P2-0007 must not execute TASK-P2-0006 payload changes'
                  ]
              }, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('CONTROLLED_MUTATION_POLICY=READY')
          PY

      - name: Guardrail summary
        if: steps.context.outputs.should_execute == 'true'
        run: |
          cat .tmp/mutation_policy.json
          echo "Executor supports controlled mutation allowlist only for governance/current_task.json and ssot/MASTER_PROMPT_v162_CANON_FINAL.txt."
          echo "Executor must not execute arbitrary free-form repo mutation."
          echo "Executor must not take audit decisions."

      - name: Apply controlled mutation for approved tasks
        if: steps.context.outputs.should_execute == 'true' && steps.mutation_policy.outputs.mutation_apply == 'true'
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          context = json.loads(Path('.tmp/executor_context.json').read_text(encoding='utf-8'))

          if context.get('task_id') == 'TASK-P2-0007':
              print('VALIDATION_FAILED: TASK-P2-0007 must not execute TASK-P2-0006 mutations', file=sys.stderr)
              sys.exit(1)

          print('NO_MUTATION_APPLIED')
          PY

      - name: Run Claude API as Cloud Code
        if: steps.context.outputs.should_execute == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_ID: ${{ steps.context.outputs.task_id }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path

          api_key = os.environ['ANTHROPIC_API_KEY']
          task_id = os.environ['TASK_ID']
          model = os.getenv('LLM_MODEL') or 'claude-sonnet-4-20250514'
          context = json.loads(Path('.tmp/executor_context.json').read_text(encoding='utf-8'))
          mutation_policy = json.loads(Path('.tmp/mutation_policy.json').read_text(encoding='utf-8'))
          context['mutation_policy'] = mutation_policy

          system_prompt = """You are CLOUD_CODE in an autonomous multi-agent DevOps system.
          SSOT: MASTER_PROMPT_v162_CANON_FINAL
          Respond ONLY with valid JSON. No preamble. No markdown.
          Required fields: schema_version(v162), event_id, parent_event_id, task_id,
          event_time, step_name, actor_role(CLOUD_CODE), event_type, description,
          status, next_actor_role, next_expected_event, routing_decision_basis, commit_sha"""

          payload = {
              "model": model,
              "max_tokens": 2000,
              "system": system_prompt,
              "messages": [{"role": "user", "content": f"Context: {json.dumps(context, ensure_ascii=False)}"}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01'
              }
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())

          Path('.tmp/executor_raw_output.txt').write_text(
              result['content'][0]['text'].strip(),
              encoding='utf-8'
          )
          PY

      - name: Validate LLM output schema
        if: steps.context.outputs.should_execute == 'true'
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          required = ['schema_version','event_id','parent_event_id','task_id','event_time',
                      'step_name','actor_role','event_type','description','status',
                      'next_actor_role','next_expected_event','routing_decision_basis','commit_sha']
          allowed_types = {'TASK_PROPOSED','PRE_ACTION_APPROVED','PRE_ACTION_REJECTED',
                           'ACTION_EXECUTION_REQUEST','ACTION_COMPLETED','RESULT_ACCEPTED',
                           'RESULT_REJECTED','TASK_CLOSED','EMERGENCY_BLOCKED','VALIDATION_FAILED'}
          allowed_roles = {'ANALYST','AUDITOR','CLOUD_CODE','OPERATOR',
                           'LEDGER_WRITER','LEDGER_ROUTER','NONE'}

          raw = Path('.tmp/executor_raw_output.txt').read_text(encoding='utf-8')
          try:
              p = json.loads(raw)
          except Exception as e:
              print(f'VALIDATION_FAILED: {e}', file=sys.stderr)
              sys.exit(1)

          missing = [f for f in required if f not in p]
          if missing:
              print(f'VALIDATION_FAILED: missing {missing}', file=sys.stderr)
              sys.exit(1)
          if p['schema_version'] != 'v162':
              print('VALIDATION_FAILED: wrong schema_version', file=sys.stderr)
              sys.exit(1)
          if p['actor_role'] != 'CLOUD_CODE':
              print('VALIDATION_FAILED: actor_role must be CLOUD_CODE', file=sys.stderr)
              sys.exit(1)
          if p['event_type'] not in allowed_types:
              print('VALIDATION_FAILED: invalid event_type', file=sys.stderr)
              sys.exit(1)
          if p['next_actor_role'] not in allowed_roles:
              print('VALIDATION_FAILED: invalid next_actor_role', file=sys.stderr)
              sys.exit(1)

          Path('.tmp/executor_validated_output.json').write_text(
              json.dumps(p, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('SCHEMA_VALIDATION=PASSED')
          PY

      - name: Write to ledger
        if: steps.context.outputs.should_execute == 'true'
        run: |
          python3 governance/ledger_writer.py \
            --payload-file .tmp/executor_validated_output.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Cloud Code: execution result" \
            --binding-commit-message "Cloud Code: bind sha" \
            | tee .tmp/writer_output.txt

      - name: Push ledger
        if: steps.context.outputs.should_execute == 'true'
        run: git push origin HEAD:main

      - name: Dispatch ledger-updated
        if: steps.context.outputs.should_execute == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RESOLVED_TASK_ID: ${{ steps.context.outputs.task_id }}
        run: |
          NEXT_ROLE=$(python3 -c "
          import csv
          with open('governance/exchange_ledger.csv') as f:
              print(list(csv.DictReader(f))[-1]['next_actor_role'])
          ")
          LAST_EVENT=$(python3 -c "
          import csv
          with open('governance/exchange_ledger.csv') as f:
              print(list(csv.DictReader(f))[-1]['event_id'])
          ")
          gh api repos/bereznyi-aleksandr/ai-devops-system/dispatches \
            --method POST \
            -f event_type=ledger-updated \
            -f client_payload[next_actor_role]="$NEXT_ROLE" \
            -f client_payload[task_id]="$RESOLVED_TASK_ID" \
            -f client_payload[event_id]="$LAST_EVENT"

      - name: Cleanup
        if: always()
        run: rm -rf .tmp

      - name: Guardrail
        run: |
          echo "Executor writes execution events only. No audit decisions here."
          echo "Controlled mutation path is allowlisted to governance/current_task.json and ssot/MASTER_PROMPT_v162_CANON_FINAL.txt only."
          echo "TASK-P2-0007 does not execute TASK-P2-0006 mutations."
