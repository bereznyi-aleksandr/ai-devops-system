name: Claude Code Agent

on:
  push:
    paths:
      - 'TASK.md'
  issues:
    types: [labeled]

jobs:
  run-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Authenticate to GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | gcloud auth activate-service-account --key-file=-
          gcloud config set project barber-483016

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            printf '%s' "$ISSUE_BODY" > /tmp/task.txt
          else
            cp TASK.md /tmp/task.txt
          fi
          claude --dangerously-skip-permissions -p "$(cat /tmp/task.txt). После выполнения обнови PROGRESS.md записью о результате."

      - name: Commit results
        run: |
          git config user.name "Claude Code Agent"
          git config user.email "agent@claude.ai"
          git add -A
          git diff --staged --quiet || git commit -m "Agent: task completed"
          git fetch origin main
          git rebase -X ours origin/main
          git push origin main
