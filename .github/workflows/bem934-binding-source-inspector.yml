name: BEM-934 Binding Source Inspector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compile binding sources and publish receipt
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import traceback
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          branch = os.environ["BRANCH"]
          files = [
              "governance/runners/bem931_runner_lib.py",
              "governance/runners/auditor_stage_runner.py",
              "governance/runners/bem934_object_binding_materializer.py",
          ]
          receipt_path = "governance/proofs/BEM934_binding_source_inspection.json"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "bem934-binding-source-inspector",
          }

          def request(url, method="GET", body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=90) as response:
                  return response.read()

          checks = {}
          for path in files:
              encoded = urllib.parse.quote(path, safe="/")
              raw = request(
                  f"https://api.github.com/repos/{repo}/contents/{encoded}?ref={branch}"
              )
              meta = json.loads(raw.decode("utf-8"))
              source_bytes = base64.b64decode(meta["content"])
              item = {
                  "sha": meta.get("sha"),
                  "size": len(source_bytes),
                  "nul_bytes": source_bytes.count(b"\\x00"),
                  "compile": False,
              }
              try:
                  source = source_bytes.decode("utf-8")
                  compile(source, path, "exec")
                  item["compile"] = True
              except Exception as exc:
                  item["error_type"] = type(exc).__name__
                  item["error_message"] = str(exc)
                  item["traceback"] = traceback.format_exc()[-4000:]
              checks[path] = item

          status = "PASS" if all(
              item["compile"] and item["nul_bytes"] == 0 for item in checks.values()
          ) else "BLOCKED"
          payload = {
              "status": status,
              "protocol": "BEM-934",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "checks": checks,
              "missing": [
                  path
                  for path, item in checks.items()
                  if not item["compile"] or item["nul_bytes"] != 0
              ],
          }
          if status != "PASS":
              payload["blocker"] = "binding_source_compile_or_nul_failure"

          content = base64.b64encode(
              (json.dumps(payload, ensure_ascii=False, indent=2) + "\n").encode("utf-8")
          ).decode("ascii")
          encoded_path = urllib.parse.quote(receipt_path, safe="/")
          url = f"https://api.github.com/repos/{repo}/contents/{encoded_path}"
          sha = None
          try:
              existing = json.loads(request(url + f"?ref={branch}").decode("utf-8"))
              sha = existing.get("sha")
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          body = {
              "message": "Inspect BEM-934 binding sources",
              "content": content,
              "branch": branch,
          }
          if sha:
              body["sha"] = sha
          request(url, method="PUT", body=body)
          PY
