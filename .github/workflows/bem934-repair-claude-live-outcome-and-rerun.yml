name: BEM934 Repair Claude Live Outcome and Rerun

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repair claude.yml and dispatch semantic rerun
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-repair@ai-devops-system"
          git config user.name "BEM-934 Repair"
          python3 -m py_compile governance/runners/bem934_fix_claude_live_outcome.py
          python3 governance/runners/bem934_fix_claude_live_outcome.py
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/claude.yml')"
          grep -q "BEM-934 live semantic proof validation" .github/workflows/claude.yml
          grep -q "TASK_TYPE:" .github/workflows/claude.yml
          git add .github/workflows/claude.yml
          if ! git diff --cached --quiet; then
            git commit -m "Fix Claude live semantic outcome with strict proof validation"
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                break
              fi
              git pull --rebase origin main
              if [ "$attempt" = "5" ]; then
                exit 1
              fi
            done
          fi
          gh workflow run claude.yml --repo "$REPO" --ref main             -f role=curator             -f provider=claude_code             -f trace_id=tg_934432449_20260618T102008Z             -f cycle_id=bem934_live_test_repair_final             -f task_type=live_content_analysis_repair             -f task='BEM-934 final semantic verification for existing live trace tg_934432449_20260618T102008Z. Verify governance/proofs/BEM934_live_content_tg_934432449.json and its source router receipt. Preserve the proof if valid. Produce a content-bearing Claude report and transport result with semantic status completed, provider claude, no blocker. Do not alter ACTIVE_QUEUE, AGENT_CONTEXT, or SYSTEM_STATUS.'
