name: BEM-948 Claude Credentials Preflight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem948-claude-credentials-preflight.yml'
      - 'governance/state/bem948_claude_credentials_preflight_trigger.json'

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate credential presence without disclosure
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs governance/reports
          export CLAUDE_OAUTH_PRESENT=false
          export PAT_PRESENT=false
          if [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then export CLAUDE_OAUTH_PRESENT=true; fi
          if [ -n "${AI_SYSTEM_GITHUB_PAT:-}" ]; then export PAT_PRESENT=true; fi
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          claude_present = os.environ.get("CLAUDE_OAUTH_PRESENT") == "true"
          pat_present = os.environ.get("PAT_PRESENT") == "true"
          blockers = []
          if not claude_present:
              blockers.append("claude_code_oauth_token_missing")
          if not pat_present:
              blockers.append("ai_system_github_pat_missing")
          receipt = {
              "status": "PASS" if not blockers else "BLOCKED_REPAIRING",
              "protocol": "BEM-948",
              "task_id": "BEM948-P0-CLAUDE-CREDENTIALS-PREFLIGHT",
              "created_at": now,
              "checks": {
                  "claude_code_oauth_token_present": claude_present,
                  "ai_system_github_pat_present": pat_present,
                  "secret_values_disclosed": False,
                  "sha_type_explicit": True,
              },
              "blockers": blockers,
              "next_task": (
                  "BEM948-P0-REPAIR-CLAUDE-OAUTH-CREDENTIAL"
                  if not claude_present
                  else "BEM948-P0-OBSERVE-CLAUDE-ACTION-LOG"
              ),
          }
          Path("governance/proofs/BEM948_claude_credentials_preflight_receipt.json").write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          Path("governance/reports/bem948_p0_claude_credentials_preflight.md").write_text(
              "\n".join([
                  "# BEM-948 Claude credentials preflight",
                  "",
                  f"Claude OAuth secret present: `{claude_present}`",
                  f"GitHub PAT secret present: `{pat_present}`",
                  "Secret values were not read or written.",
                  "",
                  "Result: `" + receipt["status"] + "`",
              ]) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit preflight evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-948 Preflight"
          git config user.email "bem948-preflight@ai-devops-system"
          git add governance/proofs/BEM948_claude_credentials_preflight_receipt.json governance/reports/bem948_p0_claude_credentials_preflight.md
          if git diff --cached --quiet; then
            echo "No preflight evidence changes"
          else
            git commit -m "BEM-948: record Claude credentials preflight"
            git push
          fi
