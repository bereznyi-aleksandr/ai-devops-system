name: Operator Reply Intake
# BEM-848: push disabled
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: operator-reply-intake
  cancel-in-progress: false
jobs:
  intake-operator-reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Syntax check reply intake
        run: python3 -m py_compile scripts/operator_reply_intake.py
      - name: Fetch Telegram webhook info and updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mkdir -p governance/tmp
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "not_sent_missing_secret" > governance/tmp/operator_reply_status.txt
            echo "not_sent_missing_secret" > governance/tmp/operator_reply_webhook_status.txt
            echo '{"ok":false,"result":[]}' > governance/tmp/operator_reply_updates.json
            echo '{"ok":false,"result":{}}' > governance/tmp/operator_reply_webhook_info.json
          else
            WH_CODE=$(curl -sS -o governance/tmp/operator_reply_webhook_info.json -w "%{http_code}" "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" || echo "000")
            echo "$WH_CODE" > governance/tmp/operator_reply_webhook_status.txt
            UP_CODE=$(curl -sS -o governance/tmp/operator_reply_updates.json -w "%{http_code}" "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates" || echo "000")
            echo "$UP_CODE" > governance/tmp/operator_reply_status.txt
          fi
      - name: Parse and record operator reply
        run: python3 scripts/operator_reply_intake.py
      - name: Commit intake result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/state/operator_reply_intake_state.json governance/operator_decisions governance/tasks/pending governance/reports/operator_reply_intake_result.md
          git diff --cached --quiet && echo "No changes" || git commit -m "BEM-609 conflict-safe workflow result"
          git pull --rebase --autostash origin main || true
          git push || true
