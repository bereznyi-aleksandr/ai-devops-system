name: BEM950 T4 Queue Reclassify and Provider Scan

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bem950-t4-queue-reclassify
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Reclassify P4 and scan active provider references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          QUEUE = Path("governance/roadmap/ACTIVE_QUEUE.json")
          T4_RECEIPT = Path("governance/proofs/BEM950_t4_queue_reclassify_receipt.json")
          SCAN_RECEIPT = Path("governance/proofs/BEM950_provider_reference_scan_receipt.json")

          def now():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def git_blob_sha(data: bytes) -> str:
              return hashlib.sha1(
                  b"blob " + str(len(data)).encode("ascii") + b"\0" + data
              ).hexdigest()

          def git_path_sha(path: str) -> str:
              return subprocess.check_output(
                  ["git", "rev-parse", f"HEAD:{path}"], text=True
              ).strip()

          def write_json(path: Path, data: dict) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(
                  json.dumps(data, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          queue_sha_before = git_path_sha(str(QUEUE))
          queue = json.loads(QUEUE.read_text(encoding="utf-8"))
          tasks = queue.get("tasks")
          if not isinstance(tasks, list):
              raise ValueError("ACTIVE_QUEUE.tasks must be a list")

          by_id = {
              task.get("id"): task
              for task in tasks
              if isinstance(task, dict) and isinstance(task.get("id"), str)}
          }

          required = {
              "BEM950-T1-INVALID-WORKFLOW-ARCHIVE": "governance/proofs/BEM950_t1_workflow_archive_receipt.json",
              "BEM950-T2-PROVIDER-CONFIG-RECLASSIFY": "governance/proofs/BEM950_t2_provider_config_receipt.json",
              "BEM950-T3-RUNNER-FIX-AND-P4-SKIP-LOGIC": "governance/proofs/BEM950_t3_runner_fix_receipt.json",
              "BEM950-T4-ACTIVE-QUEUE-P4-RECLASSIFY": str(T4_RECEIPT),
              "BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN": str(SCAN_RECEIPT),
          }
          missing = [task_id for task_id in required if task_id not in by_id]
          if missing:
              raise ValueError(f"missing BEM-950 task(s): {missing}")

          timestamp = now()
          for task_id, receipt_path in list(required.items())[:3]:
              receipt = Path(receipt_path)
              receipt_data = json.loads(receipt.read_text(encoding="utf-8"))
              if receipt_data.get("status") != "PASS":
                  raise ValueError(f"{task_id} receipt is not PASS")
              by_id[task_id].update(
                  status="DONE",
                  completed_at=timestamp,
                  receipt_sha=git_path_sha(receipt_path),
                  receipt_sha_type="git_blob",
              )

          p4 = by_id["BEM949-P4-LIVE-LLM-FALLBACK"]
          p4.update(
              status="SKIPPED_BY_OPERATOR",
              classification="SUPERSEDED_BY_BEM950_PROVIDER_POLICY",
              skipped_at="2026-06-27T06:25:00Z",
              skip_reason=(
                  "P4 tested OpenAI Responses API via OPENAI_API_KEY — billing class "
                  "metered_api_default is permanently prohibited by operator cost policy. "
                  "GPT as a provider class is not permanently deprecated; reactivation via "
                  "a non-metered adapter is architecturally planned under BEM-950."
              ),
              operator_decision="PAID_API_BILLING_CLASS_PROHIBITED",
              note=(
                  "SKIPPED_BY_OPERATOR is acknowledged by "
                  "bem949_release_audit_runner.py as non-blocking only for this allowlisted "
                  "task. It does not establish a broad release PASS."
              ),
          )

          policy = queue.setdefault("paid_api_policy", {})
          if not isinstance(policy, dict):
              raise ValueError("paid_api_policy must be an object")
          policy.update(
              openai_api_key="PERMANENTLY_PROHIBITED",
              automatic_paid_fallback="PERMANENTLY_PROHIBITED",
              violation_action="BLOCKED_COST_POLICY",
              scope_clarification=(
                  "Prohibition covers billing_class=metered_api_default and "
                  "automatic_paid_fallback only. GPT provider-class reactivation via a "
                  "verified subscription, OAuth, or interactive adapter remains "
                  "architecturally valid under BEM-950."
              ),
          )

          t4 = by_id["BEM950-T4-ACTIVE-QUEUE-P4-RECLASSIFY"]
          t4.update(
              status="DONE",
              completed_at=timestamp,
              classification="SUPERSEDED_BY_BEM950_PROVIDER_POLICY",
              queue_sha_before=queue_sha_before,
              queue_sha_type="git_blob",
          )

          # The BEM-949 progress counter is intentionally left untouched until P7.
          queue.update(
              current_task="BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN",
              queue_state="PENDING",
              system_status="BEM950_PROVIDER_REFERENCE_SCAN_PENDING",
              updated_at=timestamp,
              next_action=(
                  "Execute the BEM950 post-T4 repository-wide provider-reference scan. "
                  "Do not dispatch P7 until the scan receipt is PASS."
              ),
          )
          write_json(QUEUE, queue)
          queue_sha_after = git_blob_sha(QUEUE.read_bytes())

          t4_receipt = {
              "schema_version": 1,
              "task_id": "BEM950-T4-ACTIVE-QUEUE-P4-RECLASSIFY",
              "created_at": timestamp,
              "status": "PASS",
              "queue_path": str(QUEUE)
              "queue_sha_before": queue_sha_before,
              "queue_sha_after": queue_sha_after,
              "sha_type": "git_blob",
              "p4_status": "SKIPPED_BY_OPERATOR",
              "p4_classification": "SUPERSEDED_BY_BEM950_PROVIDER_POLICY",
              "progress_changed": False,
              "policy_scope_clarification": policy["scope_clarification"],
          }
          write_json(T4_RECEIPT, t4_receipt)

          terms = (
              "OPENAI_API_KEY",
              "OPENAI_MODEL",
              "api.openai.com",
              "gpt_codex_cloud",
          )
          workflow_root = Path(".github/workflows")
          findings = []
          active_findings = []
          for path in sorted(workflow_root.glob("*.y*ml")):
              text = path.read_text(encoding="utf-8", errors="replace")
              inert_archive_stub = "if: ${{ false }}" in text
              for line_no, line in enumerate(text.splitlines(), start=1):
                  for term in terms:
                      if term in line:
                          item = {
                              "path": str(path),
                              "line": line_no,
                              "term": term,
                              "classification": (
                                  "inert_archive_stub"
                                  if inert_arcive_stub
                                  else "active_workflow"
                               ),
                          }
                          findings.append(item)
                          if not inert_archive_stub:
                              active_findings.append(item)

          config_path = Path("governance/config/provider_config.json")
          config_text = config_path.read_text(encoding="utf-8", errors="replace")
          config_findings = [
              {
                  "path": str(config_path),
                  "line": line_no,
                  "term": term,
                  "classification": "provider_config_policy",
              }
              for line_no, line in enumerate(config_text.splitlines(), start=1)
              for term in terms
              if term in line
          ]
          findings.extend(config_findings)

          scan_status = "PASS" if not active_findings else "BLOCKED"
          scan_blockers = [
              f"{item['path']}:{item['line']}:{item['term']}"
              for item in active_findings
          ]
          scan_receipt = {
              "schema_version": 1,
              "task_id": "BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN",
              "created_at": timestamp,
              "status": scan_status,
              "scope": {
                  "workflow_root": ".github/workflows",
                  "config_path": str(config_path),
                  "terms": list(terms),
                  "archived_directory_excluded": "governance/archive/disabled-workflows",
              },
              "required_file_blobs": {
                  ".github/workflows/provider-router.yml": git_path_sha(".github/workflows/provider-router.yml"),
                  ".github/workflows/provider-adapter.yml": git_path_sha(".github/workflows/provider-adapter.yml"),
                  "governance/config/provider_config.json": git_path_sha("governance/config/provider_config.json"),
              },
              "sha_type": "git_blob",
              "findings": findings,
              "unresolved_active_findings": active_findings,
              "blockers": scan_blockers,
              "result_rule": (
                  "PASS only when active workflow references conform to the billing-class policy."
              ),
          }
          write_json(SCAN_RECEIPT, scan_receipt)

          scan_task = by_id["BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN"]
          scan_task.update(
              status="DONE" if scan_status == "PASS" else "BLOCKED",
              completed_at=timestamp,
              receipt_sha=git_blob_sha(SCAN_RECEIPT.read_bytes()),
              receipt_sha_type="git_blob",
              blockers=scan_blockers,
          )

          p7 = by_id["BEM949-P7-RELEASE-AUDIT-FINAL"]
          p7["status"] = "BLOCKED_PRECONDITIONS"
          p7["blockers"] = [
              blocker
              for blocker in p7.get("blockers", [])
              if blocker
              not in {
                  "BEM950-T1-INVALID-WORKFLOW-ARCHIVE",
                  "BEM950-T2-PROVIDER-CONFIG-RECLASSIFY",
                  "BEM950-T3-RUNNER-FIX-AND-P4-SKIP-LOGIC",
                  "BEM950-T4-ACTIVE-QUEUE-P4-RECLASSIFY",
                  "BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN",
              }
          ]
          if scan_status != "PASS":
              p7["blockers"].append("BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN")

          open_blockers = [
              "BEM949-P1-RUN-LEVEL-EVIDENCE",
          ]
          if scan_status != "PASS":
              open_blockers.append("BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN")
              follow_up_id = "BEM950-T5-PROVIDER-ROUTER-COST-POLICY-GUARD"
              if follow_up_id not in by_id:
                  follow_up = {
                      "id": follow_up_id,
                      "status": "PENDING",
                      "priority": "CRITICAL",
                      "protocol": "BEM-950",
                      "depends_on": [
                          "BEM950-POST-T4-REPOSITORY-WIDE-PROVIDER-SCAN"
                      ],
                      "scope": {
                          "files": [
                              ".github/workflows/provider-router.yml",
                              "scripts/provider_router.py",
                              "governance/config/provider_config.json",
                          ],
                          "goal": (
                              "Make active provider routing honor DISABLED_BY_COST_POLICY "
                              "without removing GPT as a provider class."
                          ),
                      },
                      "receipt": "governance/proofs/BEM950_t5_provider_router_cost_policy_guard_receipt.json",
                      "acceptance": [
                          "No active workflow selects gpt_codex_cloud when its provider-config status is DISABLED_BY_COST_POLICY.",
                          "The provider-neutral reactivation path remains represented in provider_config.json.",
                          "The changed Python source compiles before persistence.",
                          "A post-fix repository-wide provider-reference scan returns PASS.",
                      ],
                  }
                  tasks.append(follow_up)
              queue.update(
                  current_task=follow_up_id,
                  queue_state="PENDING",
                  system_status="BEM950_PROVIDER_ROUTING_REMEDIATION_PENDING",
                  next_action=(
                      "Execute BEM950-T5 to align active provider routing with the "
                      "DISABLED_BY_COST_POLICY registry state; do not dispatch P7."
                  ),
              )
          else:
              queue.update(
                  current_task=None,
                  queue_state="BLOCKED",
                  system_status="BEM949_P7_WAITING_FOR_P1_EVIDENCE",
                  next_action=(
                      "P7 remains blocked by BEM949-P1-RUN-LEVEL-EVIDENCE; "
                      "do not claim a broad release PASS."
                  ),
              )

          queue["open_blockers"] = open_blockers
          queue["updated_at"] = now()
          write_json(QUEUE, queue)
          PY

      - name: Commit queue and receipts
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git diff --check
          git add governance/roadmap/ACTIVE_QUEUE.json \
            governance/proofs/BEM950_t4_queue_reclassify_receipt.json \
            governance/proofs/BEM950_provider_reference_scan_receipt.json
          git commit -m "BEM950 T4: reclassify P4 and scan provider references"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase --autostash origin main
            sleep "$attempt"
          done
          echo "Unable to push BEM950 remediation after retries" >&2
          exit 1
