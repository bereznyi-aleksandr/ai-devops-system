name: BEM934 Exact Transport Probe

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Capture exact trace transport records
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          TRACE: tg_818730867_20260618T105741Z
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-transport@ai-devops-system"
          git config user.name "BEM-934 Transport Probe"
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          trace = os.environ["TRACE"]
          records = []
          for line in Path("governance/transport/results.jsonl").read_text(encoding="utf-8", errors="replace").splitlines():
              if trace not in line:
                  continue
              try:
                  item = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if item.get("trace_id") == trace:
                  records.append(item)
          out = {
              "task_id": "BEM934-LIVE-TEST",
              "trace_id": trace,
              "records": records,
              "completed_blocker_free": [
                  item for item in records
                  if item.get("status") == "completed"
                  and not item.get("blocker")
                  and item.get("provider") == "claude"
              ],
          }
          Path("governance/proofs/BEM934_exact_transport_probe.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          PY
          git add governance/proofs/BEM934_exact_transport_probe.json
          git commit -m "Capture exact BEM-934 live transport records" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
