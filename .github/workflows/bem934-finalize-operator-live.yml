name: BEM-934 Finalize Operator LIVE

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bem934-finalize-operator-live
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Validate and finalize operator LIVE
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile governance/runners/bem934_finalize_operator_live.py
          python3 governance/runners/bem934_finalize_operator_live.py

      - name: Commit strict LIVE receipt and queue
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem934-live-finalizer@ai-devops-system"
          git config user.name "BEM-934 LIVE Finalizer"
          git add             governance/proofs/BEM934_live_test_receipt.json             governance/proofs/BEM934_live_test_receipt_superseded_replay.json             governance/roadmap/ACTIVE_QUEUE.json             governance/logs/execution_log.jsonl
          git commit -m "BEM-934: finalize operator-authored LIVE test"
          git push || (git pull --rebase origin main && git push)
