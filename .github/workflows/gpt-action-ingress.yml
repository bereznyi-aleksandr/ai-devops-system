name: GPT Action Ingress
# BEM-848: disabled issue_comment trigger — was occupying slots
on:
  workflow_dispatch:
    inputs:
      action_json:
        description: 'Raw GPT_REPO_ACTION_V1 JSON'
        required: true
        type: string
permissions:
  contents: write
  issues: write
  actions: read
jobs:
  gpt-action-ingress:
    name: GPT Action Ingress
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
      - name: Extract action JSON
        shell: bash
        env:
          INPUT_ACTION_JSON: ${{ inputs.action_json }}
        run: |
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path
          raw = os.environ.get("INPUT_ACTION_JSON", "").strip()
          if not raw:
              raise SystemExit("empty action input")
          fence = re.search(r"```(?:GPT_REPO_ACTION_V1|json)?\s*(\{.*?\})\s*```", raw, re.S)
          if fence:
              payload = fence.group(1)
          else:
              start = raw.find("{"); end = raw.rfind("}")
              if start < 0 or end <= start:
                  raise SystemExit("no JSON object found")
              payload = raw[start:end + 1]
          action = json.loads(payload)
          trace_id = action.get("trace_id") or "gpt_action_ingress"
          Path("/tmp/gpt_action.json").write_text(json.dumps(action, indent=2, ensure_ascii=False) + "\n")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"TRACE_ID={trace_id}\n")
          PY
      - name: Apply action
        shell: bash
        run: python3 tools/gpt-autonomy-relay/relay.py --action-file /tmp/gpt_action.json --apply
      - name: Commit and push
        shell: bash
        run: |
          git config user.email "gpt-action-ingress@ai-devops-system"
          git config user.name "GPT Action Ingress"
          git add governance scripts tools .github || true
          git diff --cached --quiet && exit 0
          git commit -m "GPT action ingress $TRACE_ID"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
