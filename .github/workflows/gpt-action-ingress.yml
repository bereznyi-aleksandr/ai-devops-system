name: GPT Action Ingress

on:
  workflow_dispatch:
    inputs:
      action_json:
        description: 'Raw GPT_REPO_ACTION_V1 JSON'
        required: true
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  gpt-action-ingress:
    name: GPT Action Ingress
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.number == 31 && contains(github.event.comment.body, 'TYPE: GPT_REPO_ACTION_V1'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Extract action JSON
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ACTION_JSON: ${{ inputs.action_json }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          event_name = os.environ.get("EVENT_NAME", "")
          raw = os.environ.get("INPUT_ACTION_JSON", "") if event_name == "workflow_dispatch" else os.environ.get("COMMENT_BODY", "")
          raw = raw.strip()
          if not raw:
              raise SystemExit("empty action input")

          fence = re.search(r"```(?:GPT_REPO_ACTION_V1|json)?\s*(\{.*?\})\s*```", raw, re.S)
          if fence:
              payload = fence.group(1)
          else:
              start = raw.find("{")
              end = raw.rfind("}")
              if start < 0 or end <= start:
                  raise SystemExit("no JSON object found")
              payload = raw[start:end + 1]

          action = json.loads(payload)
          if action.get("source") != "external_gpt_chat":
              raise SystemExit("bad source; expected external_gpt_chat")
          trace_id = action.get("trace_id") or "gpt_action_ingress"

          Path("/tmp/gpt_action.json").write_text(json.dumps(action, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"TRACE_ID={trace_id}\n")
              f.write("COMMIT_MESSAGE=" + (action.get("commit_message") or f"GPT action ingress {trace_id}").replace("\n", " ")[:200] + "\n")
          print("BEM-GPT-ACTION-INGRESS | ACTION_EXTRACTED")
          print("TRACE_ID=" + trace_id)
          PY

      - name: Dry-run action
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/gpt-autonomy-relay/relay.py --action-file /tmp/gpt_action.json --dry-run

      - name: Apply action
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/gpt-autonomy-relay/relay.py --action-file /tmp/gpt_action.json --apply
          python3 -m compileall scripts tools/gpt-autonomy-relay

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "gpt-action-ingress@ai-devops-system"
          git config user.name "GPT Action Ingress"
          git add governance scripts tools .github || true
          if git diff --cached --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
            echo "BEM-GPT-ACTION-INGRESS | NO_CHANGES"
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
          echo "NO_CHANGES=false" >> "$GITHUB_ENV"
          echo "BEM-GPT-ACTION-INGRESS | PUSH_OK"

      - name: Post result
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const body = [
              'BEM-GPT-ACTION-INGRESS | RUN RESULT',
              '',
              `Trace: ${process.env.TRACE_ID || 'unknown'}`,
              `No changes: ${process.env.NO_CHANGES || 'unknown'}`,
              `Workflow status: ${process.env.GITHUB_JOB || 'gpt-action-ingress'}`,
              '',
              'Checklist:',
              '- action comment received',
              '- JSON extracted',
              '- relay dry-run/apply attempted',
              '- commit/push attempted'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 31,
              body
            });
