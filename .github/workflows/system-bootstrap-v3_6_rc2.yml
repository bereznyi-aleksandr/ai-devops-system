name: System Bootstrap v3.6-RC2

on:
  push:
    paths:
      - 'governance/bootstrap/bootstrap_event_v3_6_rc2.json'
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write bootstrap event into canonical ledger
        shell: bash
        run: |
          set -euo pipefail
          python3 governance/append_ledger_row_v2.py \
            --payload-file governance/bootstrap/bootstrap_event_v3_6_rc2.json \
            --ledger-path governance/exchange_ledger_v3_6_rc2.csv

      - name: Commit canonical ledger after bootstrap
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/exchange_ledger_v3_6_rc2.csv
          if git diff --cached --quiet; then
            echo "No canonical ledger changes to commit"
            exit 0
          fi
          git commit -m "System: bootstrap canonical ledger v3.6-RC2"
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "Bootstrap only writes SYSTEM_BOOTSTRAP into canonical v3.6-RC2 ledger."
          echo "No semantic product decisions here."
