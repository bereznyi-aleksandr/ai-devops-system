name: Governance Validation CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: governance-validation-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  minimal-loop-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run minimal governance loop
        id: loop
        run: |
          python governance/runtime/minimal_governance_loop_runner.py | tee /tmp/loop_output.json
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Verify output
        run: |
          python3 -c "
          import json, sys
          with open('/tmp/loop_output.json') as f:
              result = json.load(f)
          assert result['status'] == 'completed', f'Expected completed, got {result[\"status\"]}'
          assert len(result['steps']) == 4, f'Expected 4 steps, got {len(result[\"steps\"])}'
          assert result['release_pass'] == False, 'release_pass must be False'
          print('GATE-3 VERIFICATION PASS')
          print(f'trace_id: {result[\"trace_id\"]}')
          print(f'steps: {[s[\"role\"] + \":\" + s[\"result\"] for s in result[\"steps\"]]}')
          "

      - name: Write CI proof
        run: |
          python3 -c "
          import json, os
          from pathlib import Path
          proof = {
              'gate': 'GATE-3',
              'status': 'PASS',
              'ci_run_id': '${{ github.run_id }}',
              'ci_run_sha': '${{ github.sha }}',
              'runner': 'governance/runtime/minimal_governance_loop_runner.py',
              'verified': True,
              'release_pass': False,
              'note': 'CI E2E Capture — Gate 3'
          }
          Path('governance/state/gate3_ci_proof.json').write_text(json.dumps(proof, indent=2))
          print('gate3_ci_proof.json written')
          "

      - name: Commit CI proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add governance/state/gate3_ci_proof.json
          git diff --staged --quiet || git commit -m "ci: gate3_ci_proof.json — GATE-3 PASS sha ${{ github.sha }}"
          git push
