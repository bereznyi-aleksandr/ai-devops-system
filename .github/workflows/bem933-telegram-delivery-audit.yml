name: BEM-933 Execution Log Finalizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Append self-healing execution record idempotently
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("governance/logs/execution_log.jsonl")
          task_id = "BEM933-SELF-HEALING-PLAYBOOK"
          lines = path.read_text(encoding="utf-8").splitlines()
          found = False
          for line in lines:
            try:
              item = json.loads(line)
            except json.JSONDecodeError:
              continue
            if item.get("id") == task_id and item.get("status") == "done":
              found = True
              break
          if not found:
            record = {
              "date": "2026-06-16T17:03:33Z",
              "id": task_id,
              "sha": "42b9b1aee037673a0f039c5f80f345135c426097",
              "status": "done",
              "source_proof": "governance/proofs/BEM933_self_healing_playbook_receipt.json",
              "queue_state": "IDLE",
              "next_task": None,
            }
            with path.open("a", encoding="utf-8") as handle:
              handle.write(json.dumps(record, ensure_ascii=False) + "\n")
          PY

      - name: Commit execution log
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem933-finalizer@ai-devops-system"
          git config user.name "BEM-933 Finalizer"
          git pull --rebase --autostash origin main || true
          git add governance/logs/execution_log.jsonl
          if git diff --cached --quiet; then
            echo "Execution record already present"
          else
            git commit -m "BEM-933 append self-healing execution record"
            git push
          fi
