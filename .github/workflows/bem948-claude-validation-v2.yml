name: BEM948 Claude Validation V2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem948-claude-validation-v2.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          fetch-depth: 0
      - name: Validate exact turn-budget change
        shell: bash
        run: |
          set -euo pipefail
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/claude.yml')"
          git show df512080669e993f5f0128b1e5e2628d0a4ff368:.github/workflows/claude.yml > /tmp/claude_before.yml
          python3 - <<'PY'
          import hashlib, json
          from datetime import datetime, timezone
          from pathlib import Path
          before = Path("/tmp/claude_before.yml").read_bytes()
          after = Path(".github/workflows/claude.yml").read_bytes()
          old = b'--max-turns 10 --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*)"'
          new = b'--max-turns 24 --allowedTools "Edit,Read,Write,Glob,Grep,Bash(git:*)"'
          assert before.count(old) == 1
          assert before.replace(old, new, 1) == after
          blob = hashlib.sha1(b"blob " + str(len(after)).encode() + b"\0" + after).hexdigest()
          receipt = {
            "status": "PASS",
            "protocol": "BEM-948",
            "task_id": "BEM948-P0-VALIDATE-CLAUDE-YAML-AFTER-TURN-BUDGET-REPAIR",
            "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "prior_validated_blob_sha": "df512080669e993f5f0128b1e5e2628d0a4ff368",
            "prior_validated_blob_sha_type": "git_blob",
            "claude_yml_blob_sha": blob,
            "claude_yml_blob_sha_type": "git_blob",
            "checks": {
              "yaml_valid": True,
              "exact_one_setting_change_from_prior_validated_blob": True,
              "default_turn_budget_24_present": True,
              "inherited_embedded_python_validation_unchanged": True,
              "secret_values_read_or_logged": False,
              "sha_type_explicit": True
            },
            "next_task": "BEM948-P0-LIVE-OBJECT-E2E-RETRY"
          }
          Path("governance/proofs").mkdir(parents=True, exist_ok=True)
          Path("governance/reports").mkdir(parents=True, exist_ok=True)
          Path("governance/proofs/BEM948_claude_yaml_validation_receipt.json").write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          Path("governance/reports/bem948_p0_claude_yaml_validation.md").write_text(
              "# BEM-948 P0 Claude validation\n\n"
              "YAML valid. Current file differs from prior independently validated blob only by turn budget 10 -> 24.\n",
              encoding="utf-8"
          )
          PY
      - name: Commit validation evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-948 Validator"
          git config user.email "bem948-validator@ai-devops-system"
          git add governance/proofs/BEM948_claude_yaml_validation_receipt.json governance/reports/bem948_p0_claude_yaml_validation.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "BEM-948: validate Claude YAML after turn-budget repair"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash origin main
          done
          exit 1
