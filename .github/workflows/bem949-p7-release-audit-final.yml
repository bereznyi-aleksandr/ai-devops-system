name: BEM949 P7 Release Audit Final

on:
  workflow_dispatch:
    inputs:
      trace_id:
        description: Trace identifier for the independent release audit
        required: false
        default: bem949_p7_release_audit
        type: string

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TRACE_ID: ${{ inputs.trace_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Reconcile P6 PASS before audit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          queue_path = Path("governance/roadmap/ACTIVE_QUEUE.json")
          receipt_path = Path("governance/proofs/BEM949_p6_learning_loop_receipt.json")
          queue = json.loads(queue_path.read_text(encoding="utf-8"))
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          if receipt.get("status") != "PASS":
              raise SystemExit("P6 receipt is not PASS")

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          p6_seen = False
          p7_seen = False
          for task in queue.get("tasks", []):
              if not isinstance(task, dict):
                  continue
              if task.get("id") == "BEM949-P6-LEARNING-LOOP-DRILL":
                  task["status"] = "DONE"
                  task["completed_at"] = now
                  task["receipt_sha"] = hashlib.sha256(receipt_path.read_bytes()).hexdigest()
                  task["receipt_sha_type"] = "sha256_content"
                  p6_seen = True
              if task.get("id") == "BEM949-P7-RELEASE-AUDIT-FINAL":
                  task["status"] = "IN_PROGRESS"
                  task.setdefault("started_at", now)
                  p7_seen = True
          if not (p6_seen and p7_seen):
              raise SystemExit("P6 or P7 task missing from ACTIVE_QUEUE")

          progress = queue.get("progress")
          if isinstance(progress, dict):
              done_count = sum(
                  1
                  for task in queue.get("tasks", [])
                  if isinstance(task, dict) and str(task.get("status", "")).startswith("DONE")
              )
              progress["tasks_done"] = done_count
              total = progress.get("tasks_total")
              if isinstance(total, int) and total:
                  progress["percent"] = round(done_count * 100 / total, 2)
          queue["current_task"] = "BEM949-P7-RELEASE-AUDIT-FINAL"
          queue["queue_state"] = "ACTIVE"
          queue["system_status"] = "BEM949_P6_PASS_P7_AUDIT_IN_PROGRESS"
          queue["updated_at"] = now
          queue_path.write_text(
              json.dumps(queue, ensure_ascii=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Execute independent release audit
        shell: bash
        run: |
          set -euo pipefail
          python3 governance/runners/bem949_release_audit_runner.py \
            --trace-id "$TRACE_ID"

      - name: Finalize P7 queue status
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          queue_path = Path("governance/roadmap/ACTIVE_QUEUE.json")
          receipt_path = Path("governance/proofs/BEM949_p7_external_release_audit_receipt.json")
          queue = json.loads(queue_path.read_text(encoding="utf-8"))
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          outcome = receipt.get("status")
          if outcome not in {"PASS", "BLOCKED"}:
              raise SystemExit("P7 receipt has no termal status")

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          p7_seen = False
          for task in queue.get("tasks", []):
              if isinstance(task, dict) and task.get("id") == "BEM949-P7-RELEASE-AUDIT-FINAL":
                  task["status"] = "DONE" if outcome == "PASS" else "BLOCKED"
                  task["completed_at"] = now
                  task["receipt_sha"] = hashlib.sha256(receipt_path.read_bytes()).hexdigest()
                  task["receipt_sha_type"] = "sha256_content"
                  p7_seen = True
                  break
          if not p7_seen:
              raise SystemExit("P7 task missing from ACTIVE_QUEUE")

          queue["current_task"] = None
          queue["queue_state" = "COMPLETE" if outcome == "PASS" else "BLOCKED"
          queue["system_status"] = (
              "BEM949_RELEASE_AUDIT_PASS"
              if outcome == "PASS"
              else "BEM949_RELEASE_AUDIT_BLOCKED"
          )
          queue["release_status"] = "PASS" if outcome == "PASS" else "VERIFIED_WITH_LIMITATIONS"
          queue["next_action"] = (
              "Roadmap complete."
              if outcome == "PASS"
              else "Resume only recorded blockers; do not claim broad Release PASS."
          )
          queue["updated_at"] = now
          queue_path.write_text(
              json.dumps(queue, ensure_ascii=True, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit release audit and queue reconciliation
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-p7-audit@ai-devops-system"
          git config user.name "BEM949 P7 Release Audit"
          git add -- \
            governance/roadmap/ACTIVE_QUEUE.json \
            governance/proofs/BEM949_p7_external_release_audit_receipt.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P7: record independent release audit"
          git push origin HEAD:main || (
            git pull --rebase origin main &&
            git push origin HEAD:main
          )
