name: BEM-934 Object Binding Proof V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Generate structured Claude binding plan
        id: claude_binding
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          prompt: |
            Return only one strict JSON object. Do not use Markdown or tool calls.
            Set trace_id exactly to bem934_objects_bound_v2_${{ github.run_id }}.
            This is a BEM-934 WRK-C1 proof-bearing contour plan.
            The objective must explicitly mention the Claude provider, object runtime
            binding, and idempotent Telegram routing. Provide at least three concrete
            implementation or verification steps and at least two independently verifiable
            acceptance checks. Include realistic assumptions and risks.
            Do not use the historical generic steps.
          claude_args: >-
            --max-turns 30
            --json-schema '{"type":"object","properties":{"objective":{"type":"string"},"assumptions":{"type":"array","items":{"type":"string"}},"steps":{"type":"array","items":{"type":"string"},"minItems":3},"acceptance":{"type":"array","items":{"type":"string"},"minItems":2},"risks":{"type":"array","items":{"type":"string"}},"trace_id":{"type":"string"}},"required":["objective","assumptions","steps","acceptance","risks","trace_id"],"additionalProperties":false}'

      - name: Materialize and exercise AUDITOR.pre
        id: materialize
        if: always()
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude_binding.outputs.structured_output }}
          CLAUDE_OUTCOME: ${{ steps.claude_binding.outcome }}
          TRACE_ID: bem934_objects_bound_v2_${{ github.run_id }}
        run: |
          set -euo pipefail
          PYTHONPATH=governance/runners python3 -m py_compile \
            governance/runners/bem931_runner_lib.py \
            governance/runners/auditor_stage_runner.py \
            governance/runners/bem934_object_binding_materializer.py
          PYTHONPATH=governance/runners \
            python3 governance/runners/bem934_object_binding_materializer.py

      - name: Commit isolated proof artifacts
        id: commit_proof
        if: always()
        run: |
          set -euo pipefail
          git config user.email "bem934-object-binding@a-devops-system"
          git config user.name "BEM-934 Object Binding"
          git add governance/proofs/BEM934_objects_bound_isolated_receipt.json
          if [ -f governance/proofs/BEM934_object_binding_plan_isolated.json ]; then
            git add governance/proofs/BEM934_object_binding_plan_isolated.json
          fi
          if git diff --cached --quiet; then
            echo "No isolated proof changes"
          else
            git commit -m "BEM-934 isolated object binding proof trace=bem934_objects_bound_v2_${{ github.run_id }}"
            git pull --rebase origin main
            git push
          fi
          if [ -f governance/proofs/BEM934_object_binding_plan_isolated.json ]; then
            echo "plan_commit_sha=$(git log -1 --format=%H -- governance/proofs/BEM934_object_binding_plan_isolated.jsoZ)" >> "$GITHUB_OUTPUT"
            echo "plan_blob_sha=$(git rev-parse HEAD:governance/proofs/BEM934_object_binding_plan_isolated.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Promote verified binding state
        if: steps.materialize.outputs.status == 'PASS'
        env:
          TRACE_ID: bem934_objects_bound_v2_${{ github.run_id }}
          PLAN_COMMIT_SHA: ${{ steps.commit_proof.outputs.plan_commit_sha }}
          PLAN_BLOB_SHA: ${{ steps.commit_proof.outputs.plan_blob_sha }}
        run: |
          set -euo pipefail
          git pull --rebase origin main
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def now():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def read(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))

          def write(path, payload):
              Path(path).write_text(
                  json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          trace_id = os.environ["TRACE_ID"]
          plan_commit_sha = os.environ["PLAN_COMMIT_SHA"].strip()
          plan_blob_sha = os.environ["PLAN_BLOB_SHA"].strip()
          if not plan_commit_sha or not plan_blob_sha:
              raise SystemExit("plan SHA evidence missing")

          isolated_path = "governance/proofs/BEM934_objects_bound_isolated_receipt.json"
          canonical_path = "governance/proofs/BEM934_objects_bound_receipt.json"
          registry_path = "governance/architecture/objects_registry_v2.json"
          queue_path = "governance/roadmap/ACTIVE_QUEE.json"
          log_path = "governance/logs/execution_log.jsonl"

          receipt = read(isolated_path)
          if receipt.get("status") != "PASS" or receipt.get("trace_id") != trace_id:
              raise SystemExit("isolated receipt is not matching PASS")
          receipt.update({
              "plan_blob_sha": plan_blob_sha,
              "plan_commit_sha": plan_commit_sha,
              "commit_sha": plan_commit_sha,
              "registry_status": "BOUND",
              "bound_at": now(),
              "missing": [],
          })
          write(isolated_path, receipt)
          write(canonical_path, receipt)

          registry = read(registry_path)
          registry.update({
              "protocol": "BEM-934",
              "status": "BOUND",
              "bound_at": receipt["bound_at"],
              "binding_evidence": {
                  "trace_id": trace_id,
                  "provider_selected": "claude_code",
                  "workflow_id": "bem934-object-binding-proof-v2.yml",
                  "workflow_run_id": receipt.get("workflow_run_id"),
                  "plan_path": receipt["plan_path"],
                  "plan_blob_sha": plan_blob_sha,
                  "commit_sha": plan_commit_sha,
                  "semantic_verdict": "PASS",
                  "contour": "WRK-C1.AUDITOR.pre -> WRK-C1.EXECUTOR",
              },
          })
          notes = list(registry.get("notes", []))
          note = (
              "BEM-934 object runtime binding proven by isolated Claude "
              "structured plan and real WRK-C1 AUDITOR.pre channel routing."
          )
          if note not in notes:
              notes.append(note)
          registry["notes"] = notes
          write(registry_path, registry)

          queue = read(queue_path)
          found = next_found = False
          for task in queue.get("tasks", []):
              if task.get("id") == "BEM934-OBJECTS-BOUND":
                 task["status"] = "DONE"
                 task["done_sha"] = plan_commit_sha
                 task["proof"] = canonical_path
                 found = True
              elif task.get("id") == "BEM934-LIVE-TEST":
                  task["status"] = "IN_PROGRESS"
                  task.pop("blocked_by", None)
                  next_found = True
          if not found or not next_found:
              raise SystemExit("queue tasks missing")
          queue["version"] = int(queue.get("version", 0)) + 1
          queue["updated_at"] = now()
          queue["current_task"] = "BEM934-LIVE-TEST"
          queue["queue_state"] = "ACTIVE"
          queue["last_completed"] = {"id": "BEM934-OBJECTS-BOUND", "completed_at": queue["updated_at"]}
          queue["next_action"] = "BEM934-LIVE-TEST \u2014 execute content-bearing Telegram E2E through provider-router to claude_code"
          summary = dict(queue.get("completed_summary", {})
          summary["tasks_done"] = 8
          summary["tasks_total"] = 10
          proofs = list(summary.get("proofs", []))
          if canonical_path not in proofs:
              proofs.append(canonical_path)
          summary["proofs"] = proofs
          queue["completed_summary"] = summary
          write(queue_path, queue)

          record = {
              "date": now(),
              "id": "BEM934-OBJECTS-BOUND",
              "sha": plan_commit_sha,
              "status": "done",
              "source_proof": canonical_path,
              "trace_id": trace_id,
              "next_task": "BEM934-LIVE-TEST",
          }
          log_file = Path(log_path)
          existing = log_file.read_text(encoding="utf-8").splitlines() if log_file.exists() else []
          duplicate = False
          for line in existing:
              try:
                  item = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if item.get("id") == record["id"] and item.get("sha") == record["sha"]:
                  duplicate = True
                  break
          if not duplicate:
              log_file.parent.mkdir(parents=True, exist_ok=True)
              with log_file.open("a", encoding="utf-8") as handle:
                handle.write(json.dumps(record, ensure_ascii=False) + "\n")
          PY

          git config user.email "bem934-object-binding@a-devops-system"
          git config user.name "BEM-934 Object Binding"
          git add \
            governance/proofs/BEM934_objects_bound_isolated_receipt.json \
            governance/proofs/BEM934_objects_bound_receipt.json \
            governance/architecture/objects_registry_v2.json \
            governance/roadmap/ACTIVE_QUEE.json \
            governance/logs/execution_log.jsonl
          git commit -m "Close BEM934-OBJECTS-BOUND with isolated trace and SHA proof"
          git push || (git pull --rebase origin main && git push)
