name: BEM-934 Object Binding Proof V2 Archived

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Record archive status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          printf '%s\n' '{"schema_version":1,"protocol":"BEM-949","component":"bem934-object-binding-proof-v2","status":"ARCHIVED","checks":{"legacy_workflow_not_reactivated":true,"no_provider_execution_claim":true,"no_queue_or_release_mutation":true}}' > governance/proofs/BEM934_object_binding_proof_v2_archived_receipt.json

      - name: Commit archive receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-archive@ai-devops-system"
          git config user.name "BEM949 Legacy Archive"
          git add governance/proofs/BEM934_object_binding_proof_v2_archived_receipt.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "BEM949: archive legacy BEM934 object-binding workflow"
          git push || (git pull --rebase origin main && git push)
