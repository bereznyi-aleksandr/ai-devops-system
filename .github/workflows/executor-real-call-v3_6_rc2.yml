name: Executor Real Call v3.6-RC2

on:
  workflow_dispatch:
    inputs:
      packet_path:
        description: 'Path to executor packet JSON'
        required: false
        default: '.runtime/executor_packet_v3_6_rc2.json'
        type: string

jobs:
  executor_real_call:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXECUTOR_API_URL: ${{ secrets.EXECUTOR_API_URL }}
      EXECUTOR_API_KEY: ${{ secrets.EXECUTOR_API_KEY }}
      EXECUTOR_MODEL: ${{ secrets.EXECUTOR_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${EXECUTOR_API_URL:-}" || (echo "Missing secret EXECUTOR_API_URL" && exit 1)
          test -n "${EXECUTOR_API_KEY:-}" || (echo "Missing secret EXECUTOR_API_KEY" && exit 1)
          test -n "${EXECUTOR_MODEL:-}" || (echo "Missing secret EXECUTOR_MODEL" && exit 1)

      - name: Build executor request payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          packet_path = Path('${{ github.event.inputs.packet_path }}')
          prompt_path = Path('governance/prompts/executor_system_prompt_v3_6_rc2.txt')
          if not packet_path.exists():
              raise SystemExit('EXECUTOR_PACKET_MISSING')
          if not prompt_path.exists():
              raise SystemExit('EXECUTOR_SYSTEM_PROMPT_MISSING')

          packet = json.loads(packet_path.read_text(encoding='utf-8'))
          next_action = packet.get('next_action', '').strip()
          if next_action not in ('WRITE_PLAN', 'PROPOSE_TASK'):
              raise SystemExit(f'EXECUTOR_REAL_CALL_EXPECTS_WRITE_PLAN_OR_PROPOSE_TASK, got: {next_action}')

          request_payload = {
              'model': '${{ secrets.EXECUTOR_MODEL }}',
              'input': [
                  {
                      'role': 'system',
                      'content': prompt_path.read_text(encoding='utf-8')
                  },
                  {
                      'role': 'user',
                      'content': json.dumps(packet, ensure_ascii=False, indent=2)
                  }
              ]
          }

          out = Path('.runtime/executor_real_call_request.json')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(request_payload, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps({'status': 'EXECUTOR_REAL_REQUEST_READY', 'path': str(out)}, ensure_ascii=False))
          PY

      - name: Call external executor model
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST "$EXECUTOR_API_URL" \
            -H "Authorization: Bearer $EXECUTOR_API_KEY" \
            -H "Content-Type: application/json" \
            --data @.runtime/executor_real_call_request.json \
            > .runtime/executor_real_call_response_raw.json
          test -s .runtime/executor_real_call_response_raw.json

      - name: Normalize executor response into canonical plan artifact
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          packet = json.loads(Path('${{ github.event.inputs.packet_path }}').read_text(encoding='utf-8'))
          raw = json.loads(Path('.runtime/executor_real_call_response_raw.json').read_text(encoding='utf-8'))

          # Accept either direct JSON object or a response envelope with output_text/content.
          candidate = None
          if isinstance(raw, dict) and all(k in raw for k in ['task_id', 'artifact_type', 'title', 'summary', 'body_markdown']):
              candidate = raw
          elif isinstance(raw, dict):
              if 'output_text' in raw and isinstance(raw['output_text'], str):
                  candidate = json.loads(raw['output_text'])
              elif 'content' in raw and isinstance(raw['content'], str):
                  candidate = json.loads(raw['content'])
              elif 'response' in raw and isinstance(raw['response'], str):
                  candidate = json.loads(raw['response'])

          if not isinstance(candidate, dict):
              raise SystemExit('EXECUTOR_RESPONSE_PARSE_FAILED')

          task_id = packet.get('task_id', '').strip()
          if candidate.get('task_id', '').strip() != task_id:
              raise SystemExit('EXECUTOR_RESPONSE_TASK_ID_MISMATCH')

          ts = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          out_path = Path(f'governance/plans/{task_id}.md')
          out_path.parent.mkdir(parents=True, exist_ok=True)
          out_path.write_text(candidate.get('body_markdown', '').rstrip() + '\n', encoding='utf-8')

          manifest = {
              'status': 'EXECUTOR_REAL_PLAN_MATERIALIZED',
              'task_id': task_id,
              'next_action': 'WRITE_PLAN',
              'artifact_path': str(out_path),
              'parent_event_id': packet.get('current_event_ref', ''),
              'ts_utc': ts,
              'summary': candidate.get('summary', ''),
              'artifact_type': candidate.get('artifact_type', ''),
          }
          Path('.runtime/executor_materialize_result.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False))
          PY

      - name: Commit real executor artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/ .runtime/
          if git diff --cached --quiet; then
            echo "No executor real-call changes to commit"
            exit 0
          fi
          git commit -m "Executor: real WRITE_PLAN call in canonical contour"
          git push origin HEAD:main

      - name: Guardrail
        run: |
          echo "This workflow performs only executor WRITE_PLAN real-call integration."
          echo "Ledger progression remains a separate canonical step."
