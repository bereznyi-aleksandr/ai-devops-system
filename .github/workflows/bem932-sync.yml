name: BEM-932 Queue and Log Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Validate final queue and write sync receipt
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          queue_path = Path("governance/roadmap/ACTIVE_QUEUE.json")
          log_path = Path("governance/logs/execution_log.jsonl")
          proof_path = Path("governance/proofs/BEM932_sync_receipt.json")

          queue = json.loads(queue_path.read_text(encoding="utf-8"))
          log_lines = log_path.read_text(encoding="utf-8").splitlines() if log_path.exists() else []

          status = "PASS" if queue.get("queue_state") == "COMPLETE" else "BLOCKED"
          done_count = sum(1 for task in queue.get("tasks", []) if str(task.get("status", "")).startswith("DONE"))
          total_count = len(queue.get("tasks", []))

          receipt = {
              "status": status,
              "created_at": now,
              "receipt_type": "bem932_queue_log_sync_validation",
              "queue_state": queue.get("queue_state"),
              "current_task": queue.get("current_task"),
              "done_count": done_count,
              "total_count": total_count,
              "execution_log_lines": len(log_lines),
              "next_action": queue.get("next_action", "")
          }

          proof_path.parent.mkdir(parents=True, exist_ok=True)
          proof_path.write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          if status != "PASS":
              raise SystemExit("ACTIVE_QUEUE is not COMPLETE")
          PY

      - name: Commit sync receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-932 Sync"
          git config user.email "bem932-sync@ai-devops-system"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_sync_receipt.json
          if git diff --cached --quiet; then
            echo "No sync receipt changes"
          else
            git commit -m "BEM-932 sync queue and execution log"
            git push
          fi
