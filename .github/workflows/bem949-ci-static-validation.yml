name: BEM949 CI Static Validation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Confirm Python runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip --version

      - name: Install YAML parser
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check PyYAML

      - name: Validate workflows and preserve findings
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          set +e
          python3 scripts/bem949_ci_stabilize.py --out governance/proofs/BEM949_p1_ci_static_validation.json > /tmp/bem949_ci_validation.stdout 2> /tmp/bem949_ci_validation.stderr
          validation_exit=$?
          set -e
          if [ "$validation_exit" -ne 0 ]; then
            cp /tmp/bem949_ci_validation.stderr governance/proofs/BEM949_p1_ci_static_validation_error.txt
            VALIDATION_EXIT="$validation_exit" python3 -c 'import json, os; from pathlib import Path; payload={"schema_version":1,"protocol":"BEM-949","task_id":"BEM949-P1-CI-STABILIZE","status":"FAIL","blocker":"static_validation_runner_process_failed","validation_exit_code":int(os.environ["VALIDATION_EXIT"]),"error_log_path":"governance/proofs/BEM949_p1_ci_static_validation_error.txt","checks":{"manual_dispatch_execution_evidence_collected":True,"runner_process_completed":False}}; Path("governance/proofs/BEM949_p1_ci_static_validation.json").write_text(json.dumps(payload, indent=2)+"\n", encoding="utf-8")'
          fi

      - name: Commit static validation receipt
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-ci@ai-devops-system"
          git config user.name "BEM949 CI Stabilizer"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM949_p1_ci_static_validation.json governance/proofs/BEM949_p1_ci_static_validation_error.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: record repository-wide CI static validation"
          git push || (git pull --rebase origin main && git push)
