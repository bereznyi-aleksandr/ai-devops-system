name: BEM947 Claude Failure Log Collector

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem947-claude-failure-log-collector.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Collect targeted Claude action failure segment
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          API: ${{ github.api_url }}
          RUN_ID: "27845000228"
          TRACE_ID: bem947_object_dispatch_after_yaml_validation_20260619T1935Z
          REPORT_PATH: governance/reports/bem947_object_dispatch_after_yaml_validation_20260619T1935Z.md
          REPORT_SHA: dcfa2145386055b2acd4d8a64e5703f2ca2aaec7
          REPORT_COMMIT: 9b53344878f6a6bed8ea8e21844452faa8cc962c
        run: |
          set -euo pipefail
          mkdir -p /tmp/bem947_logs
          gh run view "$RUN_ID" --repo "$REPO" --json databaseId,headSha,createdAt,status,conclusion,event,displayTitle,workflowName,jobs > /tmp/bem947_logs/run.json || echo '{}' > /tmp/bem947_logs/run.json
          gh run view "$RUN_ID" --repo "$REPO" --log > /tmp/bem947_logs/full.log 2> /tmp/bem947_logs/log_error.txt || true
          gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/bem947_logs/failed.log 2>> /tmp/bem947_logs/log_error.txt || true

          python3 - <<'PY'
          import base64
          import json
          import os
          import re
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("/tmp/bem947_logs")
          repo = os.environ["REPO"]
          api = os.environ["API"]
          token = os.environ["GH_TOKEN"]
          run_id = os.environ["RUN_ID"]
          trace = os.environ["TRACE_ID"]
          report_path = os.environ["REPORT_PATH"]
          report_sha = os.environ["REPORT_SHA"]
          report_commit = os.environ["REPORT_COMMIT"]

          def now():
              return datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          def read_text(name):
              p = root / name
              return p.read_text(encoding="utf-8", errors="replace") if p.exists() else ""

          def put_file(path, text, message):
              url = f"{api}/repos/{repo}/contents/{path}"
              headers = {
                  "Authorization": "Bearer " + token,
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "User-Agent": "bem947-targeted-log-collector",
              }
              sha = None
              try:
                  req = urllib.request.Request(url + "?ref=main", headers=headers, method="GET")
                  with urllib.request.urlopen(req) as resp:
                      sha = json.loads(resp.read().decode("utf-8"))["sha"]
              except Exception:
                  sha = Non
              payload = {
                  "message": message,
                  "content": base64.b64encode(text.encode("utf-8")).decode("ascii"),
                  "branch": "main",
              }
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(url, data=json.dumps(payload).encode("utf-8"), headers=headers, method="PUT")
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          try:
              run_meta = json.loads(read_text("run.json"))
          except Exception:
              run_meta = {}

          full_log = read_text("full.log")
          failed_log = read_text("failed.log")
          log_error = read_text("log_error.txt")
          source = failed_log if failed_log.strip() else full_log
          lines = source.splitlines()

          markers = (
              "run claude code role",
              "anthropics/claude-code-action",
              "claude_role",
              "error:",
              "process completed with exit code",
              "exit code",
              "failed",
              "failure",
              "oauth",
              "unauthorized",
              "forbidden",
              "token",
              "rate limit",
          )
          keep = set()
          for idx, line in enumerate(lines):
              lower = line.lower()
              if any(marker in lower for marker in markers):
                  start = max(0, idx - 8)
                  end = min(len(lines), idx + 18)
                  keep.update(range(start, end))
          if not keep and lines:
              keep.update(range(max(0, len(lines) - 120), len(lines)))

          selected_lines = []
          for idx in sorted(keep):
              line = lines[idx].replace(token, "***")
              line = re.sub(r"ghp_[A-Za-z0-9_]+", "***", line)
              line = re.sub(r"github_pat_[A-Za-z0-9_]+", "***", line)
              selected_lines.append(f" {idx + 1}: {line[:700]}")
              if len(selected_lines) >= 220:
                  break

          logs_accessible = bool(full_log.strip() or failed_log.strip())
          found_specific_error = any(("error" in line.lower() or "exit code" in line.lower() or "unauthorized" in line.lower() or "forbidden" in line.lower()) for line in selected_lines)

          report_lines = [
              "# BEM-947 Claude role targeted failure log",
              "",
              f"Trace: `{trace}`",
              f"Run ID: `{run_id}`",
              f"Run conclusion: `{run_meta.get('conclusion', '')}`",
              f"Run status: `{run_meta.get('status', '')}`",
              f"Run head SHA: `{run_meta.get('headSha', '')}`",
              "",
              "## Targeted sanitized log segment",
              "",
          ]
          if selected_lines:
              report_lines.extend(f"- `{line}`" for line in selected_lines)
          else:
              report_lines.append("- No log segment was available.")
          report_lines.extend(["", "## Result", "", "BLOCKED: Claude Code action step outcome=failure; executed/completed proof remains absent.", ""])

          report_result = put_file(
              "governance/reports/bem947_claude_role_failure_targeted_log.md",
              "\n".join(report_lines),
              "BEM-947: record targeted claude role failure log",
          )

          blockers = ["claude_code_action_outcome_failure", "executed_completed_proof_not_present"]
          if not logs_accessible:
              blockers.append("github_actions_logs_not_accessible")
          if not found_specific_error:
              blockers.append("no_specific_error_line_found_in_targeted_excerpt")

          receipt = {
              "status": "BLOCKED_REPAIRING",
              "protocol": "BEM-947",
              "task_id": "BEM947-P2-CLAUDE-RUN-TARGETED-LOG-COLLECTOR",
              "created_at": now(),
              "stage": {"tasks_done": 2, "tasks_total": 4, "percent": 50},
              "trace_id": trace,
              "run": {
                  "databaseId": run_meta.get("databaseId"),
                  "conclusion": run_meta.get("conclusion"),
                  "status": run_meta.get("status"),
                  "headSha": run_meta.get("headSha"),
                  "headSha_type": "commit" if run_meta.get("headSha") else None,
              },
              "execution_report": {
                  "path": report_path,
                  "sha": report_sha,
                  "sha_type": "git_blob",
                  "commit_sha_reported_by_report": report_commit,
                  "commit_sha_type": "commit",
                  "blocker": "claude_role outcome=failure",
              },
              "targeted_log_report": {
                  "path": "governance/reports/bem947_claude_role_failure_targeted_log.md",
                  "sha": report_result["content"]["sha"],
                  "sha_type": "git_blob",
                  "commit": report_result["commit"]["sha"],
                  "commit_sha_type": "commit",
              },
              "checks": {
                  "logs_accessible": logs_accessible,
                  "targeted_segment_written": bool(selected_lines),
                  "specific_error_line_found": found_specific_error,
                  "executed_completed_proof_exists": False,
                  "no_false_pass_claim": True,
                  "sha_type_explicit": True
              },
              "blockers": blockers,
              "next_task": "BEM947-P2-RETRY_CLAUDE_WITH_MINIMAL_PROMPT_OR_EXTERNAL_GATE",
          }

          receipt_result = put_file(
              "governance/proofs/BEM947_claude_targeted_log_collector_receipt.json",
              json.dumps(receipt, ensure_ascii=False, indent=2) + "\n",
              "BEM-947: record targeted claude role failure diagnostic",
          )
          print(json.dumps({"report": report_result["content"]["sha"], "receipt": receipt_result["content"]["sha"]}, indent=2))
          PY
