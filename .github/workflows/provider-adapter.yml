name: Provider Adapter

on:
  workflow_dispatch:
    inputs:
      cycle_id:
        required: true
        type: string
      provider:
        required: true
        type: string
      role:
        required: true
        type: string
      status:
        required: true
        default: unknown
        type: string

permissions:
  contents: write

jobs:
  adapt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      - name: Select only an enabled provider under registry policy
        shell: bash
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
          REQUESTED_PROVIDER: ${{ inputs.provider }}
          ROLE: ${{ inputs.role }}
          SIGNAL: ${{ inputs.status }}
        run: |
          set -euo pipefaiil
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          config = json.loads(Path("governance/config/provider_config.json").read_text(encoding="utf-8"))
          providers = config.get("providers", {})
          requested = os.environ["REQUESTED_PROVIDER"]
          requested_spec = providers.get(requested, {}) if isinstance(providers, dict) else {}
          eligible = sorted(
              ((key, value) for key, value in providers.items()
               if isinstance(value, dict) and value.get("enabled") is True),
              key=lambda item: (int(item[1].get("priority", 999)), item[0]),
          )
          if not eligible:
              raise SystemExit("No enabled provider configured")
          selected = requested if isinstance(requested_spec, dict) and requested_spec.get("enabled") is True else eligible[0][0]
          cost_blocked = isinstance(requested_spec, dict) and requested_spec.get("status") == "DISABLED_BY_COST_POLICY"
          reason = "requested_provider_disabled_by_cost_policy" if cost_blocked else "requested_provider_unavailable"
          event = {
              "record_type": "provider_selection_decision",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "cycle_id": os.environ["CYCLE_ID"],
              "role": os.environ["ROLE"],
              "probe_signal": os.environ["SIGNAL"],
              "requested_provider": requested,
              "selected_provider": selected,
              "reason": None if selected == requested else reason,
              "provider_config_path": "governance/config/provider_config.json",
          }
          transport = Path("governance/transport/results.jsonl")
          transport.parent.mkdir(parents=True, exist_ok=True)
          with transport.open("a", encoding="utf-8") as handle:
              handle.write(json.dumps(event, ensure_ascii=False) + "\n")
          state_path = Path("governance/state/provider_status.json")
          state_path.parent.mkdir(parents=True, exist_ok=True)
          state_path.write_text(json.dumps({"last_provider_selection": event}, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Commit provider decision
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add governance/transport/results.jsonl governance/state/provider_status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Provider adapter decision ${{ inputs.cycle_id }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase --autostash origin main
            sleep "$attempt"
          done
          exit 1
