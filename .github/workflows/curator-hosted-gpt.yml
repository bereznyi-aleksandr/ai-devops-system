name: Curator Hosted GPT

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  hosted-gpt-curator:
    name: Hosted GPT Curator
    if: |
      github.event.issue.number == 31 &&
      github.actor != 'github-actions[bot]' &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@curator')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Write curator comment
        shell: bash
        env:
          COMMENT_BODY_JSON: ${{ toJson(github.event.comment.body) }}
        run: |
          set -e
          COMMENT_FILE="$RUNNER_TEMP/curator_comment_body.txt"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          body = json.loads(os.environ['COMMENT_BODY_JSON'])
          Path(os.environ['RUNNER_TEMP'], 'curator_comment_body.txt').write_text(body, encoding='utf-8')
          PY
          echo "COMMENT_FILE=$COMMENT_FILE" >> "$GITHUB_ENV"

      - name: Curator provider routing decision
        shell: bash
        run: |
          set +e
          python3 scripts/curator_entrypoint.py "$COMMENT_FILE"
          echo "ENTRYPOINT_EXIT=$?" >> "$GITHUB_ENV"
          exit 0

      - name: Commit curator routing state
        shell: bash
        run: |
          set -e
          git config user.email "gpt-curator@ai-devops-system"
          git config user.name "GPT Curator"
          git add governance/state/routing.json governance/state/provider_status.json governance/state/curator_last_decision.json governance/events/provider_failures.jsonl governance/events/routing_decisions.jsonl governance/exchange.jsonl || true
          git diff --cached --quiet || git commit -m "CURATOR ROUTER: persist routing decision"
          git push

      - name: Build hosted curator prompt
        shell: bash
        run: |
          set -e
          PROMPT_FILE="$RUNNER_TEMP/hosted_gpt_curator_prompt.txt"
          python3 - <<'PY'
          from pathlib import Path
          import json
          root = Path('.')
          comment = Path(__import__('os').environ['COMMENT_FILE']).read_text(encoding='utf-8', errors='replace')
          decision_path = root / 'governance/state/curator_last_decision.json'
          decision = decision_path.read_text(encoding='utf-8', errors='replace') if decision_path.exists() else '{}'
          def read(path, limit=20000):
              p = root / path
              return p.read_text(encoding='utf-8', errors='replace')[:limit] if p.exists() else f'[missing: {path}]'
          parts = [
              'BEM-GPT-CURATOR | HOSTED_GPT_CURATOR',
              '',
              'You are GPT_CURATOR for ai-devops-system.',
              'Operator entrypoint remains Telegram/Deno/Issue #31/curator.',
              'Do not call Claude. Do not reveal secrets. Do not include literal at-sign mentions.',
              '',
              'Curator routing decision:',
              decision,
              '',
              'Incoming curator comment:',
              '-----',
              comment,
              '-----',
              '',
              'routing.json:',
              read('governance/state/routing.json'),
              '',
              'provider_status.json:',
              read('governance/state/provider_status.json'),
              '',
              'MASTER_PLAN:',
              read('governance/MASTER_PLAN.md'),
              '',
              'Required output: compact Russian BEM report with ACTIVE_BACKEND, ROUTING_REASON, TRACE_ID, NEXT_ACTION.'
          ]
          Path(__import__('os').environ['RUNNER_TEMP'], 'hosted_gpt_curator_prompt.txt').write_text('\n'.join(parts), encoding='utf-8')
          PY
          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"

      - name: Run hosted GPT curator
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set +e
          OUTPUT_FILE="$RUNNER_TEMP/hosted_gpt_curator_output.md"
          python3 - <<'PY' > "$OUTPUT_FILE" 2>&1
          import json, os, pathlib, urllib.error, urllib.request
          prompt = pathlib.Path(os.environ['PROMPT_FILE']).read_text(encoding='utf-8', errors='replace')
          api_key = os.environ.get('OPENAI_API_KEY', '')
          model = os.environ.get('OPENAI_MODEL') or 'gpt-4o-mini'
          print('BEM-GPT-CURATOR | HOSTED RAW OUTPUT')
          print(f'MODEL={model}')
          print(f'ACTIVE_BACKEND={os.environ.get("ACTIVE_BACKEND", "unknown")}')
          print(f'NEXT_ACTION={os.environ.get("NEXT_ACTION", "unknown")}')
          if not api_key:
              print('HOSTED_GPT_STATUS=OPENAI_API_KEY_MISSING')
              raise SystemExit(0)
          payload = {
              'model': model,
              'input': [
                  {'role': 'system', 'content': 'You are GPT_CURATOR. Return compact Russian BEM report. Do not reveal secrets.'},
                  {'role': 'user', 'content': prompt}
              ],
              'max_output_tokens': 1400
          }
          req = urllib.request.Request('https://api.openai.com/v1/responses', data=json.dumps(payload).encode('utf-8'), headers={'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'}, method='POST')
          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  data = json.loads(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print(f'HOSTED_GPT_STATUS=OPENAI_API_HTTP_ERROR_{e.code}')
              print(e.read().decode('utf-8', errors='replace')[:4000])
              raise SystemExit(0)
          except Exception as e:
              print('HOSTED_GPT_STATUS=OPENAI_API_CALL_FAILED')
              print(str(e))
              raise SystemExit(0)
          text = data.get('output_text') or ''
          if not text:
              buf = []
              for item in data.get('output', []):
                  for content in item.get('content', []):
                      if content.get('type') in ('output_text', 'text'):
                          buf.append(content.get('text', ''))
              text = '\n'.join(buf).strip()
          print('HOSTED_GPT_STATUS=OK')
          print(text or '[empty OpenAI response text]')
          PY
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
          exit 0

      - name: Route requested role
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path
          p = Path('governance/state/curator_last_decision.json')
          if not p.exists():
              print('No curator_last_decision.json')
              raise SystemExit(0)
          d = json.loads(p.read_text(encoding='utf-8'))
          role = d.get('requested_role')
          if not role or role == 'none':
              print('No requested role; skip role route')
              raise SystemExit(0)
          trace = d.get('trace_id', 'missing')
          task = (d.get('task') or '').strip()[:4000]
          body = '\n'.join([
              'TYPE: CURATOR_TO_ROLE',
              f'TRACE_ID: {trace}',
              f'ROLE: {role}',
              '',
              'TASK:',
              task
          ])
          data = json.dumps({'body': body}).encode('utf-8')
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['ISSUE_NUMBER']}/comments",
              data=data,
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                  'User-Agent': 'ai-devops-curator-route'
              },
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PY

      - name: Post hosted GPT curator report
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          python3 - <<'PY'
          import json, os, pathlib, urllib.request
          output_path = pathlib.Path(os.environ.get('OUTPUT_FILE', ''))
          output = output_path.read_text(encoding='utf-8', errors='replace') if output_path.exists() else 'OUTPUT_FILE was not created.'
          for a, b in [('@curator','curator'),('@gpt_executor','GPT_EXECUTOR'),('@gpt_analyst','GPT_ANALYST'),('@gpt_auditor','GPT_AUDITOR')]:
              output = output.replace(a, b)
          body = 'BEM-GPT-CURATOR | RUN RESULT | HOSTED FALLBACK\n\n' + output[-60000:] + '\n\nANTI_RECURSION: report comments are ignored by curator workflows.'
          data = json.dumps({'body': body}).encode('utf-8')
          req = urllib.request.Request(f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['ISSUE_NUMBER']}/comments", data=data, headers={'Authorization': f"Bearer {os.environ['GH_TOKEN']}", 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'User-Agent': 'ai-devops-hosted-gpt-curator'}, method='POST')
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PY
