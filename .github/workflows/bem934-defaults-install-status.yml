name: BEM934 Defaults Install Status

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Capture defaults install status
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh auth setup-git
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-status@ai-devops-system"
          git config user.name "BEM-934 Status"
          mkdir -p governance/proofs
          gh run list --repo "$REPO" --workflow bem934-install-temporary-claude-dispatch-defaults.yml --limit 5 --json databaseId,status,conclusion,createdAt,updatedAt,headSha,url > /tmp/runs.json
          RUN_ID="$(python3 -c 'import json; d=json.load(open("/tmp/runs.json")); print(d[0]["databaseId"] if d else "")')"
          : > /tmp/failed.log
          if [ -n "$RUN_ID" ]; then
            gh run view "$RUN_ID" --repo "$REPO" --log-failed > /tmp/failed.log 2>&1 || true
          fi
          tail -n 200 /tmp/failed.log > /tmp/failed.tail
          python3 - <<'PY'
          import json
          from pathlib import Path
          runs = json.load(open("/tmp/runs.json", encoding="utf-8"))
          log = Path("/tmp/failed.tail").read_text(encoding="utf-8", errors="replace")
          out = {"task_id":"BEM934-LIVE-TEST","runs":runs,"failed_log_tail":log}
          Path("governance/proofs/BEM934_defaults_install_status.json").write_text(
              json.dumps(out, ensure_ascii=False, indent=2) + "\n", encoding="utf-8"
          )
          PY
          git add governance/proofs/BEM934_defaults_install_status.json
          git commit -m "Capture BEM-934 defaults install status" || exit 0
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
