name: Telegram Webhook

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message from Telegram'
        required: true
        type: string
      chat_id:
        description: 'Telegram chat_id'
        required: true
        type: string

permissions:
  contents: read
  issues: write

jobs:
  handle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process Telegram command
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ inputs.chat_id }}
          USER_MESSAGE: ${{ inputs.message }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone, timedelta

          repo = "bereznyi-aleksandr/ai-devops-system"
          msg = os.environ.get("USER_MESSAGE", "").lower().strip()
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          now_ua = (datetime.now(timezone.utc) + timedelta(hours=3)).strftime("%H:%M UA")

          def send(text):
              data = urllib.parse.urlencode({
                  "chat_id": chat_id,
                  "text": text
              }).encode("utf-8")
              url = "https://api.telegram.org/bot" + token + "/sendMessage"
              req = urllib.request.Request(url, data=data, method="POST")
              with urllib.request.urlopen(req, timeout=30) as response:
                  print(response.read().decode("utf-8"))

          def read_file(path, default=""):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return f.read()
              except Exception:
                  return default

          exchange_text = read_file("governance/exchange.jsonl")
          events = []
          for line in exchange_text.splitlines():
              try:
                  events.append(json.loads(line))
              except Exception:
                  pass

          if any(word in msg for word in ["статус", "status", "что", "как"]):
              master_plan = read_file("governance/MASTER_PLAN.md")
              stage = "E3" if "E3" in master_plan else "неизвестно"
              if events:
                  last_events = "\n".join([
                      "- " + str(e.get("event_type", "?"))
                      for e in events[-5:]
                  ])
              else:
                  last_events = "нет событий"

              reply = "\n".join([
                  "📊 КУРАТОР | " + now_ua,
                  "",
                  "Этап: " + stage,
                  "",
                  "Последние события:",
                  last_events
              ])
              send(reply)

          elif any(word in msg for word in ["аналитик", "анализ", "analyst", "запусти"]):
              body = "@analyst Прочитай MASTER_PLAN.md и EXCHANGE.md. Предложи следующий шаг E3. Завершись: @auditor REVIEW"
              subprocess.check_output([
                  "gh", "issue", "comment", "31",
                  "--repo", repo,
                  "--body", body
              ], text=True)
              send("✅ " + now_ua + " | @analyst запущен.")

          elif any(word in msg for word in ["стоп", "stop", "пауза"]):
              send("⏸ " + now_ua + " | Получена команда СТОП.")

          else:
              help_text = "\n".join([
                  "Доступные команды:",
                  "",
                  "статус — текущее состояние системы",
                  "запусти аналитика — запустить @analyst",
                  "стоп — пауза",
                  "помощь — список команд"
              ])
              send(help_text)
          PY
