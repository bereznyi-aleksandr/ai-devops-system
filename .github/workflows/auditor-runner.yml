name: Auditor Runner

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID for auditor to process'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GitHub PAT from Secret Manager
        id: get_pat
        run: |
          PAT=$(gcloud secrets versions access latest \
            --secret="GITHUB_TOKEN" \
            --project="barber-483016" | tr -d '\r\n')
          echo "::add-mask::$PAT"
          printf 'pat=%s\n' "$PAT" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read task context
        id: context
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          task_id = os.environ['TASK_ID']
          task_file = Path(f'governance/tasks/{task_id}.json')

          if task_file.exists():
              task = json.loads(task_file.read_text(encoding='utf-8'))
          else:
              task = {"task_id": task_id, "description": "No task file found"}

          ledger = Path('governance/exchange_ledger.csv').read_text(encoding='utf-8')
          last_rows = '\n'.join(ledger.strip().splitlines()[-5:])

          context = {
              "task_id": task_id,
              "task": task,
              "ledger_tail": last_rows
          }

          out_file = Path('.tmp/auditor_context.json')
          out_file.parent.mkdir(parents=True, exist_ok=True)
          out_file.write_text(
              json.dumps(context, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('CONTEXT_READY=true')
          PY

      - name: Run Claude API as Auditor
        id: auditor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_ID: ${{ github.event.inputs.task_id }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          from pathlib import Path

          api_key = os.environ['ANTHROPIC_API_KEY']
          task_id = os.environ['TASK_ID']
          model = os.getenv('LLM_MODEL') or 'claude-sonnet-4-20250514'
          context = json.loads(Path('.tmp/auditor_context.json').read_text(encoding='utf-8'))

          system_prompt = """You are the AUDITOR in an autonomous multi-agent DevOps system.
          SSOT: MASTER_PROMPT_v155_CANON_FINAL
          Repository: bereznyi-aleksandr/ai-devops-system

          Your role:
          - Review proposals, execution requests, and results
          - Produce only audit decisions
          - Never perform implementation or execution work

          Respond ONLY with a valid JSON object.
          No preamble. No markdown. No backticks.
          Required fields:
          {
            "schema_version": "v155",
            "event_id": "<new unique event id>",
            "parent_event_id": "<last event_id from ledger>",
            "task_id": "<existing task id>",
            "event_time": "<ISO timestamp>",
            "step_name": "<P0.X or P1.X>",
            "actor_role": "AUDITOR",
            "event_type": "<allowed v155 event type>",
            "description": "<audit decision description>",
            "status": "<status>",
            "next_actor_role": "<ANALYST or AUDITOR or CLOUD_CODE or OPERATOR or LEDGER_WRITER or LEDGER_ROUTER or NONE>",
            "next_expected_event": "<next expected event>",
            "routing_decision_basis": "<basis>",
            "commit_sha": ""
          }"""

          user_message = f"""Task context:
          {json.dumps(context, ensure_ascii=False, indent=2)}

          Prepare the correct audit decision for task_id: {task_id}
          using only the v155 ledger contract and allowed actor roles."""

          payload = {
              "model": model,
              "max_tokens": 2000,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_message}]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01'
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              body = e.read().decode('utf-8', errors='replace')
              print(body)
              raise

          raw_output = result['content'][0]['text'].strip()
          Path('.tmp/auditor_raw_output.txt').write_text(raw_output, encoding='utf-8')
          print('AUDITOR_OUTPUT_READY=true')
          PY

      - name: Validate LLM output schema
        id: validate
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          required = [
              'schema_version', 'event_id', 'parent_event_id',
              'task_id', 'event_time', 'step_name', 'actor_role',
              'event_type', 'description', 'status',
              'next_actor_role', 'next_expected_event',
              'routing_decision_basis', 'commit_sha'
          ]

          allowed_event_types = {
              'TASK_PROPOSED',
              'PRE_ACTION_APPROVED',
              'PRE_ACTION_REJECTED',
              'ACTION_EXECUTION_REQUEST',
              'ACTION_COMPLETED',
              'RESULT_ACCEPTED',
              'RESULT_REJECTED',
              'TASK_CLOSED',
              'EMERGENCY_BLOCKED',
              'VALIDATION_FAILED'
          }

          allowed_roles = {
              'ANALYST',
              'AUDITOR',
              'CLOUD_CODE',
              'OPERATOR',
              'LEDGER_WRITER',
              'LEDGER_ROUTER',
              'NONE'
          }

          raw = Path('.tmp/auditor_raw_output.txt').read_text(encoding='utf-8')

          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f'VALIDATION_FAILED: invalid JSON — {e}', file=sys.stderr)
              sys.exit(1)

          missing = [f for f in required if f not in payload]
          if missing:
              print(f'VALIDATION_FAILED: missing fields: {missing}', file=sys.stderr)
              sys.exit(1)

          if payload['actor_role'] != 'AUDITOR':
              print(f'VALIDATION_FAILED: actor_role must be AUDITOR, got {payload["actor_role"]}', file=sys.stderr)
              sys.exit(1)

          if payload['event_type'] not in allowed_event_types:
              print(f'VALIDATION_FAILED: invalid event_type: {payload["event_type"]}', file=sys.stderr)
              sys.exit(1)

          if payload['next_actor_role'] not in allowed_roles:
              print(f'VALIDATION_FAILED: invalid next_actor_role: {payload["next_actor_role"]}', file=sys.stderr)
              sys.exit(1)

          Path('.tmp/auditor_validated_output.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('SCHEMA_VALIDATION=PASSED')
          PY

      - name: Write validated output to ledger
        run: |
          python3 governance/ledger_writer.py \
            --payload-file .tmp/auditor_validated_output.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Auditor: decision written to ledger" \
            --binding-commit-message "Auditor: bind commit sha" \
            | tee .tmp/auditor_writer_output.txt

      - name: Capture writer outputs
        run: |
          grep '^EVENT_ID=' .tmp/auditor_writer_output.txt
          grep '^TASK_ID=' .tmp/auditor_writer_output.txt
          grep '^EVENT_COMMIT_SHA=' .tmp/auditor_writer_output.txt
          grep '^BINDING_COMMIT_SHA=' .tmp/auditor_writer_output.txt

      - name: Push ledger update
        run: |
          git push origin HEAD:main

      - name: Dispatch ledger-updated event
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        run: |
          LAST_EVENT=$(python3 -c "
          import csv
          with open('governance/exchange_ledger.csv') as f:
              rows = list(csv.DictReader(f))
              last = rows[-1]
              print(last['event_id'])
          ")
          TASK_ID="${{ github.event.inputs.task_id }}"
          NEXT_ROLE=$(python3 -c "
          import csv
          with open('governance/exchange_ledger.csv') as f:
              rows = list(csv.DictReader(f))
              last = rows[-1]
              print(last['next_actor_role'])
          ")
          gh api repos/bereznyi-aleksandr/ai-devops-system/dispatches \
            --method POST \
            -f event_type=ledger-updated \
            -f client_payload[next_actor_role]="$NEXT_ROLE" \
            -f client_payload[task_id]="$TASK_ID" \
            -f client_payload[event_id]="$LAST_EVENT"

      - name: Cleanup temp files
        if: always()
        run: |
          rm -rf .tmp

      - name: Guardrail
        run: |
          echo "Auditor workflow may write audit decisions to ledger."
          echo "Execution or implementation must not be performed here."
