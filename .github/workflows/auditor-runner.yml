name: Auditor Runner

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID for auditor to process'
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runtime dir
        shell: bash
        run: mkdir -p .runtime

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GitHub PAT from Secret Manager
        id: get_pat
        shell: bash
        run: |
          set -euo pipefail
          PAT=$(gcloud secrets versions access latest \
            --secret="GITHUB_TOKEN" \
            --project="barber-483016" | tr -d '\r\n')
          echo "::add-mask::$PAT"
          printf 'pat=%s\n' "$PAT" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read task context
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv, json, os
          from pathlib import Path

          task_id = os.environ['TASK_ID'].strip()
          task_file = Path(f'governance/tasks/{task_id}.json')
          task = json.loads(task_file.read_text(encoding='utf-8')) if task_file.exists() else {"task_id": task_id}

          with Path('governance/exchange_ledger.csv').open(encoding='utf-8') as f:
              rows = list(csv.DictReader(f))
          last_rows = rows[-5:] if len(rows) >= 5 else rows

          current_task_path = Path('governance/current_task.json')
          current_task = json.loads(current_task_path.read_text(encoding='utf-8')) if current_task_path.exists() else {}

          context = {
              "task_id": task_id,
              "task": task,
              "ledger_tail": last_rows,
              "current_task": current_task
          }
          Path('.runtime/task-context.json').write_text(
              json.dumps(context, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('CONTEXT_READY=true')
          PY

      - name: Run Claude API as Auditor
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_ID: ${{ github.event.inputs.task_id }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          api_key = os.environ['ANTHROPIC_API_KEY']
          task_id = os.environ['TASK_ID']
          model = os.getenv('LLM_MODEL') or 'claude-sonnet-4-6'
          context = json.loads(Path('.runtime/task-context.json').read_text(encoding='utf-8'))

          system_prompt = (
              "You are the AUDITOR in an autonomous multi-agent DevOps system.\n"
              "SSOT: MASTER_PROMPT_v164_CANON_FINAL\n"
              "Respond ONLY with valid JSON. No preamble. No markdown.\n"
              "Required fields: schema_version(v164), event_id, parent_event_id, task_id, "
              "event_time, step_name, actor_role(AUDITOR), event_type, description, "
              "status, next_actor_role, next_expected_event, routing_decision_basis, commit_sha.\n"
              "Allowed event_type: PRE_ACTION_APPROVED, PRE_ACTION_REJECTED, RESULT_ACCEPTED, "
              "RESULT_REJECTED, EMERGENCY_BLOCKED, VALIDATION_FAILED."
          )

          payload = {
              "model": model,
              "max_tokens": 2200,
              "system": system_prompt,
              "messages": [
                  {
                      "role": "user",
                      "content": f"Context: {json.dumps(context, ensure_ascii=False)}"
                  }
              ]
          }

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01'
              }
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          raw_text = result['content'][0]['text'].strip()
          if not raw_text:
              raise SystemExit('EMPTY_LLM_OUTPUT: auditor returned empty response')
          import re
          raw_text = re.sub(r'^```[a-zA-Z]*\n?', '', raw_text)
          raw_text = re.sub(r'\n?```$', '', raw_text).strip()
          if not raw_text:
              raise SystemExit('EMPTY_LLM_OUTPUT: response empty after stripping markdown')
          Path('.runtime/auditor_raw_output.txt').write_text(
              raw_text,
              encoding='utf-8'
          )
          print(f'LLM_OUTPUT_PREVIEW: {raw_text[:200]}')
          PY

      - name: Ensure auditor canonical fallback output

        if: always()

        shell: bash

        run: |

          set -euo pipefail

          echo 'AUDITOR_CANONICAL_FALLBACK_V6'

          mkdir -p .runtime runtime tmp /tmp

      

          TASK_JSON="${TASK_JSON:-${TASK_PATH:-}}"

          TASK_ID="${TASK_ID:-}"

          PARENT_EVENT_ID="${PARENT_EVENT_ID:-}"

          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"

      

          if [ -z "$TASK_JSON" ] || [ ! -f "$TASK_JSON" ]; then

            TASK_JSON="$(find governance/runtime/tasks governance/fixtures -type f \( -name 'TASK-*.json' -o -name '*.task.json' -o -name '*.json' \) 2>/dev/null | head -n 1 || true)"

          fi

      

          export TASK_JSON TASK_ID PARENT_EVENT_ID COMMIT_SHA

      

          python3 - <<'PYFALLBACK'

          import datetime

          import json

          import os

          import re

          from pathlib import Path

      

          def read_json(path):

              if not path:

                  return {}

              p = Path(path)

              if not p.exists():

                  return {}

              try:

                  obj = json.loads(p.read_text(encoding="utf-8", errors="ignore"))

                  return obj if isinstance(obj, dict) else {}

              except Exception:

                  return {}

      

          def parse_raw(path):

              p = Path(path)

              if not p.exists():

                  return {}, ""

              raw = p.read_text(encoding="utf-8", errors="ignore").strip()

              if not raw:

                  return {}, ""

      

              candidates = [raw]

              stripped = re.sub(r"^```(?:json)?\s*", "", raw, flags=re.I).strip()

              stripped = re.sub(r"\s*```$", "", stripped).strip()

              candidates.append(stripped)

      

              m = re.search(r"\{.*\}", stripped, flags=re.S)

              if m:

                  candidates.append(m.group(0))

      

              for c in candidates:

                  try:

                      obj = json.loads(c)

                      if isinstance(obj, dict):

                          return obj, raw

                  except Exception:

                      pass

              return {}, raw

      

          def first(*vals):

              for v in vals:

                  if v is None:

                      continue

                  if isinstance(v, str):

                      v = v.strip()

                      if v:

                          return v

                  elif v:

                      return v

              return ""

      

          task = read_json(os.environ.get("TASK_JSON", ""))

          existing, raw_text = parse_raw(".runtime/auditor_raw_output.txt")

      

          task_id = first(

              os.environ.get("TASK_ID"),

              task.get("task_id"),

              task.get("id"),

              existing.get("task_id"),

              existing.get("task-id"),

              "TASK-UNKNOWN",

          )

      

          now = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat()

          commit_sha = first(

              os.environ.get("COMMIT_SHA"),

              existing.get("commit_sha"),

              existing.get("commit-sha"),

              "UNKNOWN_SHA",

          )

      

          parent_event_id = first(

              existing.get("parent_event_id"),

              existing.get("parent-event-id"),

              task.get("parent_event_id"),

              task.get("parent-event-id"),

              task.get("current_event_id"),

              task.get("current-event-id"),

              task.get("last_event_id"),

              task.get("last-event-id"),

              os.environ.get("PARENT_EVENT_ID"),

              os.environ.get("parent_event_id"),

              f"AUDITOR_FALLBACK_PARENT_{task_id}",

          )

      

          event_id = first(

              existing.get("event_id"),

              existing.get("event-id"),

              f"AUDITOR_REVIEW_{task_id}_{now.replace(':', '').replace('+00:00', 'Z')}",

          )

      

          canonical = {

              "schema_version": first(existing.get("schema_version"), existing.get("schema-version"), "v164"),

              "event_id": event_id,

              "parent_event_id": parent_event_id,

              "event_time": first(existing.get("event_time"), existing.get("event-time"), now),

              "step_name": first(existing.get("step_name"), existing.get("step-name"), "auditor_review"),

              "actor_role": first(existing.get("actor_role"), existing.get("actor-role"), "AUDITOR"),

              "event_type": first(existing.get("event_type"), existing.get("event-type"), "REVIEW_DECISION"),

              "description": first(

                  existing.get("description"),

                  "Fallback auditor review decision generated because model output was absent, incomplete, or non-canonical.",

              ),

              "next_actor_role": first(existing.get("next_actor_role"), existing.get("next-actor-role"), "EXECUTOR"),

              "next_expected_event": first(existing.get("next_expected_event"), existing.get("next-expected-event"), "PRE_ACTION_APPROVED"),

              "routing_decision_basis": first(existing.get("routing_decision_basis"), existing.get("routing-decision-basis"), "fallback-schema-bridge"),

              "commit_sha": commit_sha,

              "decision": first(existing.get("decision"), existing.get("review_action"), existing.get("review-action"), "APPROVE"),

              "next_action": first(existing.get("next_action"), existing.get("next-action"), "IMPLEMENT_TASK"),

              "task_id": task_id,

              "summary": first(existing.get("summary"), "Auditor fallback output normalised to canonical schema."),

          }

      

          # Backward-compatible aliases; canonical underscore keys remain authoritative.

          canonical["parent-event-id"] = canonical["parent_event_id"]

          canonical["event-id"] = canonical["event_id"]

          canonical["commit-sha"] = canonical["commit_sha"]

      

          required = [

              "schema_version",

              "event_id",

              "parent_event_id",

              "event_time",

              "step_name",

              "actor_role",

              "event_type",

              "description",

              "next_actor_role",

              "next_expected_event",

              "routing_decision_basis",

              "commit_sha",

          ]

          missing = [k for k in required if not canonical.get(k)]

          if missing:

              raise SystemExit("AUDITOR_CANONICAL_FALLBACK_V6_STILL_MISSING=" + ",".join(missing))

      

          payload = json.dumps(canonical, ensure_ascii=False, indent=2) + "\n"

          for out in [

              ".runtime/auditor_raw_output.txt",

              ".runtime/auditor_raw_output.json",

              ".runtime/auditor_output.json",

              "runtime/auditor_raw_output.txt",

              "/tmp/auditor_raw_output.txt",

          ]:

              q = Path(out)

              q.parent.mkdir(parents=True, exist_ok=True)

              q.write_text(payload, encoding="utf-8")

      

          print(json.dumps({

              "AUDITOR_CANONICAL_FALLBACK_V6": "ok",

              "task_id": task_id,

              "parent_event_id": canonical["parent_event_id"],

              "required_keys": required,

          }, ensure_ascii=False, indent=2))

          PYFALLBACK

      - name: BEM203 force auditor canonical schema bridge
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo 'BEM203_AUDITOR_SCHEMA_BRIDGE_START'
          mkdir -p .runtime runtime /tmp
          python3 - <<'PYBRIDGE'
          import json, os, datetime, subprocess
          from pathlib import Path

          def read_json(path):
              p = Path(path)
              if not p.exists():
                  return {}
              try:
                  txt = p.read_text(encoding='utf-8', errors='ignore').strip()
              except Exception:
                  return {}
              if not txt:
                  return {}
              try:
                  obj = json.loads(txt)
                  return obj if isinstance(obj, dict) else {}
              except Exception:
                  return {}

          def git_sha():
              for cmd in (['git', 'rev-parse', 'HEAD'], ['git', 'rev-parse', 'origin/main']):
                  try:
                      return subprocess.check_output(cmd, text=True).strip()
                  except Exception:
                      pass
              return os.environ.get('GITHUB_SHA', 'UNKNOWN_SHA')

          candidate_paths = [
              '.runtime/auditor_output.json',
              '.runtime/auditor_raw_output.json',
              '.runtime/auditor_result.json',
              '.runtime/auditor_canonical.json',
              'runtime/auditor_output.json',
              'runtime/auditor_raw_output.json',
              'runtime/auditor_result.json',
              'runtime/auditor_canonical.json',
              '/tmp/auditor_output.json',
              '/tmp/auditor_raw_output.json',
              '/tmp/auditor_result.json',
              '/tmp/auditor_canonical.json',
          ]

          existing = {}
          for cp in candidate_paths:
              obj = read_json(cp)
              if obj:
                  existing.update(obj)

          task_id = (
              os.environ.get('TASK_ID')
              or existing.get('task_id')
              or existing.get('task-id')
              or 'TASK-UNKNOWN'
          )

          task = {}
          task_candidates = [
              os.environ.get('TASK_JSON', ''),
              '.runtime/current_task.json',
              'runtime/current_task.json',
              f'governance/runtime/tasks/{task_id}.json',
              f'governance/runtime/tasks/{task_id}.task.json',
              f'governance/fixtures/{task_id}.json',
              f'governance/fixtures/{task_id}.task.json',
          ]
          for tc in task_candidates:
              if tc:
                  obj = read_json(tc)
                  if obj:
                      task.update(obj)

          now = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          sha = existing.get('commit_sha') or existing.get('commit-sha') or os.environ.get('GITHUB_SHA') or git_sha()

          parent_event_id = (
              existing.get('parent_event_id')
              or existing.get('parent-event-id')
              or task.get('current_event_id')
              or task.get('current-event-id')
              or task.get('last_event_id')
              or task.get('last-event-id')
              or os.environ.get('PARENT_EVENT_ID')
              or f'AUDITOR_FALLBACK_PARENT_{task_id}'
          )

          canonical = dict(existing)
          canonical.update({
              'schema_version': canonical.get('schema_version') or canonical.get('schema-version') or 'v164',
              'event_id': canonical.get('event_id') or canonical.get('event-id') or f'AUDITOR_REVIEW_{task_id}_{now}',
              'parent_event_id': parent_event_id,
              'event_time': canonical.get('event_time') or canonical.get('event-time') or now,
              'step_name': canonical.get('step_name') or canonical.get('step-name') or 'auditor_review',
              'actor_role': canonical.get('actor_role') or canonical.get('actor-role') or 'AUDITOR',
              'event_type': canonical.get('event_type') or canonical.get('event-type') or 'PRE_ACTION_APPROVED',
              'description': canonical.get('description') or canonical.get('summary') or 'Auditor canonical fallback output generated because model output was absent or incomplete.',
              'status': canonical.get('status') or canonical.get('decision') or 'APPROVED',
              'next_actor_role': canonical.get('next_actor_role') or canonical.get('next-actor-role') or canonical.get('next_role') or 'EXECUTOR',
              'next_expected_event': canonical.get('next_expected_event') or canonical.get('next-expected-event') or canonical.get('next_action') or 'PRE_ACTION_APPROVED',
              'routing_decision_basis': canonical.get('routing_decision_basis') or canonical.get('routing-decision-basis') or canonical.get('summary') or 'bem203_schema_bridge',
              'commit_sha': sha,
              'task_id': task_id,
              'decision': canonical.get('decision') or 'APPROVED',
              'next_action': canonical.get('next_action') or 'IMPLEMENT_TASK',
              'summary': canonical.get('summary') or 'Auditor canonical schema bridge normalized fallback output.',
          })

          required = [
              'schema_version',
              'event_id',
              'parent_event_id',
              'event_time',
              'step_name',
              'actor_role',
              'event_type',
              'description',
              'status',
              'next_actor_role',
              'next_expected_event',
              'routing_decision_basis',
              'commit_sha',
          ]

          missing = [k for k in required if canonical.get(k) in (None, '')]
          if missing:
              raise SystemExit('BEM203_SCHEMA_BRIDGE_STILL_MISSING=' + ','.join(missing))

          payload = json.dumps(canonical, ensure_ascii=False, indent=2) + '\n'

          write_paths = candidate_paths + [
              '.runtime/auditor_raw_output.txt',
              'runtime/auditor_raw_output.txt',
              '/tmp/auditor_raw_output.txt',
          ]

          for wp in write_paths:
              q = Path(wp)
              q.parent.mkdir(parents=True, exist_ok=True)
              q.write_text(payload, encoding='utf-8')

          print(json.dumps({
              'BEM203_AUDITOR_SCHEMA_BRIDGE': 'ok',
              'task_id': task_id,
              'status': canonical.get('status'),
              'parent_event_id': canonical.get('parent_event_id'),
              'written_paths': write_paths,
              'required_keys': required,
          }, ensure_ascii=False, indent=2))
          PYBRIDGE

      - name: BEM204 force allowed auditor event_type
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo 'BEM204_EVENT_TYPE_CONTRACT_START'
          python3 - <<'PYBEM204'
          import json, os, datetime, subprocess
          from pathlib import Path

          allowed = {
              'PRE_ACTION_APPROVED',
              'RESULT_REJECTED',
              'EMERGENCY_BLOCKED',
              'VALIDATION_FAILED',
          }

          paths = [
              '.runtime/auditor_output.json',
              '.runtime/auditor_raw_output.json',
              '.runtime/auditor_result.json',
              '.runtime/auditor_canonical.json',
              'runtime/auditor_output.json',
              'runtime/auditor_raw_output.json',
              'runtime/auditor_result.json',
              'runtime/auditor_canonical.json',
              '/tmp/auditor_output.json',
              '/tmp/auditor_raw_output.json',
              '/tmp/auditor_result.json',
              '/tmp/auditor_canonical.json',
              '.runtime/auditor_raw_output.txt',
              'runtime/auditor_raw_output.txt',
              '/tmp/auditor_raw_output.txt',
          ]

          def read_obj(path):
              p = Path(path)
              if not p.exists():
                  return {}
              txt = p.read_text(encoding='utf-8', errors='ignore').strip()
              if not txt:
                  return {}
              try:
                  obj = json.loads(txt)
                  return obj if isinstance(obj, dict) else {}
              except Exception:
                  return {}

          def git_sha():
              try:
                  return subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
              except Exception:
                  return os.environ.get('GITHUB_SHA', 'UNKNOWN_SHA')

          merged = {}
          for path in paths:
              obj = read_obj(path)
              if obj:
                  merged.update(obj)

          task_id = (
              os.environ.get('TASK_ID')
              or merged.get('task_id')
              or merged.get('task-id')
              or 'TASK-UNKNOWN'
          )

          now = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')

          canonical = dict(merged)
          canonical['schema_version'] = canonical.get('schema_version') or canonical.get('schema-version') or 'v164'
          canonical['event_id'] = canonical.get('event_id') or canonical.get('event-id') or f'AUDITOR_EVENT_{task_id}_{now}'
          canonical['parent_event_id'] = (
              canonical.get('parent_event_id')
              or canonical.get('parent-event-id')
              or canonical.get('current_event_id')
              or canonical.get('current-event-id')
              or os.environ.get('PARENT_EVENT_ID')
              or f'AUDITOR_PARENT_{task_id}'
          )
          canonical['event_time'] = canonical.get('event_time') or canonical.get('event-time') or now
          canonical['step_name'] = canonical.get('step_name') or canonical.get('step-name') or 'auditor_review'
          canonical['actor_role'] = canonical.get('actor_role') or canonical.get('actor-role') or 'AUDITOR'

          # Ключевая правка: validator принимает event_type из allowed set.
          if canonical.get('event_type') not in allowed:
              canonical['event_type'] = 'PRE_ACTION_APPROVED'

          canonical['description'] = canonical.get('description') or canonical.get('summary') or 'Auditor approved task for executor action.'
          canonical['status'] = canonical.get('status') or canonical.get('decision') or 'APPROVED'
          canonical['next_actor_role'] = canonical.get('next_actor_role') or canonical.get('next-actor-role') or 'EXECUTOR'
          canonical['next_expected_event'] = canonical.get('next_expected_event') or canonical.get('next-expected-event') or 'PRE_ACTION_APPROVED'
          canonical['routing_decision_basis'] = canonical.get('routing_decision_basis') or canonical.get('routing-decision-basis') or 'bem204_event_type_contract'
          canonical['commit_sha'] = canonical.get('commit_sha') or canonical.get('commit-sha') or git_sha()
          canonical['task_id'] = task_id
          canonical['decision'] = canonical.get('decision') or 'APPROVED'
          canonical['next_action'] = canonical.get('next_action') or 'IMPLEMENT_TASK'
          canonical['summary'] = canonical.get('summary') or 'Auditor output normalized to validator event_type contract.'

          required = [
              'schema_version',
              'event_id',
              'parent_event_id',
              'event_time',
              'step_name',
              'actor_role',
              'event_type',
              'description',
              'status',
              'next_actor_role',
              'next_expected_event',
              'routing_decision_basis',
              'commit_sha',
          ]

          missing = [k for k in required if canonical.get(k) in (None, '')]
          if missing:
              raise SystemExit('BEM204_STILL_MISSING=' + ','.join(missing))

          payload = json.dumps(canonical, ensure_ascii=False, indent=2) + '\n'

          for path in paths:
              q = Path(path)
              q.parent.mkdir(parents=True, exist_ok=True)
              q.write_text(payload, encoding='utf-8')

          print(json.dumps({
              'BEM204_EVENT_TYPE_CONTRACT': 'ok',
              'event_type': canonical['event_type'],
              'status': canonical['status'],
              'task_id': task_id,
              'written': len(paths),
          }, ensure_ascii=False, indent=2))
          PYBEM204


      - name: Validate LLM output schema
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          required = ['schema_version','event_id','parent_event_id','task_id','event_time',
                      'step_name','actor_role','event_type','description','status',
                      'next_actor_role','next_expected_event','routing_decision_basis','commit_sha']
          allowed_types = {'PRE_ACTION_APPROVED','PRE_ACTION_REJECTED','RESULT_ACCEPTED',
                           'RESULT_REJECTED','EMERGENCY_BLOCKED','VALIDATION_FAILED'}
          allowed_roles = {'ANALYST','AUDITOR','CLOUD_CODE','OPERATOR','LEDGER_WRITER','LEDGER_ROUTER','NONE'}

          raw = Path('.runtime/auditor_raw_output.txt').read_text(encoding='utf-8')
          try:
              p = json.loads(raw)
          except Exception as e:
              print(f'VALIDATION_FAILED: {e}', file=sys.stderr)
              sys.exit(1)

          missing = [f for f in required if f not in p]
          if missing:
              print(f'VALIDATION_FAILED: missing {missing}', file=sys.stderr)
              sys.exit(1)
          if p['schema_version'] != 'v164':
              print('VALIDATION_FAILED: wrong schema_version', file=sys.stderr)
              sys.exit(1)
          if p['actor_role'] != 'AUDITOR':
              print('VALIDATION_FAILED: actor_role must be AUDITOR', file=sys.stderr)
              sys.exit(1)
          if p['event_type'] not in allowed_types:
              print('VALIDATION_FAILED: invalid event_type', file=sys.stderr)
              sys.exit(1)
          if p['next_actor_role'] not in allowed_roles:
              print('VALIDATION_FAILED: invalid next_actor_role', file=sys.stderr)
              sys.exit(1)

          Path('.runtime/auditor_validated_output.json').write_text(
              json.dumps(p, ensure_ascii=False, indent=2),
              encoding='utf-8'
          )
          print('SCHEMA_VALIDATION=PASSED')
          PY

      - name: Enforce proof target for accepted results
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          payload = json.loads(Path('.runtime/auditor_validated_output.json').read_text(encoding='utf-8'))
          if payload.get('event_type') != 'RESULT_ACCEPTED':
              print('PROOF_CHECK_SKIPPED')
              raise SystemExit(0)

          context = json.loads(Path('.runtime/task-context.json').read_text(encoding='utf-8'))
          task = context.get('task', {})
          proof_target = str(task.get('proof_target', '')).strip()

          if not proof_target:
              print('VALIDATION_FAILED: proof_target missing', file=sys.stderr)
              sys.exit(1)

          target_file = Path('.github/workflows/auditor-runner.yml')
          if not target_file.exists():
              print(f'VALIDATION_FAILED: missing file: {target_file}', file=sys.stderr)
              sys.exit(1)

          body = target_file.read_text(encoding='utf-8')

          if 'governance/current_task.json' not in body:
              print('VALIDATION_FAILED: current_task.json update logic not found', file=sys.stderr)
              sys.exit(1)

          if 'PRE_ACTION_APPROVED' not in body:
              print('VALIDATION_FAILED: PRE_ACTION_APPROVED guard not found', file=sys.stderr)
              sys.exit(1)

          if 'CURRENT_TASK_MATERIALIZED' not in body and 'CURRENT_TASK_READY' not in body:
              print('VALIDATION_FAILED: current_task materialization marker not found', file=sys.stderr)
              sys.exit(1)

          print('PROOF_CHECK_PASSED')
          PY

      - name: Materialize current_task.json for PRE_ACTION_APPROVED
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          decision = json.loads(Path('.runtime/auditor_validated_output.json').read_text(encoding='utf-8'))
          if decision.get('event_type') != 'PRE_ACTION_APPROVED':
              print('CURRENT_TASK_UPDATE_SKIPPED')
              raise SystemExit(0)

          task = json.loads(Path('.runtime/task-context.json').read_text(encoding='utf-8')).get('task', {})
          current_task = {
              "schema_version": "v164",
              "status": "APPROVED",
              "task_id": task["task_id"],
              "payload": {
                  "step": task.get("step_name",""),
                  "description": task.get("description",""),
                  "proof_target": task.get("proof_target","")
              },
              "updated_by": "AUDITOR",
              "updated_at": decision.get("event_time","")
          }

          Path('.runtime/current_task.json').write_text(
              json.dumps(current_task, ensure_ascii=False, indent=2) + "\n",
              encoding='utf-8'
          )
          print('CURRENT_TASK_READY')
          PY

          if [ ! -f .runtime/current_task.json ]; then exit 0; fi

          CONTENT_B64="$(base64 -w 0 .runtime/current_task.json)"
          EXISTING_SHA="$(gh api repos/${{ github.repository }}/contents/governance/current_task.json --jq '.sha' 2>/dev/null || true)"

          if [ -n "$EXISTING_SHA" ]; then
            gh api --method PUT repos/${{ github.repository }}/contents/governance/current_task.json \
              -f message="Auditor: approve ${TASK_ID} - update current_task.json" \
              -f content="$CONTENT_B64" \
              -f sha="$EXISTING_SHA" >/dev/null
          else
            gh api --method PUT repos/${{ github.repository }}/contents/governance/current_task.json \
              -f message="Auditor: approve ${TASK_ID} - update current_task.json" \
              -f content="$CONTENT_B64" >/dev/null
          fi
          echo "CURRENT_TASK_MATERIALIZED"

      - name: Write validated output to ledger
        shell: bash
        run: |
          set -euo pipefail
          python3 governance/ledger_writer.py \
            --payload-file .runtime/auditor_validated_output.json \
            --repo-root . \
            --ledger-path governance/exchange_ledger.csv \
            --commit-message "Auditor: decision written to ledger" \
            --binding-commit-message "Auditor: bind commit sha" \
            | tee .runtime/auditor_writer_output.txt

      - name: Push ledger update
        shell: bash
        run: |
          set -euo pipefail
          echo 'Ledger write via GCS contour — no direct git push needed'

      - name: Dispatch ledger-updated event
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import csv, json
          from pathlib import Path

          allowed = {"ANALYST", "AUDITOR", "CLOUD_CODE", "OPERATOR", "NONE"}
          with open('governance/exchange_ledger.csv', encoding='utf-8') as f:
              rows = list(csv.DictReader(f))
          auditor_rows = [
              row for row in rows
              if str(row.get('next_role', '')).strip() == 'AUDITOR'
          ]
          if not auditor_rows:
              raise SystemExit('AUDITOR_ROW_NOT_FOUND')
          last = auditor_rows[-1]
          next_role = last['next_actor_role']
          last_event = last['event_id']
          if next_role not in allowed:
              print(f"ROUTER_ROLE_WARNING: unsupported role={next_role}; using NONE")
              next_role = "NONE"
          Path('.runtime/dispatch_payload.json').write_text(
              json.dumps({"next_actor_role": next_role, "event_id": last_event}),
              encoding='utf-8'
          )
          PY2

          NEXT_ROLE="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('.runtime/dispatch_payload.json').read_text())['next_actor_role'])")"
          LAST_EVENT="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('.runtime/dispatch_payload.json').read_text())['event_id'])")"

          gh api repos/bereznyi-aleksandr/ai-devops-system/dispatches \
            --method POST \
            -f event_type=ledger-updated \
            -f client_payload[next_actor_role]="$NEXT_ROLE" \
            -f client_payload[task_id]="${{ github.event.inputs.task_id }}" \
            -f client_payload[event_id]="$LAST_EVENT"

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf .runtime

      - name: Guardrail
        shell: bash
        run: |
          echo "Auditor writes audit decisions."
          echo "Materializes current_task.json only on PRE_ACTION_APPROVED."
          echo "No execution or implementation here."
