name: BEM934 Objects Bound Repair

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Execute observable repair
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh run cancel 27750274693 --repo "$GITHUB_REPOSITORY" || true
          gh run cancel 27750293351 --repo "$GITHUB_REPOSITORY" || true
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          python3 -m py_compile governance/runners/bem934_objects_bound_repair.py
          python3 governance/runners/bem934_objects_bound_repair.py
