name: Analyst

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  analyst:
    if: contains(github.event.comment.body, '@analyst')
    runs-on: ubuntu-latest

    concurrency:
      group: analyst-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load analyst prompt
        id: role_prompt
        shell: bash
        run: |
          {
            echo 'text<<EOF'
            cat governance/prompts/analyst_prompt.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run as ANALYST
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          trigger_phrase: "@analyst"
          prompt: |
            ${{ steps.role_prompt.outputs.text }}

            Входящий комментарий:
            ${{ github.event.comment.body }}

            Работай строго как АНАЛИТИК. Опубликуй отчёт в текущем issue. В конце отчёта вызови @auditor.
          claude_args: "--max-turns 10"
