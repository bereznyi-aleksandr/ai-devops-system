name: Analyst

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  analyst:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@analyst')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@analyst'))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run as ANALYST
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          prompt_file: governance/prompts/analyst_prompt.md
          claude_args: --max-turns 10
