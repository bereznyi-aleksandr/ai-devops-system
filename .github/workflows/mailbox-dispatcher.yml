name: Mailbox Dispatcher

# BEM-848: removed push trigger — was flooding GitHub Actions queue on every mailbox commit
# Use workflow_dispatch only

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mailbox-dispatcher
  cancel-in-progress: false

jobs:
  dispatch-mailbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Syntax check mailbox scripts
        run: python3 -m py_compile scripts/mailbox_pick_notification.py scripts/mailbox_record_delivery.py

      - name: Pick mailbox message
        run: python3 scripts/mailbox_pick_notification.py

      - name: Record mailbox route
        run: python3 scripts/mailbox_record_delivery.py

      - name: Commit mailbox route result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/state/mailbox_dispatcher_state.json governance/reports/mailbox_dispatcher_result.md
          git diff --cached --quiet && echo "No changes" || git commit -m "BEM-609 conflict-safe workflow result"
          git pull --rebase --autostash origin main || true
          git push || true
