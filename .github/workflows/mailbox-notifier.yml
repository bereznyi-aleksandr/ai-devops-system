name: Mailbox Notifier

# BEM-931:
# Deprecated for normal operator notifications.
# Operator notification must come from DIRECTOR_CURATOR after INTERNAL_AUDITOR completes the task.
# This workflow is kept only as a manual diagnostic fallback.

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnostic notice
        run: |
          echo "Mailbox Notifier is deprecated for normal operator notifications."
          echo "Use DIRECTOR_CURATOR -> Telegram for operator wake-up."
          echo "This workflow is manual diagnostic fallback only."
