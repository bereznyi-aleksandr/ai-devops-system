name: GPT Dev Entrypoint (issue_comment)

# BEM-476: report step replaced — NO createComment to issue #31
# Supports two command formats:
#   Legacy/operator: @gpt-dev run preset=X trace_id=Y
#   ChatGPT-safe:    GPT_DEV_RUN preset=X trace_id=Y

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  parse-and-launch:
    name: Parse gpt-dev command and launch session
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.issue.number == 31 && (
        contains(github.event.comment.body, '@gpt-dev run') ||
        contains(github.event.comment.body, 'GPT_DEV_RUN')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Parse and validate command
        id: parse
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import os, re, sys

          body = """${{ github.event.comment.body }}"""

          if '@gpt-dev run' in body:
              fmt = 'legacy'
          elif 'GPT_DEV_RUN' in body:
              fmt = 'safe'
          else:
              fmt = 'unknown'

          preset   = (re.search(r'preset=([a-zA-Z0-9_]+)',   body) or [None, ''])[1]
          trace_id = (re.search(r'trace_id=([a-zA-Z0-9_]+)', body) or [None, ''])[1]
          mode     = (re.search(r'mode=([a-zA-Z0-9_]+)',     body) or [None, 'step'])[1]

          VALID_PRESETS = {'developer_runner_selftest', 'fix_internal_contour'}

          valid = True
          parse_error = ''

          if not preset:
              valid = False
              parse_error = 'missing_preset'
          elif preset not in VALID_PRESETS:
              valid = False
              parse_error = f'invalid_preset: {preset}'

          if not trace_id:
              import datetime
              trace_id = 'auto_' + datetime.datetime.utcnow().strftime('%Y%m%dT%H%M%SZ')

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'VALID={str(valid).lower()}\n')
              f.write(f'PARSE_ERROR={parse_error}\n')
              f.write(f'ENTRYPOINT_PRESET={preset}\n')
              f.write(f'ENTRYPOINT_TRACE={trace_id}\n')
              f.write(f'ENTRYPOINT_MODE={mode}\n')
              f.write(f'ENTRYPOINT_FORMAT={fmt}\n')

          print(f'format={fmt} preset={preset} trace={trace_id} mode={mode} valid={valid}')
          PYEOF

      - name: Permissions check
        if: env.VALID == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "VALID=false"                              >> "$GITHUB_ENV"
            echo "PARSE_ERROR=missing_AI_SYSTEM_GITHUB_PAT" >> "$GITHUB_ENV"
            echo "PERM_BLOCKED=true"                        >> "$GITHUB_ENV"
          else
            echo "PERM_BLOCKED=false" >> "$GITHUB_ENV"
          fi

      - name: Duplicate-run guard + init session
        if: env.VALID == 'true'
        shell: bash
        env:
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          GH_TOKEN:             ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
        run: |
          python3 scripts/gpt_dev_runner.py \
            --mode init \
            --trace-id "$ENTRYPOINT_TRACE" \
            --preset   "$ENTRYPOINT_PRESET"
          echo "INIT_EXIT=$?" >> "$GITHUB_ENV"

      - name: Commit init state
        if: env.VALID == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
        run: |
          git config user.email "gpt-dev-entrypoint@ai-devops-system"
          git config user.name  "GPT Dev Entrypoint"
          git pull --rebase --autostash origin main || true
          git add \
            governance/state/gpt_dev_session.json \
            governance/state/gpt_dev_lock.json \
            governance/events/gpt_dev_runner.jsonl \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "GPT-DEV-ENTRYPOINT: init trace=$ENTRYPOINT_TRACE preset=$ENTRYPOINT_PRESET fmt=$ENTRYPOINT_FORMAT"
            git push || (git pull --rebase origin main && git push)
          fi

      - name: Dispatch first step via workflow_dispatch
        if: env.VALID == 'true' && env.INIT_EXIT == '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO:     ${{ github.repository }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/actions/workflows/gpt-dev-runner.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"mode\":\"step\",\"trace_id\":\"$ENTRYPOINT_TRACE\"}}")
          echo "DISPATCH_HTTP=$HTTP" >> "$GITHUB_ENV"
          echo "First step workflow_dispatch HTTP=$HTTP"

      # BEM-476: job summary ONLY — NO createComment to issue #31
      - name: Report to job summary
        if: always()
        shell: bash
        run: |
          VALID="${VALID:-false}"
          PARSE_ERR="${PARSE_ERROR:-}"
          PRESET="${ENTRYPOINT_PRESET:-unknown}"
          TRACE="${ENTRYPOINT_TRACE:-unknown}"
          FMT="${ENTRYPOINT_FORMAT:-unknown}"
          INIT_EXIT="${INIT_EXIT:--}"
          DISP_HTTP="${DISPATCH_HTTP:--}"

          STATUS="LAUNCHED"
          NEXT="step 1 dispatched ($DISP_HTTP)"
          if [ "$VALID" != "true" ]; then
            STATUS="BLOCKED"
            NEXT="blocker: ${PARSE_ERR:-validation_failed}"
          elif [ "$INIT_EXIT" != "0" ]; then
            STATUS="BLOCKED"
            NEXT="init_failed (exit=$INIT_EXIT)"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## GPT Dev Entrypoint — $STATUS

          | Field | Value |
          |---|---|
          | Format | $FMT |
          | Preset | $PRESET |
          | Trace | $TRACE |
          | Init exit | $INIT_EXIT |
          | Dispatch HTTP | $DISP_HTTP |
          | Next | $NEXT |

          **No issue comments written (BEM-476)**
          EOF
