name: Ledger Router

on:
  repository_dispatch:
    types: [ledger-updated]

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GitHub PAT from Secret Manager
        id: get_pat
        run: |
          PAT=$(gcloud secrets versions access latest \
            --secret="GITHUB_TOKEN" \
            --project="barber-483016")
          echo "::add-mask::$PAT"
          echo "pat=$PAT" >> $GITHUB_OUTPUT

      - name: Read routing payload
        id: routing
        run: |
          echo "next_actor_role=${{ github.event.client_payload.next_actor_role }}" \
            >> $GITHUB_OUTPUT
          echo "task_id=${{ github.event.client_payload.task_id }}" \
            >> $GITHUB_OUTPUT

      - name: Route to ANALYST
        if: steps.routing.outputs.next_actor_role == 'ANALYST'
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        run: |
          gh workflow run analyst-runner.yml \
            -f task_id=${{ steps.routing.outputs.task_id }} \
            --repo bereznyi-aleksandr/ai-devops-system || \
            echo "WARNING: analyst-runner.yml not found - pending P0.5"

      - name: Route to AUDITOR
        if: steps.routing.outputs.next_actor_role == 'AUDITOR'
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        run: |
          gh workflow run auditor-runner.yml \
            -f task_id=${{ steps.routing.outputs.task_id }} \
            --repo bereznyi-aleksandr/ai-devops-system || \
            echo "WARNING: auditor-runner.yml not found - pending P0.6"

      - name: Route to OPERATOR
        if: steps.routing.outputs.next_actor_role == 'OPERATOR'
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        run: |
          gh workflow run operator-notify.yml \
            -f task_id=${{ steps.routing.outputs.task_id }} \
            --repo bereznyi-aleksandr/ai-devops-system || \
            echo "WARNING: operator-notify.yml not found - pending P0.8"

      - name: EXECUTOR note
        if: steps.routing.outputs.next_actor_role == 'EXECUTOR'
        run: |
          echo "EXECUTOR route: executor-runner triggers on current_task.json push"

      - name: Guardrail
        run: |
          echo "Governance decision is not made here."
          echo "This workflow only routes based on next_actor_role from ledger event."
