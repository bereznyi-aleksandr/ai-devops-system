name: Ledger Router

on:
  repository_dispatch:
    types: [ledger-updated]

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate dispatch contract
        env:
          NEXT_ROLE: ${{ github.event.client_payload.next_actor_role }}
          TASK_ID: ${{ github.event.client_payload.task_id }}
          EVENT_ID: ${{ github.event.client_payload.event_id }}
        run: |
          python3 - <<'PY'
          import os, sys

          allowed_roles = {
              'ANALYST',
              'AUDITOR',
              'CLOUD_CODE',
              'OPERATOR',
              'LEDGER_WRITER',
              'LEDGER_ROUTER',
              'NONE'
          }

          next_role = os.environ.get('NEXT_ROLE', '').strip()
          task_id = os.environ.get('TASK_ID', '').strip()
          event_id = os.environ.get('EVENT_ID', '').strip()

          if not next_role:
              print('VALIDATION_FAILED: missing next_actor_role', file=sys.stderr)
              sys.exit(1)

          if next_role not in allowed_roles:
              print(f'VALIDATION_FAILED: invalid next_actor_role: {next_role}', file=sys.stderr)
              sys.exit(1)

          if not task_id:
              print('VALIDATION_FAILED: missing task_id', file=sys.stderr)
              sys.exit(1)

          if not event_id:
              print('VALIDATION_FAILED: missing event_id', file=sys.stderr)
              sys.exit(1)

          print('DISPATCH_CONTRACT=PASSED')
          PY

      - name: Route to ANALYST
        if: ${{ github.event.client_payload.next_actor_role == 'ANALYST' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run analyst-runner.yml \
            --repo bereznyi-aleksandr/ai-devops-system \
            -f task_id="${{ github.event.client_payload.task_id }}"

      - name: Route to AUDITOR
        if: ${{ github.event.client_payload.next_actor_role == 'AUDITOR' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run auditor-runner.yml \
            --repo bereznyi-aleksandr/ai-devops-system \
            -f task_id="${{ github.event.client_payload.task_id }}"

      - name: Route to CLOUD_CODE
        if: ${{ github.event.client_payload.next_actor_role == 'CLOUD_CODE' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run executor-runner.yml \
            --repo bereznyi-aleksandr/ai-devops-system \
            -f task_id="${{ github.event.client_payload.task_id }}"

      - name: Route to OPERATOR
        if: ${{ github.event.client_payload.next_actor_role == 'OPERATOR' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run operator-notify.yml \
            --repo bereznyi-aleksandr/ai-devops-system \
            -f task_id="${{ github.event.client_payload.task_id }}"

      - name: Route to NONE
        if: ${{ github.event.client_payload.next_actor_role == 'NONE' }}
        run: |
          echo "No downstream workflow required."

      - name: Reject unsupported non-routable roles
        if: ${{ github.event.client_payload.next_actor_role == 'LEDGER_WRITER' || github.event.client_payload.next_actor_role == 'LEDGER_ROUTER' }}
        run: |
          echo "Transport-only router does not self-route to internal ledger roles."
          exit 1

      - name: Guardrail
        run: |
          echo "GitHub Actions router is transport-only."
          echo "Router does not make governance decisions."
          echo "Router only forwards by canonical v155 next_actor_role."
