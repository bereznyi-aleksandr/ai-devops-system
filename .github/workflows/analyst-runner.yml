name: Analyst Runner

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task ID for analyst to process'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GitHub PAT from Secret Manager
        id: get_pat
        shell: bash
        run: |
          set -euo pipefail
          PAT=$(gcloud secrets versions access latest \
            --secret="GITHUB_TOKEN" \
            --project="barber-483016" | tr -d '\r\n')
          echo "::add-mask::$PAT"
          echo "pat=$PAT" >> "$GITHUB_OUTPUT"

      - name: Prepare analyst context
        id: context
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp
          python3 - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path

          task_id = os.environ["TASK_ID"].strip()
          if not task_id:
              raise SystemExit("TASK_ID is required")

          ledger_path = Path("governance/exchange_ledger.csv")
          ssot_path = Path("ssot/MASTER_PROMPT_v164_CANON_FINAL.txt")

          if not ledger_path.exists():
              raise SystemExit("governance/exchange_ledger.csv not found")
          if not ssot_path.exists():
              raise SystemExit("ssot/MASTER_PROMPT_v164_CANON_FINAL.txt not found")

          with ledger_path.open(encoding="utf-8") as f:
              rows = list(csv.DictReader(f))
          if not rows:
              raise SystemExit("exchange_ledger.csv is empty")

          last_event = rows[-1]
          ledger_tail = rows[-5:] if len(rows) >= 5 else rows

          ssot_text = ssot_path.read_text(encoding="utf-8")
          roadmap_anchor = "AUTONOMY ROADMAP"
          idx = ssot_text.find(roadmap_anchor)
          roadmap_excerpt = ssot_text[idx:idx + 5000] if idx != -1 else ssot_text[:5000]

          context = {
              "task_id": task_id,
              "repository": "bereznyi-aleksandr/ai-devops-system",
              "ssot_version": "MASTER_PROMPT_v164_CANON_FINAL",
              "last_event": last_event,
              "ledger_tail": ledger_tail,
              "roadmap_excerpt": roadmap_excerpt
          }

          Path(".tmp/analyst_context.json").write_text(
              json.dumps(context, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          print("CONTEXT_READY=true")
          PY

      - name: Run Claude API as Analyst
        id: analyst
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_ID: ${{ github.event.inputs.task_id }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          api_key = os.environ["ANTHROPIC_API_KEY"]
          task_id = os.environ["TASK_ID"]
          model = os.getenv("LLM_MODEL") or "claude-sonnet-4-6"
          context = json.loads(Path(".tmp/analyst_context.json").read_text(encoding="utf-8"))

          system_prompt = (
              "You are the ANALYST / PLANNER in an autonomous multi-agent DevOps system.\n"
              "SSOT: MASTER_PROMPT_v164_CANON_FINAL\n"
              "Repository: bereznyi-aleksandr/ai-devops-system\n\n"
              "Your role:\n"
              "- Read SSOT and exchange ledger\n"
              "- Determine the next roadmap-valid task\n"
              "- Prepare one TASK_PROPOSED only\n"
              "- Do not execute code\n"
              "- Do not make audit decisions\n\n"
              "Return ONLY valid JSON with exactly two top-level keys: task_file and ledger_event.\n"
              "task_file must contain: schema_version, task_id, step_name, actor_role, event_type, description, status, proof_target, next_actor_role, routing_decision_basis.\n"
              "ledger_event must contain: schema_version, event_id, parent_event_id, task_id, event_time, step_name, actor_role, event_type, description, status, next_actor_role, next_expected_event, routing_decision_basis, commit_sha.\n"
              "Hard rules:\n"
              "- schema_version must be v164 in both objects\n"
              "- task_id in both objects must equal the workflow input task_id exactly\n"
              "- actor_role must be ANALYST\n"
              "- event_type must be TASK_PROPOSED\n"
              "- status must be PROPOSED\n"
              "- next_actor_role must be AUDITOR\n"
              "- next_expected_event must be PRE_ACTION_APPROVED\n"
              "- Output JSON only. No markdown. No prose outside JSON."
          )

          user_message = (
              f"Workflow input task_id: {task_id}\n\n"
              f"Context:\n{json.dumps(context, ensure_ascii=False, indent=2)}\n\n"
              "Prepare the next roadmap-valid TASK_PROPOSED in v164 format."
          )

          payload = {
              "model": model,
              "max_tokens": 2500,
              "system": system_prompt,
              "messages": [{"role": "user", "content": user_message}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "x-api-key": api_key,
                  "anthropic-version": "2023-06-01"
              }
          )
          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          raw = result["content"][0]["text"].strip()
          Path(".tmp/analyst_raw_output.txt").write_text(raw, encoding="utf-8")
          print("ANALYST_OUTPUT_READY=true")
          PY

      - name: Validate analyst output
        id: validate
        env:
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          wf_task_id = os.environ["TASK_ID"].strip()
          raw = Path(".tmp/analyst_raw_output.txt").read_text(encoding="utf-8")

          try:
              payload = json.loads(raw)
          except Exception as e:
              print(f"VALIDATION_FAILED: invalid JSON: {e}", file=sys.stderr)
              sys.exit(1)

          for key in ("task_file", "ledger_event"):
              if key not in payload:
                  print(f"VALIDATION_FAILED: missing {key}", file=sys.stderr)
                  sys.exit(1)

          tf = payload["task_file"]
          le = payload["ledger_event"]

          for f in ["schema_version","task_id","step_name","actor_role","event_type","description","status","proof_target","next_actor_role","routing_decision_basis"]:
              if f not in tf:
                  print(f"VALIDATION_FAILED: task_file missing {f}", file=sys.stderr)
                  sys.exit(1)

          for f in ["schema_version","event_id","parent_event_id","task_id","event_time","step_name","actor_role","event_type","description","status","next_actor_role","next_expected_event","routing_decision_basis","commit_sha"]:
              if f not in le:
                  print(f"VALIDATION_FAILED: ledger_event missing {f}", file=sys.stderr)
                  sys.exit(1)

          checks = [
              (tf["schema_version"] == "v164", "task_file.schema_version must be v164"),
              (le["schema_version"] == "v164", "ledger_event.schema_version must be v164"),
              (tf["task_id"] == wf_task_id, "task_file.task_id must match input"),
              (le["task_id"] == wf_task_id, "ledger_event.task_id must match input"),
              (tf["actor_role"] == "ANALYST", "task_file.actor_role must be ANALYST"),
              (le["actor_role"] == "ANALYST", "ledger_event.actor_role must be ANALYST"),
              (tf["event_type"] == "TASK_PROPOSED", "task_file.event_type must be TASK_PROPOSED"),
              (le["event_type"] == "TASK_PROPOSED", "ledger_event.event_type must be TASK_PROPOSED"),
              (tf["status"] == "PROPOSED", "task_file.status must be PROPOSED"),
              (le["status"] == "PROPOSED", "ledger_event.status must be PROPOSED"),
              (tf["next_actor_role"] == "AUDITOR", "task_file.next_actor_role must be AUDITOR"),
              (le["next_actor_role"] == "AUDITOR", "ledger_event.next_actor_role must be AUDITOR"),
              (le["next_expected_event"] == "PRE_ACTION_APPROVED", "ledger_event.next_expected_event must be PRE_ACTION_APPROVED"),
          ]
          for ok, msg in checks:
              if not ok:
                  print(f"VALIDATION_FAILED: {msg}", file=sys.stderr)
                  sys.exit(1)

          Path(".tmp/task_file.json").write_text(
              json.dumps(tf, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          Path(".tmp/ledger_event.json").write_text(
              json.dumps(le, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          Path(".tmp/task_meta.json").write_text(
              json.dumps(
                  {
                      "task_id": wf_task_id,
                      "task_path": f"governance/tasks/{wf_task_id}.json",
                      "event_id": le["event_id"]
                  },
                  ensure_ascii=False,
                  indent=2
              ) + "\n",
              encoding="utf-8"
          )
          print("SCHEMA_VALIDATION=PASSED")
          PY

      - name: Create task file through GitHub API
        id: create_task
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          TASK_PATH="governance/tasks/${TASK_ID}.json"
          CONTENT_B64="$(base64 -w 0 .tmp/task_file.json)"
          EXISTING_SHA="$(gh api repos/${{ github.repository }}/contents/${TASK_PATH} --jq '.sha' 2>/dev/null || true)"

          if [ -n "$EXISTING_SHA" ]; then
            gh api --method PUT repos/${{ github.repository }}/contents/${TASK_PATH} \
              -f message="Analyst: update task file for ${TASK_ID}" \
              -f content="$CONTENT_B64" \
              -f sha="$EXISTING_SHA" >/dev/null
          else
            gh api --method PUT repos/${{ github.repository }}/contents/${TASK_PATH} \
              -f message="Analyst: create task file for ${TASK_ID}" \
              -f content="$CONTENT_B64" >/dev/null
          fi

          echo "task_path=${TASK_PATH}" >> "$GITHUB_OUTPUT"

      - name: Verify task file exists in main
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
          TASK_ID: ${{ github.event.inputs.task_id }}
        shell: bash
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }}/contents/governance/tasks/${TASK_ID}.json --jq '.path,.sha'

      - name: Write ledger payload to GCS inbox
        id: gcs
        shell: bash
        run: |
          set -euo pipefail
          EVENT_ID="$(python3 -c "import json; from pathlib import Path; print(json.loads(Path('.tmp/ledger_event.json').read_text())['event_id'])")"
          GCS_PATH="governance/inbox/requests/${EVENT_ID}.json"
          gcloud storage cp .tmp/ledger_event.json "gs://barber-agent-state/${GCS_PATH}" --project=barber-483016
          echo "event_id=${EVENT_ID}" >> "$GITHUB_OUTPUT"
          echo "gcs_path=${GCS_PATH}" >> "$GITHUB_OUTPUT"

      - name: Trigger ledger ingress
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
        shell: bash
        run: |
          set -euo pipefail
          gh workflow run ledger-request-ingress.yml \
            --repo bereznyi-aleksandr/ai-devops-system \
            --ref main \
            -f request_path="${{ steps.gcs.outputs.gcs_path }}"

      - name: Dispatch ledger-updated
        env:
          GH_TOKEN: ${{ steps.get_pat.outputs.pat }}
          TASK_ID: ${{ github.event.inputs.task_id }}
          EVENT_ID: ${{ steps.gcs.outputs.event_id }}
        shell: bash
        run: |
          set -euo pipefail
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=ledger-updated \
            -f client_payload[next_actor_role]=AUDITOR \
            -f client_payload[task_id]="$TASK_ID" \
            -f client_payload[event_id]="$EVENT_ID"

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf .tmp

      - name: Guardrail
        shell: bash
        run: |
          echo "Analyst proposes only. Task file materialized server-side."
          echo "Audit decisions made only by AUDITOR."
