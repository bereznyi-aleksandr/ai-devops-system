name: Telegram Gateway

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

jobs:
  # JOB 1: Читает Telegram → пишет в issue #31 нужной роли
  receive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Process Telegram messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request, urllib.parse, re

          TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID = int(os.environ["TELEGRAM_CHAT_ID"])
          GH_TOKEN = os.environ["GH_TOKEN"]
          REPO = "bereznyi-aleksandr/ai-devops-system"
          ISSUE = 31

          def tg_send(text):
              data = urllib.parse.urlencode({
                  "chat_id": CHAT_ID, "text": text, "parse_mode": "Markdown"
              }).encode()
              urllib.request.urlopen(urllib.request.Request(
                  f"https://api.telegram.org/bot{TOKEN}/sendMessage", data=data))

          def gh_comment(body):
              data = json.dumps({"body": body}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/issues/{ISSUE}/comments",
                  data=data,
                  headers={"Authorization": f"Bearer {GH_TOKEN}",
                           "Accept": "application/vnd.github+json",
                           "Content-Type": "application/json"})
              urllib.request.urlopen(req)

          def read_routing():
              """Читает текущую routing table из EXCHANGE.md"""
              routing = {"ANALYST": "claude", "AUDITOR": "claude", "EXECUTOR": "claude"}
              try:
                  with open("governance/EXCHANGE.md") as f:
                      content = f.read()
                  for role in ["ANALYST", "AUDITOR", "EXECUTOR"]:
                      m = re.search(rf"\| {role}\s*\| (claude|gpt) \|", content)
                      if m:
                          routing[role] = m.group(1)
              except:
                  pass
              return routing

          def update_routing(role, impl):
              """Обновляет routing table в EXCHANGE.md"""
              try:
                  with open("governance/EXCHANGE.md") as f:
                      content = f.read()
                  content = re.sub(
                      rf"(\| {role}\s*\| )(claude|gpt)( \|)",
                      rf"\g<1>{impl}\g<3>",
                      content
                  )
                  with open("governance/EXCHANGE.md", "w") as f:
                      f.write(content)
                  return True
              except Exception as e:
                  print(f"Error updating routing: {e}")
                  return False

          def get_trigger(role, routing):
              """Возвращает правильный триггер для роли согласно routing table"""
              impl = routing.get(role, "claude")
              triggers = {
                  "ANALYST": {"claude": "@analyst", "gpt": "@codex ROLE=GPT_ANALYST"},
                  "AUDITOR": {"claude": "@auditor", "gpt": "@codex ROLE=GPT_AUDITOR"},
                  "EXECUTOR": {"claude": "@executor", "gpt": "@codex ROLE=GPT_EXECUTOR"},
              }
              return triggers[role][impl]

          # Читать offset
          try:
              with open("governance/telegram_offset.txt") as f:
                  offset = int(f.read().strip())
          except:
              offset = 0

          url = f"https://api.telegram.org/bot{TOKEN}/getUpdates?offset={offset}&timeout=3"
          result = json.loads(urllib.request.urlopen(url).read())
          updates = result.get("result", [])
          routing = read_routing()

          routing_changed = False

          for update in updates:
              offset = update["update_id"] + 1
              msg = update.get("message", {})
              if msg.get("chat", {}).get("id") != CHAT_ID:
                  continue
              text = (msg.get("text") or "").strip()
              lower = text.lower()

              # === ПЕРЕКЛЮЧЕНИЕ РОЛЕЙ ===
              switched = False
              for role_ru, role_key in [("аналитик", "ANALYST"), ("аудитор", "AUDITOR"), ("исполнитель", "EXECUTOR")]:
                  if role_ru in lower:
                      if "gpt" in lower or "гпт" in lower:
                          update_routing(role_key, "gpt")
                          routing[role_key] = "gpt"
                          routing_changed = True
                          tg_send(f"🔄 *{role_key}* переключён на *GPT*\nТриггер: `{get_trigger(role_key, routing)}`")
                          switched = True
                      elif "claude" in lower or "клод" in lower:
                          update_routing(role_key, "claude")
                          routing[role_key] = "claude"
                          routing_changed = True
                          tg_send(f"🔄 *{role_key}* переключён на *Claude*\nТриггер: `{get_trigger(role_key, routing)}`")
                          switched = True

              if switched:
                  continue

              # === СТАТУС РОЛЕЙ ===
              if any(w in lower for w in ["статус роли", "роли", "конфигурация", "config"]):
                  r = read_routing()
                  tg_send(f"""📊 *Конфигурация ролей*

🔍 АНАЛИТИК: *{r['ANALYST']}* → `{get_trigger('ANALYST', r)}`
✅ АУДИТОР: *{r['AUDITOR']}* → `{get_trigger('AUDITOR', r)}`
⚙️ ИСПОЛНИТЕЛЬ: *{r['EXECUTOR']}* → `{get_trigger('EXECUTOR', r)}`""")
                  continue

              # === СТАТУС СИСТЕМЫ ===
              if any(w in lower for w in ["статус", "status"]):
                  try:
                      with open("governance/exchange.jsonl") as f:
                          events = [json.loads(l) for l in f if l.strip()]
                      last = events[-3:]
                      ev = "\n".join([f"• {e.get('event_type','?')}" for e in last])
                  except:
                      ev = "нет данных"
                  tg_send(f"📊 *Статус системы*\n\nЭтап: E3\n\nПоследние события:\n{ev}")
                  continue

              # === ЗАПУСК РОЛЕЙ ===
              if any(w in lower for w in ["запусти аналит", "analyst", "@analyst"]):
                  trigger = get_trigger("ANALYST", routing)
                  task = text.replace("запусти аналитика", "").replace("analyst", "").strip()
                  gh_comment(f"{trigger} {task}".strip())
                  tg_send(f"✅ Задача передана *АНАЛИТИКУ* [{routing['ANALYST']}]\n`{trigger}`")
                  continue

              if any(w in lower for w in ["запусти аудит", "auditor", "@auditor"]):
                  trigger = get_trigger("AUDITOR", routing)
                  task = text.replace("запусти аудитора", "").strip()
                  gh_comment(f"{trigger} {task}".strip())
                  tg_send(f"✅ Задача передана *АУДИТОРУ* [{routing['AUDITOR']}]\n`{trigger}`")
                  continue

              if any(w in lower for w in ["запусти исполн", "executor", "@executor"]):
                  trigger = get_trigger("EXECUTOR", routing)
                  task = text.replace("запусти исполнителя", "").strip()
                  gh_comment(f"{trigger} {task}".strip())
                  tg_send(f"✅ Задача передана *ИСПОЛНИТЕЛЮ* [{routing['EXECUTOR']}]\n`{trigger}`")
                  continue

              # === ПОМОЩЬ ===
              if any(w in lower for w in ["помощь", "help", "/start"]):
                  tg_send("""*Команды AI DevOps System:*

*Запуск ролей:*
🔍 `запусти аналитика [задача]`
✅ `запусти аудитора [задача]`
⚙️ `запусти исполнителя [задача]`

*Переключение реализации:*
🔄 `аналитик gpt` / `аналитик claude`
🔄 `аудитор gpt` / `аудитор claude`
🔄 `исполнитель gpt` / `исполнитель claude`

*Статус:*
📊 `статус` — последние события
📋 `роли` — текущая конфигурация ролей
❓ `помощь` — этот список""")
                  continue

              # Неизвестная команда → аналитику
              trigger = get_trigger("ANALYST", routing)
              gh_comment(f"{trigger} {text}")
              tg_send(f"✅ Сообщение передано *АНАЛИТИКУ* [{routing['ANALYST']}]")

          # Сохранить offset
          with open("governance/telegram_offset.txt", "w") as f:
              f.write(str(offset))

          print(f"Processed {len(updates)} updates. Routing changed: {routing_changed}")
          EOF

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          git config user.email "telegram-gateway@ai-devops-system"
          git config user.name "Telegram Gateway"
          git pull --rebase origin main
          git add governance/telegram_offset.txt governance/EXCHANGE.md || true
          git diff --cached --quiet || git commit -m "TELEGRAM GATEWAY: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  # JOB 2: При новом комментарии роли → отправить отчёт в Telegram
  report:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.number == 31 &&
      (contains(github.event.comment.body, 'BEM-') ||
       contains(github.event.comment.body, 'АНАЛИТИК') ||
       contains(github.event.comment.body, 'АУДИТОР') ||
       contains(github.event.comment.body, 'ИСПОЛНИТЕЛЬ') ||
       contains(github.event.comment.body, 'APPROVED') ||
       contains(github.event.comment.body, 'BLOCKED'))
    runs-on: ubuntu-latest
    steps:
      - name: Send report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, urllib.parse
          from datetime import datetime, timezone, timedelta

          TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID = int(os.environ["TELEGRAM_CHAT_ID"])

          body = """${{ github.event.comment.body }}"""
          now_ua = (datetime.now(timezone.utc) + timedelta(hours=3)).strftime("%H:%M UA")

          if "АНАЛИТИК" in body:
              icon, role = "🔍", "АНАЛИТИК"
          elif "APPROVED" in body:
              icon, role = "✅", "АУДИТОР — APPROVED"
          elif "BLOCKED" in body:
              icon, role = "🚫", "АУДИТОР — BLOCKED"
          elif "АУДИТОР" in body:
              icon, role = "✅", "АУДИТОР"
          elif "ИСПОЛНИТЕЛЬ" in body:
              icon, role = "⚙️", "ИСПОЛНИТЕЛЬ"
          else:
              icon, role = "📋", "СИСТЕМА"

          short = body[:400] + ("..." if len(body) > 400 else "")
          msg = f"{icon} *{role}* | {now_ua}\n\n{short}"

          data = urllib.parse.urlencode({
              "chat_id": CHAT_ID, "text": msg, "parse_mode": "Markdown"
          }).encode()
          urllib.request.urlopen(urllib.request.Request(
              f"https://api.telegram.org/bot{TOKEN}/sendMessage", data=data))
          print("Report sent to Telegram")
          EOF
