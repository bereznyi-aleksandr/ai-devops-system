name: GPT Curator Inbox Processor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  process-inbox:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main
        run: |
          git config user.email "gpt-curator-inbox@ai-devops-system"
          git config user.name "GPT Curator Inbox"
          git pull --rebase origin main

      - name: Process GPT Curator Inbox
        run: |
          python3 governance/process_gpt_curator_inbox.py

      - name: Commit results
        run: |
          git add governance/curator_inbox/
          git add governance/exchange.jsonl
          git diff --cached --quiet || git commit -m "GPT CURATOR INBOX: processed task $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
