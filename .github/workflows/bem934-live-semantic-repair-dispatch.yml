name: BEM934 Live Semantic Repair Dispatch

on:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Claude semantic repair for existing live trace
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh workflow run claude.yml             --repo "$REPO"             --ref main             -f role=curator             -f provider=claude_code             -f trace_id=tg_934432449_20260618T102008Z             -f cycle_id=bem934_live_test_repair             -f task_type=live_content_analysis_repair             -f task='BEM-934 semantic repair for the existing live Telegram trace tg_934432449_20260618T102008Z. Create governance/proofs/BEM934_live_content_tg_934432449.json as a real content-bearing analysis artifact. Analyze two verifiable invariants for idempotent Telegram delivery into WRK-C1 and provide a concise validation plan with explicit PASS/FAIL criteria. The JSON must include status=PASS, protocol=BEM-934, task_id=BEM934-LIVE-TEST, trace_id, provider_selected=claude_code, source_router_receipt=governance/proofs/BEM932_provider_router_tg_934432449_20260618T102008Z.json, invariants, validation_steps, acceptance_checks, and limitations. Verify the provider-router receipt exists and has status PASS, provider_selected claude_code, target_workflow_id claude.yml, chat_id 601442777, message_id 724. This is substantive analysis, not a service or release command. Do not alter ACTIVE_QUEUE, AGENT_CONTEXT, or SYSTEM_STATUS.'
