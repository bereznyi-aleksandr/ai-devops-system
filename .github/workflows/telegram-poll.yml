name: Telegram Poll

on:
  schedule:
    - cron: '3-59/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync latest main
        run: |
          git config user.email "telegram-poll@ai-devops-system"
          git config user.name "Telegram Poll"
          git pull --rebase origin main

      - name: Poll Telegram and relay outbox
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = int(os.environ.get("TELEGRAM_CHAT_ID", "0"))
          now_dt = datetime.now(timezone.utc)
          now_iso = now_dt.isoformat()
          now_ua = (now_dt + timedelta(hours=3)).strftime("%H:%M UA")

          def tg_api(method, params=None):
              params = params or {}
              url = "https://api.telegram.org/bot" + token + "/" + method
              data = urllib.parse.urlencode(params).encode("utf-8")
              req = urllib.request.Request(url, data=data, method="POST")
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode("utf-8"))

          def tg_send(text):
              return tg_api("sendMessage", {"chat_id": chat_id, "text": text})

          def append_jsonl(path, obj):
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              with open(path, "a", encoding="utf-8") as f:
                  f.write(json.dumps(obj, ensure_ascii=False) + "\n")

          offset_path = Path("governance/telegram_offset.txt")
          inbox_path = Path("governance/telegram_inbox.jsonl")
          outbox_path = Path("governance/telegram_outbox.jsonl")
          inbox_path.parent.mkdir(parents=True, exist_ok=True)

          try:
              offset = int(offset_path.read_text(encoding="utf-8").strip())
          except Exception:
              offset = 0

          updates = []
          poll_error = None
          try:
              resp = tg_api("getUpdates", {"offset": offset, "timeout": 5, "limit": 20})
              updates = resp.get("result", [])
          except urllib.error.HTTPError as e:
              poll_error = "HTTP " + str(e.code) + ": " + e.read().decode("utf-8", errors="replace")
          except Exception as e:
              poll_error = repr(e)

          processed = text_count = voice_count = unsupported_count = 0

          for update in updates:
              offset = int(update.get("update_id", offset)) + 1
              msg = update.get("message") or update.get("edited_message") or {}
              if msg.get("chat", {}).get("id") != chat_id:
                  continue
              processed += 1
              text = (msg.get("text") or "").strip()
              if text:
                  text_count += 1
                  append_jsonl(inbox_path, {"timestamp": now_iso, "source": "telegram", "target": "curator", "type": "text", "message_id": update.get("update_id"), "telegram_message_id": msg.get("message_id"), "text": text, "status": "pending"})
                  tg_send("📨 " + now_ua + " | Текст получен. Сообщение передано куратору в ISA.")
              elif msg.get("voice"):
                  voice_count += 1
                  voice = msg.get("voice") or {}
                  append_jsonl(inbox_path, {"timestamp": now_iso, "source": "telegram", "target": "curator", "type": "voice", "message_id": update.get("update_id"), "telegram_message_id": msg.get("message_id"), "voice_file_id": voice.get("file_id"), "duration": voice.get("duration"), "status": "voice_received_transcription_not_configured"})
                  tg_send("🎙 " + now_ua + " | Голосовое получено. Расшифровка ещё не подключена; текстовые сообщения обрабатываются отдельно.")
              else:
                  unsupported_count += 1
                  append_jsonl(inbox_path, {"timestamp": now_iso, "source": "telegram", "target": "curator", "type": "unsupported", "message_id": update.get("update_id"), "telegram_message_id": msg.get("message_id"), "status": "unsupported_message_type"})

          try:
              entries = [json.loads(l) for l in outbox_path.read_text(encoding="utf-8").splitlines() if l.strip()]
          except Exception:
              entries = []

          sent = 0
          for entry in entries:
              if entry.get("status") == "ready_to_send":
                  tg_send(entry.get("text", ""))
                  entry["status"] = "sent"
                  entry["sent_at"] = now_iso
                  sent += 1

          outbox_path.write_text("".join(json.dumps(e, ensure_ascii=False) + "\n" for e in entries), encoding="utf-8")
          offset_path.write_text(str(offset) + "\n", encoding="utf-8")

          if poll_error:
              append_jsonl("governance/telegram_errors.jsonl", {"timestamp": now_iso, "source": "telegram_poll", "error": poll_error, "status": "getUpdates_failed_outbox_relay_continued"})
              print("poll_error=" + poll_error)
          print(f"Poll done. Updates={len(updates)} processed={processed} text={text_count} voice={voice_count} unsupported={unsupported_count} sent={sent}")
          PY

      - name: Commit state
        run: |
          touch governance/telegram_inbox.jsonl governance/telegram_outbox.jsonl governance/telegram_offset.txt governance/telegram_errors.jsonl
          git add governance/telegram_inbox.jsonl governance/telegram_outbox.jsonl governance/telegram_offset.txt governance/telegram_errors.jsonl
          git diff --cached --quiet || git commit -m "TELEGRAM POLL: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
