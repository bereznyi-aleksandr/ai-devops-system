name: Telegram Long Poll

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

concurrency:
  group: telegram-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Poll Telegram and write to inbox
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_CHAT_ID: "601442777"
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request
          from pathlib import Path

          token      = os.environ["TELEGRAM_BOT_TOKEN"]
          allowed_id = os.environ.get("ALLOWED_CHAT_ID", "601442777")
          offset_file = Path("governance/telegram/poll_offset.txt")
          inbox_file  = Path("governance/telegram/inbox.jsonl")

          offset = 0
          if offset_file.exists():
              try:
                  offset = int(offset_file.read_text().strip())
              except:
                  offset = 0

          url = f"https://api.telegram.org/bot{token}/getUpdates?offset={offset}&limit=100&timeout=0"
          try:
              with urllib.request.urlopen(url, timeout=10) as resp:
                  data = json.loads(resp.read())
          except Exception as e:
              print(f"Telegram API error: {e}")
              exit(0)

          if not data.get("ok"):
              print(f"Telegram error: {data}")
              exit(0)

          updates = data.get("result", [])
          if not updates:
              print("No new updates")
              exit(0)

          new_entries = []
          max_update_id = offset - 1
          for upd in updates:
              uid = upd["update_id"]
              if uid >= max_update_id:
                  max_update_id = uid
              msg = upd.get("message")
              if not msg:
                  continue
              chat_id = str(msg["chat"]["id"])
              if chat_id != allowed_id:
                  continue
              entry = {
                  "ts": msg.get("date"),
                  "update_id": uid,
                  "chat_id": chat_id,
                  "message_id": str(msg["message_id"]),
                  "text": msg.get("text", ""),
                  "source": "telegram_poll"
              }
              new_entries.append(entry)
              print(f"New message: {entry['text'][:80]}")

          inbox_file.parent.mkdir(parents=True, exist_ok=True)
          offset_file.write_text(str(max_update_id + 1))

          if new_entries:
              with inbox_file.open("a") as f:
                  for entry in new_entries:
                      f.write(json.dumps(entry, ensure_ascii=False) + "\n")
              print(f"Written {len(new_entries)} messages")
          else:
              print("No messages from allowed chat")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/telegram/inbox.jsonl governance/telegram/poll_offset.txt
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git pull --rebase origin main
            git commit -m "telegram: poll $(date -u +%H:%M:%SZ)"
            git push
          fi
