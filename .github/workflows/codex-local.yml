name: Codex Local ISA

# BEM-495: removed issue_comment trigger + createComment to issue #31
# Reports go to governance/codex/results/ + job summary only
# Use codex-runner.yml as primary entrypoint (from Deno /codex-task)
# This workflow remains as direct workflow_dispatch alternative

on:
  workflow_dispatch:
    inputs:
      role:
        description: 'analyst | auditor | executor | curator'
        required: true
        type: string
      provider:
        description: 'codex | gpt_codex'
        required: false
        default: 'gpt_codex'
        type: string
      trace_id:
        description: 'Trace id'
        required: true
        type: string
      cycle_id:
        description: 'Role cycle id'
        required: false
        default: ''
        type: string
      task_type:
        description: 'Task type'
        required: false
        default: 'default_development'
        type: string
      task:
        description: 'Task body'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  codex-local:
    name: Codex Local ISA
    runs-on: [self-hosted, codex-local]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Verify local Codex CLI
        shell: bash
        run: |
          set -e
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          echo "node=$(command -v node || true)"
          echo "codex=$(command -v codex || true)"
          node -v
          codex --version

      - name: Build role prompt
        shell: bash
        env:
          INPUT_ROLE:      ${{ inputs.role }}
          INPUT_PROVIDER:  ${{ inputs.provider }}
          INPUT_TRACE_ID:  ${{ inputs.trace_id }}
          INPUT_CYCLE_ID:  ${{ inputs.cycle_id }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
          INPUT_TASK:      ${{ inputs.task }}
        run: |
          set -e
          PROMPT_FILE="$RUNNER_TEMP/codex_prompt.txt"
          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"
          export PROMPT_FILE

          python3 - <<'PY'
          import json, os
          from pathlib import Path

          role_raw  = os.environ.get('INPUT_ROLE', 'executor').lower().strip()
          provider  = os.environ.get('INPUT_PROVIDER', 'gpt_codex')
          trace_id  = os.environ.get('INPUT_TRACE_ID', 'missing')
          cycle_id  = os.environ.get('INPUT_CYCLE_ID', '')
          task_type = os.environ.get('INPUT_TASK_TYPE', 'default_development')
          task      = os.environ.get('INPUT_TASK', '')
          role      = 'GPT_' + role_raw.upper()

          parts = [
              'BEM-CODEX-LOCAL | ' + role,
              '',
              'You are running locally inside the ai-devops-system repository on a self-hosted Codex runner.',
              '',
              'ROLE: ' + role,
              'PROVIDER: ' + provider,
              'TRACE_ID: ' + trace_id,
              'CYCLE_ID: ' + cycle_id,
              'TASK_TYPE: ' + task_type,
              '',
              'Safety boundaries:',
              '- Do not edit secrets, billing, repository permissions, production deploy credentials.',
              '- Do not print tokens or secrets.',
              '- Do not write to issue #31 comments (locked at 2500 limit).',
              '- Write reports ONLY to governance/codex/results/' + trace_id + '.md',
              '- Keep commits focused and small.',
              '',
              'Incoming task:',
              '-----',
              task,
              '-----',
              '',
              'Required output:',
              'BEM-CODEX-LOCAL | ' + role + ' | RESULT',
              '',
              'Include: checklist, files changed, checks run, commit SHA if committed, blocker only if objective.',
          ]
          Path(os.environ['PROMPT_FILE']).write_text('\n'.join(parts), encoding='utf-8')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write('ROLE=' + role + '\n')
              f.write('ROLE_RAW=' + role_raw + '\n')
              f.write('PROVIDER=' + provider + '\n')
              f.write('TRACE_ID=' + trace_id + '\n')
              f.write('CYCLE_ID=' + cycle_id + '\n')
              f.write('TASK_TYPE=' + task_type + '\n')
          PY

      - name: Run local Codex CLI
        shell: bash
        run: |
          set +e
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          OUTPUT_FILE="$RUNNER_TEMP/codex_output.md"
          EXIT_FILE="$RUNNER_TEMP/codex_exit_code.txt"
          {
            echo "BEM-CODEX-LOCAL | RAW_OUTPUT"
            echo "ROLE=$ROLE"
            echo "TRACE_ID=$TRACE_ID"
            echo "CYCLE_ID=$CYCLE_ID"
            echo
            codex exec "$(cat "$PROMPT_FILE")"
            CODEX_EXIT=$?
            echo "$CODEX_EXIT" > "$EXIT_FILE"
            echo
            echo "CODEX_EXIT_CODE=$CODEX_EXIT"
          } 2>&1 | tee "$OUTPUT_FILE"
          CODEX_EXIT="$(cat "$EXIT_FILE" 2>/dev/null || echo 0)"
          echo "OUTPUT_FILE=$OUTPUT_FILE"   >> "$GITHUB_ENV"
          echo "CODEX_EXIT_CODE=$CODEX_EXIT" >> "$GITHUB_ENV"
          exit 0

      - name: Commit approved changes
        if: always()
        shell: bash
        run: |
          set -e
          if [ "$ROLE" != "GPT_EXECUTOR" ] && [ "$ROLE" != "GPT_CURATOR" ]; then
            echo "No commit for role $ROLE"
            exit 0
          fi
          git config user.email "gpt-codex@ai-devops-system"
          git config user.name "GPT Codex"
          git pull --rebase origin main
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "GPT CODEX: ${TASK_TYPE} ${TRACE_ID}"
          git push

      # BEM-495: file-based report instead of createComment to issue #31
      - name: Write result to file
        if: always()
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          now      = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          trace    = os.environ.get('TRACE_ID', 'unknown')
          role     = os.environ.get('ROLE', 'unknown')
          provider = os.environ.get('PROVIDER', 'gpt_codex')
          codex_exit = os.environ.get('CODEX_EXIT_CODE', '?')

          status  = 'completed' if codex_exit == '0' else 'failed'
          blocker = None if codex_exit == '0' else {'code': 'CODEX_EXEC_FAILED', 'exit': codex_exit}

          sha = None
          try:
              sha = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          except Exception:
              pass

          output_path = os.environ.get('OUTPUT_FILE', '')
          output = ''
          if output_path:
              try:
                  output = Path(output_path).read_text(errors='replace')[-8000:]
              except Exception:
                  pass

          result_dir = Path('governance/codex/results')
          result_dir.mkdir(parents=True, exist_ok=True)

          result_json = {
              'schema_version': 1,
              'trace_id':       trace,
              'executor':       'codex-local',
              'role':           role,
              'provider':       provider,
              'status':         status,
              'commit_sha':     sha,
              'blocker':        blocker,
              'report_path':    'governance/codex/results/' + trace + '.md',
              'completed_at':   now
          }
          (result_dir / (trace + '.json')).write_text(
              json.dumps(result_json, indent=2, ensure_ascii=False) + '\n'
          )

          lines = [
              '# Codex Local ISA Result - ' + trace,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Role | ' + role + ' |',
              '| Provider | ' + provider + ' |',
              '| Status | ' + status + ' |',
              '| Codex exit | ' + codex_exit + ' |',
              '| Commit SHA | ' + (sha or 'none') + ' |',
              '| Completed at | ' + now + ' |',
              '',
              '## Codex Output',
              '',
              output[:4000] if output else '(no output)',
              '',
              '## Notes',
              '- No issue #31 comments (BEM-495)',
              '- Runner: [self-hosted, codex-local]',
          ]
          (result_dir / (trace + '.md')).write_text('\n'.join(lines) + '\n')

          # Commit result
          import subprocess as sp
          try:
              sp.run(['git', 'add', 'governance/codex/'], capture_output=True)
              diff = sp.run(['git', 'diff', '--cached', '--quiet'], capture_output=True)
              if diff.returncode != 0:
                  sp.run(['git', 'commit', '-m', 'CODEX-LOCAL-ISA: result trace=' + trace], check=True)
                  sp.run(['git', 'push'], check=True)
          except Exception as e:
              print('Commit failed: ' + str(e))
          print('Result written: status=' + status + ' trace=' + trace)
          PYEOF

      - name: Advance role orchestrator
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO:     ${{ github.repository }}
        run: |
          set -e
          if [ -z "${CYCLE_ID:-}" ]; then
            echo "No cycle_id; skip orchestrator advance"
            exit 0
          fi
          STATUS="ROLE_DONE"
          if [ "${CODEX_EXIT_CODE:-0}" != "0" ]; then
            STATUS="BLOCKED"
          fi
          export STATUS
          python3 - <<'PY'
          import json, os, urllib.request

          data = json.dumps({
              'ref': 'main',
              'inputs': {
                  'mode':      'advance',
                  'task_type': os.environ.get('TASK_TYPE', 'default_development'),
                  'task':      '',
                  'trace_id':  os.environ.get('TRACE_ID', ''),
                  'cycle_id':  os.environ.get('CYCLE_ID', ''),
                  'role':      os.environ.get('ROLE_RAW', '').lower(),
                  'status':    os.environ.get('STATUS', 'ROLE_DONE'),
                  'note':      'Codex Local exit=' + os.environ.get('CODEX_EXIT_CODE', '0')
              }
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://api.github.com/repos/' + os.environ['REPO'] + '/actions/workflows/role-orchestrator.yml/dispatches',
              data=data,
              headers={
                  'Authorization': 'Bearer ' + os.environ['GH_TOKEN'],
                  'Accept':        'application/vnd.github+json',
                  'Content-Type':  'application/json',
                  'User-Agent':    'ai-devops-codex-local'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print('orchestrator advance: HTTP ' + str(resp.status))
          except Exception as e:
              print('orchestrator advance failed: ' + str(e))
          PY

      - name: Report to job summary
        if: always()
        shell: bash
        env:
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          INPUT_ROLE:     ${{ inputs.role }}
        run: |
          python3 - <<'PYEOF'
          import os

          trace    = os.environ.get('INPUT_TRACE_ID', '?')
          role     = os.environ.get('INPUT_ROLE', '?')
          exit_c   = os.environ.get('CODEX_EXIT_CODE', '?')
          status   = 'completed' if exit_c == '0' else 'failed'

          lines = [
              '## Codex Local ISA - ' + role + ' | ' + status,
              '',
              '| Field | Value |',
              '|---|---|',
              '| Trace | ' + trace + ' |',
              '| Role | ' + role + ' |',
              '| Codex exit | ' + exit_c + ' |',
              '| Status | ' + status + ' |',
              '| Result | governance/codex/results/' + trace + '.json |',
              '',
              '**No issue #31 comments written (BEM-495)**',
              '',
          ]
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/tmp/summary.md')
          with open(summary_path, 'a') as f:
              f.write('\n'.join(lines))
          PYEOF
