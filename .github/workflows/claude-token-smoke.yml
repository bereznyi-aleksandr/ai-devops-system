name: Claude Token Smoke

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret presence and write report
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python3 scripts/claude_token_smoke.py

      - name: Commit smoke result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/reports/bem568_claude_token_secret_smoke.md governance/transport/results.jsonl
          git commit -m "BEM-568 Claude token smoke result" || echo "No changes"
          git push
