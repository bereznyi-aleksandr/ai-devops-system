name: BEM949 P1 Static Validation Run Inspector

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          fetch-depth: 0

      - name: Inspect recent static validation runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          script: |
            const fs = require("fs");
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo,
              workflow_id: "bem949-ci-static-validation.yml",
              per_page: 10,
            });
            const records = [];
            for (const run of runs.workflow_runs) {
              const { data: jobsResult } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo,
                run_id: run.id,
                per_page: 100,
              });
              records.push({
                run_id: String(run.id),
                run_id_type: "github_actions_run",
                head_sha: run.head_sha,
                head_sha_type: "commit",
                status: run.status,
                conclusion: run.conclusion,
                event: run.event,
                created_at: run.created_at,
                updated_at: run.updated_at,
                jobs: jobsResult.jobs.map!job => ({
                  id: job.id,
                  name: job.name,
                  status: job.status,
                  conclusion: job.conclusion,
                  check_run_url: job.check_run_url,
                  steps: job.steps.map(step => ({
                    number: step.number,
                    name: step.name,
                    status: step.status,
                    conclusion: step.conclusion,
                  })),
                })),
              });
            }
            const payload = {
              schema_version: 1,
              protocol: "BEM-949",
              task_id: "BEM949-P1-CI-STABILIZE",
              receipt_id: "BEM949_p1_ci_static_validation_runs",
              created_at: new Date().toISOString(),
              workflow_file: ".github/workflows/bem949-ci-static-validation.yml",
              workflow_file_type: "workflow_path",
              runs: records,
            };
            fs.writeFileSync(
              "/tmp/BEM949_p1_ci_static_validation_runs.json",
              JSON.stringify(payload, null, 2) + "\n",
              "utf8"
            );

      - name: Commit run inspection
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/BEM949_p1_ci_static_validation_runs.json governance/proofs/BEM949_p1_ci_static_validation_runs.json
          git config user.email "bem949-ci-inspector@ai-devops-system"
          git config user.name "BEM949 CI Inspector"
          git add governance/proofs/BEM949_p1_ci_static_validation_runs.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: inspect static validation workflow runs"
          git push || (git pull --rebase origin main && git push)
