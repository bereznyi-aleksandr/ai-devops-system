name: BEM934 Materialize Patched Claude Candidate

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Build and validate patched candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh repo clone "$GITHUB_REPOSITORY" repo
          cd repo
          git config user.email "bem934-candidate@ai-devops-system"
          git config user.name "BEM-934 Candidate"
          python3 -m py_compile governance/runners/bem934_make_live_validation_dynamic.py
          python3 governance/runners/bem934_make_live_validation_dynamic.py
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/claude.yml')"
          grep -q "safe_trace" .github/workflows/claude.yml
          grep -q "BEM932_provider_router_' + trace + '.json'" .github/workflows/claude.yml
          mkdir -p governance/proofs
          cp .github/workflows/claude.yml governance/proofs/BEM934_patched_claude_candidate.yml
          SOURCE_SHA="$(git rev-parse HEAD:.github/workflows/claude.yml)"
          CANDIDATE_SHA="$(git hash-object governance/proofs/BEM934_patched_claude_candidate.yml)"
          jq -n --arg source "$SOURCE_SHA" --arg candidate "$CANDIDATE_SHA" '{status:"PASS",protocol:"BEM-934",task_id:"BEM934-LIVE-TEST",source_claude_blob_sha:$source,candidate_blob_sha:$candidate,candidate_path:"governance/proofs/BEM934_patched_claude_candidate.yml",checks:{patcher_compiled:true,yaml_parsed:true,dynamic_trace_path:true,dynamic_router_path:true}}' > governance/proofs/BEM934_patched_claude_candidate_receipt.json
          git add governance/proofs/BEM934_patched_claude_candidate.yml governance/proofs/BEM934_patched_claude_candidate_receipt.json
          git commit -m "Materialize validated BEM-934 patched Claude candidate"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
