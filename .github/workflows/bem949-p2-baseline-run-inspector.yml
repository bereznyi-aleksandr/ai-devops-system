name: BEM949 P2 Baseline Run Inspector

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Collect P2 run metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          gh run list --repo "$REPO" --workflow bem949-p2-functional-baseline.yml --limit 10 --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt > governance/proofs/BEM949_p2_baseline_runs.json || printf '[]\n' > governance/proofs/BEM949_p2_baseline_runs.json

      - name: Commit inspection
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-p2-inspector@ai-devops-system"
          git config user.name "BEM949 P2 Run Inspector"
          git add governance/proofs/BEM949_p2_baseline_runs.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "BEM949 P2: inspect baseline workflow runs"
          git push || (git pull --rebase origin main && git push)
