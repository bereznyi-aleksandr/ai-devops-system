name: BEM-932 Codex Local Assembled

on:
  workflow_dispatch:
    inputs:
      role:
        required: true
        type: string
      provider:
        required: false
        default: gpt_codex
        type: string
      trace_id:
        required: true
        type: string
      cycle_id:
        required: false
        default: ""
        type: string
      task_type:
        required: false
        default: default_development
        type: string
      task:
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

jobs:
  assemble-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Assemble role prompt and dispatch codex-local
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          ROLE: ${{ inputs.role }}
          PROVIDER: ${{ inputs.provider }}
          TRACE_ID: ${{ inputs.trace_id }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          TASK_TYPE: ${{ inputs.task_type }}
          TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail
          case "$ROLE" in
            curator) ELEMENT_ID="WRK.CURATOR" ;;
            analyst) ELEMENT_ID="WRK.ANALYST" ;;
            auditor) ELEMENT_ID="WRK.AUDITOR" ;;
            executor) ELEMENT_ID="WRK.EXECUTOR" ;;
            *) echo "unsupported role: $ROLE"; exit 2 ;;
          esac
          export ELEMENT_ID
          echo "element_id=$ELEMENT_ID" >> "$GITHUB_OUTPUT"
          python3 -m py_compile scripts/prompt_assembler.py
          python3 scripts/prompt_assembler.py --element-id "$ELEMENT_ID" --out /tmp/role_prompt.md

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          role_prompt = Path("/tmp/role_prompt.md").read_text(encoding="utf-8")
          task = os.environ.get("TASK", "")
          assembled = "\n".join([
              "BEM-932 PROVIDER ROUTER ASSEMBLED TASK",
              "",
              "## Assembled role prompt",
              role_prompt,
              "",
              "## Incoming task body",
              "-----",
              task,
              "-----",
              "",
          ])
          Path("/tmp/assembled_task.md").write_text(assembled, encoding="utf-8")
          meta = {
              "element_id": os.environ["ELEMENT_ID"],
              "role": os.environ["ROLE"],
              "trace_id": os.environ["TRACE_ID"],
              "cycle_id": os.environ.get("CYCLE_ID", ""),
              "task_type": os.environ.get("TASK_TYPE", ""),
              "assembled_sha256": hashlib.sha256(assembled.encode("utf-8")).hexdigest(),
              "assembled_bytes": len(assembled.encode("utf-8")),
          }
          Path("/tmp/assembled_meta.json").write_text(json.dumps(meta, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          payload = {
              "ref": "main",
              "inputs": {
                  "role": os.environ["ROLE"],
                  "provider": os.environ.get("PROVIDER", "gpt_codex"),
                  "trace_id": os.environ["TRACE_ID"],
                  "cycle_id": os.environn.get("CYCLE_ID", ""),
                  "task_type": os.environ.get("TASK_TYPE", "default_development"),
                  "task": assembled,
              },
          }
          Path("/tmp/codex_payload.json").write_text(json.dumps(payload, ensure_ascii=False), encoding="utf-8")
          print("assembled_sha256=" + meta["assembled_sha256"])
          print("assembled_bytes=" + str(meta["assembled_bytes"]))
          PY

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          meta = json.loads(Path("/tmp/assembled_meta.json").read_text())
          print("assembled_sha256=" + meta["assembled_sha256"])
          print("assembled_bytes=" + str(meta["assembled_bytes"]))
          PY

          url="https://api.github.com/repos/$REPO/actions/workflows/codex-local.yml/dispatches"
          code=$(curl -sS -o /tmp/dispatch_response.txt -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "$url" \
            --data @/tmp/codex_payload.json)
          echo "dispatch_http_code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/dispatch_response.txt || true

      - name: Write assembly receipt
        shell: bash
        env:
          TRACE_ID: ${{ inputs.trace_id }}
          ROLE: ${{ inputs.role }}
          PROVIDER: ${{ inputs.provider }}
          DISPATCH_HTTP_CODE: ${{ steps.dispatch.outputs.dispatch_http_code }}
          ASSEMBLED_SHA256: ${{ steps.dispatch.outputs.assembled_sha256 }}
          ASSEMBLED_BYTES: ${{ steps.dispatch.outputs.assembled_bytes }}
          ELEMENT_ID: ${{ steps.dispatch.outputs.element_id }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          trace = os.environ["TRACE_ID"]
          status = "PASS" if os.environ.get("DISPATCH_HTTP_CODE") == "204" else "BLOCKED"
          receipt = {
              "status": status,
              "protocol": "BEM-932 v8.3",
              "receipt_type": "codex_local_assembled_dispatch",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "role": os.environ.get("ROLE", ""),
              "element_id": os.environ.get("ELEMENT_ID", ""),
              "provider": os.environ.get("PROVIDER", ""),
              "trace_id": trace,
              "target_workflow_id": "codex-local.yml",
              "wrapper_workflow_id": "codex-local-assembled.yml",
              "prompt_assembler": "scripts/prompt_assembler.py",
              "assembled_sha256": os.environ.get("ASSEMBLED_SHA256", ""),
              "assembled_bytes": int(os.environ.get("ASSEMBLED_BYTES") or 0),
              "dispatch_http_code": os.environ.get("DISPATCH_HTTP_CODE", ""),
              "github_run_id": os.environ.get("RUN_ID", ""),
          }
          Path(f"governance/proofs/BEM932_codex_local_assembled_{trace}.json").write_text(
              json.dumps(receipt, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.email "codex-local-assembled@ai-devops-system"
          git config user.name "BEM-932 Codex Local Assembled"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/
          if git diff --cached --quiet; then
            echo "No receipt changes"
          else
            git commit -m "BEM-932 codex local assembled receipt trace=${TRACE_ID}"
            git push
          fi
          test "$DISPATCH_HTTP_CODE" = "204"
