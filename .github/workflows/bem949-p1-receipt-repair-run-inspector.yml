name: BEM949 P1 Receipt Repair Run Inspector
on:
  workflow_dispatch:
permissions:
  actions: read
  contents: write
jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          gh run list --repo "$REPO" --workflow bem949-p1-static-receipt-conflict-repair.yml --limit 10 --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt > governance/proofs/BEM949_p1_static_receipt_repair_runs.json || printf '[]\n' > governance/proofs/BEM949_p1_static_receipt_repair_runs.json
          git config user.email "bem949-inspector@ai-devops-system"
          git config user.name "BEM949 Receipt Repair Inspector"
          git add governance/proofs/BEM949_p1_static_receipt_repair_runs.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "BEM949 P1: inspect static receipt repair runs"
          git push
