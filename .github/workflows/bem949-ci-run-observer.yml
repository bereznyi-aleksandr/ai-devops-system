name: BEM949 CI Run Observer

on:
  workflow_run:
    workflows: ["BEM949 CI Static Validation"]
    types: [completed]

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          fetch-depth: 0

      - name: Record workflow_run conclusion
        shell: bash
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_CONCLUSION_TYPE: github_actions_conclusion
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          conclusion = os.environ.get("RUN_CONCLUSION", "unknown")
          payload = {
              "schema_version": 1,
              "protocol": "BEM-949",
              "task_id": "BEM949-P1-CI-STABILIZE",
              "status": "PASS" if conclusion == "success" else "FAIL",
              "workflow": os.environ.get("RUN_WORKFLOW", ""),
              "run_id": os.environ.get("RUN_ID", ""),
              "run_id_type": "github_actions_run",
              "run_attempt": os.environ.get("RUN_ATTEMPT", ""),
              "run_conclusion": conclusion,
              "run_conclusion_type": os.environ.get("RUN_CONCLUSION_TYPE", ""),
              "head_sha": os.environ.get("RUN_HEAD_SHA", ""),
              "head_sha_type": "commit",
              "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "checks": {
                  "conclusion_observed_from_workflow_run_event": True,
                  "green_dispatch_proven": conclusion == "success",
              },
              "non_claim": "A failed or neutral run is preserved as failure, not converted into a static-pass claim.",
          }
          Path("governance/proofs/BEM949_p1_ci_run_observer.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          git config user.email "bem949-ci-observer@ai-devops-system"
          git config user.name "BEM949 CI Run Observer"
          git add governance/proofs/BEM949_p1_ci_run_observer.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: record static-validation run conclusion"
          git push || (git pull --rebase origin main && git push)
