name: BEM949 CI Run Observer

on:
  workflow_run:
    workflows: ["BEM949 CI Static Validation"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          fetch-depth: 0

      - name: Collect target workflow job diagnostics
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          script: |
            const fs = require("fs");
            const runId = context.payload.workflow_run.id;
            const { data: jobResponse } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const conclusion = context.payload.workflow_run.conclusion || "unknown";
            const jobs = jobResponse.jobs.map(job => ({
              name: job.name,
              status: job.status,
              conclusion: job.conclusion,
              started_at: job.started_at,
              completed_at: job.completed_at,
              steps: job.steps.map(step => ({
                number: step.number,
                name: step.name,
                status: step.status,
                conclusion: step.conclusion,
              })),
            }));
            const payload = {
              schema_version: 1,
              protocol: "BEM-949",
              task_id: "BEM949-P1-CI-STABILIZE",
              status: conclusion === "success" ? "PASS" : "FAIL",
              workflow: context.payload.workflow_run.name,
              run_id: String(runId),
              run_id_type: "github_actions_run",
              run_attempt: String(context.payload.workflow_run_attempt || ""),
              run_conclusion: conclusion,
              run_conclusion_type: "github_actions_conclusion",
              head_sha: context.payload.workflow_run.head_sha || "",
              head_sha_type: "commit",
              created_at: new Date().toISOString(),
              jobs,
              checks: {
                conclusion_observed_from_workflow_run_event: true,
                green_dispatch_proven: conclusion === "success",
                job_diagnostics_collected: true,
              },
              non_claim: "A non-successful run remains failure; its step conclusions are preserved for autorepair.",
            };
            fs.writeFileSync(
              "/tmp/BEM949_p1_ci_run_observer.json",
              JSON.stringify(payload, null, 2) + "\n",
              "utf8"
            );

      - name: Commit run observation
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/BEM949_p1_ci_run_observer.json governance/proofs/BEM949_p1_ci_run_observer.json
          git config user.email "bem949-ci-observer@ai-devops-system"
          git config user.name "BEM949 CI Run Observer"
          git add governance/proofs/BEM949_p1_ci_run_observer.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P1: record static-validation run diagnostics"
          git push || (git pull --rebase origin main && git push)
