name: Repair Claude trace persistence

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Replace conflict-prone trace persistence step
        env:
          REPLACEMENT_B64:  --cached --quiet; then
            echo "No trace-report changes"
            exit 0
          fi
          git commit -m "CLAUDER-ROLE: role=${ROLE_RAW} trace=${TRACE_ID}"

          resolve_transport_conflicts() {
            local path
            local unresolved
            unresolved="$(git diff --name-only --diff-filter=U || true)"

            for path in governance/transport/results.jsoll governance/state/provider_status.json; do
              if printf '%s\n' "$unresolved" | grep -Fxq "$path"; then
                python3 - "$path" <<'PY'
import json
import subprocess
import sys
from pathlib import Path

path = sys.argv[1]

def stage_blob(stage):
    return subprocess.check_output(
        ["git", "show", f":{stage}:{path}"],
        text=True,
        encoding="utf-8",
    )

upstream = stage_blob(2)
local = stage_blob(3)

if path.endswith("results.jsol"):
    seen = set()
    merged = []
    for source in (upstream, local):
        for line in source.splitlines():
            if line.strip() and line not in seen:
                seen.add(line)
                merged.append(line)
    Path(path).write_text(
        ("\n".join(merged) + "\n") if merged else "",
        encoding="utf-8",
    )
else:
    remote_state = json.loads(upstream)
    local_state = json.loads(local)
    if not isinstance(remote_state, dict) or not isinstance(local_state, dict):
        raise SystemExit("provider_status.json must contain JSON objects")
    merged_state = dict(remote_state)
    if "claude" in local_state:
        merged_state["claude"] = local_state["claude"]
    if "updated_at" in local_state:
        merged_state["updated_at"] = local_state["updated_at"]
    Path(path).write_text(
        json.dumps(merged_state, ensure_ascii=False, indent=2) + "\n",
        encoding="utf-8",
    )
PY
                git add -- "$path"
              fi
            done

            unresolved="$(git diff --name-only --diff-filter=U || true)"
            if [ -n "$unresolved" ]; then
              echo "Unresolved rebase conflicts outside deterministic transport state:"
              printf '%s\n' "$unresolved"
              git status --short || true
              exit 1
            fi
            GIT_EDITOR=true git rebase --continue
          }

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            git fetch origin main
            if ! git rebase origin/main; then
              resolve_transport_conflicts
            fi
            sleep "$attempt"
          done

          echo "Trace report commit could not be pushed after retries"
          exit 1
