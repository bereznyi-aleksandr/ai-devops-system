name: Repair Claude trace persistence

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Replace conflict-prone trace persistence step
        env:
          PATCH_B64: 
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          import zlib
          from pathlib import Path

          path = Path(".github/workflows/claude.yml")
          text = path.read_text(encoding="utf-8")
          start_marker = "      - name: Commit trace report safely\n"
          end_marker = "\n      - name: Advance role orchestrator\n"
          if text.count(start_marker) != 1:
              raise SystemExit("expected exactly one trace persistence step")
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = zlib.decompress(base64.b64decode(os.environ["PATCH_B64"])).decode("utf-8")
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY
          git diff --check
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/claude.yml")'
          grep -Fq 'resolve_generated_conflicts()' .github/workflows/claude.yml


      - name: Commit and push repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -- .github/workflows/claude.yml
          if git diff --cached --quiet; then
            echo "Claude trace persistence is already repaired"
            exit 0
          fi
          git commit -m "BEM949: resolve Claude transport rebase conflicts"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git pull --rebase origin main
            sleep "$attempt"
          done
          echo "Repair commit could not be pushed after retries"
          exit 1
