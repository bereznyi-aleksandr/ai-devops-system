name: Repair Claude transport persistence

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/repair-claude-transport-persistence.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Replace conflict-prone transport commit
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          from pathlib import Path

          path = Path(".github/workflows/claude.yml")
          text = path.read_text(encoding="utf-8")
          start = text.index("      - name: Commit transport and report\n")
          end = text.index("\n      - name: Advance role orchestrator\n", start)
          replacement = base64.b64decode("").decode("utf-8")
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY
          git diff --check
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/claude.yml")'

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .github/workflows/claude.yml
          if git diff --cached --quiet; then
            echo "Claude transport step already repaired"
            exit 0
          fi
          git commit -m "BEM949: prevent Claude transport rebase conflicts"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep "$attempt"
          done
          exit 1
