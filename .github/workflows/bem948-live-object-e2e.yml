name: BEM-948 Live Object To Claude E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bem948-live-object-e2e.yml'

permissions:
  contents: write
  actions: write

jobs:
  live_e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TRACE_ID: bem948_p0_live_object_e2e_20260620T0427Z
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 1

      - name: Queue and route OBJ-GD-001 task
        shell: bash
        run: |
          set -euo pipefail
          python3 governance/runners/object_runner.py \
            --object-id OBJ-GD-001 \
            --role executor \
            --provider claude_code \
            --trace-id "$TRACE_ID" \
            --consume \
            --task "BEM-948 P0 live object E2E. Create governance/reports/bem948_p0_live_object_e2e_20260620T0427Z.md and governance/proofs/BEM948_p0_live_object_executed_bem948_p0_live_object_e2e_20260620T0427Z.json. The proof must be truthful: status completed only after work is complete; include protocol BEM-948, trace_id, provider_selected claude_code, target_workflow_id claude.yml, dispatch_result executed, blocker null, and explicit sha_type for every SHA."

      - name: Execute only this routed governance dispatch
        id: executor
        shell: bash
        env:
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          set +e
          python3 governance/runners/dispatch_executor.py --max 1 --trace-id "$TRACE_ID"
          result=$?
          set -e
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: Commit P0 handoff evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-948 Live E2E"
          git config user.email "bem948-live-e2e@ai-devops-system"
          git add governance/state/dispatch_queue.jsonl governance/state/dispatch_processed.jsonl governance/state/dispatch_executed.jsonl governance/state/object_events.jsonl governance/state/OBJ-GD-001_last_run.json governance/proofs/BEM938_object_runner_receipt.json governance/proofs/BEM935_dispatch_consumer_receipt.json governance/proofs/BEM948_dispatch_executor_receipt.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No P0 handoff evidence changes"
          else
            git commit -m "BEM-948: live object to dispatch executor handoff"
            git push
          fi

      - name: Enforce handoff result
        if: always()
        shell: bash
        run: |
          test "${{ steps.executor.outputs.result }}" = "0"
