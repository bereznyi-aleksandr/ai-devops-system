name: BEM-948 Live Object to Claude E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate retired E2E repair workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow source is available
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/workflows/bem948-live-object-e2e.yml
          echo "BEM-948 retired E2E workflow is syntax-safe."
      - name: Verify dispatch bridge sources
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile             governance/runners/object_dispatch_bridge.py             governance/runners/dispatch_executor.py             governance/runners/dispatch_executor_guard.py
