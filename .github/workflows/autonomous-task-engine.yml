name: Autonomous Task Engine

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'production_loop | run_until_blocked | execute_next | plan | proof_patch | proof_cycle'
        required: false
        default: 'production_loop'
        type: string
      add_internal_tasks:
        description: 'Add INT-001..INT-005 tasks to roadmap (true/false)'
        required: false
        default: 'false'
        type: string
  issue_comment:
    types: [created]
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  autonomy-engine:
    name: Autonomous Task Engine
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.number == 31 && contains(github.event.comment.body, 'TYPE: AUTONOMY_ENGINE'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Resolve mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_ADD_INTERNAL_TASKS: ${{ inputs.add_internal_tasks }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -e
          MODE="${INPUT_MODE:-production_loop}"
          ADD_TASKS="${INPUT_ADD_INTERNAL_TASKS:-false}"
          TRACE_ID="workflow_dispatch"

          if [ "${EVENT_NAME:-}" = "issue_comment" ]; then
            MODE="production_loop"
            ADD_TASKS="false"
            TRACE_ID="issue_comment"

            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: run_until_blocked'; then MODE="run_until_blocked"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: execute_next'; then MODE="execute_next"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: plan'; then MODE="plan"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'ADD_INTERNAL_TASKS: true'; then ADD_TASKS="true"; fi

            TRACE_LINE=$(printf '%s\n' "$COMMENT_BODY" | grep -E '^TRACE_ID:' | head -1 || true)
            if [ -n "$TRACE_LINE" ]; then
              TRACE_ID=$(printf '%s' "$TRACE_LINE" | cut -d ':' -f 2- | tr -d ' ')
            fi
          fi

          if [ -z "$MODE" ]; then MODE="production_loop"; fi
          echo "AUTONOMY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "ADD_INTERNAL_TASKS=$ADD_TASKS" >> "$GITHUB_ENV"
          echo "AUTONOMY_TRACE_ID=$TRACE_ID" >> "$GITHUB_ENV"
          echo "Resolved AUTONOMY_MODE=$MODE ADD_INTERNAL_TASKS=$ADD_TASKS TRACE_ID=$TRACE_ID"

      - name: Run autonomy engine
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
          MAIN_ISSUE: '31'
        run: |
          set +e
          EXTRA_ARGS=""
          if [ "$ADD_INTERNAL_TASKS" = "true" ]; then
            EXTRA_ARGS="--add-internal-tasks"
          fi
          python3 scripts/autonomous_task_engine.py --mode "$AUTONOMY_MODE" $EXTRA_ARGS
          echo "ENGINE_EXIT=$?" >> "$GITHUB_ENV"
          exit 0

      - name: Commit autonomy state
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "autonomy-engine@ai-devops-system"
          git config user.name "Autonomy Engine"

          git add \
            governance/state/autonomy_state.json \
            governance/state/roadmap_state.json \
            governance/state/internal_contour_status.json \
            governance/state/repo_inventory.json \
            governance/state/orchestrator_health.json \
            governance/state/production_status_report.json \
            governance/state/repair_generator_state.json \
            governance/state/gpt_reserve_proof_result.json \
            governance/state/e6_proof_result.json \
            governance/state/test_autonomy_cycle_001.json \
            governance/state/test_autonomy_cycle_003.json \
            governance/events/autonomy_engine.jsonl \
            governance/events/autonomous_development.jsonl \
            governance/events/autonomous_roadmap_executor_proof.jsonl \
            governance/events/autonomous_test_cycle.jsonl \
            governance/events/patch_runner.jsonl \
            governance/patch_queue/current.json \
            governance/patch_queue/generated/ \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "BEM-AUTONOMY-ENGINE | NO_STATE_CHANGES"
            echo "AUTONOMY_PUSH_STATUS=no_changes" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "AUTONOMY ENGINE: state update (mode=$AUTONOMY_MODE)"

          push_ok=false
          for attempt in 1 2 3; do
            echo "BEM-AUTONOMY-ENGINE | PUSH_ATTEMPT_$attempt"
            git pull --rebase --autostash origin main
            if git push origin HEAD:main; then
              push_ok=true
              break
            fi
            sleep $((attempt * 2))
          done

          if [ "$push_ok" != "true" ]; then
            echo "BEM-AUTONOMY-ENGINE | PUSH_FAILED"
            echo "AUTONOMY_PUSH_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi

          echo "BEM-AUTONOMY-ENGINE | PUSH_OK"
          echo "AUTONOMY_PUSH_STATUS=ok" >> "$GITHUB_ENV"

      - name: Post autonomy report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const body = [
              'BEM-AUTONOMY-ENGINE | RUN RESULT',
              '',
              `Mode: ${process.env.AUTONOMY_MODE || 'unknown'}`,
              `Trace: ${process.env.AUTONOMY_TRACE_ID || 'unknown'}`,
              `Exit: ${process.env.ENGINE_EXIT || 'unknown'}`,
              `Push: ${process.env.AUTONOMY_PUSH_STATUS || 'unknown'}`,
              '',
              'BM-CLOUD-001 hardened:',
              '- issue_comment trigger supported',
              '- production_loop mode active',
              '- sync includes waiting_runner status',
              '- dispatch layer for stale tasks',
              '- generated/ patch files for stale recovery',
              '- INT-001..INT-005 available via --add-internal-tasks'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 31,
              body
            });
