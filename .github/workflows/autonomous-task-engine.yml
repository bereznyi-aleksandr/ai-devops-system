name: Autonomous Task Engine

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'production_loop | run_until_blocked | execute_next | plan | proof_patch | proof_cycle'
        required: false
        default: 'production_loop'
        type: string
      add_internal_tasks:
        description: 'Add INT-001..INT-005 tasks to roadmap (true/false)'
        required: false
        default: 'false'
        type: string
  repository_dispatch:
    types: [autonomy-engine, ledger-updated]
  issue_comment:
    types: [created]
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  autonomy-engine:
    name: Autonomous Task Engine
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment' && github.event.issue.number == 31 && contains(github.event.comment.body, 'TYPE: AUTONOMY_ENGINE'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Resolve mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_ADD_INTERNAL_TASKS: ${{ inputs.add_internal_tasks }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set -e
          MODE="${INPUT_MODE:-production_loop}"
          ADD_TASKS="${INPUT_ADD_INTERNAL_TASKS:-false}"
          TRACE_ID="workflow_dispatch"

          if [ "${EVENT_NAME:-}" = "repository_dispatch" ]; then
            # GPT triggered via Deno webhook → repository_dispatch
            MODE=$(echo "$DISPATCH_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('mode','production_loop'))" 2>/dev/null || echo "production_loop")
            TRACE_ID=$(echo "$DISPATCH_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('trace_id','repo_dispatch'))" 2>/dev/null || echo "repo_dispatch")
            ADD_TASKS=$(echo "$DISPATCH_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('add_internal_tasks') else 'false')" 2>/dev/null || echo "false")
            echo "REPOSITORY_DISPATCH triggered: mode=$MODE trace_id=$TRACE_ID"
          fi

          if [ "${EVENT_NAME:-}" = "schedule" ]; then
            MODE="production_loop"
            TRACE_ID="cron_scheduled"
          fi

          if [ "${EVENT_NAME:-}" = "issue_comment" ]; then
            MODE="production_loop"
            ADD_TASKS="false"
            TRACE_ID="issue_comment"

            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: run_until_blocked'; then MODE="run_until_blocked"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: execute_next'; then MODE="execute_next"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'MODE: plan'; then MODE="plan"; fi
            if printf '%s\n' "$COMMENT_BODY" | grep -q 'ADD_INTERNAL_TASKS: true'; then ADD_TASKS="true"; fi

            TRACE_LINE=$(printf '%s\n' "$COMMENT_BODY" | grep -E '^TRACE_ID:' | head -1 || true)
            if [ -n "$TRACE_LINE" ]; then
              TRACE_ID=$(printf '%s' "$TRACE_LINE" | cut -d ':' -f 2- | tr -d ' ')
            fi
          fi

          if [ -z "$MODE" ]; then MODE="production_loop"; fi
          echo "AUTONOMY_MODE=$MODE" >> "$GITHUB_ENV"
          echo "ADD_INTERNAL_TASKS=$ADD_TASKS" >> "$GITHUB_ENV"
          echo "AUTONOMY_TRACE_ID=$TRACE_ID" >> "$GITHUB_ENV"
          echo "Resolved AUTONOMY_MODE=$MODE ADD_INTERNAL_TASKS=$ADD_TASKS TRACE_ID=$TRACE_ID"

      - name: Run autonomy engine
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
          MAIN_ISSUE: '31'
        run: |
          set +e
          EXTRA_ARGS=""
          if [ "$ADD_INTERNAL_TASKS" = "true" ]; then
            EXTRA_ARGS="--add-internal-tasks"
          fi
          python3 scripts/autonomous_task_engine.py --mode "$AUTONOMY_MODE" $EXTRA_ARGS
          echo "ENGINE_EXIT=$?" >> "$GITHUB_ENV"
          exit 0

      - name: Commit autonomy state
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "autonomy-engine@ai-devops-system"
          git config user.name "Autonomy Engine"

          git add \
            governance/state/ \
            governance/events/ \
            governance/patch_queue/ \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "BEM-AUTONOMY-ENGINE | NO_STATE_CHANGES"
            echo "AUTONOMY_PUSH_STATUS=no_changes" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "AUTONOMY ENGINE: state update (mode=$AUTONOMY_MODE trace=$AUTONOMY_TRACE_ID)"

          push_ok=false
          for attempt in 1 2 3; do
            echo "BEM-AUTONOMY-ENGINE | PUSH_ATTEMPT_$attempt"
            git pull --rebase --autostash origin main
            if git push origin HEAD:main; then
              push_ok=true
              break
            fi
            sleep $((attempt * 2))
          done

          if [ "$push_ok" != "true" ]; then
            echo "BEM-AUTONOMY-ENGINE | PUSH_FAILED"
            echo "AUTONOMY_PUSH_STATUS=failed" >> "$GITHUB_ENV"
            exit 1
          fi

          echo "BEM-AUTONOMY-ENGINE | PUSH_OK"
          echo "AUTONOMY_PUSH_STATUS=ok" >> "$GITHUB_ENV"

      - name: Post autonomy report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const body = [
              'BEM-AUTONOMY-ENGINE | RUN RESULT',
              '',
              `Mode: ${process.env.AUTONOMY_MODE || 'unknown'}`,
              `Trace: ${process.env.AUTONOMY_TRACE_ID || 'unknown'}`,
              `Trigger: ${context.eventName}`,
              `Exit: ${process.env.ENGINE_EXIT || 'unknown'}`,
              `Push: ${process.env.AUTONOMY_PUSH_STATUS || 'unknown'}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 31,
              body
            });
