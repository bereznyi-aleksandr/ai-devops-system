name: GPT Scheduler Tick

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'  # каждые 10 минут

jobs:
  gpt-tick:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run GPT Scheduler Tick
        run: |
          python3 governance/gpt_scheduler_tick.py

      - name: Commit state changes
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          git config user.email "gpt-scheduler@ai-devops-system"
          git config user.name "GPT Scheduler"
          git pull --rebase origin main
          git add governance/schedulers/gpt/
          git add governance/exchange.jsonl
          git diff --cached --quiet || git commit -m "GPT SCHEDULER TICK: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Report to issue
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
        run: |
          LAST_TICK=$(python3 -c "import json; d=json.load(open('governance/schedulers/gpt/state.json')); print(d.get('last_tick','unknown'))")
          LAST_REPORT=$(python3 -c "import json; d=json.load(open('governance/schedulers/gpt/state.json')); print(d.get('last_report','none'))")
          gh issue comment 31 \
            --repo bereznyi-aleksandr/ai-devops-system \
            --body "GPT SCHEDULER TICK | ${LAST_TICK} | Report: ${LAST_REPORT}"
