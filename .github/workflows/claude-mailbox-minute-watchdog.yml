name: Claude Mailbox Minute Watchdog

# BEM-848: removed push trigger — 125 min timeout was blocking all concurrent slots
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: claude-mailbox-minute-watchdog
  cancel-in-progress: false

jobs:
  minute-watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Syntax check
        run: python3 -m py_compile scripts/claude_mailbox_minute_watchdog.py scripts/read_claude_watchdog_status.py
      - name: Run minute watchdog loop
        run: bash scripts/claude_mailbox_minute_watchdog_loop.sh
