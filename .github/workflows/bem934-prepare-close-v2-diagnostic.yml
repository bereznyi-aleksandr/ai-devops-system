name: BEM-934 Prepare Close v2 Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
      - name: Capture and commit diagnostic
        shell: bash
        run: |
          set +e
          python3 -m py_compile governance/runners/bem934_prepare_close_v2.py > /tmp/bem934_prepare.log 2>&1
          RC=$?
          if [ "$RC" -eq 0 ]; then
            python3 governance/runners/bem934_prepare_close_v2.py >> /tmp/bem934_prepare.log 2>&1
            RC=$?
          fi
          export RC
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          text = Path('/tmp/bem934_prepare.log').read_text(errors='replace')
          payload = {
              'status': 'PASS' if int(os.environ['RC']) == 0 else 'BLOCKED',
              'task_id': 'BEM934-CLOSE.PREPARE-DIAGNOSTIC',
              'created_at': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'return_code': int(os.environ['RC']),
              'diagnostic': text[-4000:],
              'release_promoted': False,
          }
          Path('/tmp/BEM934_close_preparation_diagnostic.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          git reset --hard HEAD
          cp /tmp/BEM934_close_preparation_diagnostic.json governance/proofs/BEM934_close_preparation_diagnostic.json
          git config user.email "bem934-diagnostic@ai-devops-system"
          git config user.name "BEM-934 Diagnostic"
          git add governance/proofs/BEM934_close_preparation_diagnostic.json
          git commit -m "BEM-934: record close preparation diagnostic" || true
          git push || (git pull --rebase origin main && git push)
          exit 0
