name: BEM949 P3 V3 Observer Failure Diagnostics

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          fetch-depth: 0

      - name: Collect latest v3 observer failed log
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          run_id="$(
            gh run list \
              --repo "$REPO" \
              --workflow bem949-p3-v3-trace-observer.yml \
              --limit 10 \
              --json databaseId,status,conclusion \
              --qq '[.[] | select(.status == "completed" and .conclusion == "failure")] | first  | .databaseId // empty' \
              || true
          )"
          if [ -n "$run_id" ]; then
            gh run view "$run_id" --repo "$REPO" --log-failed 2>/dev/null | tail -n 250 > governance/proofs/BEM949_p3_v_observer_latest_failed.log || true
          else
            printf '%s\n' 'No completed failed v3 observer run was returned by the Actions API.' > governance/proofs/BEM949_p3_v3_observer_latest_failed.log
          fi
          test -s governance/proofs/BEM949_p3_v3_observer_latest_failed.log

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.email "bem949-diagnostics@ai-devops-system"
          git config user.name "BEM949 P3 Diagnostics"
          git add -- governance/proofs/BEM949_p3_v3_observer_latest_failed.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "BEM949 P3: collect v3 observer failure log"
          git push || (git pull --rebase origin main && git push)
