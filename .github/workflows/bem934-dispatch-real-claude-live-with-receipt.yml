name: BEM934 Dispatch Real Claude Live With Receipt

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch and record receipt
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          TRACE: tg_818730867_20260618T105741Z
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          python3 - <<'PY' > /tmp/payload.json
          import json
          payload = {
              "ref": "main",
              "inputs": {
                  "role": "curator",
                  "provider": "claude_code",
                  "trace_id": "tg_818730867_20260618T105741Z",
                  "cycle_id": "bem934_live_operator_actual_final",
                  "task_type": "live_content_analysis_repair",
                  "task": (
                      "BEM-934 real operator Telegram trace tg_818730867_20260618T105741Z. "
                      "Verify governance/proofs/BEM932_provider_router_tg_818730867_20260618T105741Z.json. "
                      "Create governance/proofs/BEM934_live_content_tg_818730867_20260618T105741Z.json "
                      "with status PASS, protocol BEM-934, task_id BEM934-LIVE-TEST, exact trace_id, "
                      "provider_selected claude_code, exact source_router_receipt, exactly two verifiable "
                      "idempotency invariants for Telegram delivery into WRK-C1, at least two validation_steps, "
                      "at least two acceptance_checks each result PASS, and at least one limitation. "
                      "Produce a substantive report. Do not modify canonical closure state."
                  ),
              },
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          gh api --method POST             -H "Accept: application/vnd.github+json"             -H "X-GitHub-Api-Version: 2022-11-28"             --input /tmp/payload.json             "repos/$REPO/actions/workflows/claude.yml/dispatches"
          gh repo clone "$REPO" repo
          cd repo
          git config user.email "bem934-dispatch@ai-devops-system"
          git config user.name "BEM-934 Dispatch"
          mkdir -p governance/proofs
          jq -n --arg trace "$TRACE" --arg run "$GITHUB_RUN_ID"             '{status:"PASS",protocol:"BEM-934",task_id:"BEM934-LIVE-TEST",trace_id:$trace,claude_dispatch_http:204,wrapper_run_id:$run,dispatched:true}'             > governance/proofs/BEM934_real_claude_dispatch_receipt.json
          git add governance/proofs/BEM934_real_claude_dispatch_receipt.json
          git commit -m "Record BEM-934 real Claude dispatch receipt"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main
          done
          exit 1
