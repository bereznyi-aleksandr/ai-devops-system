name: Curator

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  gateway-diagnostic:
    name: Curator Gateway Diagnostic
    if: |
      github.event.issue.number == 31 &&
      github.actor != 'github-actions[bot]' &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@curator') &&
      !contains(github.event.comment.body, 'BEM-GATEWAY-DIAG') &&
      !contains(github.event.comment.body, 'BEM-GPT-CURATOR') &&
      !contains(github.event.comment.body, 'RUN RESULT') &&
      !contains(github.event.comment.body, 'HOSTED FALLBACK') &&
      !contains(github.event.comment.body, 'HOSTED_GPT_STATUS') &&
      !contains(github.event.comment.body, 'ANTI_RECURSION') &&
      !contains(github.event.comment.body, 'Workflow run:') &&
      !contains(github.event.comment.body, 'DIAGNOSIS RULE')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Post gateway diagnostic report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            let runnerLines = [];
            let runnerSummary = 'unknown';
            try {
              const runners = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              const list = runners.data.runners || [];
              runnerSummary = `${list.length} self-hosted runner(s) visible`;
              if (list.length === 0) {
                runnerLines.push('| self-hosted runners | ❌ | none visible to AI_SYSTEM_GITHUB_PAT |');
              } else {
                for (const r of list) {
                  const labels = (r.labels || []).map(l => l.name).join(', ');
                  const status = r.status === 'online' ? '✅ online' : `❌ ${r.status}`;
                  runnerLines.push(`| runner:${r.name} | ${status} | labels: ${labels}; busy: ${r.busy} |`);
                }
              }
            } catch (error) {
              runnerSummary = `runner inventory failed with AI_SYSTEM_GITHUB_PAT: ${error.message}`;
              runnerLines.push(`| self-hosted runner inventory | ❌ | ${error.message} |`);
            }

            await new Promise(resolve => setTimeout(resolve, 15000));

            let jobLines = [];
            try {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100
              });
              const list = jobs.data.jobs || [];
              if (list.length === 0) {
                jobLines.push('| workflow jobs | ❌ | no jobs visible for current run |');
              } else {
                for (const j of list) {
                  const labels = (j.labels || []).join(', ');
                  const conclusion = j.conclusion || 'none';
                  jobLines.push(`| job:${j.name} | ${j.status}/${conclusion} | labels: ${labels}; runner: ${j.runner_name || 'none'}; url: ${j.html_url} |`);
                }
              }
            } catch (error) {
              jobLines.push(`| workflow jobs inventory | ❌ | ${error.message} |`);
            }

            const body = [
              'BEM-GATEWAY-DIAG | CURATOR | RUN RESULT',
              '',
              'Checklist:',
              '✅ issue_comment event reached curator.yml',
              '✅ curator trigger matched issue #31',
              '✅ ubuntu-latest fallback job executed',
              '✅ Claude was not called',
              `⏳ GPT Curator job depends on self-hosted runner availability: ${runnerSummary}`,
              '',
              `Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '| Node | Status | Comment |',
              '|---|---:|---|',
              '| GitHub event | ✅ | issue_comment received |',
              '| Gateway fallback | ✅ | ubuntu-latest path works |',
              ...runnerLines,
              ...jobLines,
              '| GPT backend | ⏳ | check GPT Curator job line above |',
              '',
              'DIAGNOSIS RULE:',
              '- If GPT Curator job is queued and runner is none, no matching online self-hosted runner is available.',
              '- If GPT Curator job is in_progress/completed and BEM-GPT-CURATOR is absent, inspect job logs: Codex CLI/path/post-report is the suspect.',
              '- If BEM-GPT-CURATOR appears, GPT curator backend works.',
              '',
              'ANTI_RECURSION: report comments are ignored by curator workflows.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  curator:
    name: GPT Curator
    if: |
      github.event.issue.number == 31 &&
      github.actor != 'github-actions[bot]' &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@curator') &&
      !contains(github.event.comment.body, 'BEM-GATEWAY-DIAG') &&
      !contains(github.event.comment.body, 'BEM-GPT-CURATOR') &&
      !contains(github.event.comment.body, 'RUN RESULT') &&
      !contains(github.event.comment.body, 'HOSTED FALLBACK') &&
      !contains(github.event.comment.body, 'HOSTED_GPT_STATUS') &&
      !contains(github.event.comment.body, 'ANTI_RECURSION') &&
      !contains(github.event.comment.body, 'Workflow run:') &&
      !contains(github.event.comment.body, 'DIAGNOSIS RULE')
    runs-on: self-hosted
    timeout-minutes: 30

    concurrency:
      group: curator-${{ github.event.issue.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Verify local Codex CLI
        shell: bash
        run: |
          set -e
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          echo "node=$(command -v node || true)"
          echo "codex=$(command -v codex || true)"
          node -v
          codex --version

      - name: Build curator prompt
        shell: bash
        run: |
          set -e
          BODY_FILE="$RUNNER_TEMP/curator_comment_body.txt"
          PROMPT_FILE="$RUNNER_TEMP/gpt_curator_prompt.txt"
          cat > "$BODY_FILE" <<'BODY'
          ${{ github.event.comment.body }}
          BODY

          cat > "$PROMPT_FILE" <<PROMPT
          BEM-GPT-CURATOR | GPT_CURATOR

          You are GPT_CURATOR for ai-devops-system.

          Architecture:
          - Operator entrypoint remains Telegram -> Deno -> issue #31 -> curator.
          - Curator backend is GPT/Codex local runner.
          - Do not call Claude.
          - Do not use anthropics/claude-code-action.
          - Route execution to GPT_EXECUTOR, analysis to GPT_ANALYST, audit to GPT_AUDITOR.

          Read before acting:
          - governance/prompts/curator_prompt.md
          - governance/MASTER_PLAN.md
          - governance/state/routing.json
          - governance/state/system_state.json
          - governance/exchange.jsonl
          - governance/telegram_outbox.jsonl
          - governance/processed_events.jsonl

          Incoming comment:
          -----
          $(cat "$BODY_FILE")
          -----

          Allowed file changes:
          - governance/exchange.jsonl
          - governance/telegram_outbox.jsonl
          - governance/processed_events.jsonl
          - governance/state/routing.json

          Required behavior:
          - Determine operator intent.
          - Update state/routing if needed so curator.active=gpt.
          - Append state events where applicable.
          - Write operator-facing report to telegram_outbox.jsonl where applicable.
          - Publish a compact BEM report.
          PROMPT

          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"

      - name: Run GPT Curator
        shell: bash
        run: |
          set +e
          export PATH="$HOME/.nvm/versions/node/v24.15.0/bin:$HOME/.local/bin:$PATH"
          OUTPUT_FILE="$RUNNER_TEMP/gpt_curator_output.md"
          {
            echo "BEM-GPT-CURATOR | RAW_OUTPUT"
            echo
            codex exec "$(cat "$PROMPT_FILE")"
            CODEX_EXIT=$?
            echo
            echo "CODEX_EXIT_CODE=$CODEX_EXIT"
          } 2>&1 | tee "$OUTPUT_FILE"
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
          exit 0

      - name: Commit curator state changes
        shell: bash
        run: |
          set -e
          git config user.email "gpt-curator@ai-devops-system"
          git config user.name "GPT Curator"
          git pull --rebase origin main
          git add governance/exchange.jsonl governance/telegram_outbox.jsonl governance/processed_events.jsonl governance/state/routing.json || true
          git diff --cached --quiet || git commit -m "GPT CURATOR: process operator event"
          git push

      - name: Post GPT curator report to issue
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          output_path = pathlib.Path(os.environ.get("OUTPUT_FILE", ""))
          output = output_path.read_text(encoding="utf-8", errors="replace") if output_path.exists() else "OUTPUT_FILE was not created."
          body = "BEM-GPT-CURATOR | RUN RESULT\n\n" + output[-60000:]
          data = json.dumps({"body": body}).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['ISSUE_NUMBER']}/comments",
              data=data,
              headers={
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "User-Agent": "ai-devops-gpt-curator"
              },
              method="POST"
          )
          with urllib.request.urlopen(req) as resp:
              print(resp.status)
          PY
