name: Role Orchestrator

on:
  workflow_dispatch:
    inputs:
      cycle_id:
        required: false
        default: ""
        type: string
      task:
        required: false
        default: ""
        type: string
      task_type:
        required: false
        default: "default_development"
        type: string

permissions:
  contents: write
  actions: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    outputs:
      next_role: ${{ steps.next.outputs.next_role }}
      should_dispatch: ${{ steps.next.outputs.should_dispatch }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Decide next role
        shell: bash
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
        run: |
          set -euo pipefail
          python3 scripts/role_orchestrator_decide.py

      - name: Commit orchestration decision
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/transport/results.jsonl governance/state/role_cycle_state.json
          git commit -m "Role orchestrator decision ${{ inputs.cycle_id }}" || echo "No changes"
          git push || true

      - name: Prepare provider-router dispatch
        id: next
        shell: bash
        env:
          TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail
          python3 -<<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          from pathlib import Path
          state = json.loads(Path("governance/state/role_cycle_state.json").read_text())
          last = state.get("last_orchestrator_decision", {})
          next_role = last.get("to_role") or state.get("next_role") or ""
          if next_role == "auditor_final":
              next_role = "auditor"
          cycle_id = state.get("cycle_id") or ""
          trace_id = last.get("trace_id") or cycle_id or "role_orchestrator_trace"
          yshould = next_role in {"analyst", "auditor", "executor", "curator"}
          task = os.environ.get("TASK") or f"Role orchestrator dispatch for cycle {cycle_id}"
          print(f"next_role={next_role}")
          print(f"trace_id={trace_id}")
          print(f"should_dispatch={'true' if should else 'false'}")
          print("task<<EOF")
          print(task)
          print("EOF")
          PY

      - name: Dispatch selected role through provider-router
        if: ${{ steps.next.outputs.should_dispatch == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          NEXT_ROLE: ${{ steps.next.outputs.next_role }}
          TRACE_ID: ${{ steps.next.outputs.trace_id }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          TASK: ${{ steps.next.outputs.task }}
          TASK_TYPE: ${{ inputs.task_type }}
        run: |
          set -euo pipefail
          python3 -<<'PY' > /tmp/provider_router_payload.json
          import json, os
          payload = {
            "ref": "main",
            "inputs": {
              "role": os.environ["NEXT_ROLE"],
              "trace_id": os.environ["TRACE_ID"],
              "cycle_id": os.environ.get("CYCLE_ID", ""),
              "task_type": os.environ.get("TASK_TYPE", "default_development"),
              "task": os.environ.get("TASK", ""),
              "mode": "live"
            }
          }
          print(json.dumps(payload))
          PY
          code=$(curl -sS -o /tmp/provider_router_dispatch.txt -w '%{http_code}' -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/actions/workflows/provider-router.yml/dispatches" --data @/tmp/provider_router_payload.json)
          cat /tmp/provider_router_dispatch.txt || true
          test "$code" = "204"

      - name: Write role orchestrator receipt
        if: always()
        shell: bash
        env:
          NEXT_ROLE: ${{ steps.next.outputs.next_role }}
          SHOULD_DISPATCH: ${{ steps.next.outputs.should_dispatch }}
          TRACE_ID: ${{ steps.next.outputs.trace_id }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 -<<'PY'
          import json, os
          from datetime import datetime, timezone
          from patlib import Path
          receipt = {
            "status": "PASS",
            "protocol": "BEM-932 v8.3",
            "receipt_type": "role_orchestrator_provider_router",
            "created_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "workflow": "role-orchestrator.yml",
            "provider_router_workflow": "provider-router.yml",
            "next_role": os.environ.get("NEXT_ROLE", ""),
            "trace_id": os.environ.get("TRACE_ID", ""),
            "should_dispatch": os.environ.get("SHOULD_DISPATCH", ""),
            "note": "role-orchestrator dispatches analyst/auditor/executor/curator roles through provider-router.yml"
          }
          Path("governance/proofs/BEM932_role_orchestrator_provider_router_receipt.json").write_text(json.dumps(receipt, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "BEM-932 Role Orchestrator"
          git config user.email "role-orchestrator@ai-devops-system"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_role_orchestrator_provider_router_receipt.json
          if git diff --cached --quiet; then
            echo "No receipt changes"
          else
            git commit -m "BEM932 role orchestrator provider router receipt"
            git push
          fi
