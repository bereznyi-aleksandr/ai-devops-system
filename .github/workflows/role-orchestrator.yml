name: Role Orchestrator

on:
  workflow_dispatch:
    inputs:
      cycle_id:
        required: false
        default: ""
        type: string
      task:
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}

      - name: Decide next role
        shell: bash
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
        run: |
          set -euo pipefail
          python3 scripts/role_orchestrator_decide.py

      - name: Commit decision
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/transport/results.jsonl governance/state/role_cycle_state.json
          git commit -m "Role orchestrator decision ${{ inputs.cycle_id }}" || echo "No changes"
          git push || true

      - name: Dispatch and receipt
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT || github.token }}
          REPO: ${{ github.repository }}
          TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail
          mkdir -p governance/proofs
          python3 - <<'PY' > /tmp/dispatch.env
          import json, os
          from pathlib import Path
          state = json.loads(Path("governance/state/role_cycle_state.json").read_text())
          last = state.get("last_orchestrator_decision", {})
          role = last.get("to_role") or state.get("next_role") or ""
          if role == "auditor_final":
              role = "auditor"
          trace = last.get("trace_id") or state.get("cycle_id") or "role_orchestrator_trace"
          task = os.environ.get("TASK") or ("Role orchestrator dispatch for " + trace)
          should = role in {"analyst", "auditor", "executor", "curator"}
          print("ROLE=" + role)
          print("TRACE=" + trace)
          print("SHOULD=" + ("1" if should else "0"))
          payload = {"ref": "main", "inputs": {"role": role, "trace_id": trace, "cycle_id": state.get("cycle_id",""), "task_type": "default_development", "task": task, "mode": "live"}}
          Path("/tmp/payload.json").write_text(json.dumps(payload))
          PY
          source /tmp/dispatch.env
          if [ "$SHOULD" = "1" ]; then
            code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/actions/workflows/provider-router.yml/dispatches" --data @/tmp/payload.json)
            cat /tmp/resp.txt || true
            test "$code" = "204"
          fi
          python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          env = {}
          for line in Path("/tmp/dispatch.env").read_text().splitlines():
              if "=" in line:
                  k, v = line.split("=", 1)
                  env[k] = v
          receipt = {"status":"PASS","protocol":"BEM-932 v8.3","receipt_type":"role_orchestrator_provider_router","created_at":datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),"workflow":"role-orchestrator.yml","provider_router_workflow":"provider-router.yml","next_role":env.get("ROLE",""),"trace_id":env.get("TRACE",""),"should_dispatch":env.get("SHOULD","")}
          Path("governance/proofs/BEM932_role_orchestrator_provider_router_receipt.json").write_text(json.dumps(receipt, indent=2) + "\n")
          PY
          git config user.name "BEM-932 Role Orchestrator"
          git config user.email "role-orchestrator@ai-devops-system"
          git pull --rebase --autostash origin main || true
          git add governance/proofs/BEM932_role_orchestrator_provider_router_receipt.json
          git commit -m "BEM932 role orchestrator provider router receipt" || echo "No receipt changes"
          git push || true
