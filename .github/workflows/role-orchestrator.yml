name: Role Orchestrator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'start | advance | watchdog'
        required: true
        default: 'start'
        type: string
      task_type:
        description: 'default_development | hotfix | audit_only | architecture_change'
        required: false
        default: 'default_development'
        type: string
      task:
        description: 'Task body'
        required: false
        default: ''
        type: string
      trace_id:
        description: 'Trace id'
        required: false
        default: ''
        type: string
      cycle_id:
        description: 'Cycle id'
        required: false
        default: ''
        type: string
      role:
        description: 'Current role for advance'
        required: false
        default: ''
        type: string
      status:
        description: 'ROLE_DONE | APPROVED | BLOCKED | REJECTED'
        required: false
        default: 'ROLE_DONE'
        type: string
      note:
        description: 'Result note'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  orchestrate:
    name: Role Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}

      - name: Run role orchestrator
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          AI_SYSTEM_GITHUB_PAT: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: main
          MAIN_ISSUE: '31'
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_TASK_TYPE: ${{ inputs.task_type }}
          INPUT_TASK: ${{ inputs.task }}
          INPUT_TRACE_ID: ${{ inputs.trace_id }}
          INPUT_CYCLE_ID: ${{ inputs.cycle_id }}
          INPUT_ROLE: ${{ inputs.role }}
          INPUT_STATUS: ${{ inputs.status }}
          INPUT_NOTE: ${{ inputs.note }}
        run: |
          set +e
          MODE="${INPUT_MODE:-watchdog}"
          TASK_TYPE="${INPUT_TASK_TYPE:-default_development}"
          TASK="${INPUT_TASK:-}"
          TRACE_ID="${INPUT_TRACE_ID:-}"
          CYCLE_ID="${INPUT_CYCLE_ID:-}"
          ROLE="${INPUT_ROLE:-}"
          STATUS="${INPUT_STATUS:-ROLE_DONE}"
          NOTE="${INPUT_NOTE:-}"

          python3 scripts/role_orchestrator.py \
            --mode "$MODE" \
            --task-type "$TASK_TYPE" \
            --task "$TASK" \
            --trace-id "$TRACE_ID" \
            --cycle-id "$CYCLE_ID" \
            --role "$ROLE" \
            --status "$STATUS" \
            --note "$NOTE"
          echo "ORCHESTRATOR_EXIT=$?" >> "$GITHUB_ENV"
          echo "ORCHESTRATOR_MODE=$MODE" >> "$GITHUB_ENV"
          exit 0

      - name: Commit role orchestration state
        shell: bash
        run: |
          set -e
          git config user.email "role-orchestrator@ai-devops-system"
          git config user.name "Role Orchestrator"

          git pull --rebase --autostash origin main

          git add governance/state/role_cycle_state.json governance/state/provider_status.json governance/events/role_orchestrator.jsonl governance/events/provider_adapter.jsonl || true
          if git diff --cached --quiet; then
            echo "No role orchestrator state changes"
            exit 0
          fi

          git commit -m "ROLE ORCHESTRATOR: state update"

          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Push attempt $i failed; retrying after rebase"
            sleep $((i * 2))
          done

          echo "Failed to push role orchestrator state after retries"
          exit 1

      - name: Post role orchestrator report
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AI_SYSTEM_GITHUB_PAT }}
          script: |
            const body = [
              'BEM-ROLE-ORCHESTRATOR | RUN RESULT',
              '',
              `Mode: ${process.env.ORCHESTRATOR_MODE || '${{ inputs.mode }}' || 'watchdog'}`,
              `Exit: ${process.env.ORCHESTRATOR_EXIT || 'unknown'}`,
              '',
              'Checklist:',
              '- role orchestrator workflow executed',
              '- state/event log commit attempted',
              '- internal transport uses workflow_dispatch, not issue_comment chaining',
              '- watchdog marks stale runner-backed dispatch as blocked'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 31,
              body
            });
