name: Role Orchestrator

on:
  workflow_dispatch:
    inputs:
      cycle_id:
        description: Internal cycle id
        required: true
        type: string

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decide next role from transport
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
        run: python3 scripts/role_orchestrator_decide.py
      - name: Commit orchestration decision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add governance/transport/results.jsonl governance/state/role_cycle_state.json
          git commit -m "Role orchestrator decision ${{ inputs.cycle_id }}" || echo "No changes"
          git push
